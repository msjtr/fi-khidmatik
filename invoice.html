<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفاتورة | منصة في خدمتك</title>
    <style>
        /* ============================================
           RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* ============================================
           INVOICE CONTAINER
           ============================================ */
        .invoice-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ============================================
           INVOICE CARD
           ============================================ */
        .invoice {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* ============================================
           INVOICE CONTENT
           ============================================ */
        .invoice-content {
            padding: 30px;
        }

        /* ============================================
           TOP MARGIN SECTION
           ============================================ */
        .top-margin {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        /* ============================================
           LOGO
           ============================================ */
        .logo-center {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-center img {
            max-width: 100px;
            height: auto;
        }
        .logo-placeholder {
            font-size: 24px;
            font-weight: bold;
            color: #1e3a8a;
        }

        /* ============================================
           INVOICE HEADER
           ============================================ */
        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e2e8f0;
        }
        .invoice-number {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a8a;
        }
        .invoice-number span {
            background: #e0e7ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-right: 8px;
        }
        .invoice-date {
            font-size: 14px;
            color: #475569;
        }

        /* ============================================
           PARTIES SECTION
           ============================================ */
        .invoice-parties {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
        }
        .invoice-from, .invoice-to {
            flex: 1;
            padding: 18px;
            border-radius: 12px;
        }
        .invoice-from {
            background: #fef9e3;
            border-right: 4px solid #f59e0b;
        }
        .invoice-to {
            background: #e0f2fe;
            border-right: 4px solid #0284c7;
        }
        .invoice-from h3, .invoice-to h3 {
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .invoice-from p, .invoice-to p {
            font-size: 13px;
            line-height: 1.7;
            color: #334155;
        }

        /* ============================================
           PAYMENT & SHIPPING
           ============================================ */
        .payment-shipping {
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }
        .payment-shipping span {
            background: white;
            padding: 6px 15px;
            border-radius: 25px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* ============================================
           PRODUCTS TABLE
           ============================================ */
        .products-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        .products-table th {
            background: #1e3a8a;
            color: white;
            padding: 12px 8px;
            font-size: 14px;
            border: 1px solid #2e4a9a;
        }
        .products-table td {
            padding: 10px 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
            font-size: 13px;
            background: white;
        }

        /* ============================================
           TOTALS SECTION
           ============================================ */
        .totals-wrapper {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .totals-labels p, .totals-values p {
            margin: 6px 0;
        }
        .totals-labels {
            text-align: right;
            font-weight: 600;
        }
        .totals-values {
            text-align: left;
            font-weight: 600;
            color: #059669;
        }
        .grand-total {
            text-align: center;
            padding: 0 20px;
            border-right: 1px solid #cbd5e1;
            border-left: 1px solid #cbd5e1;
        }
        .grand-total h2 {
            font-size: 20px;
            color: #1e3a8a;
            margin: 0;
        }

        /* ============================================
           CONTACT BAR
           ============================================ */
        .contact-bar {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            font-size: 13px;
        }

        /* ============================================
           THANKS FOOTER
           ============================================ */
        .thanks {
            text-align: center;
            padding-top: 15px;
            font-size: 14px;
            color: #475569;
            border-top: 1px solid #e2e8f0;
        }

        /* ============================================
           BUTTONS
           ============================================ */
        .buttons {
            text-align: center;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-pdf { background: #dc2626; color: white; }
        .btn-print { background: #2563eb; color: white; }
        .btn-new { background: #f59e0b; color: white; }

        /* ============================================
           EMPTY STATE
           ============================================ */
        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            font-size: 18px;
            color: #666;
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            .invoice-content { padding: 15px; }
            .invoice-parties { flex-direction: column; gap: 15px; }
            .invoice-header { flex-direction: column; text-align: center; gap: 10px; }
            .invoice-number { text-align: center; }
            .totals-wrapper { flex-direction: column; text-align: center; gap: 12px; }
            .grand-total { border: none; padding: 10px 0; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; }
            .products-table th, .products-table td { padding: 6px 3px; font-size: 11px; }
            .payment-shipping { flex-direction: column; align-items: center; }
            .contact-bar { gap: 12px; font-size: 11px; }
            .top-margin { font-size: 10px; flex-wrap: wrap; gap: 5px; text-align: center; }
            button { padding: 8px 20px; font-size: 12px; }
        }

        /* ============================================
           PRINT STYLES - إصلاح كامل للطباعة
           ============================================ */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            
            .buttons, button {
                display: none !important;
            }
            
            .invoice-container {
                max-width: 100%;
                margin: 0;
                padding: 0;
            }
            
            .invoice {
                box-shadow: none;
                border-radius: 0;
                margin: 0;
                padding: 0;
                background: white;
                overflow: visible;
            }
            
            .invoice-content {
                padding: 0.5cm !important;
            }
            
            .top-margin {
                background: #f1f5f9;
                color: #333;
                margin-bottom: 15px;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .invoice-from, .invoice-to,
            .payment-shipping span,
            .contact-bar {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .products-table th {
                background: #1e3a8a;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .invoice-parties, .payment-shipping, .totals-wrapper, .contact-bar {
                page-break-inside: avoid;
            }
            
            .products-table tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }
            
            .products-table td, .products-table th {
                border: 1px solid #ccc;
            }
            /* ضمان عرض جميع الأعمدة في الطباعة */
            .products-table {
                width: 100%;
                table-layout: fixed;
            }
            .products-table th:nth-child(1), .products-table td:nth-child(1) { width: 20%; } /* اسم المنتج */
            .products-table th:nth-child(2), .products-table td:nth-child(2) { width: 10%; } /* الكود */
            .products-table th:nth-child(3), .products-table td:nth-child(3) { width: 25%; } /* الوصف */
            .products-table th:nth-child(4), .products-table td:nth-child(4) { width: 8%; } /* الكمية */
            .products-table th:nth-child(5), .products-table td:nth-child(5) { width: 12%; } /* السعر */
            .products-table th:nth-child(6), .products-table td:nth-child(6) { width: 10%; } /* الخصم */
            .products-table th:nth-child(7), .products-table td:nth-child(7) { width: 15%; } /* الإجمالي */
        }
    </style>
</head>
<body>

<div class="invoice-container" id="invoiceContent"></div>

<div class="buttons">
    <button class="btn-pdf" onclick="downloadPDF()">📥 تحميل PDF</button>
    <button class="btn-print" onclick="window.print()">🖨️ طباعة</button>
    <button class="btn-new" onclick="newOrder()">🔄 طلب جديد</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
// ============================================================
// نظام الفواتير الإلكتروني - منصة في خدمتك (النسخة المحسنة)
// ============================================================

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// دالة لإنشاء بيانات تجريبية في حالة عدم وجود بيانات حقيقية
function createDemoOrder() {
    const demoOrder = {
        orderNumber: "FK-DEMO-001",
        customer: "عميل تجريبي",
        city: "الرياض",
        district: "الملك فهد",
        street: "الطريق العام",
        building: "برج الأعمال",
        extra: "1234",
        postal: "12345",
        phone: "05XXXXXXXX",
        email: "demo@example.com",
        payment: "مدى",
        shipping: "شحن سريع",
        date: new Date().toISOString().slice(0,10),
        time: new Date().toLocaleTimeString('ar-SA'),
        cart: [
            { name: "منتج تجريبي 1", code: "P001", desc: "وصف المنتج الأول", qty: 2, price: 150.00, discount: 10.00 },
            { name: "منتج تجريبي 2", code: "P002", desc: "وصف المنتج الثاني", qty: 1, price: 300.00, discount: 0.00 },
            { name: "منتج تجريبي 3", code: "P003", desc: "وصف المنتج الثالث", qty: 3, price: 75.00, discount: 25.00 }
        ]
    };
    localStorage.setItem('currentOrder', JSON.stringify(demoOrder));
    return demoOrder;
}

function loadInvoice() {
    let orderData = localStorage.getItem('currentOrder');
    let order;
    
    if (!orderData) {
        // إذا لم توجد بيانات، نقوم بإنشاء بيانات تجريبية
        order = createDemoOrder();
    } else {
        try {
            order = JSON.parse(orderData);
        } catch(e) {
            console.error("خطأ في قراءة البيانات:", e);
            order = createDemoOrder();
        }
    }

    // التأكد من وجود مصفوفة المنتجات
    let items = order.cart || order.items || [];
    if (!items.length) {
        // إذا كانت السلة فارغة، نستخدم البيانات التجريبية
        order = createDemoOrder();
        items = order.cart;
    }

    let cartRows = '';
    let subtotal = 0;
    let totalDiscount = 0;

    for (let i = 0; i < items.length; i++) {
        let item = items[i];
        let price = parseFloat(item.price) || 0;
        let qty = parseInt(item.qty) || 1;
        let discount = parseFloat(item.discount) || 0;
        let itemTotal = (price * qty) - discount;
        
        subtotal += price * qty;
        totalDiscount += discount;

        cartRows += `
            <tr>
                <td>${escapeHtml(item.name || '-')}</td>
                <td>${escapeHtml(item.code || '-')}</td>
                <td>${escapeHtml(item.desc || '-')}</td>
                <td>${qty}</td>
                <td>${price.toFixed(2)}</td>
                <td>${discount.toFixed(2)}</td>
                <td>${itemTotal.toFixed(2)}</td>
            </tr>
        `;
    }

    let taxableAmount = subtotal - totalDiscount;
    let tax = taxableAmount * 0.15;
    let grandTotal = taxableAmount + tax;

    // تنسيق التاريخ
    let displayDate = order.date || '-';
    if (displayDate && displayDate.match(/^\d{4}-\d{2}-\d{2}$/)) {
        let parts = displayDate.split('-');
        displayDate = parts[2] + '-' + parts[1] + '-' + parts[0];
    }

    // تنسيق الوقت
    let timeDisplay = '';
    if (order.time && order.time !== '-') {
        timeDisplay = ' - ' + order.time;
    }

    // بناء الفاتورة
    let html = `
        <div class="invoice" id="invoiceToPrint">
            <div class="invoice-content">
                <div class="top-margin">
                    <div>رقم شهادة العمل الحر: FL-765735204</div>
                    <div>الرقم الضريبي: 312495447600003</div>
                </div>

                <div class="logo-center">
                    <img src="images/logo.svg" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'logo-placeholder\'>منصة في خدمتك</div>';" alt="شعار المنصة">
                </div>

                <div class="invoice-header">
                    <div class="invoice-number">
                        رقم الفاتورة: <span>${escapeHtml(order.orderNumber || 'FK-0000')}</span>
                    </div>
                    <div class="invoice-date">
                        التاريخ: ${displayDate}${timeDisplay}
                    </div>
                </div>

                <div class="invoice-parties">
                    <div class="invoice-from">
                        <h3>📌 مصدرة من</h3>
                        <p>
                            <strong>منصة في خدمتك</strong><br>
                            المملكة العربية السعودية<br>
                            حائل - حي النقرة - شارع سعد المشاط - مبنى 3085<br>
                            الرقم الإضافي: 7718 - الرمز البريدي: 55431
                        </p>
                    </div>
                    <div class="invoice-to">
                        <h3>📌 مصدرة إلى</h3>
                        <p>
                            <strong>${escapeHtml(order.customer) || '-'}</strong><br>
                            المملكة العربية السعودية<br>
                            ${escapeHtml(order.city || '')} ${order.district ? '- ' + escapeHtml(order.district) : ''} ${order.street ? '- ' + escapeHtml(order.street) : ''} ${order.building ? '- ' + escapeHtml(order.building) : ''}<br>
                            ${order.extra ? 'الرقم الإضافي: ' + escapeHtml(order.extra) + ' - ' : ''}${order.postal ? 'الرمز البريدي: ' + escapeHtml(order.postal) : ''}<br>
                            هاتف: ${escapeHtml(order.phone) || '-'}<br>
                            بريد: ${escapeHtml(order.email) || 'غير مدخل'}
                        </p>
                    </div>
                </div>

                <div class="payment-shipping">
                    <span>💳 طريقة الدفع: ${escapeHtml(order.payment) || '-'}</span>
                    ${order.payment === 'تمارا' && order.tamaraAuth ? `<span>🔑 رمز الموافقة: ${escapeHtml(order.tamaraAuth)}</span>` : ''}
                    <span>🚚 خدمة الشحن: ${escapeHtml(order.shipping) || '-'}</span>
                </div>

                <h3 style="margin: 0 0 15px 0;">📦 تفاصيل الطلب</h3>
                <table class="products-table">
                    <thead>
                        <tr>
                            <th>اسم المنتج</th>
                            <th>كود المنتج</th>
                            <th>الوصف</th>
                            <th>الكمية</th>
                            <th>السعر</th>
                            <th>الخصم</th>
                            <th>الإجمالي</th>
                        </tr>
                    </thead>
                    <tbody>${cartRows}</tbody>
                </table>

                <div class="totals-wrapper">
                    <div class="totals-labels">
                        <p>المجموع الفرعي</p>
                        <p>الخصم الكلي</p>
                        <p>الضريبة (15%)</p>
                    </div>
                    <div class="totals-values">
                        <p>${subtotal.toFixed(2)} ريال</p>
                        <p>${totalDiscount.toFixed(2)} ريال</p>
                        <p>${tax.toFixed(2)} ريال</p>
                    </div>
                    <div class="grand-total">
                        <h2>الإجمالي النهائي: ${grandTotal.toFixed(2)} ريال</h2>
                    </div>
                </div>

                <div class="contact-bar">
                    <span>📞 +966597771565</span>
                    <span>✉️ info@fi-khidmatik.com</span>
                    <span>🌐 www.khidmatik.com</span>
                </div>

                <div class="thanks">
                    شكراً لتسوقكم معنا
                </div>
            </div>
        </div>
    `;

    document.getElementById('invoiceContent').innerHTML = html;
}

function downloadPDF() {
    let element = document.getElementById('invoiceToPrint');
    if (!element) {
        alert('لا يوجد فاتورة للتحميل');
        return;
    }

    // إنشاء اسم الملف من بيانات العميل والتاريخ
    let orderData = localStorage.getItem('currentOrder');
    let fileName = 'فاتورة';
    
    if (orderData) {
        try {
            let order = JSON.parse(orderData);
            let customerName = (order.customer || 'عميل').replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '');
            let today = new Date();
            let day = today.getDate();
            let month = today.getMonth() + 1;
            let year = today.getFullYear();
            fileName = `${customerName}_${day}-${month}-${year}`;
        } catch(e) {}
    }

    // إعدادات عالية الجودة للـ PDF
    const opt = {
        margin: [0.3, 0.3, 0.3, 0.3],
        filename: `${fileName}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
            scale: 3,
            letterRendering: true,
            useCORS: false,
            logging: false
        },
        jsPDF: { 
            unit: 'in', 
            format: 'a4', 
            orientation: 'portrait'
        }
    };

    // تعطيل الزر أثناء التحميل - نستخدم event أو نجد الزر بطريقة أخرى
    let btns = document.querySelectorAll('.btn-pdf');
    let btn = btns[0];
    if (!btn) return;
    
    let originalText = btn.innerHTML;
    btn.innerHTML = '⏳ جاري التحضير...';
    btn.disabled = true;

    html2pdf().set(opt).from(element).save()
        .then(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
        })
        .catch(function(err) {
            console.error('PDF error:', err);
            alert('حدث خطأ أثناء إنشاء PDF، يرجى المحاولة مرة أخرى');
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
}

function newOrder() {
    localStorage.removeItem('currentOrder');
    // يمكن توجيه المستخدم إلى صفحة إنشاء الطلب، أو إعادة تحميل الصفحة لإنشاء طلب جديد
    window.location.href = "index.html"; // تأكد من وجود ملف index.html في نفس المسار
    // إذا لم يكن موجوداً، يمكن إعادة تحميل الصفحة الحالية مع إنشاء طلب جديد
    // window.location.reload();
}

// تحميل الفاتورة عند اكتمال تحميل الصفحة
window.onload = loadInvoice;
</script>

</body>
</html>
