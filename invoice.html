<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفاتورة | منصة في خدمتك</title>
    <style>
        /* ============================================
           التنسيقات الأساسية - موحدة وخالية من التعارض
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .invoice-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .invoice {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .invoice-content {
            padding: 30px;
        }

        .top-margin {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .logo-center {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-center img {
            max-width: 100px;
            height: auto;
        }
        .logo-placeholder {
            font-size: 24px;
            font-weight: bold;
            color: #1e3a8a;
        }

        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid #e2e8f0;
        }
        .invoice-number {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a8a;
        }
        .invoice-number span {
            background: #e0e7ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-right: 8px;
        }
        .invoice-date {
            font-size: 14px;
            color: #475569;
        }

        .invoice-parties {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
        }
        .invoice-from, .invoice-to {
            flex: 1;
            padding: 18px;
            border-radius: 12px;
        }
        .invoice-from {
            background: #fef9e3;
            border-right: 4px solid #f59e0b;
        }
        .invoice-to {
            background: #e0f2fe;
            border-right: 4px solid #0284c7;
        }
        .invoice-from h3, .invoice-to h3 {
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .invoice-from p, .invoice-to p {
            font-size: 13px;
            line-height: 1.7;
            color: #334155;
        }

        .payment-shipping {
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }
        .payment-shipping span {
            background: white;
            padding: 6px 15px;
            border-radius: 25px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .products-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        .products-table th {
            background: #1e3a8a;
            color: white;
            padding: 12px 8px;
            font-size: 14px;
            border: 1px solid #2e4a9a;
        }
        .products-table td {
            padding: 10px 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
            font-size: 13px;
            background: white;
        }

        .totals-wrapper {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .totals-labels p, .totals-values p {
            margin: 6px 0;
        }
        .totals-labels {
            text-align: right;
            font-weight: 600;
        }
        .totals-values {
            text-align: left;
            font-weight: 600;
            color: #059669;
        }
        .grand-total {
            text-align: center;
            padding: 0 20px;
            border-right: 1px solid #cbd5e1;
            border-left: 1px solid #cbd5e1;
        }
        .grand-total h2 {
            font-size: 20px;
            color: #1e3a8a;
            margin: 0;
        }

        .contact-bar {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .thanks {
            text-align: center;
            padding-top: 15px;
            font-size: 14px;
            color: #475569;
            border-top: 1px solid #e2e8f0;
        }

        .buttons {
            text-align: center;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-pdf { background: #dc2626; color: white; }
        .btn-print { background: #2563eb; color: white; }
        .btn-png { background: #10b981; color: white; }
        .btn-new { background: #f59e0b; color: white; }

        .error-state, .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            font-size: 18px;
        }
        .error-state { color: #dc2626; }
        .empty-state { color: #666; }

        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            .invoice-content { padding: 15px; }
            .invoice-parties { flex-direction: column; gap: 15px; }
            .invoice-header { flex-direction: column; text-align: center; gap: 10px; }
            .totals-wrapper { flex-direction: column; text-align: center; gap: 12px; }
            .grand-total { border: none; padding: 10px 0; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; }
            .products-table th, .products-table td { padding: 6px 3px; font-size: 11px; }
            .payment-shipping { flex-direction: column; align-items: center; }
            .contact-bar { gap: 12px; font-size: 11px; }
            .top-margin { font-size: 10px; flex-wrap: wrap; gap: 5px; text-align: center; }

            button { padding: 8px 16px; font-size: 12px; }
        }

           تنسيق الطباعة - منع القطع بشكل نهائي
           ============================================ */
        @media print {

                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            .invoice-container {

                padding: 0 !important;
            }
            
            .invoice {
                box-shadow: none !important;
                border-radius: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                overflow: visible !important;

            .thanks,

            .products-table th:nth-child(6) { width: 12%; }
            .products-table th:nth-child(7) { width: 18%; }
            
            .top-margin,
            .invoice-from,
            .invoice-to,
            .payment-shipping span,
            .contact-bar,
            .products-table th {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            
            .top-margin {
                background: #f1f5f9 !important;
                color: #333 !important;
                margin-bottom: 10px !important;
                padding: 6px 12px !important;
            }
            
            .invoice-from p, 
            .invoice-to p {
                font-size: 11px !important;
                line-height: 1.4 !important;
            }
            
            .grand-total h2 {
                font-size: 16px !important;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="invoice-container" id="invoiceContent">
    <div class="empty-state">⏳ جاري تحميل الفاتورة...</div>
</div>

<div class="buttons">
    <button class="btn-pdf" onclick="saveAsPDF()">📥 حفظ كـ PDF</button>
    <button class="btn-png" onclick="saveAsPNG()">🖼️ حفظ كـ PNG</button>
    <button class="btn-print" onclick="printInvoice()">🖨️ طباعة</button>
    <button class="btn-new" onclick="newOrder()">🔄 طلب جديد</button>
</div>

<script>
    // ============================================
    // دوال مساعدة
    // ============================================
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showError(message) {
        document.getElementById('invoiceContent').innerHTML = `
            <div class="error-state">
                ❌ ${message}<br><br>
                <button onclick="window.location.href='index.html'" style="padding:10px 20px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer;">
                    العودة لإنشاء طلب
                </button>
            </div>
        `;
    }

    function showLoading(btn, originalText) {
        btn.innerHTML = '⏳ جاري التحضير...';
        btn.disabled = true;
    }

    function hideLoading(btn, originalText) {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }

    // انتظار تحميل الصور
    async function waitForImages(element) {
        const images = element.querySelectorAll('img');
        await Promise.all(Array.from(images).map(img => {
            if (img.complete) return Promise.resolve();
            return new Promise(resolve => {
                img.onload = resolve;
                img.onerror = resolve;
            });
        }));
    }

    // ============================================
    // حفظ كـ PDF - طريقة محسنة
    // ============================================
   async function saveAsPDF() {
    const element = document.getElementById('invoiceToPrint');
    if (!element) {
        alert('لا توجد فاتورة للتحميل');
        return;
    }

    const btn = document.querySelector('.btn-pdf');
    const originalText = btn.innerHTML;
    showLoading(btn, originalText);

    await waitForImages(element);

    try {
        const canvas = await html2canvas(element, {
            scale: 3,
            useCORS: true,
            backgroundColor: "#ffffff",
            scrollY: -window.scrollY
        });

        const imgData = canvas.toDataURL("image/jpeg", 1.0);

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');

        const pageWidth = 210;
        const pageHeight = 297;

        const imgWidth = pageWidth;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;

        let position = 0;
let remainingHeight = imgHeight;

pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
remainingHeight -= pageHeight;

while (remainingHeight > 0) {
    position = -(imgHeight - remainingHeight);
    pdf.addPage();
    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
    remainingHeight -= pageHeight;
}

        pdf.save(`فاتورة_${new Date().toISOString().slice(0,10)}.pdf`);

    } catch (err) {
        console.error(err);
        alert('حدث خطأ، سيتم استخدام الطباعة');
        window.print();
    } finally {
        hideLoading(btn, originalText);
    }
}

    // ============================================
    // حفظ كـ PNG - ميزة جديدة
    // ============================================
    async function saveAsPNG() {
        const element = document.getElementById('invoiceToPrint');
        if (!element) {
            alert('لا توجد فاتورة للتحميل');
            return;
        }

        const btn = document.querySelector('.btn-png');
        const originalText = btn.innerHTML;
        showLoading(btn, originalText);

        await waitForImages(element);

        try {
            // إنشاء canvas من العنصر
            const canvas = await html2canvas(element, {
                scale: 3,
                backgroundColor: '#ffffff',
                logging: false,
                useCORS: false,
                windowWidth: element.scrollWidth,
                windowHeight: element.scrollHeight
            });
            
            // تحويل canvas إلى رابط صورة
            const link = document.createElement('a');
            link.download = `فاتورة_${new Date().toISOString().slice(0,10)}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            alert('✅ تم حفظ الفاتورة كصورة PNG بنجاح');
        } catch (err) {
            console.error('PNG error:', err);
            alert('❌ حدث خطأ في حفظ الصورة');
        } finally {
            hideLoading(btn, originalText);
        }
    }

    // ============================================
    // طباعة - استخدام الطباعة المدمجة
    // ============================================
async function printInvoice() {
    const element = document.getElementById('invoiceToPrint');
    if (!element) {
        alert('لا توجد فاتورة للطباعة');
        return;
    }

    await waitForImages(element);

    const canvas = await html2canvas(element, {
        scale: 3,
        useCORS: true,
        backgroundColor: "#ffffff"
    });

    const pageWidth = 210;
    const pageHeight = 297;

    const pages = [];

    const pageHeightPx = (pageHeight * canvas.width) / pageWidth;

    let currentPosition = 0;

    while (currentPosition < canvas.height) {
        const pageCanvas = document.createElement('canvas');
        const pageCtx = pageCanvas.getContext('2d');

        const sliceHeight = Math.min(pageHeightPx, canvas.height - currentPosition);

        pageCanvas.width = canvas.width;
        pageCanvas.height = sliceHeight;

        pageCtx.drawImage(
            canvas,
            0,
            currentPosition,
            canvas.width,
            sliceHeight,
            0,
            0,
            canvas.width,
            sliceHeight
        );

        pages.push(pageCanvas.toDataURL("image/jpeg", 1.0));

        currentPosition += sliceHeight;
    }

    const printWindow = window.open('', '_blank');

    printWindow.document.write(`
        <html>
        <head>
            <title>طباعة الفاتورة</title>
            <style>
                body {
                    margin: 0;
                    padding: 0;
                }
                img {
                    width: 100%;
                    display: block;
                    page-break-after: always;
                }
                img:last-child {
                    page-break-after: auto;
                }
                @page {
                    size: A4;
                    margin: 0;
                }
            </style>
        </head>
        <body>
            ${pages.map(p => `<img src="${p}" />`).join('')}
        </body>
        </html>
    `);

    printWindow.document.close();

    printWindow.onload = function () {
        printWindow.focus();
        printWindow.print();
        printWindow.close();
    };
}
    // ============================================
    // عرض الفاتورة
    // ============================================
    async function loadInvoice() {
        let order = null;

        // محاولة جلب من Firebase أو localStorage
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');

        if (orderId && typeof window.getOrderFromFirebase === 'function') {
            try {
                order = await window.getOrderFromFirebase(orderId);
                if (order) {
                    localStorage.setItem('currentOrder', JSON.stringify(order));
                }
            } catch(e) {
                console.warn('فشل جلب من Firebase', e);
            }
        }

        if (!order) {
            const stored = localStorage.getItem('currentOrder');
            if (stored) {
                try {
                    order = JSON.parse(stored);
                } catch(e) {
                    console.error(e);
                }
            }
        }

        if (!order) {
            showError("لا توجد بيانات للفاتورة. يرجى إنشاء طلب أولاً.");
            return;
        }

        let items = order.cart || order.items || [];
        if (!items.length) {
            showError("السلة فارغة. لا توجد منتجات لعرضها.");
            return;
        }

        let cartRows = '';
        let subtotal = 0;
        let totalDiscount = 0;

        for (let i = 0; i < items.length; i++) {
            let item = items[i];
            let price = parseFloat(item.price) || 0;
            let qty = parseInt(item.qty) || 1;
            let discount = parseFloat(item.discount) || 0;
            let itemTotal = (price * qty) - discount;
            
            subtotal += price * qty;
            totalDiscount += discount;

            cartRows += `
                <tr>
                    <td>${escapeHtml(item.name || '-')}</td>
                    <td>${escapeHtml(item.code || '-')}</td>
                    <td>${escapeHtml(item.desc || '-')}</td>
                    <td>${qty}</td>
                    <td>${price.toFixed(2)}</td>
                    <td>${discount.toFixed(2)}</td>
                    <td>${itemTotal.toFixed(2)}</td>
                </tr>
            `;
        }

        let taxableAmount = subtotal - totalDiscount;
        let tax = taxableAmount * 0.15;
        let grandTotal = taxableAmount + tax;

        let displayDate = order.date || '-';
        if (displayDate && displayDate.match(/^\d{4}-\d{2}-\d{2}$/)) {
            let parts = displayDate.split('-');
            displayDate = parts[2] + '-' + parts[1] + '-' + parts[0];
        }
        let timeDisplay = (order.time && order.time !== '-') ? ' - ' + order.time : '';

        let html = `
            <div class="invoice" id="invoiceToPrint">
                <div class="invoice-content">
                    <div class="top-margin">
                        <div>رقم شهادة العمل الحر: FL-765735204</div>
                        <div>الرقم الضريبي: 312495447600003</div>
                    </div>

                    <div class="logo-center">
                        <img src="images/logo.svg" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'logo-placeholder\\'>منصة في خدمتك</div>';" alt="شعار المنصة">
                    </div>

                    <div class="invoice-header">
                        <div class="invoice-number">
                            رقم الفاتورة: <span>${escapeHtml(order.orderNumber || 'FK-0000')}</span>
                        </div>
                        <div class="invoice-date">
                            التاريخ: ${displayDate}${timeDisplay}
                        </div>
                    </div>

                    <div class="invoice-parties">
                        <div class="invoice-from">
                            <h3>📌 مصدرة من</h3>
                            <p>
                                <strong>منصة في خدمتك</strong><br>
                                المملكة العربية السعودية<br>
                                حائل - حي النقرة - شارع سعد المشاط - مبنى 3085<br>
                                الرقم الإضافي: 7718 - الرمز البريدي: 55431
                            </p>
                        </div>
                        <div class="invoice-to">
                            <h3>📌 مصدرة إلى</h3>
                            <p>
                                <strong>${escapeHtml(order.customer) || '-'}</strong><br>
                                المملكة العربية السعودية<br>
                                ${escapeHtml(order.city || '')} ${order.district ? '- ' + escapeHtml(order.district) : ''} ${order.street ? '- ' + escapeHtml(order.street) : ''} ${order.building ? '- ' + escapeHtml(order.building) : ''}<br>
                                ${order.extra ? 'الرقم الإضافي: ' + escapeHtml(order.extra) + ' - ' : ''}${order.postal ? 'الرمز البريدي: ' + escapeHtml(order.postal) : ''}<br>
                                هاتف: ${escapeHtml(order.phone) || '-'}<br>
                                بريد: ${escapeHtml(order.email) || 'غير مدخل'}
                            </p>
                        </div>
                    </div>

                    <div class="payment-shipping">
                        <span>💳 طريقة الدفع: ${escapeHtml(order.payment) || '-'}</span>
                        ${order.payment === 'تمارا' && order.tamaraAuth ? `<span>🔑 رمز الموافقة: ${escapeHtml(order.tamaraAuth)}</span>` : ''}
                        <span>🚚 خدمة الشحن: ${escapeHtml(order.shipping) || '-'}</span>
                    </div>

                    <h3 style="margin: 0 0 15px 0;">📦 تفاصيل الطلب</h3>
                    <table class="products-table">
                        <thead>
                            <tr>
                                <th>اسم المنتج</th>
                                <th>كود المنتج</th>
                                <th>الوصف</th>
                                <th>الكمية</th>
                                <th>السعر (ريال)</th>
                                <th>الخصم (ريال)</th>
                                <th>الإجمالي (ريال)</th>
                            </tr>
                        </thead>
                        <tbody>${cartRows}</tbody>
                    </table>

                    <div class="totals-wrapper">
                        <div class="totals-labels">
                            <p>المجموع الفرعي</p>
                            <p>الخصم الكلي</p>
                            <p>الضريبة (15%)</p>
                        </div>
                        <div class="totals-values">
                            <p>${subtotal.toFixed(2)} ريال</p>
                            <p>${totalDiscount.toFixed(2)} ريال</p>
                            <p>${tax.toFixed(2)} ريال</p>
                        </div>
                        <div class="grand-total">
                            <h2>الإجمالي النهائي: ${grandTotal.toFixed(2)} ريال</h2>
                        </div>
                    </div>

                    <div class="contact-bar">
                        <span>📞 +966597771565</span>
                        <span>✉️ info@fi-khidmatik.com</span>
                        <span>🌐 www.khidmatik.com</span>
                    </div>

                    <div class="thanks">
                        شكراً لتسوقكم معنا
                    </div>
                </div>
            </div>
        `;

        document.getElementById('invoiceContent').innerHTML = html;
    }

    // ربط الدوال بالنافذة
    window.loadInvoice = loadInvoice;
    window.saveAsPDF = saveAsPDF;
    window.saveAsPNG = saveAsPNG;
    window.printInvoice = printInvoice;
    window.newOrder = newOrder;

    // تحميل الفاتورة عند بدء الصفحة
    window.onload = () => {
        loadInvoice().catch(err => {
            console.error(err);
            showError("حدث خطأ غير متوقع أثناء تحميل الفاتورة.");
        });
    };
</script>
