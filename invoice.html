<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>فاتورة</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<div class="invoice" id="inv"></div>

<button onclick="pdf()">تحميل PDF</button>

<script>

let o=JSON.parse(localStorage.getItem("order"));

if(!o){
document.body.innerHTML="لا يوجد طلب";
throw "";
}

let rows="";
let total=0;

o.cart.forEach(p=>{
let t=p.price*p.qty;
total+=t;

rows+=`
<tr>
<td>${p.name}</td>
<td>${p.qty}</td>
<td>${p.price}</td>
<td>${t.toFixed(2)}</td>
</tr>`;
});

let tax=total*0.15;
let final=total+tax;

document.getElementById("inv").innerHTML=`

<h2>فاتورة إلكترونية</h2>

<h3>مصدرة من</h3>
منصة في خدمتك<br>
المملكة العربية السعودية<br>
حائل - حي النقرة - شارع سعد المشاط<br>

<hr>

<h3>مصدرة إلى</h3>

${o.customer}<br>
المملكة العربية السعودية<br><br>

${o.city} - حي ${o.district} - شارع ${o.street} - رقم المبنى ${o.building} - الرقم الإضافي ${o.extra} - الرمز البريدي ${o.postal}<br><br>

${o.phone}<br>
${o.email}

<table border="1" width="100%">
<tr>
<th>المنتج</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>

${rows}

</table>

<h3>المجموع: ${total.toFixed(2)}</h3>
<h3>الضريبة: ${tax.toFixed(2)}</h3>
<h2>الإجمالي: ${final.toFixed(2)}</h2>

`;

function pdf(){
html2pdf().from(document.getElementById("inv")).save("فاتورة.pdf");
}

</script>

</body>
</html>
