<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>فاتورة</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="invoice" id="inv"></div>

<script>

let o = JSON.parse(localStorage.getItem("order"));

let rows = "";
let total = 0;

o.cart.forEach(p=>{
let t = p.price * p.qty;
total += t;

rows += `<tr>
<td>${p.name}</td>
<td>${p.qty}</td>
<td>${p.price}</td>
<td>${t}</td>
</tr>`;
});

document.getElementById("inv").innerHTML = `

<h2>فاتورة إلكترونية</h2>

<div class="row">

<div class="box">
<h3>مصدرة من</h3>
منصة في خدمتك<br>
المملكة العربية السعودية<br>
حائل - حي النقرة - شارع سعد المشاط<br>
+966597771565<br>
info@fi-khidmatik.com<br>
www.khidmatik.com<br>
FL-765735204<br>
312495447600003
</div>

<div class="box">
<h3>مصدرة إلى</h3>

${o.customer}<br>
المملكة العربية السعودية<br><br>

${o.city} - حي ${o.district} - شارع ${o.street} - رقم المبنى ${o.building} - الرقم الإضافي ${o.extra} - الرمز البريدي ${o.postal}<br><br>

${o.phone}<br>
${o.email}
</div>

</div>

<table>
<tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
${rows}
</table>

<h3>المجموع: ${total.toFixed(2)} ريال</h3>

`;

</script>

</body>
</html>
