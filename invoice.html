<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فاتورة</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="invoice" id="invoice"></div>

<div style="text-align:center;">
<button onclick="downloadPDF()">تحميل PDF</button>
<button onclick="goHome()">العودة للرئيسية</button>
</div>

<script>

let order = JSON.parse(localStorage.getItem("currentOrder"));

if(!order){
document.getElementById("invoice").innerHTML = "<h3>لا يوجد طلب</h3>";
throw new Error("No data");
}

let subtotal = 0;
let rows = "";

order.cart.forEach(p=>{
let price = parseFloat(p.price) || 0;
let total = price;
subtotal += total;

rows += `
<tr>
<td>${p.name}</td>
<td>${p.desc || "-"}</td>
<td>1</td>
<td>${price}</td>
<td>${total}</td>
</tr>
`;
});

let tax = subtotal * 0.15;
let final = subtotal + tax;

document.getElementById("invoice").innerHTML = `

<div class="header">

<div class="logo">
<img src="images/logo.svg">
</div>

<div style="text-align:center;">
<h2>فاتورة إلكترونية</h2>
<p>منصة في خدمتك</p>
</div>

<div style="text-align:left;">
<p>رقم الطلب: ${order.order_number}</p>
<p>التاريخ: ${order.date}</p>
<p>الوقت: ${order.time}</p>
</div>

</div>

<hr>

<div class="row">

<!-- مصدرة من -->
<div class="box">
<h4>مصدرة من</h4>

<p>منصة في خدمتك</p>
<p>المملكة العربية السعودية</p>

<p>
المنطقة: حائل - الحي: النقرة - الشارع: سعد المشاط<br>
رقم المبنى: 3085 - الرقم الفرعي: 7718<br>
الرمز البريدي: 55431
</p>

<p>رقم الهاتف: +966597771565</p>
<p>البريد الإلكتروني: info@fi-khidmatik.com</p>
<p>الموقع الإلكتروني: www.khidmatik.com</p>

<p>رقم شهادة العمل الحر: FL-765735204</p>
<p>الرقم الضريبي: 312495447600003</p>
</div>

<!-- مصدرة إلى -->
<div class="box">
<h4>مصدرة إلى</h4>

<p>اسم العميل: ${order.customer || "-"}</p>
<p>الدولة: ${order.country || "-"}</p>
<p>المنطقة: ${order.region || "-"}</p>
<p>الحي: ${order.district || "-"}</p>
<p>الشارع: ${order.street || "-"}</p>

<p>
رقم المبنى: ${order.building || "-"} - 
الرقم الإضافي: ${order.extra || "-"}<br>
الرمز البريدي: ${order.postal || "-"}
</p>

<p>رقم الهاتف: ${order.phone || "-"}</p>
<p>البريد الإلكتروني: ${order.email || "-"}</p>

</div>

</div>

<hr>

<p>طريقة الدفع: ${order.payment}</p>
<p>رمز تمارا: ${order.tamara_auth || "-"}</p>
<p>طلب تمارا: ${order.tamara_order || "-"}</p>

<p>تفاصيل الشحن: ${order.shipping}</p>

<table>
<tr>
<th>المنتج</th>
<th>الوصف</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>

${rows}

</table>

<div class="total">
<p>مجموع السلة: ${subtotal}</p>
<p>الضريبة: ${tax.toFixed(2)}</p>
<h3>الإجمالي: ${final.toFixed(2)} ريال</h3>
</div>

`;

function downloadPDF(){
html2pdf().from(document.querySelector(".invoice")).save("فاتورة.pdf");
}

function goHome(){
window.location.href = "index.html";
}

</script>

</body>
</html>
