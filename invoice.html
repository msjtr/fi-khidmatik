<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>فاتورة إلكترونية</title>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- PNG -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  direction: rtl;
  font-family: Arial;
  margin: 20px;
}

.invoice-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.logo-circle {
  width: 80px;
  height: 80px;
  background: #1e3a8a;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-circle img {
  width: 50px;
}

.header-center {
  text-align: center;
  flex: 1;
}

.invoice-title {
  font-size: 26px;
  font-weight: bold;
}

.header-left {
  text-align: left;
  font-size: 14px;
}

.line {
  border-top: 1px solid #000;
  margin: 10px 0;
}

.row {
  display: flex;
  justify-content: space-between;
  gap: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #000;
  padding: 6px;
  text-align: center;
}

img.product {
  width: 40px;
}

@media print {
  body { margin: 0; }
  button { display:none; }
}
</style>
</head>

<body>

<div id="invoice"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
  authDomain: "msjt301-974bb.firebaseapp.com",
  projectId: "msjt301-974bb",
  storageBucket: "msjt301-974bb.firebasestorage.app",
  messagingSenderId: "186209858482",
  appId: "1:186209858482:web:186ca610780799ef562aab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= params =================
const params = new URLSearchParams(window.location.search);
const orderId = params.get("id");
const auto = params.get("auto");

// ================= تحميل البيانات =================
async function loadInvoice() {

  const orderSnap = await getDoc(doc(db, "orders", orderId));
  if (!orderSnap.exists()) {
    document.body.innerHTML = "الطلب غير موجود";
    return;
  }

  const order = orderSnap.data();

  const customersSnap = await getDocs(collection(db, "customers"));
  const productsSnap = await getDocs(collection(db, "products"));

  const customers = Object.fromEntries(customersSnap.docs.map(d => [d.id, d.data()]));
  const products = Object.fromEntries(productsSnap.docs.map(d => [d.id, d.data()]));

  const customer = customers[order.customerId] || {};

  let rows = "";
  let subtotal = 0;

  order.items?.forEach((item, i) => {
    const product = products[item.productId] || {};
    const total = item.qty * item.price;
    subtotal += total;

    rows += `
      <tr>
        <td>${i+1}</td>
        <td><img class="product" src="${product.image || './product.png'}"></td>
        <td>${product.name || "-"}</td>
        <td>${product.code || "-"}</td>
        <td>${item.qty}</td>
        <td>${item.price}</td>
        <td>${total}</td>
      </tr>
    `;
  });

  const tax = subtotal * 0.15;
  const finalTotal = subtotal + tax;

  document.getElementById("invoice").innerHTML = `
  <div class="invoice-container">

  <div class="invoice-header">
    <div class="logo-circle"><img src="./logo.png"></div>
    <div class="header-center"><div class="invoice-title">فاتورة إلكترونية</div></div>
    <div class="header-left">
      رقم شهادة العمل الحر: FL-765735204<br>
      الرقم الضريبي: 312495447600003
    </div>
  </div>

  <div class="line"></div>

  <div class="row">
    <div>رقم الفاتورة: ${orderId}</div>
    <div>التاريخ: ${order.date || "-"}</div>
  </div>

  <div class="line"></div>

  <div class="row">
    <div>
      <b>مصدرة من:</b><br>
      منصة في خدمتك
    </div>

    <div>
      <b>مصدرة إلى:</b><br>
      ${customer.name || "-"}<br>
      ${customer.phone || "-"}
    </div>
  </div>

  <div class="line"></div>

  <div id="paymentLine">
    الدفع: ${order.paymentMethod || "-"}
  </div>

  <div class="line"></div>

  <table>
    <tr>
      <th>#</th>
      <th>صورة</th>
      <th>اسم المنتج</th>
      <th>الكود</th>
      <th>الكمية</th>
      <th>السعر</th>
      <th>الإجمالي</th>
    </tr>
    ${rows}
  </table>

  <div class="line"></div>

  <div>
    المجموع: ${subtotal}<br>
    الضريبة: ${tax.toFixed(2)}<br>
    الإجمالي: ${finalTotal.toFixed(2)}
  </div>

  </div>
  `;

  runAutoAction();
}

// ================= تنفيذ تلقائي =================
function runAutoAction() {

  setTimeout(() => {

    if (auto === "print") {
      window.print();
    }

    if (auto === "pdf") {
      html2pdf().from(document.body).save(`invoice_${orderId}.pdf`);
    }

    if (auto === "png") {
      html2canvas(document.body).then(canvas => {
        const link = document.createElement("a");
        link.download = `invoice_${orderId}.png`;
        link.href = canvas.toDataURL();
        link.click();
      });
    }

  }, 500);
}

loadInvoice();
</script>

</body>
</html>
