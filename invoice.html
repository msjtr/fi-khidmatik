<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>فاتورة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="invoice" id="invoice"></div>

<button onclick="downloadPDF()">تحميل PDF</button>
<button onclick="location.href='index.html'">رجوع</button>

<script>

let order = JSON.parse(localStorage.getItem("currentOrder"));

let rows="", sub=0;

order.cart.forEach(p=>{
let t=p.price*p.qty;
sub+=t;

rows+=`<tr>
<td>${p.name}</td>
<td>${p.qty}</td>
<td>${p.price}</td>
<td>${t.toFixed(2)}</td>
</tr>`;
});

let tax=sub*0.15;

document.getElementById("invoice").innerHTML=`

<h2>فاتورة إلكترونية</h2>

<div class="row">

<div class="box">
<h4>مصدرة من</h4>
<p>منصة في خدمتك</p>
<p>المملكة العربية السعودية</p>
<p>حائل - حي النقرة - شارع سعد المشاط</p>
</div>

<div class="box">
<h4>مصدرة إلى</h4>
<p>${order.customer}</p>
<p>المملكة العربية السعودية</p>
<p>${order.city} - حي ${order.district} - شارع ${order.street} - رقم المبنى ${order.building} - الرقم الإضافي ${order.extra} - الرمز البريدي ${order.postal}</p>
</div>

</div>

<table>
<tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
${rows}
</table>

<h3>المجموع: ${sub}</h3>
<h3>الضريبة: ${tax.toFixed(2)}</h3>
<h2>الإجمالي: ${(sub+tax).toFixed(2)}</h2>
`;

function downloadPDF(){
html2pdf().from(invoice).save();
}
</script>

</body>
</html>
