<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفاتورة</title>

<style>
body {
    background: #f5f7fb;
    margin: 0;
    padding: 20px;
    font-family: 'Segoe UI', Tahoma;
}

.invoice {
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    max-width: 900px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.logo-center {
    text-align: center;
    margin-bottom: 15px;
}

.logo-center img {
    width: 120px;
}

.invoice-header {
    display: flex;
    justify-content: space-between;
}

.invoice-parties {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.products-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

.products-table th, .products-table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

.products-table th {
    background: #eee;
}

.totals-wrapper {
    margin-top: 20px;
}

.grand-total {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
    color: #1a73e8;
}

.action-buttons {
    text-align: center;
    margin-top: 20px;
}

button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    background: #1a73e8;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>

<body>

<div id="invoiceContent"></div>

<div class="action-buttons">
    <button onclick="downloadPDF()">📥 تحميل PDF</button>
    <button onclick="window.print()">🖨️ طباعة</button>
    <button onclick="newOrder()">🔄 طلب جديد</button>
</div>

<!-- مكتبة PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="js/order.js"></script>

</body>
</html>
