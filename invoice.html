<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>فاتورة</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="invoice" id="invoice"></div>

<div style="text-align:center;">
<button onclick="downloadPDF()">تحميل PDF</button>
<button onclick="goHome()">العودة للرئيسية</button>
</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders"));
let index = localStorage.getItem("currentOrder");
let order = orders[index];

let subtotal = 0;
let rows = "";

order.cart.forEach(p=>{

let total = parseFloat(p.price);

subtotal += total;

rows += `
<tr>
<td>${p.name}</td>
<td>${p.desc}</td>
<td>1</td>
<td>${p.price}</td>
<td>${total}</td>
</tr>
`;

});

let tax = subtotal * 0.15;
let final = subtotal + tax;

document.getElementById("invoice").innerHTML = `

<div class="header">

<div class="logo">
<img src="images/logo.svg">
</div>

<div>
<h2>فاتورة إلكترونية</h2>
<p>منصة في خدمتك</p>
</div>

</div>

<hr>

<p>رقم الطلب: ${order.order_number}</p>
<p>التاريخ: ${order.date}</p>
<p>الوقت: ${order.time}</p>

<hr>

<p>اسم العميل: ${order.customer}</p>
<p>العنوان: ${order.address}</p>
<p>الجوال: ${order.phone}</p>

<hr>

<p>تفاصيل الشحن: ${order.shipping}</p>

<table>
<tr>
<th>المنتج</th>
<th>الوصف</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>

${rows}

</table>

<div class="total">
<p>المجموع: ${subtotal}</p>
<p>الضريبة: ${tax.toFixed(2)}</p>
<h3>الإجمالي: ${final.toFixed(2)} ريال</h3>
</div>

`;

function downloadPDF(){
html2pdf().from(document.querySelector(".invoice")).save("فاتورة.pdf");
}

function goHome(){
window.location.href = "index.html";
}

</script>

</body>
</html>
