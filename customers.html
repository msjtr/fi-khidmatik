<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>العملاء</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { getCustomers, addCustomer, updateCustomer, deleteCustomer } from './js/admin.js';
        
        let customers = [];

        async function loadCustomers() {
            customers = await getCustomers();
            renderCustomers();
        }

        function renderCustomers() {
            const tbody = document.getElementById('customers-list');
            if (!tbody) return;
            
            if (customers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center p-6 text-gray-500">لا يوجد عملاء</td></tr>';
                return;
            }
            
            tbody.innerHTML = customers.map(c => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3 font-semibold">${c.name}</td>
                    <td class="p-3">${c.phone || '-'}</td>
                    <td class="p-3">${c.email || '-'}</td>
                    <td class="p-3">${c.address || '-'}</td>
                    <td class="p-3">
                        <button onclick="window.editCustomerItem('${c.id}')" class="text-blue-600 hover:text-blue-800 ml-2"><i class="fas fa-edit"></i></button>
                        <button onclick="window.deleteCustomerItem('${c.id}')" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        window.showAddCustomer = () => {
            const name = prompt('الاسم:');
            if (!name) return;
            const phone = prompt('رقم الهاتف:');
            const email = prompt('البريد الإلكتروني:');
            const address = prompt('العنوان:');
            
            addCustomer({ name, phone, email, address })
                .then(() => loadCustomers())
                .catch(err => alert('خطأ: ' + err.message));
        };

        window.editCustomerItem = async (id) => {
            const customer = customers.find(c => c.id === id);
            if (!customer) return;
            
            const name = prompt('الاسم الجديد:', customer.name);
            if (!name) return;
            const phone = prompt('الهاتف الجديد:', customer.phone);
            const email = prompt('البريد الجديد:', customer.email);
            const address = prompt('العنوان الجديد:', customer.address);
            
            await updateCustomer(id, { name, phone, email, address });
            loadCustomers();
        };

        window.deleteCustomerItem = async (id) => {
            if (confirm('هل أنت متأكد من حذف هذا العميل؟')) {
                await deleteCustomer(id);
                loadCustomers();
            }
        };

        loadCustomers();
        
        window.showAddCustomer = showAddCustomer;
        window.editCustomerItem = editCustomerItem;
        window.deleteCustomerItem = deleteCustomerItem;
    </script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold"><i class="fas fa-users ml-2"></i>إدارة العملاء</h2>
            <button onclick="showAddCustomer()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
                <i class="fas fa-plus ml-1"></i>عميل جديد
            </button>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full">
                <thead class="bg-gray-100">
                    <tr><th class="p-3">الاسم</th><th class="p-3">الهاتف</th><th class="p-3">البريد</th><th class="p-3">العنوان</th><th class="p-3">الإجراءات</th></tr>
                </thead>
                <tbody id="customers-list"><tr><td colspan="5" class="text-center p-6">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </div>
</body>
</html>
