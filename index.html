<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>طلب شراء</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h2>طلب شراء</h2>

<div class="top-section">
<input id="order_date" placeholder="التاريخ 11-03-2026">
<input id="order_time" type="time">
</div>

<hr>

<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الجوال">
<input id="email" placeholder="البريد الإلكتروني">

<hr>

<h3>العنوان</h3>

<input id="city" placeholder="المدينة">
<input id="district" placeholder="الحي">
<input id="street" placeholder="الشارع">
<input id="building" placeholder="رقم المبنى">
<input id="extra" placeholder="الرقم الإضافي">
<input id="postal" placeholder="الرمز البريدي">

<hr>

<h3>إضافة منتج</h3>

<input id="product_name" placeholder="اسم المنتج">
<input id="product_desc" placeholder="الوصف">
<input id="product_price" placeholder="السعر">

<button onclick="addToCart()">إضافة للسلة</button>

<div id="cart"></div>

<hr>

<select id="payment">
<option value="تمارا">تمارا</option>
<option value="تحويل">تحويل</option>
</select>

<input id="tamara_auth" placeholder="رمز الموافقة">
<input id="tamara_order" placeholder="رقم طلب تمارا">

<select id="shipping">
<option value="لا يحتاج شحن">لا يحتاج شحن</option>
<option value="يحتاج شحن">يحتاج شحن</option>
</select>

<button onclick="checkout()">تأكيد الطلب</button>

<hr>

<h3>معاينة البيانات</h3>
<div class="preview-box" id="preview"></div>

</div>

<script src="js/cart.js"></script>
<script src="js/order.js"></script>

<script>
function updatePreview(){

let name = nameInput.value || "-";
let phone = phoneInput.value || "-";
let email = emailInput.value || "-";

let city = cityInput.value;
let district = districtInput.value;
let street = streetInput.value;
let building = buildingInput.value;
let extra = extraInput.value;
let postal = postalInput.value;

preview.innerHTML = `
<b>مصدرة إلى</b><br><br>

اسم العميل: ${name}<br>
المملكة العربية السعودية<br><br>

${city} - حي ${district} - شارع ${street} - رقم المبنى ${building} - الرقم الإضافي ${extra} - الرمز البريدي ${postal}<br><br>

رقم الهاتف: ${phone}<br>
البريد الإلكتروني: ${email}
`;
}

// تعريف المتغيرات
let nameInput = document.getElementById("name");
let phoneInput = document.getElementById("phone");
let emailInput = document.getElementById("email");

let cityInput = document.getElementById("city");
let districtInput = document.getElementById("district");
let streetInput = document.getElementById("street");
let buildingInput = document.getElementById("building");
let extraInput = document.getElementById("extra");
let postalInput = document.getElementById("postal");

let preview = document.getElementById("preview");

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input", updatePreview);
});

updatePreview();
</script>

</body>
</html>
