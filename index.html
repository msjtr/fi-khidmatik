<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>طلب شراء</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h2>طلب شراء</h2>

<input id="order_number" placeholder="رقم الطلب">
<input id="order_date" placeholder="التاريخ (11-03-2026)">
  <input id="order_time" type="time">

<hr>

<input id="name" placeholder="اسم العميل">
<input id="address" placeholder="العنوان">
<input id="phone" placeholder="رقم الجوال">

<hr>

<h3>إضافة منتج</h3>

<input id="product_name" placeholder="اسم المنتج">
<input id="product_desc" placeholder="وصف المنتج">
<input id="product_price" placeholder="السعر">

<button onclick="addToCart()">إضافة للسلة</button>

<div id="cart"></div>

<hr>

<select id="payment">
<option>تمارا</option>
<option>تحويل</option>
</select>

<input id="tamara_auth" placeholder="رمز الموافقة">
<input id="tamara_order" placeholder="رقم طلب تمارا">

<select id="shipping">
<option>لا يحتاج شحن</option>
<option>يحتاج شحن</option>
</select>

<button onclick="checkout()">تأكيد الطلب</button>

</div>

<script src="js/cart.js"></script>
<script src="js/order.js"></script>

</body>
</html>
