<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب شراء | منصة في خدمتك</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* تنسيقات إضافية (يمكن وضعها في style.css) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px 20px; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo { max-width: 80px; margin-bottom: 15px; }
        .form-section { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-section h2 { color: #1e293b; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .form-group { margin-bottom: 5px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; transition: 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn-add, .btn-checkout { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-add { background: #f59e0b; color: white; }
        .btn-add:hover { background: #d97706; transform: translateY(-2px); }
        .btn-checkout { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-size: 18px; padding: 15px; }
        .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .cart-items { max-height: 400px; overflow-y: auto; }
        .cart-item { display: grid; grid-template-columns: 2fr 1fr 1.2fr 1fr 0.8fr 0.5fr; gap: 10px; align-items: center; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .cart-item:hover { background: #f8fafc; }
        .cart-item-info strong { display: block; color: #1e293b; }
        .cart-item-qty { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 28px; height: 28px; border: 1px solid #cbd5e1; background: white; border-radius: 6px; cursor: pointer; }
        .qty-btn:hover { background: #667eea; color: white; }
        .remove-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .remove-btn:hover { background: #dc2626; }
        .cart-total { background: #1e293b; color: white; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; text-align: left; margin-top: 15px; }
        .empty-cart { text-align: center; padding: 40px; color: #64748b; }
        .alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 50px; color: white; font-weight: bold; z-index: 1000; animation: slideDown 0.3s ease; }
        .alert-success { background: #10b981; }
        .alert-error { background: #ef4444; }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }
        @media (max-width: 768px) { .cart-item { grid-template-columns: 1fr; gap: 8px; text-align: center; } .cart-item-qty { justify-content: center; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="images/logo.svg" alt="شعار المنصة" class="logo" onerror="this.style.display='none'">
        <h1>📋 طلب شراء جديد</h1>
    </div>

    <!-- رقم الطلب -->
    <div class="form-section">
        <h2>🔢 رقم الطلب</h2>
        <div class="row">
            <div class="form-group">
                <input type="text" id="order_number_manual" placeholder="FK-0000" value="FK-0000">
            </div>
        </div>
    </div>

    <!-- التاريخ والوقت -->
    <div class="form-section">
        <h2>📅 التاريخ والوقت</h2>
        <div class="row">
            <div class="form-group"><input type="date" id="order_date"></div>
            <div class="form-group"><input type="time" id="order_time"></div>
        </div>
    </div>

    <!-- معلومات العميل -->
    <div class="form-section">
        <h2>👤 معلومات العميل</h2>
        <div class="row">
            <div class="form-group"><input type="text" id="name" placeholder="الاسم الكامل *"></div>
            <div class="form-group"><input type="tel" id="phone" placeholder="رقم الجوال *"></div>
            <div class="form-group"><input type="email" id="email" placeholder="البريد الإلكتروني"></div>
        </div>
    </div>

    <!-- العنوان -->
    <div class="form-section">
        <h2>📍 العنوان</h2>
        <div class="row">
            <div class="form-group"><input type="text" id="city" placeholder="المدينة"></div>
            <div class="form-group"><input type="text" id="district" placeholder="الحي"></div>
            <div class="form-group"><input type="text" id="street" placeholder="الشارع"></div>
            <div class="form-group"><input type="text" id="building" placeholder="رقم المبنى"></div>
            <div class="form-group"><input type="text" id="extra" placeholder="الرقم الإضافي"></div>
            <div class="form-group"><input type="text" id="postal" placeholder="الرمز البريدي"></div>
        </div>
    </div>

    <!-- إضافة منتج -->
    <div class="form-section">
        <h2>🛒 إضافة منتج</h2>
        <div class="row">
            <div class="form-group"><input type="text" id="product_code" placeholder="كود المنتج *"></div>
            <div class="form-group"><input type="text" id="product_name" placeholder="اسم المنتج *"></div>
            <div class="form-group"><input type="text" id="product_desc" placeholder="وصف المنتج"></div>
            <div class="form-group"><input type="number" id="product_price" placeholder="السعر *"></div>
            <div class="form-group"><input type="number" id="product_qty" placeholder="الكمية" value="1"></div>
            <div class="form-group"><input type="number" id="product_discount" placeholder="الخصم" value="0"></div>
        </div>
        <button class="btn-add" onclick="addToCart()">➕ أضف إلى السلة</button>
    </div>

    <!-- سلة المشتريات -->
    <div class="form-section">
        <h2>🛍️ سلة المشتريات</h2>
        <div id="cart" class="cart-items"></div>
    </div>

    <!-- الدفع والشحن -->
    <div class="form-section">
        <h2>💳 الدفع والشحن</h2>
        <div class="row">
            <div class="form-group">
                <label>طريقة الدفع</label>
                <select id="payment">
                    <option value="مدى">💳 مدى</option>
                    <option value="فيزا">💳 فيزا</option>
                    <option value="ماستركارد">💳 ماستركارد</option>
                    <option value="تمارا">📱 تمارا</option>
                    <option value="تابي">📱 تابي</option>
                    <option value="نقدي">💰 نقدي</option>
                </select>
            </div>
            <div class="form-group" id="tamara_group" style="display: none;">
                <input type="text" id="tamara_auth" placeholder="رمز الموافقة على الطلب في تمارا">
            </div>
            <div class="form-group">
                <label>خدمة الشحن</label>
                <select id="shipping">
                    <option value="لا يحتاج شحن">🏠 لا يحتاج شحن</option>
                    <option value="شحن سريع">🚚 شحن سريع (24 ساعة)</option>
                    <option value="شحن عادي">📦 شحن عادي (3-5 أيام)</option>
                </select>
            </div>
        </div>
    </div>

    <button class="btn-checkout" onclick="checkout()">✅ تأكيد الطلب</button>
    <a class="btn-checkout" href="invoice.html" style="display:block; text-align:center; text-decoration:none; margin-top:10px; background:#0f172a;">
        👁️ معاينة الفاتورة مباشرة
    </a>
</div>

<script src="js/cart.js"></script>
<script type="module">
    import { saveOrderToFirebase } from './js/order.js';

    window.showAlert = function(message, type) {
        const existing = document.querySelector('.alert');
        if (existing) existing.remove();
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-${type}`;
        alertDiv.textContent = message;
        document.body.appendChild(alertDiv);
        setTimeout(() => alertDiv.remove(), 3000);
    };

    window.generateOrderNumber = function() {
        const date = new Date();
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
        return `FK-${year}${month}${day}-${random}`;
    };

    window.checkout = async function() {
        if (cart.length === 0) {
            showAlert('❌ لا يمكن تأكيد الطلب. السلة فارغة!', 'error');
            return;
        }

        const customerName = document.getElementById('name').value.trim();
        const customerPhone = document.getElementById('phone').value.trim();

        if (!customerName) { showAlert('❌ يرجى إدخال اسم العميل', 'error'); document.getElementById('name').focus(); return; }
        if (!customerPhone) { showAlert('❌ يرجى إدخال رقم الجوال', 'error'); document.getElementById('phone').focus(); return; }

        const phoneRegex = /^(05|5)[0-9]{8}$/;
        if (!phoneRegex.test(customerPhone.replace(/\s/g, ''))) {
            showAlert('❌ رقم الجوال غير صحيح. يجب أن يبدأ بـ 05 ويتكون من 10 أرقام', 'error');
            return;
        }

        let totalAmount = 0;
        for (let item of cart) totalAmount += (item.price * item.qty) - item.discount;

        const orderNumberManual = document.getElementById('order_number_manual').value.trim();
        const orderNumber = (orderNumberManual && orderNumberManual !== 'FK-0000') ? orderNumberManual : generateOrderNumber();

        const orderData = {
            orderNumber,
            customer: customerName,
            phone: customerPhone,
            email: document.getElementById('email').value.trim() || 'غير مدخل',
            city: document.getElementById('city').value.trim(),
            district: document.getElementById('district').value.trim(),
            street: document.getElementById('street').value.trim(),
            building: document.getElementById('building').value.trim(),
            extra: document.getElementById('extra').value.trim(),
            postal: document.getElementById('postal').value.trim(),
            payment: document.getElementById('payment').value,
            tamaraAuth: document.getElementById('tamara_auth').value.trim(),
            shipping: document.getElementById('shipping').value,
            date: document.getElementById('order_date').value,
            time: document.getElementById('order_time').value,
            cart: cart,
            totalAmount: totalAmount.toFixed(2),
            status: 'جديد'
        };

        showAlert('⏳ جاري حفظ الطلب في قاعدة البيانات...', 'success');
        try {
            const firebaseId = await saveOrderToFirebase(orderData);
            orderData.firebaseId = firebaseId;
            localStorage.setItem('currentOrder', JSON.stringify(orderData));
            showAlert(`✅ تم تأكيد الطلب بنجاح! رقم الطلب: ${orderNumber}`, 'success');
            cart = [];
            saveCart();
            renderCart();
            setTimeout(() => { window.location.href = `invoice.html?orderId=${firebaseId}`; }, 1500);
        } catch (error) {
            console.error(error);
            showAlert('❌ فشل حفظ الطلب في قاعدة البيانات، سيتم حفظه محلياً فقط', 'error');
            localStorage.setItem('currentOrder', JSON.stringify(orderData));
            setTimeout(() => { window.location.href = 'invoice.html'; }, 1500);
        }
    };

    // إظهار/إخفاء حقل تمارا
    document.getElementById('payment').addEventListener('change', function() {
        document.getElementById('tamara_group').style.display = this.value === 'تمارا' ? 'block' : 'none';
    });
    document.getElementById('tamara_group').style.display = document.getElementById('payment').value === 'تمارا' ? 'block' : 'none';
</script>
</body>
</html>
