<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب شراء | منصة في خدمتك</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="images/logo.svg" alt="شعار المنصة" class="logo" onerror="this.style.display='none'">
            <h1>📋 طلب شراء جديد</h1>
        </div>

        <!-- رقم الطلب -->
        <div class="form-section">
            <div class="row">
                <div class="form-group">
                    <label>🔢 رقم الطلب</label>
                    <input type="text" id="order_number_manual" placeholder="FK-0000" value="FK-0000">
                </div>
            </div>
        </div>

        <!-- التاريخ والوقت -->
        <div class="form-section">
            <div class="row">
                <div class="form-group">
                    <label>📅 التاريخ</label>
                    <input type="date" id="order_date" value="2026-03-26">
                </div>
                <div class="form-group">
                    <label>⏰ الوقت</label>
                    <input type="time" id="order_time">
                </div>
            </div>
        </div>

        <hr>

        <!-- معلومات العميل -->
        <div class="form-section">
            <h2>👤 معلومات العميل</h2>
            <div class="row">
                <div class="form-group"><input type="text" id="name" placeholder="الاسم الكامل"></div>
                <div class="form-group"><input type="tel" id="phone" placeholder="رقم الجوال"></div>
                <div class="form-group"><input type="email" id="email" placeholder="البريد الإلكتروني"></div>
            </div>
        </div>

        <hr>

        <!-- العنوان -->
        <div class="form-section">
            <h2>📍 العنوان</h2>
            <div class="row">
                <div class="form-group"><input type="text" id="city" placeholder="المدينة"></div>
                <div class="form-group"><input type="text" id="district" placeholder="الحي"></div>
                <div class="form-group"><input type="text" id="street" placeholder="الشارع"></div>
                <div class="form-group"><input type="text" id="building" placeholder="رقم المبنى"></div>
                <div class="form-group"><input type="text" id="extra" placeholder="الرقم الإضافي"></div>
                <div class="form-group"><input type="text" id="postal" placeholder="الرمز البريدي"></div>
            </div>
        </div>

        <hr>

        <!-- إضافة منتج -->
        <div class="form-section">
            <h2>🛒 إضافة منتج</h2>
            <div class="row">
                <div class="form-group"><input type="text" id="product_code" placeholder="كود المنتج"></div>
                <div class="form-group"><input type="text" id="product_name" placeholder="اسم المنتج"></div>
                <div class="form-group"><input type="text" id="product_desc" placeholder="وصف المنتج"></div>
                <div class="form-group"><input type="number" id="product_price" placeholder="السعر"></div>
                <div class="form-group"><input type="number" id="product_qty" placeholder="الكمية" value="1"></div>
                <div class="form-group"><input type="number" id="product_discount" placeholder="الخصم" value="0"></div>
            </div>
            <button class="btn-add" onclick="addToCart()">➕ أضف إلى السلة</button>
        </div>

        <hr>

        <!-- سلة المشتريات -->
        <div class="form-section">
            <h2>🛍️ سلة المشتريات</h2>
            <div id="cart"></div>
        </div>

        <hr>

        <!-- الدفع والشحن -->
        <div class="form-section">
            <h2>💳 الدفع والشحن</h2>
            <div class="row">
                <div class="form-group">
                    <label>طريقة الدفع</label>
                    <select id="payment">
                        <option value="تمارا">تمارا</option>
                        <option value="تحويل بنكي">تحويل بنكي</option>
                    </select>
                </div>
                <div class="form-group" id="tamara_group">
                    <input type="text" id="tamara_auth" placeholder="رمز الموافقة على الطلب في تمارا">
                </div>
                <div class="form-group">
                    <label>خدمة الشحن</label>
                    <select id="shipping">
                        <option value="لا يحتاج شحن">لا يحتاج شحن</option>
                        <option value="يحتاج شحن">يحتاج شحن</option>
                    </select>
                </div>
            </div>
        </div>

        <button class="btn-checkout" onclick="checkout()">✅ تأكيد الطلب</button>
    </div>

    <script>
        document.getElementById('payment').addEventListener('change', function() {
            document.getElementById('tamara_group').style.display = this.value === 'تمارا' ? 'block' : 'none';
        });
        document.getElementById('tamara_group').style.display = document.getElementById('payment').value === 'تمارا' ? 'block' : 'none';
    </script>
    <script src="js/cart.js"></script>
    <script src="js/order.js"></script>
</body>
</html>
