<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>في خدمتك - فاتورة إلكترونية</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        /* ========================================
           الأنماط الأساسية والطباعة
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .page {
                page-break-after: always;
            }
            .page:last-child {
                page-break-after: auto;
            }
        }
        
        body {
            background: #e9ecef;
            font-family: 'Segoe UI', 'Cairo', 'Tahoma', sans-serif;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .invoice-wrapper {
            max-width: 210mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        .page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            padding: 15mm 12mm;
            page-break-after: always;
            position: relative;
        }
        
        .page:last-child {
            page-break-after: auto;
        }
        
        /* ========================================
           رأس الصفحة الموحد
           ======================================== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #1e3a5f;
            padding-bottom: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-img {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            object-fit: contain;
        }
        
        .logo-placeholder {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #1e3a5f, #2d4a7a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        
        .platform-name {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a5f;
        }
        
        .platform-slogan {
            font-size: 10px;
            color: #6c757d;
        }
        
        .page-title {
            font-size: 22px;
            font-weight: bold;
            color: #1e3a5f;
        }
        
        .legal-numbers {
            text-align: left;
            font-size: 10px;
            color: #4a5568;
            line-height: 1.5;
        }
        
        /* ========================================
           تذييل الصفحة الموحد
           ======================================== */
        .page-footer {
            position: absolute;
            bottom: 15mm;
            left: 12mm;
            right: 12mm;
            font-size: 10px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 12px;
        }
        
        .contact-info {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        
        .contact-info span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .page-number {
            text-align: left;
            direction: ltr;
            margin-top: 8px;
            font-size: 9px;
            color: #94a3b8;
        }
        
        /* ========================================
           معلومات الفاتورة
           ======================================== */
        .info-grid {
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            padding: 12px 18px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-label {
            font-size: 11px;
            color: #6c757d;
            margin-bottom: 4px;
        }
        
        .info-value {
            font-weight: bold;
            font-size: 13px;
        }
        
        .status-badge {
            background: #10b981;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            display: inline-block;
        }
        
        /* ========================================
           العناوين (مصدرة من / إلى)
           ======================================== */
        .addresses {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .address-card {
            flex: 1;
            background: #f9fafb;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            font-size: 11px;
            line-height: 1.7;
        }
        
        .address-card strong {
            display: block;
            margin-bottom: 8px;
            color: #1e3a5f;
            font-size: 12px;
            border-right: 3px solid #1e3a5f;
            padding-right: 8px;
        }
        
        /* ========================================
           معلومات الدفع والشحن
           ======================================== */
        .payment-grid {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .payment-card {
            flex: 1;
            background: #f1f5f9;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 11px;
            text-align: center;
        }
        
        .payment-card strong {
            display: block;
            margin-bottom: 5px;
            color: #1e3a5f;
            font-size: 12px;
        }
        
        /* ========================================
           جدول المنتجات
           ======================================== */
        .products-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 11px;
        }
        
        .products-table th {
            background: #1e3a5f;
            color: white;
            padding: 10px 8px;
            border: 1px solid #2d4a7a;
            text-align: center;
            font-weight: 600;
        }
        
        .products-table td {
            border: 1px solid #cbd5e1;
            padding: 10px 8px;
            vertical-align: middle;
        }
        
        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            background: #f1f5f9;
        }
        
        /* ========================================
           الإجماليات
           ======================================== */
        .totals-box {
            width: 280px;
            margin-right: auto;
            margin-top: 20px;
            border-top: 2px solid #e2e8f0;
            padding-top: 12px;
        }
        
        .totals-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
        }
        
        .grand-total {
            font-weight: bold;
            font-size: 16px;
            color: #1e3a5f;
            border-top: 2px solid #1e3a5f;
            margin-top: 6px;
            padding-top: 10px;
        }
        
        /* ========================================
           الباركودات
           ======================================== */
        .barcodes {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 25px 0;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        
        .barcode-item {
            text-align: center;
        }
        
        .barcode-item p {

            margin-top: 8px;
            color: #666;
        }
        
        .qr-code {
            width: 90px;
            height: 90px;
            margin: 0 auto;
        }
        
        /* ========================================
           الشروط والأحكام
           ======================================== */
        .terms-title {
            font-size: 22px;
            font-weight: bold;
            color: #1e3a5f;
            text-align: center;
            margin: 15px 0 20px;
            border-bottom: 2px solid #1e3a5f;
            padding-bottom: 10px;
        }
        
        .legal-notice {
            background: #fef3c7;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-right: 4px solid #f59e0b;
            font-size: 12px;
            line-height: 1.8;
        }
        
        .terms-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .terms-card {
            background: #fafafa;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            break-inside: avoid;
        }
        
        .terms-card h4 {
            background: #1e3a5f;
            color: white;
            padding: 5px 14px;
            border-radius: 25px;
            font-size: 13px;
            margin-bottom: 12px;
            display: inline-block;
        }
        
        .terms-card p {
            font-size: 10.5px;
            line-height: 1.75;
            color: #2d3a4a;
            margin-bottom: 8px;
        }
        
        .terms-card strong {
            color: #1e3a5f;
        }
        
        /* ========================================
           إقرار العميل
           ======================================== */
        .declaration {
            background: #f0f4f9;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
        }
        
        .signature-area {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #cbd5e1;
        }
        
        /* ========================================
           أزرار التحكم
           ======================================== */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px auto;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.02);
        }
        
        .btn-primary {
            background: #1e3a5f;
            color: white;
        }
        
        .btn-secondary {
            background: #334155;
            color: white;
        }
        
        .btn-purple {
            background: #6b21a5;
            color: white;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        /* ========================================
           تحميل وتنبيهات
           ======================================== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .loading-box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3a5f;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .toast-message {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 10000;
            font-size: 13px;
            color: white;
        }
        
        /* ========================================
           استجابة للشاشات الصغيرة
           ======================================== */
        @media (max-width: 768px) {
            .page {
                padding: 10mm 8mm;
            }
            .terms-grid {
                grid-template-columns: 1fr;
            }
            .addresses, .payment-grid {
                flex-direction: column;
            }
            .info-grid {
                flex-direction: column;
                text-align: center;
            }
            .action-buttons {
                gap: 8px;
                padding: 6px 15px;
            }
            .btn {
                padding: 6px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<div id="invoiceRoot" class="invoice-wrapper"></div>

<div class="action-buttons no-print">
    <button class="btn btn-primary" id="printBtn"><i class="fas fa-print"></i> طباعة</button>
    <button class="btn btn-secondary" id="pdfBtn"><i class="fas fa-file-pdf"></i> PDF</button>
    <button class="btn btn-purple" id="downloadBtn"><i class="fas fa-download"></i> تحميل</button>
    <button class="btn btn-danger" id="closeBtn"><i class="fas fa-times"></i> إغلاق</button>
</div>

<script>
    (function() {
        // ========================================
        // تكوين Firebase
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
            authDomain: "msjt301-974bb.firebaseapp.com",
            projectId: "msjt301-974bb",
            storageBucket: "msjt301-974bb.firebasestorage.app",
            messagingSenderId: "186209858482",
            appId: "1:186209858482:web:186ca610780799ef562aab"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let currentOrder = null;

        // ========================================
        // بيانات البائع
        // ========================================
        const sellerData = {
            name: "منصة في خدمتك",
            taxNumber: "312495447600003",
            licenseNumber: "FL-765735204",
            address: "حائل - حي النقرة - شارع سعد المشاط - مبنى 3085 - الرمز البريدي 55431",
            phone: "+966 534051317",
            whatsapp: "+966 545312021",
            email: "info@fi-khidmatik.com",
            website: "www.khidmatik.com"
        };

        // ========================================
        // دوال مساعدة
        // ========================================
        function cleanText(text) {
            if (!text) return '';
            var cleaned = text.replace(/[^\u0600-\u06FF\s\u0621-\u064A\u0660-\u0669\.\,\-\+\#\@\&\*\(\)]/g, '');
            cleaned = cleaned.replace(/\s+/g, ' ').trim();
            return cleaned || text;
        }

        function formatDate(d) {
            if (!d) return '';
            var parts = d.split('-');
            if (parts.length === 3) {
                return parseInt(parts[2]) + '/' + parseInt(parts[1]) + '/' + parseInt(parts[0]);
            }
            return d;
        }

        function formatTime(time24) {
            if (!time24) return '';
            var parts = time24.split(':');
            var hour = parseInt(parts[0]);
            var minute = parts[1];
            var ap = hour >= 12 ? 'مساءً' : 'صباحاً';
            hour = hour % 12 || 12;
            return hour + ':' + minute + ' ' + ap;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function getStatusText(status) {
            var map = {
                'جديد': 'جديد',
                'تحت التنفيذ': 'قيد التنفيذ',
                'تم التنفيذ': 'مكتمل',
                'ملغي': 'ملغي',
                'مسترجع': 'مسترجع',
                'تحت المراجعة': 'تحت المراجعة'
            };
            return map[status] || status || 'مكتمل';
        }

        function getShippingText(method) {
            if (method === 'delivery') return 'شحن منزلي';
            if (method === 'noship') return 'لا يتطلب شحن';
            return 'استلام من المقر';
        }

        function getPaymentName(method) {
            var names = {
                'mada': 'مدى',
                'mastercard': 'ماستركارد',
                'visa': 'فيزا',
                'stcpay': 'STCPay',
                'tamara': 'تمارا',
                'tabby': 'تابي',
                'other': 'أخرى'
            };
            return names[method] || method || 'مدى';
        }

        // ========================================
        // دوال واجهة المستخدم
        // ========================================
        function showLoading(msg) {
            var ov = document.getElementById('loadingOverlay');
            if (!ov) {
                ov = document.createElement('div');
                ov.id = 'loadingOverlay';
                ov.className = 'loading-overlay';
                ov.innerHTML = '<div class="loading-box"><div class="loading-spinner"></div><p id="loadingMsg"></p></div>';
                document.body.appendChild(ov);
            }
            document.getElementById('loadingMsg').textContent = msg;
            ov.style.display = 'flex';
        }

        function hideLoading() {
            var ov = document.getElementById('loadingOverlay');
            if (ov) ov.style.display = 'none';
        }

        function showToast(msg, isError) {
            var t = document.createElement('div');
            t.className = 'toast-message';
            t.style.background = isError ? '#ef4444' : '#10b981';
            t.innerHTML = (isError ? '❌ ' : '✅ ') + msg;
            document.body.appendChild(t);
            setTimeout(function() { t.remove(); }, 3000);
        }

        // ========================================
        // جلب الطلب من Firebase
        // ========================================
        async function fetchOrder(orderId) {
            var orderDoc = await db.collection('orders').doc(orderId).get();
            if (!orderDoc.exists) throw new Error('الطلب غير موجود');
            var order = { id: orderDoc.id, ...orderDoc.data() };
            
            var customer = { name: 'غير معروف', phone: '', email: '', address: '' };
            if (order.customerId) {
                try {
                    var customerDoc = await db.collection('customers').doc(order.customerId).get();
                    if (customerDoc.exists) customer = customerDoc.data();
                } catch(e) {}
            }
            
            var items = [];
            for (var i = 0; i < (order.items || []).length; i++) {
                var item = order.items[i];
                var productImage = item.image || '';
                var productName = cleanText(item.name) || 'منتج';
                var productDesc = cleanText(item.description) || '';
                
                if (item.productId && item.productId !== 'null' && !item.productId.startsWith('temp_')) {
                    try {
                        var productDoc = await db.collection('products').doc(item.productId).get();
                        if (productDoc.exists) {
                            var product = productDoc.data();
                            productImage = product.image || productImage;
                            productName = cleanText(product.name) || productName;
                            productDesc = cleanText(product.description) || productDesc;
                        }
                    } catch(e) {}
                }
                
                items.push({
                    productName: productName,
                    description: productDesc,
                    image: productImage,
                    quantity: item.quantity || 1,
                    price: item.price || 0
                });
            }
            
            return {
                orderNumber: order.orderNumber,
                orderDate: order.orderDate,
                orderTime: order.orderTime,
                status: order.status,
                customerName: customer.name,
                customerPhone: customer.phone,
                customerEmail: customer.email,
                customerAddress: customer.address || '',
                shippingMethod: order.shippingMethod,
                paymentMethod: order.paymentMethod,
                paymentMethodName: getPaymentName(order.paymentMethod),
                approvalCode: order.approvalCode,
                items: items,
                subtotal: order.subtotal,
                discount: order.discount,
                tax: order.tax,
                total: order.total
            };
        }

        // ========================================
        // بناء مكونات الصفحة
        // ========================================
        function buildHeader(title) {
            // محاولة استخدام الشعار من مجلد images
            var logoHtml = '<div class="logo-area">' +
                '<img src="images/logo.svg" class="logo-img" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<div class=\\\'logo-placeholder\\\'>' + sellerData.name.charAt(0) + '</div>\'">' +
                '<div>' +
                    '<div class="platform-name">' + sellerData.name + '</div>' +
                    '<div class="platform-slogan">خدمات تقنية متكاملة</div>' +
                '</div>' +
            '</div>';
            
            return '<div class="page-header">' +
                logoHtml +
                '<div class="page-title">' + title + '</div>' +
                '<div class="legal-numbers">' +
                    '<div>شهادة العمل الحر: ' + sellerData.licenseNumber + '</div>' +
                    '<div>الرقم الضريبي: ' + sellerData.taxNumber + '</div>' +
                '</div>' +
            '</div>';
        }

        function buildFooter(pageNum, totalPages) {
            return '<div class="page-footer">' +
                '<div class="contact-info">' +
                    '<span><i class="fas fa-phone"></i> ' + sellerData.phone + '</span>' +
                    '<span><i class="fab fa-whatsapp"></i> ' + sellerData.whatsapp + '</span>' +
                    '<span><i class="fas fa-envelope"></i> ' + sellerData.email + '</span>' +
                    '<span><i class="fas fa-globe"></i> ' + sellerData.website + '</span>' +
                '</div>' +
                '<div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>' +
                '<div class="page-number">صفحة ' + pageNum + ' من ' + totalPages + '</div>' +
            '</div>';
        }

        function calculateTotals(order) {
            var subtotal = order.subtotal || 0;
            if (!subtotal && order.items) {
                subtotal = 0;
                for (var i = 0; i < order.items.length; i++) {
                    subtotal += (order.items[i].price || 0) * (order.items[i].quantity || 1);
                }
            }
            var discount = order.discount || 0;
            var tax = order.tax || ((subtotal - discount) * 0.15);
            var total = order.total || (subtotal - discount + tax);
            return { subtotal: subtotal, discount: discount, tax: tax, total: total };
        }

        // ========================================
        // صفحة الفاتورة
        // ========================================
        function buildInvoicePage(order, pageNum, totalPages) {
            var totals = calculateTotals(order);
            
            var itemsHtml = '';
            for (var i = 0; i < order.items.length; i++) {
                var item = order.items[i];
                itemsHtml += '<tr>' +
                    '<td style="text-align:center">' + (i+1) + '</td>' +

        function buildTermsPage3(order, pageNum, totalPages) {

        // ========================================
        // إنشاء بيانات الباركود
        // ========================================
        function generateZATCAQRData(order) {
            var totals = calculateTotals(order);
            var timestamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');
            var total = totals.total.toFixed(2);
            var tax = totals.tax.toFixed(2);
            
            var tlvData = '';
            tlvData += String.fromCharCode(1) + String.fromCharCode(1) + '1';
            tlvData += String.fromCharCode(2) + String.fromCharCode(15) + sellerData.taxNumber;
            tlvData += String.fromCharCode(3) + String.fromCharCode(timestamp.length) + timestamp;
            tlvData += String.fromCharCode(4) + String.fromCharCode(total.length) + total;
            tlvData += String.fromCharCode(5) + String.fromCharCode(tax.length) + tax;
            
            return btoa(tlvData);
        }

        // ========================================
        // تحميل وعرض الفاتورة
        // ========================================
        async function loadInvoice() {
            var params = new URLSearchParams(window.location.search);
            var orderId = params.get('id');
            
            if (!orderId || orderId === 'null') {
                document.getElementById('invoiceRoot').innerHTML = '<div class="page" style="text-align:center;display:flex;align-items:center;justify-content:center;"><div><h2 style="color:#ef4444;">خطأ</h2><p>لم يتم تحديد رقم الطلب</p></div></div>';
                return;
            }
            
            showLoading('جاري تحميل الفاتورة...');
            
            try {
                var order = await fetchOrder(orderId);
                currentOrder = order;
                
                var html = buildInvoicePage(order, 1, 4);
                html += buildTermsPage1(2, 4);
                html += buildTermsPage2(3, 4);
                html += buildTermsPage3(order, 4, 4);
                
                document.getElementById('invoiceRoot').innerHTML = html;
                
                // إنشاء QR Codes
                setTimeout(function() {
                    var zatcaDiv = document.getElementById('zatcaQR');
                    if (zatcaDiv && typeof QRCode !== 'undefined') {
                        try {
                            new QRCode(zatcaDiv, { text: generateZATCAQRData(order), width: 90, height: 90 });
                        } catch(e) { console.log('ZATCA QR Error:', e); }
                    }
                    var orderDiv = document.getElementById('orderQR');
                    if (orderDiv && typeof QRCode !== 'undefined') {
                        try {
                            new QRCode(orderDiv, { text: window.location.href, width: 90, height: 90 });
                        } catch(e) { console.log('Order QR Error:', e); }
                    }
                    var downloadDiv = document.getElementById('downloadQR');
                    if (downloadDiv && typeof QRCode !== 'undefined') {
                        try {
                            var downloadUrl = window.location.origin + window.location.pathname + '?id=' + orderId;
                            new QRCode(downloadDiv, { text: downloadUrl, width: 90, height: 90 });
                        } catch(e) { console.log('Download QR Error:', e); }
                    }
                }, 200);
                
                showToast('تم تحميل الفاتورة بنجاح', false);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('invoiceRoot').innerHTML = '<div class="page" style="text-align:center;display:flex;align-items:center;justify-content:center;"><div><h2 style="color:#ef4444;">خطأ</h2><p>' + error.message + '</p><button onclick="location.reload()" style="margin-top:20px;padding:8px 16px;background:#1e3a5f;color:white;border:none;border-radius:8px;cursor:pointer;">إعادة المحاولة</button></div></div>';
                showToast(error.message, true);
            } finally {
                hideLoading();
            }
        }

        // ========================================
        // إنشاء ملف PDF
        // ========================================
        async function generatePDF() {
            var pages = document.querySelectorAll('.page');
            if (!pages.length) {
                showToast('لا توجد فاتورة للتصدير', true);
                return;
            }
            
            showLoading('جاري إنشاء PDF...');
            
            try {
                var { jsPDF } = window.jspdf;
                var pdf = new jsPDF('p', 'mm', 'a4');
                
                for (var i = 0; i < pages.length; i++) {
                    var canvas = await html2canvas(pages[i], { scale: 2, useCORS: false, backgroundColor: '#ffffff', logging: false, allowTaint: true });
                    if (i !== 0) pdf.addPage();
                    var imgData = canvas.toDataURL('image/png');
                    var imgWidth = 210;
                    var imgHeight = (canvas.height * imgWidth) / canvas.width;
                    pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                }
                
                pdf.save('فاتورة_' + (currentOrder?.orderNumber || 'invoice') + '.pdf');
                showToast('تم حفظ PDF بنجاح', false);
            } catch(error) {
                console.error('PDF Error:', error);
                showToast('خطأ في إنشاء PDF', true);
            } finally {
                hideLoading();
            }
        }

        // ========================================
        // تحميل الفاتورة
        // ========================================
        async function downloadInvoice() {
            if (!currentOrder) {
                showToast('لا توجد فاتورة للتحميل', true);
                return;
            }
            await generatePDF();
        }

        // ========================================
        // ربط الأزرار وبدء التشغيل
        // ========================================
        document.getElementById('printBtn').onclick = function() { window.print(); };
        document.getElementById('pdfBtn').onclick = generatePDF;
        document.getElementById('downloadBtn').onclick = downloadInvoice;
        document.getElementById('closeBtn').onclick = function() { window.close(); };
        
        loadInvoice();
    })();
