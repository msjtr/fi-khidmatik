    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;

    // إنشاء باركود ZATCA
    function generateZATCAQRData(order) {
        const seller = order.seller?.name || "منصة في خدمتك";
        const taxNumber = order.seller?.taxNumber || "312495447600003";
        const timestamp = new Date().toISOString();
        const total = order.total || 0;
        const taxAmount = order.tax || 0;
        
        function encodeTLV(tag, value) {
            return String.fromCharCode(tag) + String.fromCharCode(value.length) + value;
        }
        
        let tlvData = '';
        tlvData += encodeTLV(1, seller);
        tlvData += encodeTLV(2, taxNumber);
        tlvData += encodeTLV(3, timestamp);
        tlvData += encodeTLV(4, total.toFixed(2));
        tlvData += encodeTLV(5, taxAmount.toFixed(2));
        
        return btoa(tlvData);
    }

    // عرض المنتجات
    function renderProductRows(items) {

                <td style="text-align:center">

                </td>

                <td style="text-align:center">${((item.price || 0) * item.quantity).toFixed(2)} ريال</td>
            </tr>
        `).join('');
    }

    // عرض الفاتورة كاملة
    async function renderFullInvoice() {
        await fetchOrderData();
        
        if (!orderData) {
            document.getElementById('invoiceRoot').innerHTML = `
                <div class="loading-box" style="text-align: center; padding: 50px;">
                    <p style="color: red;">❌ حدث خطأ في تحميل الفاتورة</p>
                    <button onclick="window.close()" style="margin-top: 20px; padding: 10px 20px;">إغلاق</button>
                </div>
            `;
            hideLoading();
            return;
        }
        
        const page1 = buildInvoicePage(orderData, 1, 3);
        const page2 = buildTermsPage(2, 3);
        const page3 = buildDeclarationPage(3, 3);
        const fullHtml = page1 + page2 + page3;
        document.getElementById('invoiceRoot').innerHTML = fullHtml;
        
        setTimeout(() => {
            const qrDiv = document.getElementById('zatcaQR');
            if (qrDiv && typeof QRCode !== 'undefined') {
                try {
                    new QRCode(qrDiv, {
                        text: generateZATCAQRData(orderData),
                        width: 100,
                        height: 100,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } catch(e) {
                    console.warn('QR Error:', e);
                }
            }
        }, 100);
        
        hideLoading();
    }

    // دوال الطباعة والتصدير
    function getPrintStyles() {
        return `
            * { margin:0; padding:0; box-sizing:border-box; }
            body { background:white; padding:0; margin:0; }
            .invoice-page, .terms-page, .declaration-page { width:210mm; min-height:297mm; padding:15mm 12mm; page-break-after:always; }
            .invoice-table th { background:#1e3a5f; color:white; }
            .product-img { width:50px; height:50px; object-fit:cover; }
            .page-number { text-align:left; }
            .action-buttons { display:none; }
            .no-print { display:none; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        `;
    }

    function printInvoice() {
        const printWindow = window.open('', '_blank');
        if (!printWindow) {
            showToast('الرجاء السماح للنوافذ المنبثقة', 'error');
            return;
        }
        
        printWindow.document.write(`
            <!DOCTYPE html>
            <html dir="rtl">
            <head>
                <meta charset="UTF-8">
                <title>فاتورة ${orderData.orderNumber}</title>
                <style>${getPrintStyles()}</style>
            </head>
            <body>${document.getElementById('invoiceRoot').innerHTML}</body>
            </html>
        `);
        printWindow.document.close();
        printWindow.focus();
        printWindow.print();
        showToast('تم إرسال الفاتورة للطباعة', 'success');
    }

    async function generatePDF() {
        const element = document.getElementById('invoiceRoot');
        const pages = element.querySelectorAll('.invoice-page, .terms-page, .declaration-page');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        
        showLoading('جاري إنشاء ملف PDF...');
        
        try {
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 3, useCORS: true, logging: false });
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                if (i !== 0) pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            }
            pdf.save(`invoice_${orderData.orderNumber}.pdf`);
            showToast('تم حفظ PDF بنجاح', 'success');
        } catch (error) {
            console.error('PDF Error:', error);
            showToast('حدث خطأ في إنشاء PDF', 'error');
        } finally {
            hideLoading();
        }
    }

    async function generatePNG() {
        const element = document.getElementById('invoiceRoot');
        showLoading('جاري إنشاء صورة PNG...');
        
        try {
            const canvas = await html2canvas(element, { scale: 3, backgroundColor: '#ffffff', useCORS: true });
            const link = document.createElement('a');
            link.download = `invoice_${orderData.orderNumber}.png`;
            link.href = canvas.toDataURL();
            link.click();
            showToast('تم حفظ PNG بنجاح', 'success');
        } catch (error) {
            console.error('PNG Error:', error);
            showToast('حدث خطأ في إنشاء PNG', 'error');
        } finally {
            hideLoading();
        }
    }

    async function generateZIP() {
        const element = document.getElementById('invoiceRoot');
        const zip = new JSZip();
        const { jsPDF } = window.jspdf;
        const pages = element.querySelectorAll('.invoice-page, .terms-page, .declaration-page');
        const pdf = new jsPDF('p', 'mm', 'a4');
        
        showLoading('جاري إنشاء الملف المضغوط...');
        
        try {
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 3, useCORS: true });
                const imgData = canvas.toDataURL('image/png');
                if (i !== 0) pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
            }
            zip.file(`invoice_${orderData.orderNumber}.pdf`, pdf.output('blob'));
            
            const fullCanvas = await html2canvas(element, { scale: 2.5, useCORS: true });
            const pngBlob = await new Promise(resolve => fullCanvas.toBlob(resolve, 'image/png'));
            zip.file(`invoice_${orderData.orderNumber}.png`, pngBlob);
            
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `invoice_${orderData.orderNumber}.zip`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('تم حفظ الملف المضغوط بنجاح', 'success');
        } catch (error) {
            console.error('ZIP Error:', error);
            showToast('حدث خطأ في إنشاء الملف المضغوط', 'error');
        } finally {
            hideLoading();
        }
    }

    // ربط الأحداث
    document.getElementById('printBtn')?.addEventListener('click', printInvoice);
    document.getElementById('pdfBtn')?.addEventListener('click', generatePDF);
    document.getElementById('pngBtn')?.addEventListener('click', generatePNG);
    document.getElementById('zipBtn')?.addEventListener('click', generateZIP);

    // بدء التشغيل
    renderFullInvoice();
</script>
