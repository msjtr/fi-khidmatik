<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة إلكترونية - منصة في خدمتك</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2e8f0;
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            direction: rtl;
            padding: 10px;
        }

        /* حجم A4 */
        .invoice-wrapper {
            max-width: 210mm;
            margin: 0 auto;
        }

        .invoice-page {
            background: white;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* أنماط الطباعة */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .invoice-page {
                box-shadow: none;
                margin: 0;
            }
            .action-buttons {
                display: none;
            }
            @page {
                size: A4;
                margin: 0;
            }
        }

        /* المحتوى الداخلي */
        .invoice-content {
            padding: 8mm 10mm;
        }

        /* الهيدر */
        .logo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 2px solid #1e3a5f;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .logo-fallback {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #1e3a5f, #3b82f6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-fallback i {
            font-size: 24px;
            color: white;
        }

        .invoice-title h1 {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a5f;
        }

        .invoice-title p {
            font-size: 9px;
            margin: 2px 0;
        }

        .badge-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 8px;
            font-weight: 600;
        }

        .company-badge {
            background: #f1f5f9;
            padding: 5px 8px;
            border-radius: 8px;
            font-size: 8px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        /* بطاقات المعلومات */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 8px 0;
        }

        .info-card {
            background: #f8fafc;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .info-card h3 {
            font-size: 10px;
            margin-bottom: 3px;
            border-right: 3px solid #3b82f6;
            padding-right: 5px;
        }

        .info-card p {
            font-size: 8px;
            line-height: 1.3;
        }

        .info-row {
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
            margin: 5px 0;
            font-size: 9px;
        }

        .section-title {
            font-size: 11px;
            font-weight: bold;
            margin: 8px 0 6px 0;
            border-right: 4px solid #3b82f6;
            padding-right: 6px;
        }

        /* الجدول */
        .product-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 8px;
            margin: 5px 0;
        }

        .product-table th {
            background: #1e3a5f;
            color: #fff;
            padding: 5px 3px;
            border: 1px solid #2d4a6e;
            text-align: center;
        }

        .product-table td {
            border: 1px solid #cbd5e1;
            padding: 4px 3px;
            text-align: center;
        }

        .product-table td:first-child {
            text-align: right;
        }

        .product-img {
            width: 28px;
            height: 28px;
            object-fit: cover;
            border-radius: 4px;
            display: block;
            margin: 0 auto;
        }

        .product-img-fallback {
            width: 28px;
            height: 28px;
            background: #f1f5f9;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .product-img-fallback i {
            font-size: 12px;
            color: #94a3b8;
        }

        .desc-text {
            text-align: right;
            word-break: break-word;
            font-size: 7px;
            line-height: 1.2;
        }

        /* الملخص */
        .summary-box {
            background: #f0fdf4;
            padding: 6px 10px;
            border-radius: 8px;
            margin: 8px 0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px dashed #cbd5e1;
            font-size: 9px;
        }

        .summary-row.total {
            font-size: 11px;
            font-weight: bold;
            color: #166534;
            border-top: 2px solid #86efac;
            padding-top: 4px;
            border-bottom: none;
        }

        .terms-box {
            background: #fefce8;
            padding: 5px 8px;
            border-radius: 6px;
            border-right: 3px solid #eab308;
            margin: 6px 0;
            font-size: 7px;
        }

        .thanks-block {
            text-align: center;
            margin: 6px 0;
            padding: 5px;
            background: #eff6ff;
            border-radius: 12px;
            font-size: 9px;
        }

        /* التذييل */
        .footer-static {
            margin-top: 8px;
            text-align: center;
            border-top: 2px solid #1e3a5f;
            padding-top: 6px;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            background: #f8fafc;
            padding: 4px 8px;
            border-radius: 20px;
        }

        .contact-links span {
            font-size: 7px;
            color: #334155;
        }

        .footer-copyright {
            font-size: 6px;
            color: #94a3b8;
            margin-top: 3px;
        }

        /* أزرار */
        .action-buttons {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 1000;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-print { background: #3b82f6; color: white; }
        .btn-pdf { background: #ef4444; color: white; }
        .btn-png { background: #8b5cf6; color: white; }
        .btn-close { background: #64748b; color: white; }

        .loading-spinner-simple {
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div id="loading" class="text-center py-20">
    <div class="loading-spinner-simple"></div>
    <p class="text-gray-600">جاري تحميل الفاتورة...</p>
</div>
<div id="invoiceContainer" style="display: none;"></div>
<div class="action-buttons" id="actionButtons" style="display: none;">
    <button class="btn btn-print" id="printBtn"><i class="fas fa-print"></i> طباعة</button>
    <button class="btn btn-pdf" id="pdfBtn"><i class="fas fa-file-pdf"></i> PDF</button>
    <button class="btn btn-png" id="pngBtn"><i class="fas fa-image"></i> صورة</button>
    <button class="btn btn-close" onclick="window.close()"><i class="fas fa-times"></i> إغلاق</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let customersMap = new Map();
    let productsMap = new Map();
    let currentFileName = "";

    async function loadCustomersAndProducts() {
        const customersSnap = await getDocs(collection(db, 'customers'));
        customersSnap.forEach(docSnap => customersMap.set(docSnap.id, docSnap.data()));
        const productsSnap = await getDocs(collection(db, 'products'));
        productsSnap.forEach(docSnap => productsMap.set(docSnap.id, docSnap.data()));
    }

    async function getOrder(orderId) {
        const orderRef = doc(db, 'orders', orderId);
        const orderSnap = await getDoc(orderRef);
        if (!orderSnap.exists()) return null;
        return { id: orderSnap.id, ...orderSnap.data() };
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
    }

    function formatTime(time24) {
        if (!time24) return '';
        let [h, m] = time24.split(':');
        let hour = parseInt(h);
        let ampm = hour >= 12 ? 'مساءً' : 'صباحاً';
        hour = hour % 12 || 12;
        return `${hour.toString().padStart(2,'0')}:${m} ${ampm}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getStatusClass(status) {
        const map = {
            'جديد': 'bg-blue-100 text-blue-800',
            'تحت التنفيذ': 'bg-yellow-100 text-yellow-800',
            'تم التنفيذ': 'bg-green-100 text-green-800',
            'تحت المراجعة': 'bg-purple-100 text-purple-800',
            'مسترجع': 'bg-orange-100 text-orange-800',
            'ملغي': 'bg-red-100 text-red-800'
        };
        return map[status] || 'bg-gray-100 text-gray-800';
    }

    function showLoading() {
        let overlay = document.getElementById('loadingOverlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'loadingOverlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner fa-spin fa-2x"></i><p>جاري إنشاء الفاتورة...</p></div>`;
            document.body.appendChild(overlay);
        }
        overlay.style.display = 'flex';
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.style.display = 'none';
    }

    async function renderInvoice() {
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        const autoAction = urlParams.get('auto');

        if (!orderId) {
            document.getElementById('loading').innerHTML = '<div class="text-center text-red-600 p-10">رقم الطلب غير موجود</div>';
            return;
        }

        await loadCustomersAndProducts();
        const order = await getOrder(orderId);
        if (!order) {
            document.getElementById('loading').innerHTML = '<div class="text-center text-red-600 p-10">الطلب غير موجود</div>';
            return;
        }

        const customer = customersMap.get(order.customerId) || { name: '__________', phone: '__________', city: '__________', street: '__________', email: '__________' };
        const clientName = (customer.name || 'client').replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '_');
        const orderNumber = order.orderNumber || order.id;
        const today = new Date();
        const dateStr = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2,'0')}-${today.getDate().toString().padStart(2,'0')}`;
        currentFileName = `${clientName}_${orderNumber}_${dateStr}`;

        let subtotal = 0;
        const items = order.items || [];
        for (const item of items) {
            subtotal += (item.price || 0) * (item.quantity || 0);
        }

        let discountValue = order.discount || 0;
        if (order.discountType === 'percent' && discountValue > 0) {
            discountValue = (subtotal * discountValue) / 100;
        }
        const afterDiscount = subtotal - discountValue;
        const tax = afterDiscount * 0.15;
        const total = afterDiscount + tax;

        const paymentMethodName = order.paymentMethodName || (order.paymentMethod === 'mada' ? 'مدى' : order.paymentMethod === 'mastercard' ? 'ماستركارد' : order.paymentMethod === 'visa' ? 'فيزا' : order.paymentMethod === 'stcpay' ? 'STCPay' : order.paymentMethod === 'tamara' ? 'تمارا' : order.paymentMethod === 'tabby' ? 'تابي' : 'أخرى');
        const shippingMethodText = { 'pickup': '🏪 استلام من المقر', 'delivery': '🚚 شحن منزلي', 'noship': '📥 لا يتطلب شحن' }[order.shippingMethod] || 'استلام من المقر';

        // بناء صفوف المنتجات
        let productsRows = '';
        for (const item of items) {
            const price = item.price || 0;
            const qty = item.quantity || 0;
            const itemTotal = price * qty;
            let productImage = '';
            let description = item.description || '';

            if (item.productId && productsMap.has(item.productId)) {
                const prod = productsMap.get(item.productId);
                if (prod.image) productImage = prod.image;
                if (!description && prod.description) description = prod.description;
            }
            if (!productImage && item.image) productImage = item.image;
            if (description) description = escapeHtml(description);

            const imgHtml = productImage ?
                `<img src="${productImage}" class="product-img" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'product-img-fallback\'><i class=\'fas fa-box\'></i></div>';">` :
                `<div class="product-img-fallback"><i class="fas fa-box"></i></div>`;

            productsRows += `
                <tr>
                    <td style="text-align:right">${escapeHtml(item.name)}</td>
                    <td>${imgHtml}</td>
                    <td>${escapeHtml(item.barcode || '—')}</td>
                    <td class="desc-text">${description}</td>
                    <td>${qty}</td>
                    <td>${price.toFixed(2)} ريال</td>
                    <td>${itemTotal.toFixed(2)} ريال</td>
                </tr>
            `;
        }

        const invoiceHTML = `
            <div class="invoice-wrapper">
                <div class="invoice-page">
                    <div class="invoice-content">
                        <!-- الهيدر -->
                        <div class="logo-header">
                            <div class="logo-fallback">
                                <i class="fas fa-handshake"></i>
                            </div>
                            <div class="invoice-title text-left">
                                <h1>فاتورة إلكترونية</h1>
                                <p><strong>رقم الفاتورة:</strong> ${escapeHtml(order.orderNumber || order.id)}</p>
                                <p><strong>التاريخ:</strong> ${formatDate(order.orderDate)} | <strong>الوقت:</strong> ${formatTime(order.orderTime)}</p>
                                <p><span class="badge-status ${getStatusClass(order.status)}">${order.status || 'جديد'}</span></p>
                            </div>
                        </div>

                        <!-- بيانات الشركة -->
                        <div class="company-badge">
                            <span><i class="fas fa-briefcase"></i> <strong>منصة في خدمتك</strong></span>
                            <span><i class="fas fa-id-card"></i> رقم شهادة العمل الحر: FL-765735204</span>
                            <span><i class="fas fa-chart-line"></i> الرقم الضريبي: 312495447600003</span>
                        </div>

                        <!-- معلومات العميل -->
                        <div class="two-columns">
                            <div class="info-card">
                                <h3><i class="fas fa-building"></i> مصدرة من</h3>
                                <p>منصة في خدمتك<br>المملكة العربية السعودية<br>حائل - حي النقرة - شارع سعد المشاط<br>رقم المبنى: 3085 | الرمز البريدي: 55431</p>
                            </div>
                            <div class="info-card">
                                <h3><i class="fas fa-user"></i> مصدرة إلى</h3>
                                <p><strong>العميل:</strong> ${escapeHtml(customer.name || '__________')}<br>
                                <strong>المدينة:</strong> ${escapeHtml(customer.city || '__________')}<br>
                                <strong>العنوان:</strong> ${escapeHtml(customer.street || '__________')}<br>
                                <strong>الجوال:</strong> ${escapeHtml(customer.phone || '__________')}<br>
                                <strong>البريد:</strong> ${escapeHtml(customer.email || '__________')}</p>
                            </div>
                        </div>

                        <!-- معلومات إضافية -->
                        <div class="info-row">
                            <span><i class="fas fa-credit-card"></i> <strong>طريقة الدفع:</strong> ${paymentMethodName}</span>
                            <span><i class="fas fa-check-circle"></i> <strong>رمز الموافقة:</strong> ${order.approvalCode || 'APV-' + Math.floor(Math.random()*10000)}</span>
                        </div>
                        <div class="info-row">
                            <span><i class="fas fa-truck"></i> <strong>طريقة الاستلام:</strong> ${shippingMethodText}</span>
                        </div>

                        <!-- جدول المنتجات -->
                        <div class="section-title">تفاصيل المنتجات / الخدمات</div>
                        <table class="product-table">
                            <thead>
                                <tr>
                                    <th>اسم المنتج</th>
                                    <th>الصورة</th>
                                    <th>الباركود</th>
                                    <th>الوصف</th>
                                    <th>الكمية</th>
                                    <th>سعر الوحدة</th>
                                    <th>الإجمالي</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${productsRows}
                            </tbody>
                        </table>

                        <!-- الملخص -->
                        <div class="summary-box">
                            <div class="summary-row"><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                            <div class="summary-row"><span>إجمالي الخصم:</span><span style="color:#dc2626;">- ${discountValue.toFixed(2)} ريال</span></div>
                            <div class="summary-row"><span>ضريبة القيمة المضافة (15%):</span><span>${tax.toFixed(2)} ريال</span></div>
                            <div class="summary-row total"><span>الإجمالي النهائي شامل الضريبة:</span><span>${total.toFixed(2)} ريال</span></div>
                        </div>

                        <!-- الشروط -->
                        <div class="terms-box">
                            <h4><i class="fas fa-info-circle"></i> تعليمات الفاتورة</h4>
                            <p>تخضع هذه الفاتورة لكامل الشروط والأحكام المرفقة، ويُعد اعتمادها أو سداد أي مبلغ بموجبها إقرارًا صريحًا ونهائيًا بالموافقة على جميع بنودها دون أي تحفظ، مع إقرار العميل بمسؤوليته عن الاطلاع عليها</p>
                        </div>

                        <div class="thanks-block">
                            <p><i class="fas fa-heart text-red-500"></i> شكراً لتسوقكم معنا</p>
                        </div>

                        <!-- التذييل -->
                        <div class="footer-static">
                            <div class="contact-links">
                                <span><i class="fas fa-phone-alt"></i> هاتف: 966534051317</span>
                                <span><i class="fab fa-whatsapp"></i> واتساب: 966545312021</span>
                                <span><i class="fas fa-envelope"></i> info@fi-khidmatik.com</span>
                                <span><i class="fas fa-globe"></i> www.khidmatik.com</span>
                            </div>
                            <div class="footer-copyright">هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        const container = document.getElementById('invoiceContainer');
        container.innerHTML = invoiceHTML;

        document.getElementById('loading').style.display = 'none';
        document.getElementById('invoiceContainer').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';

        document.getElementById('printBtn').onclick = () => window.print();
        document.getElementById('pdfBtn').onclick = () => exportPDF();
        document.getElementById('pngBtn').onclick = () => exportPNG();

        if (autoAction === 'print') setTimeout(() => window.print(), 500);
        else if (autoAction === 'pdf') setTimeout(() => exportPDF(), 500);
        else if (autoAction === 'png') setTimeout(() => exportPNG(), 500);
    }

    async function exportPDF() {
        const element = document.getElementById('invoiceContainer');
        if (!element) return;
        const btn = document.getElementById('pdfBtn');
        btn.disabled = true;
        showLoading();
        try {
            const opt = {
                margin: [0, 0, 0, 0],
                filename: `${currentFileName}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            await html2pdf().set(opt).from(element).save();
        } catch (error) {
            console.error(error);
            alert('حدث خطأ أثناء تصدير PDF');
        } finally {
            btn.disabled = false;
            hideLoading();
        }
    }

    async function exportPNG() {
        const element = document.getElementById('invoiceContainer');
        if (!element) return;
        const btn = document.getElementById('pngBtn');
        btn.disabled = true;
        showLoading();
        try {
            const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false });
            const link = document.createElement('a');
            link.download = `${currentFileName}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (error) {
            console.error(error);
            alert('حدث خطأ أثناء تصدير الصورة');
        } finally {
            btn.disabled = false;
            hideLoading();
        }
    }

    renderInvoice();
</script>
