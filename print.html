<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة في خدمتك - الفاتورة والشروط الكاملة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link rel="icon" href="data:image/x-icon;base64,AA">

    <style>
        :root { --primary: #1e3a5f; --secondary: #f8fafc; --text: #1a202c; --accent: #d4af37; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e2e8f0; font-family: 'Tajawal', sans-serif; color: var(--text); line-height: 1.6; }

        .page { 
            width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 10px auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; page-break-after: always; position: relative;
        }

        /* الهيدر المحسن مع مسار الشعار الجديد */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .logo-box img { height: 70px; width: auto; max-width: 200px; }
        .branding h1 { color: var(--primary); font-size: 22px; font-weight: 800; }
        .branding p { font-size: 10px; color: #64748b; font-weight: bold; }
        .doc-type { background: var(--primary); color: white; padding: 8px 20px; border-radius: 4px; font-weight: 800; font-size: 14px; }

        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .meta-box { background: var(--secondary); padding: 12px; border-radius: 6px; border: 1px solid #cbd5e1; }
        .meta-box label { display: block; font-size: 9px; color: #64748b; font-weight: bold; margin-bottom: 3px; }
        .meta-box span { font-weight: 700; color: var(--primary); font-size: 12px; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { background: var(--primary); color: white; padding: 10px; font-size: 10px; }
        td { border: 1px solid #e2e8f0; padding: 8px; text-align: center; font-size: 10px; }

        .terms-content { font-size: 8.5px; text-align: justify; color: #334155; }
        .disclaimer-box { background: #fffbeb; border: 1px solid #fef3c7; padding: 10px; border-radius: 4px; font-weight: bold; margin-bottom: 12px; border-right: 4px solid #f59e0b; }
        .section-h { background: #f1f5f9; padding: 5px 10px; border-right: 4px solid var(--primary); margin: 12px 0 6px; font-weight: 800; color: var(--primary); font-size: 10px; }
        .clause { margin-bottom: 4px; padding-right: 12px; position: relative; }
        .clause::before { content: "•"; position: absolute; right: 0; color: var(--accent); font-weight: bold; }

        .links-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .link-card { background: #f8fafc; padding: 8px; border-radius: 4px; text-align: center; font-size: 9px; border: 1px solid #e2e8f0; }
        .link-card a { color: var(--primary); text-decoration: none; font-weight: bold; border-bottom: 1px solid var(--primary); }

        .qr-area { display: flex; justify-content: space-around; margin: 15px 0; }
        .footer-nav { background: var(--primary); color: white; padding: 8px 15px; border-radius: 4px; display: flex; justify-content: space-between; font-size: 9px; margin-top: auto; }

        .no-print { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .print-btn { background: var(--primary); color: white; padding: 12px 35px; border: none; border-radius: 50px; cursor: pointer; font-weight: 800; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        @media print { .no-print { display: none !important; } .page { margin: 0; box-shadow: none; width: 100%; } }
    </style>
</head>
<body>

<div id="loading" style="text-align:center; padding:100px;">جاري معالجة المستند الكامل والشعار...</div>
<div id="app"></div>

<div class="no-print">
    <button class="print-btn" onclick="window.print()">🖨️ طباعة المستند بالكامل</button>
</div>

<script>
// --- إعدادات Firebase ---
const firebaseConfig = {
    apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
    authDomain: "msjt301-974bb.firebaseapp.com",
    projectId: "msjt301-974bb",
    storageBucket: "msjt301-974bb.firebasestorage.app",
    messagingSenderId: "186209858482",
    appId: "1:186209858482:web:186ca610780799ef562aab"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const INFO = {
    name: "منصة في خدمتك",
    taxId: "312495447600003",
    license: "FL-765735204",
    linktree: "https://linktr.ee/fikhidmatik",
    zatca: "https://zatca.gov.sa/ar/eServices/Pages/TaxpayerLookup.aspx"
};

async function init() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) { document.getElementById('loading').innerHTML = "معرف الفاتورة مفقود"; return; }
    try {
        const doc = await db.collection("orders").doc(id).get();
        if (doc.exists) {
            document.getElementById('loading').style.display = 'none';
            render(doc.id, doc.data());
        }
    } catch (e) { console.error(e); }
}

function render(id, data) {
    const app = document.getElementById('app');
    const customer = data.customerName || '---';

    // الصفحة 1: الفاتورة
    let p1 = `
    <div class="page">
        <div class="header">
            <div class="logo-box"><img src="images/logo.svg" alt="Logo"></div>
            <div class="branding"><h1>${INFO.name}</h1><p>الرقم الضريبي: ${INFO.taxId} | الترخيص: ${INFO.license}</p></div>
            <div class="doc-type">فاتورة إلكترونية</div>
        </div>
        <div class="meta-grid">
            <div class="meta-box"><label>رقم الفاتورة</label><span>${data.orderNumber || id.toUpperCase()}</span></div>
            <div class="meta-box"><label>العميل</label><span>${customer}</span></div>
        </div>
        <table>
            <thead><tr><th>#</th><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
            <tbody>
                ${(data.items || []).map((item, i) => `<tr><td>${i+1}</td><td>${item.name}</td><td>${item.qty}</td><td>${item.price}</td><td>${item.qty * item.price}</td></tr>`).join('')}
            </tbody>
        </table>
        <div style="width:220px; margin-right:auto; border:2px solid var(--primary); padding:10px; border-radius:5px; text-align:center; font-weight:800; background:var(--secondary);">
            الإجمالي النهائي: ${data.total} ر.س
        </div>
        <div class="links-bar">
            <div class="link-card">التحقق الضريبي (ZATCA)<br><a href="${INFO.zatca}" target="_blank">رابط التحقق</a></div>
            <div class="link-card">رابط الموقع الرسمي<br><a href="${INFO.linktree}" target="_blank">Linktree</a></div>
            <div class="link-card">نسخة الفاتورة<br><a href="${window.location.href}" target="_blank">فتح الرابط</a></div>
        </div>
        <div class="qr-area"><div id="q1"></div><div id="q2"></div></div>
        <div class="footer-nav"><span>نسخة إلكترونية معتمدة</span><span>صفحة 1 من 3</span></div>
    </div>`;

    // الصفحة 2: الشروط الكاملة (1-33)
    let p2 = `
    <div class="page">
        <div class="header"><div class="logo-box"><img src="images/logo.svg"></div><h1>${INFO.name}</h1><div class="doc-type">الشروط والأحكام (1)</div></div>
        <div class="terms-content">
            <div class="disclaimer-box">إقرار مسؤولية البيانات والمعلومات: يقر العميل ويوافق على أن جميع المعلومات والبيانات والمستندات التي قام بتزويد مقدم الخدمة بها أو تم إدراجها في هذا المستند صحيحة ودقيقة ومكتملة، ويتحمل وحده كامل المسؤولية عنها.</div>
            <div class="section-h">أولاً: صلاحية العرض والتنفيذ (1-5)</div>
            <div class="clause">1. مدة صلاحية العرض: يكون هذا المستند صالحًا لمدة ثلاثة (3) أيام عمل فقط من تاريخ إصداره.</div>
            <div class="clause">2. بدء التنفيذ: تبدأ الأعمال بعد استلام الدفعة المقدمة وكافة المتطلبات من العميل بشكل واضح.</div>
            <div class="clause">3. مدة التنفيذ: تُحتسب من تاريخ اكتمال استلام المتطلبات، ولا يُعتد بأي تأخير يسببه العميل.</div>
            <div class="clause">4. التأخير الخارج عن الإرادة: لا نتحمل مسؤولية التأخير الناتج عن أطراف ثالثة أو ظروف قاهرة.</div>
            <div class="clause">5. الموافقات الحكومية: تخضع لسياسات الجهات المعنية ولا نضمن قراراتها.</div>
            <div class="section-h">ثانياً: التكاليف والمسؤوليات المالية (6-10)</div>
            <div class="clause">6. الرسوم الخارجية: لا تشمل القيمة رسوم السيرفرات أو النطاقات أو أي تراخيص خارجية.</div>
            <div class="clause">7. خدمات الطرف الثالث: تخضع لسياساتهم الخاصة ولا نتحمل مسؤولية جودة أدائهم.</div>
            <div class="clause">8. المدفوعات المستردة: مبالغ الجهات الخارجية غير قابلة للاسترجاع نهائياً.</div>
            <div class="clause">9. الدفع بالنيابة: تُعد المبالغ المدفوعة نيابة عن العميل ديناً واجباً سداده فوراً.</div>
            <div class="clause">10. الضريبة: تضاف ضريبة القيمة المضافة وفق الأنظمة السائدة في المملكة.</div>
            <div class="section-h">ثالثاً: التسليم والملكية (11-16)</div>
            <div class="clause">11. نطاق العمل: الالتزام فقط بما تم ذكره في هذا المستند حصراً.</div>
            <div class="clause">12. المنتج النهائي: التسليم للمخرج النهائي ولا يشمل الملفات المفتوحة.</div>
            <div class="clause">13. الكود المصدري: ملكية فكرية لمقدم الخدمة ولا يتم تسليمه إلا باتفاق مالي مستقل.</div>
            <div class="clause">14. نقل الملكية: يتم فقط بعد سداد كامل المستحقات وصدور خطاب نقل ملكية رسمي.</div>
            <div class="clause">16. حقوق الاستخدام: يحق للمنصة عرض الأعمال المنفذة في معرض أعمالها.</div>
            <div class="section-h">رابعاً: الدفعات والاسترجاع (17-22)</div>
            <div class="clause">17. آلية السداد: الالتزام بالمواعيد والدفعات المحددة في الفاتورة.</div>
            <div class="clause">18. إيقاف العمل: يحق لنا تعليق الخدمة فوراً عند تأخر السداد.</div>
            <div class="clause">19. سياسة الاسترجاع: لا يحق استرجاع المبالغ بعد البدء الفعلي في العمل.</div>
            <div class="clause">22. الرسوم الإدارية: يتم استقطاع 20% كرسوم تشغيل عند إلغاء المشروع من طرف العميل.</div>
        </div>
        <div class="footer-nav"><span>تتمة البنود في الصفحة التالية</span><span>صفحة 2 من 3</span></div>
    </div>`;

    // الصفحة 3: تتمة الشروط (34-57) والإقرار
    let p3 = `
    <div class="page">
        <div class="header"><div class="logo-box"><img src="images/logo.svg"></div><h1>${INFO.name}</h1><div class="doc-type">الشروط والأحكام (2)</div></div>
        <div class="terms-content">
            <div class="section-h">خامساً إلى حادي عشر: الضمان والنزاعات (23-50)</div>
            <div class="clause">24. نطاق الضمان: يغطي الأخطاء البرمجية أو الفنية الناتجة عن عملنا فقط.</div>
            <div class="clause">31. التواصل الرسمي: تُعتمد القنوات المسجلة في هذا المستند فقط كمرجع قانوني.</div>
            <div class="clause">35. شمولية الاتفاق: يلغي هذا المستند أي تفاهمات سابقة شفهية كانت أم مكتوبة.</div>
            <div class="clause">39. حل النزاعات: يتم السعي للحل الودي قبل اللجوء للجهات المختصة.</div>
            <div class="clause">45. الاستلام الضمني: يُعتبر المشروع مستلماً رسمياً بعد مرور 7 أيام دون ملاحظات مكتوبة.</div>
            <div class="clause">50. رفض الخدمة: نحتفظ بحق رفض الخدمة مع حفظ حقوق الطرفين المالية.</div>
            <div class="section-h">ثاني عشر: الحماية القانونية والبنود النهائية (51-57)</div>
            <div class="clause">51. سقف المطالبات: لا تتجاوز قيمة أي تعويض مالي إجمالي قيمة هذه الفاتورة.</div>
            <div class="clause">52. حدود المسؤولية: مقدم الخدمة غير مسؤول عن سوء استخدام العميل للمخرجات.</div>
            <div class="clause">54. الملكية الفكرية: جميع الحقوق محفوظة للمنصة ما لم يُنص على خلاف ذلك كتابةً.</div>
            <div class="clause">57. الملحقات الإضافية: أي متطلبات فنية أو مالية خارج هذا النطاق توثق في ملحق مستقل ومعتمد خطياً، ولا يُعتد بأي تفاهمات شفهية خارج هذا الإطار.</div>

            <div style="margin-top:40px; border:2px solid var(--primary); padding:20px; border-radius:10px; background:var(--secondary);">
                <h4 style="text-align:center; color:var(--primary); margin-bottom:12px;">إقرار وموافقة العميل</h4>
                <p>أقر أنا العميل المذكور بياناتي أعلاه بالاطلاع على جميع الشروط والأحكام الـ (57) المذكورة في هذا المستند وأوافق عليها بالكامل وأتعهد بالالتزام بها دون قيد أو شرط.</p>
                <div style="display:flex; justify-content:space-between; margin-top:20px; font-weight:bold;">
                    <span>اسم العميل: ${customer}</span>
                    <span>التاريخ: ${new Date().toLocaleDateString('ar-SA')}</span>
                </div>
                <div style="margin-top:15px; border-bottom:1px solid #ccc; width:200px; height:30px;">التوقيع:</div>
            </div>
        </div>
        <div class="footer-nav"><span>www.khidmatik.com</span><span>صفحة 3 من 3</span></div>
    </div>`;

    app.innerHTML = p1 + p2 + p3;
    
    // توليد الأكواد
    new QRCode(document.getElementById("q1"), { text: `Seller:${INFO.name}|VAT:${INFO.taxId}|Total:${data.total}`, width: 85, height: 85 });
    new QRCode(document.getElementById("q2"), { text: window.location.href, width: 85, height: 85 });
}
window.onload = init;
</script>
</body>
</html>
