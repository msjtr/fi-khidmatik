<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>في خدمتك - فاتورة إلكترونية</title>
    <link rel="stylesheet" href="css/print.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #e9ecef; 
            font-family: 'Segoe UI', 'Cairo', sans-serif; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        .invoice-wrapper { 
            max-width: 210mm; 
            margin: 0 auto; 
            background: white; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            border-radius: 8px;
            min-height: 297mm;
        }
        .invoice-page, .terms-section-page { 
            width: 210mm; 
            min-height: 297mm; 
            background: white; 
            padding: 15mm 12mm; 
            page-break-after: always; 
            position: relative; 
        }
        .header-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid #1e3a5f; 
            padding-bottom: 12px; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 65px; height: 65px; background: #1e3a5f; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; }
        .platform-name { font-size: 20px; font-weight: bold; color: #1e3a5f; }
        .invoice-title { font-size: 24px; font-weight: bold; color: #1e3a5f; }
        .legal-numbers { text-align: left; font-size: 10px; color: #4a5568; }
        .info-row { 
            display: flex; 
            justify-content: space-between; 
            background: #f8fafc; 
            padding: 12px 15px; 
            border-radius: 12px; 
            margin: 15px 0; 
            border: 1px solid #e2e8f0;
        }
        .status-badge { background: #10b981; color: white; padding: 4px 12px; border-radius: 30px; font-size: 11px; display: inline-block; }
        .addresses { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .address-box { flex: 1; background: #f9f9fb; padding: 15px; border-radius: 14px; border: 1px solid #e9ecef; font-size: 11px; line-height: 1.7; }
        .address-box strong { display: block; margin-bottom: 10px; color: #1e3a5f; }
        .payment-approval { display: flex; gap: 15px; margin: 15px 0; }
        .payment-box, .approval-box { flex: 1; background: #f1f5f9; padding: 10px 12px; border-radius: 10px; font-size: 11px; }
        .invoice-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 11px; }
        .invoice-table th { background: #1e3a5f; color: white; padding: 10px; border: 1px solid #2d4a7a; }
        .invoice-table td { border: 1px solid #cbd5e1; padding: 10px; vertical-align: middle; }
        .product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .totals { width: 280px; margin-right: auto; margin-top: 20px; border-top: 2px solid #e2e8f0; padding-top: 12px; }
        .totals div { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; }
        .grand-total { font-weight: bold; font-size: 16px; color: #1e3a5f; border-top: 2px solid #1e3a5f; margin-top: 6px; padding-top: 10px; }
        .barcodes-container { display: flex; justify-content: center; margin: 20px 0; padding: 15px; background: #f8fafc; border-radius: 12px; }
        .qr-placeholder { width: 100px; height: 100px; }
        .footer-note { margin-top: 30px; font-size: 10px; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 15px; }
        .contact-info { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin: 12px 0; }
        .action-buttons { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin: 20px auto; 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: white; 
            padding: 10px 25px; 
            border-radius: 50px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            z-index: 1000; 
        }
        .btn { padding: 8px 20px; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-secondary { background: #334155; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .loading-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.7); display: flex; align-items: center; 
            justify-content: center; z-index: 9999; 
        }
        .loading-box { background: white; padding: 30px; border-radius: 16px; text-align: center; }
        .loading-spinner { 
            border: 4px solid #f3f3f3; border-top: 4px solid #1e3a5f; 
            border-radius: 50%; width: 45px; height: 45px; 
            animation: spin 1s linear infinite; margin: 0 auto 15px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast-message { 
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); 
            padding: 10px 20px; border-radius: 8px; z-index: 10000; font-size: 14px; color: white; 
        }
        @media print { .action-buttons { display: none !important; } body { background: white; padding: 0; } }
        .error-container { text-align: center; padding: 50px; color: #ef4444; }
    </style>
</head>
<body>
<div class="invoice-wrapper" id="invoiceRoot">
    <div class="error-container" id="errorContainer" style="display: none;">
        <h2>⚠️ حدث خطأ</h2>
        <p id="errorMessage"></p>
    </div>
</div>
<div class="action-buttons">
    <button class="btn btn-primary" id="printBtn">🖨️ طباعة</button>
    <button class="btn btn-secondary" id="pdfBtn">📄 PDF</button>
    <button class="btn btn-danger" id="backBtn" onclick="window.close()">✖️ إغلاق</button>
</div>

<script type="module">
    // استيراد Firebase مباشرة
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
        getFirestore,
        collection,
        doc,
        getDoc,
        getDocs
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // تكوين Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };

    // تهيئة Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let orderData = null;

    const sellerData = {
        name: "منصة في خدمتك",
        taxNumber: "312495447600003",
        licenseNumber: "FL-765735204",
        address: "حائل - حي النقرة - شارع سعد المشاط - مبنى 3085 - الرمز البريدي 55431",
        phone: "966534051317",
        whatsapp: "966545312021",
        email: "info@fi-khidmatik.com",
        website: "www.khidmatik.com"
    };

    // دوال مساعدة
    function showLoading(msg) {
        let ov = document.getElementById('loadingOverlay');
        if (!ov) {
            ov = document.createElement('div');
            ov.id = 'loadingOverlay';
            ov.className = 'loading-overlay';
            ov.innerHTML = `<div class="loading-box"><div class="loading-spinner"></div><p id="loadingMsg">${msg}</p></div>`;
            document.body.appendChild(ov);
        }
        const msgEl = document.getElementById('loadingMsg');
        if (msgEl) msgEl.textContent = msg;
        ov.style.display = 'flex';
    }
    
    function hideLoading() { 
        let ov = document.getElementById('loadingOverlay'); 
        if(ov) ov.style.display = 'none'; 
    }
    
    function showToast(msg, isError = false) { 
        let t = document.createElement('div'); 
        t.className = 'toast-message'; 
        t.textContent = (isError ? '❌ ' : '✅ ') + msg; 
        t.style.background = isError ? '#ef4444' : '#10b981';
        document.body.appendChild(t); 
        setTimeout(() => t.remove(), 3000); 
    }
    
    function showError(message) {
        const errorDiv = document.getElementById('errorContainer');
        const errorMsg = document.getElementById('errorMessage');
        if (errorDiv && errorMsg) {
            errorMsg.textContent = message;
            errorDiv.style.display = 'block';
        }
        showToast(message, true);
    }

    function formatTime12(t) { 
        if(!t) return ''; 
        let [h, m] = t.split(':'); 
        let hour = parseInt(h); 
        let ap = hour >= 12 ? 'مساءً' : 'صباحاً'; 
        hour = hour % 12 || 12; 
        return `${hour}:${m} ${ap}`; 
    }
    
    function formatDateYMD(d) { 
        if(!d) return ''; 
        let p = d.split('-'); 
        return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d; 
    }
    
    function escapeHtml(str) { 
        if(!str) return ''; 
        return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
    }
    
    function getShippingMethodText(method) {
        if (method === 'delivery') return '🚚 شحن منزلي';
        if (method === 'pickup') return '🏪 استلام من المقر';
        if (method === 'noship') return '📥 لا يحتاج شحن';
        return method || 'غير محدد';
    }

    // جلب الطلب من Firebase
    async function fetchOrder(orderId) {
        try {
            console.log('🔄 جلب الطلب:', orderId);
            const orderRef = doc(db, 'orders', orderId);
            const orderSnap = await getDoc(orderRef);
            
            if (!orderSnap.exists()) {
                throw new Error('الطلب غير موجود');
            }
            
            const order = { id: orderSnap.id, ...orderSnap.data() };
            console.log('✅ تم جلب الطلب:', order);
            
            // جلب بيانات العميل
            let customer = { name: 'غير معروف', phone: '', email: '', address: '' };
            if (order.customerId) {
                const customerRef = doc(db, 'customers', order.customerId);
                const customerSnap = await getDoc(customerRef);
                if (customerSnap.exists()) {
                    customer = customerSnap.data();
                }
            }
            
            // جلب بيانات المنتجات
            const items = [];
            for (const item of (order.items || [])) {
                let productImage = item.image || '';
                let productName = item.name || 'منتج';
                let productDesc = item.description || '';
                
                // محاولة جلب صورة المنتج من Firebase
                if (item.productId) {
                    try {
                        const productRef = doc(db, 'products', item.productId);
                        const productSnap = await getDoc(productRef);
                        if (productSnap.exists()) {
                            const product = productSnap.data();
                            productImage = product.image || productImage;
                            productName = product.name || productName;
                            productDesc = product.description || productDesc;
                        }
                    } catch(e) {
                        console.warn('خطأ في جلب المنتج:', e);
                    }
                }
                
                items.push({
                    ...item,
                    productName: productName,
                    description: productDesc,
                    image: productImage,
                    price: item.price || 0
                });
            }
            
            return {
                ...order,
                customerName: customer.name,
                customerPhone: customer.phone,
                customerEmail: customer.email,
                customerAddress: customer.address || '',
                items: items,
                paymentMethodName: getPaymentMethodName(order.paymentMethod)
            };
            
        } catch (error) {
            console.error('❌ خطأ في جلب الطلب:', error);
            throw error;
        }
    }
    
    function getPaymentMethodName(method) {
        const methods = {
            'mada': 'مدى', 'mastercard': 'ماستركارد', 'visa': 'فيزا',
            'stcpay': 'STCPay', 'tamara': 'تمارا', 'tabby': 'تابي'
        };
        return methods[method] || method || 'مدى';
    }

    // بناء HTML الفاتورة
    function buildInvoiceHTML(order) {
        const itemsHtml = (order.items || []).map((item, idx) => `
            <tr>
                <td style="text-align:center">${idx + 1}</td>
                <td style="text-align:center">
                    ${item.image ? `<img src="${item.image}" class="product-img" onerror="this.style.display='none'" style="width:50px;height:50px;object-fit:cover;border-radius:8px;">` : '<div style="width:50px;height:50px;background:#e2e8f0;border-radius:8px;"></div>'}
                </td>
                <td style="text-align:right">
                    <strong>${escapeHtml(item.productName)}</strong><br>
                    <small style="color:#666;">${escapeHtml(item.description || '')}</small>
                </td>
                <td style="text-align:center">${item.quantity}</td>
                <td style="text-align:center">${(item.price || 0).toFixed(2)} ريال</td>
                <td style="text-align:center">${((item.price || 0) * item.quantity).toFixed(2)} ريال</td>
            </tr>
        `).join('');
        
        const subtotal = order.subtotal || order.items?.reduce((s, i) => s + ((i.price || 0) * i.quantity), 0) || 0;
        const discount = order.discount || 0;
        const tax = order.tax || ((subtotal - discount) * 0.15);
        const total = order.total || (subtotal - discount + tax);
        const shipText = getShippingMethodText(order.shippingMethod);
        
        return `
            <div class="invoice-page">
                <div class="header-top">
                    <div class="logo-area">
                        <div class="logo-img">📄</div>
                        <div>
                            <div class="platform-name">${sellerData.name}</div>
                            <div style="font-size:10px;color:#6c757d;">خدمات تقنية متكاملة</div>
                        </div>
                    </div>
                    <div class="invoice-title">فاتورة إلكترونية</div>
                    <div class="legal-numbers">
                        <div>رقم شهادة العمل الحر: ${sellerData.licenseNumber}</div>
                        <div>الرقم الضريبي: ${sellerData.taxNumber}</div>
                    </div>
                </div>
                
                <div class="info-row">
                    <div><strong>رقم الفاتورة:</strong> ${order.orderNumber}</div>
                    <div><strong>التاريخ:</strong> ${formatDateYMD(order.orderDate)} - ${formatTime12(order.orderTime)}</div>
                    <div><span class="status-badge">${order.status || 'مكتمل'}</span></div>
                </div>
                
                <div class="addresses">
                    <div class="address-box">
                        <strong>🏢 مصدرة من</strong>
                        ${sellerData.name}<br>
                        المملكة العربية السعودية<br>
                        ${sellerData.address}<br>
                        📞 ${sellerData.phone}<br>
                        ✉️ ${sellerData.email}
                    </div>
                    <div class="address-box">
                        <strong>👤 مصدرة إلى</strong>
                        ${escapeHtml(order.customerName)}<br>
                        ${escapeHtml(order.customerAddress)}<br>
                        📞 ${escapeHtml(order.customerPhone)}<br>
                        ✉️ ${escapeHtml(order.customerEmail)}
                    </div>
                </div>
                
                <div class="payment-approval">
                    <div class="payment-box"><strong>💰 طريقة الدفع:</strong> ${order.paymentMethodName || 'غير محدد'}</div>
                    <div class="payment-box"><strong>🚚 طريقة الاستلام:</strong> ${shipText}</div>
                    <div class="approval-box"><strong>✅ رمز الموافقة:</strong> ${order.approvalCode || 'غير مطلوب'}</div>
                </div>
                
                <table class="invoice-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>الصورة</th>
                            <th>المنتج / الوصف</th>
                            <th>الكمية</th>
                            <th>سعر الوحدة</th>
                            <th>الإجمالي</th>
                        </tr>
                    </thead>
                    <tbody>${itemsHtml}</tbody>
                </table>
                
                <div class="totals">
                    <div><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                    ${discount > 0 ? `<div><span>الخصم:</span><span>- ${discount.toFixed(2)} ريال</span></div>` : ''}
                    <div><span>ضريبة القيمة المضافة 15%:</span><span>${tax.toFixed(2)} ريال</span></div>
                    <div class="grand-total"><span>الإجمالي النهائي:</span><span>${total.toFixed(2)} ريال</span></div>
                </div>
                
                <div class="barcodes-container">
                    <div class="barcode-item">
                        <div id="zatcaQR" class="qr-placeholder"></div>
                    </div>
                </div>
                
                <div class="footer-note">
                    <div class="contact-info">
                        <span>📞 ${sellerData.phone}</span>
                        <span>💬 ${sellerData.whatsapp}</span>
                        <span>✉️ ${sellerData.email}</span>
                        <span>🌐 ${sellerData.website}</span>
                    </div>
                    <div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
                </div>
            </div>
        `;
    }

    // إنشاء QR Code
    function generateZATCAQR(order) {
        const sellerName = sellerData.name;
        const vatNumber = sellerData.taxNumber;
        const timestamp = new Date().toISOString();
        const totalWithVAT = order.total || 0;
        const vatAmount = order.tax || ((order.subtotal || 0) * 0.15);
        
        function encodeTLV(tag, value) {
            const tagHex = String.fromCharCode(tag);
            const lengthHex = String.fromCharCode(value.length);
            return tagHex + lengthHex + value;
        }
        
        let tlvData = '';
        tlvData += encodeTLV(1, sellerName);
        tlvData += encodeTLV(2, vatNumber);
        tlvData += encodeTLV(3, timestamp);
        tlvData += encodeTLV(4, totalWithVAT.toFixed(2));
        tlvData += encodeTLV(5, vatAmount.toFixed(2));
        
        return btoa(tlvData);
    }

    // التحميل والعرض
    async function loadAndDisplayInvoice() {
        showLoading('جاري تحميل الفاتورة...');
        
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        
        if (!orderId || orderId === 'null' || orderId === 'undefined') {
            hideLoading();
            showError('لم يتم تحديد رقم الطلب. الرجاء استخدام الرابط الصحيح.');
            return;
        }
        
        try {
            const order = await fetchOrder(orderId);
            orderData = order;
            
            const invoiceHTML = buildInvoiceHTML(order);
            document.getElementById('invoiceRoot').innerHTML = invoiceHTML;
            
            // إنشاء QR Code
            setTimeout(() => {
                const qrDiv = document.getElementById('zatcaQR');
                if (qrDiv && typeof QRCode !== 'undefined') {
                    try {
                        const qrData = generateZATCAQR(order);
                        new QRCode(qrDiv, {
                            text: qrData,
                            width: 100,
                            height: 100
                        });
                    } catch(e) {
                        console.error('QR Error:', e);
                    }
                }
            }, 100);
            
            showToast('تم تحميل الفاتورة بنجاح');
            
        } catch (error) {
            console.error('خطأ:', error);
            showError('حدث خطأ في تحميل الفاتورة: ' + error.message);
        } finally {
            hideLoading();
        }
    }

    // إنشاء PDF
    async function generatePDF() {
        const root = document.getElementById('invoiceRoot');
        const invoicePage = root.querySelector('.invoice-page');
        
        if (!invoicePage) {
            showToast('لا توجد فاتورة للتصدير', true);
            return;
        }
        
        showLoading('جاري إنشاء PDF...');
        
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            const canvas = await html2canvas(invoicePage, { 
                scale: 2, 
                useCORS: true, 
                backgroundColor: '#ffffff'
            });
            
            const imgData = canvas.toDataURL('image/png');
            const imgWidth = 210;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            pdf.save(`فاتورة_${orderData?.orderNumber || 'invoice'}.pdf`);
            showToast('تم حفظ PDF بنجاح');
            
        } catch(error) {
            console.error('PDF Error:', error);
            showToast('خطأ في إنشاء PDF', true);
        } finally {
            hideLoading();
        }
    }

    // ربط الأزرار
    document.getElementById('printBtn').onclick = () => window.print();
    document.getElementById('pdfBtn').onclick = generatePDF;
    
    // بدء التشغيل
    loadAndDisplayInvoice();
</script>
</body>
</html>
