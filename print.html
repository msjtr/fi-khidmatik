<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>في خدمتك - فاتورة إلكترونية</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e9ecef;
            font-family: 'Segoe UI', 'Cairo', 'Tahoma', sans-serif;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
        }

        .invoice-wrapper {
            max-width: 210mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border-radius: 8px;
        }

        /* الصفحات */
        .invoice-page, .terms-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            padding: 15mm 12mm;
            page-break-after: always;
            break-inside: avoid;
            position: relative;
        }

        /* ========== رأس الصفحة الموحد ========== */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #1e3a5f;
            padding-bottom: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 65px;
            height: 65px;
            object-fit: contain;
        }

        .platform-name {
            font-size: 20px;
            font-weight: bold;
            color: #1e3a5f;
        }

        .platform-slogan {
            font-size: 10px;
            color: #6c757d;
        }

        .invoice-title {
            font-size: 24px;
            font-weight: bold;
            color: #1e3a5f;
        }

        .legal-numbers {
            text-align: left;
            font-size: 10px;
            color: #4a5568;
            line-height: 1.5;
        }

        /* ========== معلومات الطلب ========== */
        .info-row {
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            padding: 12px 15px;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid #e2e8f0;
        }

        .info-item {
            font-size: 12px;
        }

        .status-badge {
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            display: inline-block;
        }

        /* ========== العناوين (مصدرة من - مصدرة إلى) ========== */
        .addresses {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .address-box {
            flex: 1;
            background: #f9f9fb;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid #e9ecef;
            font-size: 11px;
            line-height: 1.7;
        }

        .address-box strong {
            display: block;
            margin-bottom: 10px;
            color: #1e3a5f;
            font-size: 13px;
            border-right: 3px solid #1e3a5f;
            padding-right: 8px;
        }

        /* ========== الدفع والتوصيل ========== */
        .payment-approval {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .payment-box, .approval-box {
            flex: 1;
            background: #f1f5f9;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 11px;
        }

        .payment-box strong, .approval-box strong {
            display: block;
            margin-bottom: 5px;
            color: #1e3a5f;
        }

        /* ========== جدول المنتجات ========== */
        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 11px;
        }

        .invoice-table th {
            background: #1e3a5f;
            color: white;
            padding: 10px 8px;
            border: 1px solid #2d4a7a;
            text-align: center;
        }

        .invoice-table td {
            border: 1px solid #cbd5e1;
            padding: 10px 8px;
            vertical-align: middle;
        }

        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            background: #f1f5f9;
        }

        /* ========== الإجماليات ========== */
        .totals {
            width: 280px;
            margin-right: auto;
            margin-top: 20px;
            border-top: 2px solid #e2e8f0;
            padding-top: 12px;
        }

        .totals div {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
        }

        .grand-total {
            font-weight: bold;
            font-size: 16px;
            color: #1e3a5f;
            border-top: 2px solid #1e3a5f;
            margin-top: 6px;
            padding-top: 10px;
        }

        /* ========== الباركود ========== */
        .barcodes-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            padding: 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .qr-placeholder {
            width: 100px;
            height: 100px;
        }

        /* ========== التذييل الموحد ========== */
        .footer-note {
            margin-top: 30px;
            font-size: 10px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 15px;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin: 12px 0;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 10px;
        }

        .contact-info span {
            font-size: 11px;
        }

        .page-number {
            text-align: left;
            font-size: 10px;
            color: #94a3b8;
            margin-top: 12px;
            direction: ltr;
        }

        /* ========== صفحة الشروط والأحكام ========== */
        .terms-page .page-title {
            color: #1e3a5f;
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: bold;
            border-right: 4px solid #1e3a5f;
            padding-right: 12px;
        }

        .terms-intro {
            background: #fef3c7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 11px;
            line-height: 1.8;
            border-right: 4px solid #f59e0b;
        }

        /* تنسيق الأعمدة للشروط */
        .terms-two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .terms-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .terms-section {
            background: #fafafa;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .terms-section h4 {
            background: #1e3a5f;
            color: white;
            padding: 5px 14px;
            border-radius: 25px;
            font-size: 11px;
            margin-bottom: 12px;
            display: inline-block;
        }

        .terms-section p {
            font-size: 10.5px;
            line-height: 1.8;
            color: #334155;
        }

        .terms-section p strong {
            color: #1e3a5f;
            margin-left: 5px;
        }

        /* ========== الإقرار والتوقيع ========== */
        .declaration-box {
            background: #f8fafc;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin: 20px 0;
            text-align: center;
        }

        .declaration-box p {
            font-size: 13px;
            font-weight: bold;
            line-height: 1.8;
        }

        .signature-line {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        /* ========== أزرار التحكم ========== */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px auto;
            position: sticky;
            bottom: 20px;
            background: white;
            padding: 12px 20px;
            border-radius: 60px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: fit-content;
            z-index: 100;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-primary { background: #1e3a5f; color: white; }
        .btn-secondary { background: #334155; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }

        /* ========== الطباعة ========== */
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; padding: 0; }
            .action-buttons, .no-print { display: none !important; }
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }

        /* ========== التحميل ========== */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-box {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3a5f;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 10000;
            font-size: 14px;
            background: #10b981;
            color: white;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media screen and (max-width: 768px) {
            .invoice-page, .terms-page { padding: 8mm 6mm; }
            .invoice-table th, .invoice-table td { padding: 6px 4px; font-size: 9px; }
            .product-img { width: 40px; height: 40px; }
            .addresses, .payment-approval { flex-direction: column; }
            .terms-two-columns { grid-template-columns: 1fr; gap: 15px; }
        }
    </style>
</head>
<body>
<div style="display: flex; flex-direction: column; align-items: center;">
    <div class="invoice-wrapper" id="invoiceRoot">
        <div class="loading-box"><div class="loading-spinner"></div><p>جاري تحميل الفاتورة...</p></div>
    </div>
    <div class="action-buttons no-print">
        <button class="btn btn-primary" id="printBtn">طباعة</button>
        <button class="btn btn-secondary" id="pdfBtn">PDF</button>
        <button class="btn btn-danger" id="backBtn" onclick="window.close()">إغلاق</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let orderData = null;
    let sellerData = {
        name: "منصة في خدمتك",
        taxNumber: "312495447600003",
        licenseNumber: "FL-765735204",
        address: "حائل - حي النقرة - شارع سعد المشاط - رقم المبنى 3085 - الرقم الإضافي 7718 - الرمز البريدي 55431",
        phone: "966534051317",
        whatsapp: "966545312021",
        email: "info@fi-khidmatik.com",
        website: "www.khidmatik.com"
    };

    function showLoading(msg) {
        let ov = document.getElementById('loadingOverlay');
        if (!ov) {
            ov = document.createElement('div');
            ov.id = 'loadingOverlay';
            ov.className = 'loading-overlay';
            ov.innerHTML = `<div class="loading-box"><div class="loading-spinner"></div><p id="loadingMsg">${msg}</p></div>`;
            document.body.appendChild(ov);
        }
        document.getElementById('loadingMsg').textContent = msg;
        ov.style.display = 'flex';
    }

    function hideLoading() {
        let ov = document.getElementById('loadingOverlay');
        if (ov) ov.style.display = 'none';
    }

    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast-message';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function cleanHtmlText(html) {
        if (!html) return '';
        let text = String(html);
        text = text.replace(/<[^>]*>/g, ' ');
        text = text.replace(/data-[a-z]+="[^"]*"/gi, '');
        text = text.replace(/\b(strong|p|div|span|br|data-start|data-end)\b/gi, '');
        text = text.replace(/\s+/g, ' ').trim();
        return text;
    }

    async function imageToBase64(url) {
        if (!url) return null;
        try {
            const res = await fetch(url, { mode: 'cors' });
            if (!res.ok) return null;
            const blob = await res.blob();
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = () => resolve(null);
                reader.readAsDataURL(blob);
            });
        } catch(e) { return null; }
    }

    async function fetchOrderData() {
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        
        if (orderId && orderId !== 'null' && orderId !== 'undefined') {
            try {
                showLoading('جاري تحميل بيانات الطلب...');
                const orderRef = doc(db, 'orders', orderId);
                const orderSnap = await getDoc(orderRef);
                
                if (orderSnap.exists()) {
                    orderData = { id: orderSnap.id, ...orderSnap.data() };
                    
                    if (orderData.customerId) {
                        const customerRef = doc(db, 'customers', orderData.customerId);
                        const customerSnap = await getDoc(customerRef);
                        if (customerSnap.exists()) {
                            const c = customerSnap.data();
                            orderData.customerName = c.name || c.customerName || 'عميل';
                            orderData.customerPhone = c.phone || c.mobile || '';
                            orderData.customerEmail = c.email || '';
                            const addressParts = [];
                            if (c.city) addressParts.push(c.city);
                            if (c.street) addressParts.push(c.street);
                            if (c.buildingNo) addressParts.push(`مبنى رقم: ${c.buildingNo}`);
                            if (c.postalCode) addressParts.push(`الرمز البريدي: ${c.postalCode}`);
                            orderData.customerAddress = addressParts.join(' - ') || 'لا يوجد عنوان';
                        }
                    }
                    
                    if (orderData.items && Array.isArray(orderData.items)) {
                        for (let item of orderData.items) {
                            item.name = cleanHtmlText(item.name);
                            item.description = cleanHtmlText(item.description);
                        }
                    }
                    
                    showToast('تم تحميل الفاتورة بنجاح');
                    return;
                }
            } catch(e) {
                console.error('خطأ في جلب البيانات:', e);
                showToast('خطأ في جلب البيانات');
            }
        }
        
        // بيانات تجريبية للعرض
        orderData = {
            id: "demo_001",
            orderNumber: "INV-2026-0407-001",
            orderDate: "2026-04-07",
            orderTime: "14:30",
            status: "مكتمل",
            customerName: "أحمد بن محمد السالم",
            customerPhone: "+966 55 123 4567",
            customerEmail: "ahmed.alsalem@example.com",
            customerAddress: "الرياض - حي المروج - شارع الأمير فيصل بن عبدالعزيز - مبنى رقم 2215 - الرمز البريدي 12282",
            subtotal: 19282.00,
            discount: 5784.60,
            tax: 2024.61,
            total: 15522.01,
            paymentMethodName: "تحويل بنكي (تمارا)",
            shippingMethod: "delivery",
            approvalCode: "AP-8821X9",
            items: [
                { id: 1, name: "الباقة المتقدمة في تصميم المتاجر الإلكترونية", description: "تصميم متكامل للمتجر الإلكتروني + لوحة تحكم احترافية + بوابة دفع متكاملة + شهادة SSL", image: "https://picsum.photos/id/48/200/200", quantity: 1, price: 12500.00 },
                { id: 2, name: "استضافة سحابية", description: "استضافة مواقع لمدة عام كامل + دعم فني 24/7 + سعة تخزينية 50GB", image: "https://picsum.photos/id/0/200/200", quantity: 2, price: 2391.00 }
            ]
        };
    }

    function formatTime12(time24) {
        if (!time24) return '';
        let [h, m] = time24.split(':');
        let hour = parseInt(h);
        let ampm = hour >= 12 ? 'مساءً' : 'صباحاً';
        hour = hour % 12 || 12;
        return `${hour.toString().padStart(2, '0')}:${m} ${ampm}`;
    }

    function formatDateYMD(d) {
        if (!d) return '';
        let p = d.split('-');
        return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    function buildHeader() {
        return `
            <div class="header-top">
                <div class="logo-area">
                    <img src="images/logo.svg" class="logo-img" alt="logo" onerror="this.src='https://placehold.co/65x65/1e3a5f/white?text=في+خدمتك'">
                    <div>
                        <div class="platform-name">منصة في خدمتك</div>
                        <div class="platform-slogan">خدمات تقنية متكاملة</div>
                    </div>
                </div>
                <div class="invoice-title">فاتورة إلكترونية</div>
                <div class="legal-numbers">
                    <div>رقم شهادة العمل الحر: ${sellerData.licenseNumber}</div>
                    <div>الرقم الضريبي: ${sellerData.taxNumber}</div>
                </div>
            </div>
        `;
    }

    function buildFooter(pageNum, totalPages) {
        return `
            <div class="footer-note">
                <div class="contact-info">
                    <span>📞 الهاتف: ${sellerData.phone}</span>
                    <span>💬 الواتساب: ${sellerData.whatsapp}</span>
                    <span>✉️ البريد: ${sellerData.email}</span>
                    <span>🌐 الموقع: ${sellerData.website}</span>
                </div>
                <div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
                <div class="page-number">صفحة ${pageNum} من ${totalPages}</div>
            </div>
        `;
    }

    function buildInvoicePage(base64Images) {
        const itemsHtml = (orderData.items || []).map((item, idx) => {
            let imgHtml = '';
            const b64 = base64Images?.find(b => b.index === idx)?.base64;
            if (b64) {
                imgHtml = `<img src="${b64}" class="product-img">`;
            } else if (item.image) {
                imgHtml = `<img src="${item.image}" class="product-img" crossorigin="anonymous" onerror="this.style.display='none'">`;
            } else {
                imgHtml = '<div style="width:50px;height:50px;background:#e2e8f0;border-radius:8px;"></div>';
            }
            return `
                <tr>
                    <td style="text-align:center">${idx + 1}</td>
                    <td style="text-align:center">${imgHtml}</td>
                    <td style="text-align:right"><strong>${escapeHtml(item.name)}</strong><br><small>${escapeHtml(item.description || '')}</small></td>
                    <td style="text-align:center">${item.quantity}</td>
                    <td style="text-align:center">${(item.price || 0).toFixed(2)} ريال</td>
                    <td style="text-align:center">${((item.price || 0) * item.quantity).toFixed(2)} ريال</td>
                </tr>
            `;
        }).join('');

        const subtotal = orderData.subtotal || (orderData.items || []).reduce((s, i) => s + (i.price * i.quantity), 0);
        const discount = orderData.discount || 0;
        const tax = orderData.tax || ((subtotal - discount) * 0.15);
        const finalTotal = orderData.total || (subtotal - discount + tax);
        const shipMethod = orderData.shippingMethod === 'delivery' ? 'شحن منزلي' : 'استلام من المقر';

        return `
            <div class="invoice-page">
                ${buildHeader()}
                
                <div class="info-row">
                    <div class="info-item"><strong>رقم الفاتورة:</strong> ${orderData.orderNumber}</div>
                    <div class="info-item"><strong>التاريخ:</strong> ${formatDateYMD(orderData.orderDate)} - الوقت: ${formatTime12(orderData.orderTime)}</div>
                    <div><span class="status-badge">${orderData.status || 'مكتمل'}</span></div>
                </div>
                
                <div class="addresses">
                    <div class="address-box">
                        <strong>مصدرة من</strong>
                        ${sellerData.name}<br>
                        المملكة العربية السعودية<br>
                        ${sellerData.address}
                    </div>
                    <div class="address-box">
                        <strong>مصدرة إلى</strong>
                        ${escapeHtml(orderData.customerName)}<br>
                        ${escapeHtml(orderData.customerAddress)}<br>
                        هاتف: ${escapeHtml(orderData.customerPhone)}<br>
                        بريد إلكتروني: ${escapeHtml(orderData.customerEmail)}
                    </div>
                </div>
                
                <div class="payment-approval">

    async function renderFullInvoice() {
        await fetchOrderData();
        
        if (!orderData) {
            document.getElementById('invoiceRoot').innerHTML = '<div class="loading-box">فشل تحميل البيانات</div>';
            hideLoading();
            return;
        }
        
        // تحويل الصور إلى Base64
        const base64Images = [];
        if (orderData.items && Array.isArray(orderData.items)) {
            for (let i = 0; i < orderData.items.length; i++) {
                const item = orderData.items[i];
                if (item.image) {
                    const b64 = await imageToBase64(item.image);
                    base64Images.push({ index: i, base64: b64 });
                } else {
                    base64Images.push({ index: i, base64: null });
                }
            }
        }
        
        const page1 = buildInvoicePage(base64Images);
        const page2 = buildTermsPage1();
        const page3 = buildTermsPage2();
        const page4 = buildTermsPage3WithDeclaration();
        
        document.getElementById('invoiceRoot').innerHTML = page1 + page2 + page3 + page4;
        
        setTimeout(() => {
            const qrDiv = document.getElementById('platformQR');
            if (qrDiv && typeof QRCode !== 'undefined') {
                new QRCode(qrDiv, {
                    text: `https://${sellerData.website}`,
                    width: 100,
                    height: 100
                });
            }
        }, 100);
        
        hideLoading();
    }

    async function generatePDF() {
        const element = document.getElementById('invoiceRoot');
        const pages = element.querySelectorAll('.invoice-page, .terms-page');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        
        showLoading('جاري إنشاء PDF...');
        
        try {
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], {
                    scale: 3,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });
                
                if (i !== 0) pdf.addPage();
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
            }
            
            pdf.save(`فاتورة_${orderData.orderNumber}.pdf`);
            showToast('تم حفظ PDF بنجاح');
        } catch (error) {
            console.error('خطأ في PDF:', error);
            showToast('حدث خطأ أثناء إنشاء PDF');
        } finally {
            hideLoading();
        }
    }

    function printInvoice() {
        window.print();
    }

    document.getElementById('printBtn')?.addEventListener('click', printInvoice);
    document.getElementById('pdfBtn')?.addEventListener('click', generatePDF);
    
    renderFullInvoice();
</script>
