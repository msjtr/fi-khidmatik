<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>فاتورة إلكترونية - في خدمتك</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary-blue: #1e3a5f; --gray-light: #f8f9fa; --border-color: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9ecef; font-family: 'Tajawal', sans-serif; color: #333; }

        /* إعدادات الصفحة A4 للطباعة */
        .page { 
            width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 20px auto; background: white; position: relative;
            display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* الهيدر العلوي */
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid var(--primary-blue); padding-bottom: 15px; margin-bottom: 20px; }
        .platform-info h1 { color: var(--primary-blue); font-size: 26px; font-weight: 800; margin-bottom: 5px; }
        .platform-info p { font-size: 12px; color: #555; line-height: 1.4; }
        .invoice-badge { background: var(--primary-blue); color: white; padding: 8px 25px; border-radius: 50px; font-weight: bold; }

        /* شبكة المعلومات (مصدرة من / إلى) */
        .address-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .address-card { border: 1px solid var(--border-color); border-radius: 10px; padding: 15px; background: var(--gray-light); }
        .address-card h3 { font-size: 14px; color: var(--primary-blue); margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .address-card p { font-size: 13px; line-height: 1.6; }

        /* الجدول الديناميكي */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background: var(--primary-blue); color: white; padding: 12px; font-size: 14px; text-align: center; }
        td { border: 1px solid var(--border-color); padding: 10px; text-align: center; font-size: 13px; word-wrap: break-word; }
        .product-img { width: 80px; height: 80px; object-fit: contain; border-radius: 5px; border: 1px solid #eee; }

        /* الإجماليات */
        .summary-section { margin-top: 20px; display: flex; justify-content: flex-end; }
        .summary-table { width: 300px; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .total-final { font-weight: 800; color: var(--primary-blue); font-size: 18px; border-top: 2px solid var(--primary-blue); margin-top: 5px; }

        /* التذييل والباركود */
        .footer-content { margin-top: auto; padding-top: 20px; border-top: 1px dashed #ccc; }
        .instructions { text-align: center; font-size: 12px; color: #666; margin-bottom: 15px; line-height: 1.8; }
        .barcode-section { display: flex; justify-content: space-around; align-items: center; padding: 15px 0; }
        .qr-item { text-align: center; font-size: 10px; }
        .contact-bar { background: var(--primary-blue); color: white; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; font-size: 11px; margin-top: 10px; }

        /* أزرار التحكم */
        .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 9999; }
        .btn { padding: 12px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        .btn-print { background: var(--primary-blue); color: white; }
        .btn-pdf { background: #dc2626; color: white; }

        @media print { 
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .page { box-shadow: none; margin: 0; width: 100%; border: none; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

    <div id="invoice-render">
        </div>

    <div class="controls no-print">
        <button class="btn btn-print" onclick="window.print()">🖨️ طباعة مباشرة</button>
        <button class="btn btn-pdf" onclick="exportPDF()">📄 حفظ PDF بجودة عالية</button>
    </div>

    <script>
        // --- بيانات ثابتة من المستند ---
        const platformData = {
            name: "منصة في خدمتك", 
            license: "FL-765735204", 
            taxId: "312495447600003", 
            address: "حائل : حي النقرة : شارع :سعد المشاط", 
            building: "3085", zip: "55431", 
            email: "info@fi-khidmatik.com", web: "www.khidmatik.com", 
            phones: "966534051317 | 966545312021" 
        };

        // --- محاكة جلب البيانات من Firebase ---
        async function fetchInvoiceData() {
            // في الإنتاج: استخدم دالة getDocument(id) من ملفك السابق
            return {
                id: "KF-2603290287", [cite: 3]
                date: "29/03/2026", [cite: 3]
                time: "03:21 صباحاً", [cite: 3]
                status: "تم التنفيذ", [cite: 3]
                customer: { name: "فهد العتيبي", phone: "050XXXXXXX", city: "الرياض" },
                items: [
                    { name: "منتج تجريبي 1", desc: "حجم مناسب وكبير", price: 19282, qty: 1, img: "https://via.placeholder.com/80" } [cite: 6]
                ],
                subtotal: 19282.00, 
                discount: 5784.60, 
                tax: 2024.61, 
                total: 15522.01 
            };
        }

        function generateQR(id, text) {
            new QRCode(document.getElementById(id), {
                text: text, width: 100, height: 100,
                correctLevel: QRCode.CorrectLevel.L
            });
        }

        async function initInvoice() {
            const data = await fetchInvoiceData();
            const container = document.getElementById('invoice-render');

            const html = `
                <div class="page">
                    <div class="header-top">
                        <div class="platform-info">
                            <h1>${platformData.name}</h1>
                            <p>رقم شهادة العمل الحر: ${platformData.license}</p> 
                            <p>الرقم الضريبي: ${platformData.taxId}</p> 
                        </div>
                        <div class="invoice-badge">فاتورة إلكترونية</div> 
                    </div>

                    <div class="address-grid">
                        <div class="address-card">
                            <h3>مصدرة من:</h3> 
                            <p><strong>${platformData.name}</strong></p> 
                            <p>${platformData.address}</p> 
                            <p>المبنى: ${platformData.building} | الرمز البريدي: ${platformData.zip}</p> 
                        </div>
                        <div class="address-card">
                            <h3>مصدرة إلى:</h3> 
                            <p>الاسم: ${data.customer.name}</p> 
                            <p>رقم الفاتورة: ${data.id}</p> [cite: 3]
                            <p>التاريخ: ${data.date} | الوقت: ${data.time}</p> [cite: 3]
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th style="width:50px">#</th>
                                <th>المنتج</th>
                                <th style="width:100px">الصورة</th>
                                <th style="width:70px">الكمية</th>
                                <th style="width:120px">سعر الوحدة</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.items.map((item, index) => `
                                <tr>
                                    <td>${index + 1}</td>
                                    <td style="text-align:right"><strong>${item.name}</strong><br><small>${item.desc}</small></td> [cite: 6]
                                    <td><img src="${item.img}" class="product-img"></td> [cite: 6]
                                    <td>${item.qty}</td> [cite: 6]
                                    <td>${item.price.toFixed(2)} ريال</td> [cite: 6]
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <div class="summary-section">
                        <div class="summary-table">
                            <div class="summary-row"><span>المجموع الفرعي:</span><span>${data.subtotal.toFixed(2)} ريال</span></div> 
                            <div class="summary-row"><span>إجمالي الخصم:</span><span>-${data.discount.toFixed(2)} ريال</span></div> 
                            <div class="summary-row"><span>الضريبة (15%):</span><span>${data.tax.toFixed(2)} ريال</span></div> 
                            <div class="summary-row total-final"><span>الإجمالي النهائي:</span><span>${data.total.toFixed(2)} ريال</span></div> 
                        </div>
                    </div>

                    <div class="footer-content">
                        <div class="instructions">
                            تخضع هذه الفاتورة لكامل الشروط والأحكام المرفقة<br> 
                            شكراً لتسوقكم معنا 
                        </div>
                        <div class="barcode-section">
                            <div class="qr-item"><div id="zatcaQR"></div><br>فاتورة ضريبية</div> 
                            <div class="qr-item"><div id="verifyQR"></div><br>تحقق من الفاتورة</div>
                        </div>
                        <div class="contact-bar">
                            <span>📞 ${platformData.phones}</span> 
                            <span>📧 ${platformData.email}</span> 
                            <span>🌐 ${platformData.web}</span> 
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;
            generateQR("zatcaQR", `Seller:${platformData.name}|VAT:${platformData.taxId}|Total:${data.total}`);
            generateQR("verifyQR", window.location.href);
        }

        async function exportPDF() {
            const element = document.querySelector(".page");
            const canvas = await html2canvas(element, { scale: 3 });
            const imgData = canvas.toDataURL("image/png");
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF("p", "mm", "a4");
            pdf.addImage(imgData, "PNG", 0, 0, 210, 297);
            pdf.save(`Invoice_${Date.now()}.pdf`); 
        }

        window.onload = initInvoice;
    </script>
</body>
</html>
