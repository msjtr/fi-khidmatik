    <style>
        /* تنسيق الطوارئ - في حال عدم تحميل print.css */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9ecef; font-family: 'Segoe UI', 'Cairo', sans-serif; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }

        .invoice-page, .terms-section-page { width: 210mm; min-height: 297mm; background: white; padding: 15mm 12mm; page-break-after: always; position: relative; }

        .logo-img { width: 65px; height: 65px; object-fit: contain; }
        .platform-name { font-size: 20px; font-weight: bold; color: #1e3a5f; }
        .invoice-title { font-size: 24px; font-weight: bold; color: #1e3a5f; }
        .legal-numbers { text-align: left; font-size: 10px; color: #4a5568; }

        .address-box { flex: 1; background: #f9f9fb; padding: 15px; border-radius: 14px; border: 1px solid #e9ecef; font-size: 11px; }
        .address-box strong { display: block; margin-bottom: 10px; color: #1e3a5f; }
        .payment-approval { display: flex; gap: 15px; margin: 15px 0; }
        .payment-box, .approval-box { flex: 1; background: #f1f5f9; padding: 10px 12px; border-radius: 10px; font-size: 11px; }
        .invoice-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 11px; }
        .invoice-table th { background: #1e3a5f; color: white; padding: 10px; border: 1px solid #2d4a7a; }
        .invoice-table td { border: 1px solid #cbd5e1; padding: 10px; vertical-align: middle; }
        .product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .totals { width: 280px; margin-right: auto; margin-top: 20px; border-top: 2px solid #e2e8f0; padding-top: 12px; }
        .totals div { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; }
        .grand-total { font-weight: bold; font-size: 16px; color: #1e3a5f; border-top: 2px solid #1e3a5f; margin-top: 6px; padding-top: 10px; }
        .barcodes-container { display: flex; justify-content: center; margin: 20px 0; padding: 15px; background: #f8fafc; border-radius: 12px; }
        .qr-placeholder { width: 100px; height: 100px; }
        .footer-note { margin-top: 30px; font-size: 10px; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 15px; }
        .contact-info { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin: 12px 0; }
        .action-buttons { display: flex; justify-content: center; gap: 15px; margin: 20px auto; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 25px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; }
        .btn { padding: 8px 20px; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-secondary { background: #334155; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .loading-box { background: white; padding: 30px; border-radius: 16px; text-align: center; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1e3a5f; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast-message { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; z-index: 10000; font-size: 14px; color: white; }
        @media print { .action-buttons { display: none !important; } .invoice-page, .terms-section-page { page-break-after: always; } body { background: white; padding: 0; } }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .terms-block { background: #fafafa; padding: 16px 18px; border-radius: 14px; border: 1px solid #e5e7eb; break-inside: avoid; }
        .terms-block h3 { background: #1e3a5f; color: white; padding: 6px 16px; border-radius: 30px; font-size: 14px; margin-bottom: 14px; display: inline-block; }
        .main-title { color: #1e3a5f; font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 25px; }
    </style>
</head>

    // ================= Config Firebase =================
    const firebaseConfig = {

        authDomain: "msjt301-974bb.firebaseapp.com",

    // تهيئة Firebase

    let orderData = null;

    const sellerData = {
        name: "منصة في خدمتك",
        taxNumber: "312495447600003",

        address: "حائل - حي النقرة - شارع سعد المشاط - مبنى 3085 - الرمز البريدي 55431",

    // ================= دوال مساعدة =================
    function showLoading(msg) {
        let ov = document.getElementById('loadingOverlay');
        if (!ov) {
            ov = document.createElement('div');
            ov.id = 'loadingOverlay';
            ov.className = 'loading-overlay';
            ov.innerHTML = `<div class="loading-box"><div class="loading-spinner"></div><p id="loadingMsg">${msg}</p></div>`;
            document.body.appendChild(ov);
        }
        const msgEl = document.getElementById('loadingMsg');
        if (msgEl) msgEl.textContent = msg;
        ov.style.display = 'flex';
    }
    
    function hideLoading() { 
        let ov = document.getElementById('loadingOverlay'); 
        if(ov) ov.style.display = 'none'; 
    }
    
    function showToast(msg, isError = false) { 
        let t = document.createElement('div'); 
        t.className = 'toast-message'; 
        t.textContent = (isError ? '❌ ' : '✅ ') + msg; 
        t.style.background = isError ? '#ef4444' : '#10b981';
        document.body.appendChild(t); 
        setTimeout(() => t.remove(), 3000); 
    }

    function formatTime12(t) { 
        if(!t) return ''; 
        let [h, m] = t.split(':'); 
        let hour = parseInt(h); 
        let ap = hour >= 12 ? 'مساءً' : 'صباحاً'; 
        hour = hour % 12 || 12; 
        return `${hour}:${m} ${ap}`; 
    }
    
    function formatDateYMD(d) { 
        if(!d) return ''; 
        let p = d.split('-'); 
        return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d; 
    }
    
    function escapeHtml(str) { 
        if(!str) return ''; 
        return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
    }
    
    function getShippingMethodText(method) {
        if (method === 'delivery') return '🚚 شحن منزلي';
        if (method === 'pickup') return '🏪 استلام من المقر';
        if (method === 'noship') return '📥 لا يحتاج شحن (منتج رقمي)';
        return method || 'غير محدد';
    }

    function getPaymentMethodName(method) {
        const methods = {
            'mada': 'مدى', 'mastercard': 'ماستركارد', 'visa': 'فيزا',
            'stcpay': 'STCPay', 'tamara': 'تمارا', 'tabby': 'تابي'
        };
        return methods[method] || method || 'مدى';
    }

    // ================= تحميل البيانات من Firebase =================
    async function loadCustomersAndProducts() {
        console.log('🔄 جاري تحميل العملاء والمنتجات...');
        try {
            const [customersSnap, productsSnap] = await Promise.all([
                getDocs(collection(db, 'customers')),
                getDocs(collection(db, 'products'))
            ]);

            customersMap.clear();
            productsMap.clear();
            
            customersSnap.forEach(doc => customersMap.set(doc.id, doc.data()));
            productsSnap.forEach(doc => productsMap.set(doc.id, doc.data()));
            
            console.log(`✅ تم تحميل ${customersMap.size} عميل و ${productsMap.size} منتج`);
            return true;
        } catch (error) {
            console.error('❌ خطأ في تحميل البيانات:', error);
            return false;
        }
    }

    async function getOrderFull(orderId) {
        try {
            if (!orderId) return null;
            
            const orderRef = doc(db, 'orders', orderId);
            const orderSnap = await getDoc(orderRef);
            
            if (!orderSnap.exists()) return null;
            
            const order = { id: orderSnap.id, ...orderSnap.data() };
            
            // جلب بيانات العميل
            const customer = customersMap.get(order.customerId) || { 
                name: 'غير معروف', 
                phone: '', 
                email: '', 
                address: '' 
            };
            
            // تجهيز المنتجات مع الصور
            const items = (order.items || []).map(item => {
                const product = productsMap.get(item.productId) || {};
                return {
                    ...item,
                    productName: product.name || item.name || 'غير معروف',
                    description: product.description || item.description || '',
                    image: product.image || item.image || '',
                    price: item.price || product.price || 0
                };
            });
            
            return {
                ...order,
                customerName: customer.name,
                customerPhone: customer.phone,
                customerEmail: customer.email,
                customerAddress: customer.address || '',
                items: items,
                paymentMethodName: getPaymentMethodName(order.paymentMethod)
            };
            
        } catch (error) {
            console.error('❌ خطأ في جلب الطلب:', error);
            return null;
        }
    }

    function getDemoData() {
        return {
            orderNumber: "DEMO-001",
            orderDate: new Date().toISOString().split('T')[0],
            orderTime: new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' }),
            status: "مكتمل",
            customerName: "عميل تجريبي",
            customerPhone: "+966500000000",
            customerEmail: "demo@example.com",
            customerAddress: "الرياض - المملكة العربية السعودية",
            subtotal: 15000,
            discount: 0,
            tax: 2250,
            total: 17250,
            paymentMethodName: "تحويل بنكي",
            shippingMethod: "delivery",
            approvalCode: "DEMO-001",
            items: [
                { productName: "منتج تجريبي 1", description: "وصف تجريبي للمنتج الأول", image: "", quantity: 1, price: 10000 },
                { productName: "منتج تجريبي 2", description: "وصف تجريبي للمنتج الثاني", image: "", quantity: 1, price: 5000 }
            ]
        };
    }

    // ================= محتوى الشروط والأحكام =================
    const termsContent = `
        <div class="terms-main-container">
            <h1 class="main-title">📜 الشروط والأحكام</h1>
            <div class="legal-intro" style="background:#fef3c7;padding:18px;border-radius:12px;margin-bottom:30px;">
                <p>هذه الاتفاقية تنظم العلاقة بين منصة "في خدمتك" والعميل المستخدم للخدمات. باستخدامك لمنصتنا فإنك توافق على جميع الشروط والأحكام التالية.</p>
            </div>
            <div class="two-columns">
                <div class="col">
                    <div class="terms-block"><h3>أولاً: الخدمات المقدمة</h3><p>تقدم المنصة خدمات تقنية متكاملة تشمل بيع المنتجات الرقمية والتقنية، حلول البرمجة، التطبيقات، والاستشارات التقنية حسب الاتفاق مع العميل.</p></div>
                    <div class="terms-block"><h3>ثانياً: سياسة الدفع</h3><p>يتم الدفع عبر الوسائل المتاحة في المنصة. تعتبر الفاتورة ملزمة قانونياً بعد إصدارها. المبالغ المستردة تخضع لسياسة الإرجاع المحددة.</p></div>
                    <div class="terms-block"><h3>ثالثاً: التسليم</h3><p>يتم تسليم المنتجات الرقمية فور إتمام الدفع. المنتجات المادية يتم شحنها خلال 3-5 أيام عمل.</p></div>
                </div>
                <div class="col">
                    <div class="terms-block"><h3>رابعاً: الضمانات</h3><p>نضمن جودة المنتجات والخدمات المقدمة. في حال وجود عيب صناعي يتم الاستبدال أو الاسترجاع خلال 14 يوماً.</p></div>
                    <div class="terms-block"><h3>خامساً: الخصوصية</h3><p>نلتزم بحماية بيانات العملاء وعدم مشاركتها مع أطراف خارجية إلا بموافقة العميل أو بناء على طلب نظامي.</p></div>
                    <div class="terms-block"><h3>سادساً: التحديثات</h3><p>تحتفظ المنصة بحق تحديث هذه الشروط في أي وقت مع إشعار العملاء بالتغييرات الجوهرية.</p></div>
                </div>
            </div>
            <div class="declaration" style="background:#f0f4f9;padding:20px;border-radius:14px;text-align:center;margin:20px 0;">
                <p>أقر أنا الموقع أدناه بأنني اطلعت على الشروط والأحكام وأوافق عليها بالكامل.</p>
                <div class="signature" style="display:flex;justify-content:space-between;margin-top:25px;padding-top:20px;border-top:1px solid #cbd5e1;">
                    <div><strong>توقيع العميل:</strong> _________________</div>
                    <div><strong>التاريخ:</strong> <span class="customer-date-display"></span></div>
                </div>
            </div>
        </div>
    `;

    // ================= بناء HTML الفاتورة =================
    function buildHeader(title = "فاتورة إلكترونية") {
        return `<div class="header-top">
            <div class="logo-area">
                <div class="logo-img" style="width:65px;height:65px;background:#1e3a5f;border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;">📄</div>
                <div><div class="platform-name">${sellerData.name}</div><div style="font-size:10px;color:#6c757d;">خدمات تقنية متكاملة</div></div>
            </div>
            <div class="invoice-title">${title}</div>
            <div class="legal-numbers"><div>رقم شهادة العمل الحر: ${sellerData.licenseNumber}</div><div>الرقم الضريبي: ${sellerData.taxNumber}</div></div>
        </div>`;
    }

    function buildFooter(pageNum, totalPages) {
        return `<div class="footer-note">
            <div class="contact-info">
                <span>📞 ${sellerData.phone}</span>
                <span>💬 ${sellerData.whatsapp}</span>
                <span>✉️ ${sellerData.email}</span>
                <span>🌐 ${sellerData.website}</span>
            </div>
            <div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
            <div class="page-number" style="text-align:left;direction:ltr;">صفحة ${pageNum} من ${totalPages}</div>
        </div>`;
    }

    function buildInvoicePage(order) {
        const itemsHtml = (order.items || []).map((item, idx) => `
            <tr>
                <td style="text-align:center;border:1px solid #cbd5e1;padding:10px;">${idx + 1}</td>
                <td style="text-align:center;border:1px solid #cbd5e1;padding:10px;">
                    ${item.image ? `<img src="${item.image}" class="product-img" style="width:50px;height:50px;object-fit:cover;border-radius:8px;" crossorigin="anonymous" onerror="this.style.display='none'">` : '<div style="width:50px;height:50px;background:#e2e8f0;border-radius:8px;"></div>'}
                </td>
                <td style="text-align:right;border:1px solid #cbd5e1;padding:10px;">
                    <strong>${escapeHtml(item.productName)}</strong><br>
                    <small style="color:#666;">${escapeHtml(item.description || '')}</small>
                </td>
                <td style="text-align:center;border:1px solid #cbd5e1;padding:10px;">${item.quantity}</td>
                <td style="text-align:center;border:1px solid #cbd5e1;padding:10px;">${(item.price || 0).toFixed(2)} ريال</td>
                <td style="text-align:center;border:1px solid #cbd5e1;padding:10px;">${((item.price || 0) * item.quantity).toFixed(2)} ريال</td>
            </tr>
        `).join('');
        
        const subtotal = order.subtotal || order.items?.reduce((s, i) => s + ((i.price || 0) * i.quantity), 0) || 0;
        const discount = order.discount || 0;
        const tax = order.tax || ((subtotal - discount) * 0.15);
        const total = order.total || (subtotal - discount + tax);
        const shipText = getShippingMethodText(order.shippingMethod);
        
        return `<div class="invoice-page">
            ${buildHeader("فاتورة إلكترونية")}
            <div class="info-row">
                <div><strong>رقم الفاتورة:</strong> ${order.orderNumber}</div>
                <div><strong>التاريخ:</strong> ${formatDateYMD(order.orderDate)} - ${formatTime12(order.orderTime)}</div>
                <div><span class="status-badge">${order.status || 'مكتمل'}</span></div>
            </div>
            <div class="addresses">
                <div class="address-box">
                    <strong>🏢 مصدرة من</strong>
                    ${sellerData.name}<br>
                    المملكة العربية السعودية<br>
                    ${sellerData.address}<br>
                    📞 ${sellerData.phone}<br>
                    ✉️ ${sellerData.email}
                </div>
                <div class="address-box">
                    <strong>👤 مصدرة إلى</strong>
                    ${escapeHtml(order.customerName)}<br>
                    ${escapeHtml(order.customerAddress)}<br>
                    📞 ${escapeHtml(order.customerPhone)}<br>
                    ✉️ ${escapeHtml(order.customerEmail)}
                </div>
            </div>
            <div class="payment-approval">
                <div class="payment-box"><strong>💰 طريقة الدفع:</strong> ${order.paymentMethodName || 'غير محدد'}</div>
                <div class="payment-box"><strong>🚚 طريقة الاستلام:</strong> ${shipText}</div>
                <div class="approval-box"><strong>✅ رمز الموافقة:</strong> ${order.approvalCode || 'غير مطلوب'}</div>
            </div>
            <table class="invoice-table" style="width:100%;border-collapse:collapse;margin:20px 0;">
                <thead>
                    <tr style="background:#1e3a5f;color:white;">
                        <th style="padding:10px;border:1px solid #2d4a7a;">#</th>
                        <th style="padding:10px;border:1px solid #2d4a7a;">الصورة</th>
                        <th style="padding:10px;border:1px solid #2d4a7a;">المنتج / الوصف</th>
                        <th style="padding:10px;border:1px solid #2d4a7a;">الكمية</th>
                        <th style="padding:10px;border:1px solid #2d4a7a;">سعر الوحدة</th>
                        <th style="padding:10px;border:1px solid #2d4a7a;">الإجمالي</th>
                    </tr>
                </thead>
                <tbody>${itemsHtml}</tbody>
            </table>
            <div class="totals">
                <div><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                ${discount > 0 ? `<div><span>الخصم:</span><span>- ${discount.toFixed(2)} ريال</span></div>` : ''}
                <div><span>ضريبة القيمة المضافة 15%:</span><span>${tax.toFixed(2)} ريال</span></div>
                <div class="grand-total"><span>الإجمالي النهائي:</span><span>${total.toFixed(2)} ريال</span></div>
            </div>
            <div class="barcodes-container">
                <div class="barcode-item"><div id="platformQR" class="qr-placeholder"></div></div>
            </div>
            ${buildFooter(1, 3)}
        </div>`;
    }

    // ================= العرض الرئيسي =================
    async function renderCompleteInvoice() {
        showLoading('جاري تحميل الفاتورة...');
        
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        
        let order = null;
        
        if (orderId && orderId !== 'null' && orderId !== 'undefined') {
            try {
                // تحميل العملاء والمنتجات أولاً
                await loadCustomersAndProducts();
                // جلب الطلب من Firebase
                order = await getOrderFull(orderId);
                if (!order) {
                    showToast('لم يتم العثور على الطلب، سيتم عرض بيانات تجريبية', true);
                    order = getDemoData();
                } else {
                    showToast('تم تحميل بيانات الطلب بنجاح');
                    console.log('✅ تم تحميل الطلب:', order.orderNumber);
                }
            } catch (error) {
                console.error('❌ خطأ:', error);
                showToast('خطأ في تحميل البيانات: ' + error.message, true);
                order = getDemoData();
            }
        } else {
            order = getDemoData();
            showToast('عرض بيانات تجريبية (لم يتم تحديد طلب)');
        }
        
        orderData = order;
        
        const finalHtml = buildInvoicePage(order) + 
            `<div class="terms-section-page">${buildHeader("الشروط والأحكام")}${termsContent}${buildFooter(2, 3)}</div>`;
        
        document.getElementById('invoiceRoot').innerHTML = finalHtml;
        
        // إنشاء QR code
        setTimeout(() => {
            const qrDiv = document.getElementById('platformQR');
            if (qrDiv && typeof QRCode !== 'undefined') {
                try {
                    new QRCode(qrDiv, { 
                        text: `https://${sellerData.website}/verify/${order.orderNumber}`,
                        width: 100, 
                        height: 100 
                    });
                } catch(e) {
                    console.error('QR Error:', e);
                }
            }
            
            // تحديث التاريخ في التوقيع
            const dateSpan = document.querySelector('.customer-date-display');
            if (dateSpan) {
                dateSpan.textContent = `${formatDateYMD(order.orderDate)} - ${formatTime12(order.orderTime)}`;
            }
        }, 100);
        
        hideLoading();
    }

    // ================= إنشاء PDF =================
    async function generatePDF() {
        const root = document.getElementById('invoiceRoot');
        const pages = root.querySelectorAll('.invoice-page, .terms-section-page');
        const { jsPDF } = window.jspdf;
        
        if (!pages.length) {
            showToast('لا توجد صفحات للتصدير', true);
            return;
        }
        
        showLoading('جاري إنشاء PDF...');
        
        try {
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { 
                    scale: 2, 
                    useCORS: true, 
                    backgroundColor: '#ffffff',
                    logging: false
                });
                
                if (i !== 0) pdf.addPage();
                
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            }
            
            const orderId = orderData?.orderNumber || new URLSearchParams(window.location.search).get('id') || 'demo';
            pdf.save(`فاتورة_${orderId}.pdf`);
            showToast('تم حفظ PDF بنجاح');
            
        } catch(error) {
            console.error('PDF Error:', error);
            showToast('خطأ في إنشاء PDF: ' + error.message, true);
        } finally {
            hideLoading();
        }
    }

    // ================= ربط الأزرار =================
    document.getElementById('printBtn').onclick = () => window.print();
    document.getElementById('pdfBtn').onclick = generatePDF;
    
    // بدء التشغيل
    renderCompleteInvoice();
</script>
</body>
</html>
