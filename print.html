<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>فاتورة</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
@page { size: A4; margin: 0; }

body {
  background:#eef2f5;
  font-family:Cairo;
}

.page {
  width:210mm;
  height:297mm;
  padding:20mm 15mm 25mm 15mm;
  background:#fff;
  position:relative;
  page-break-after:always;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo {
  height:60px;
}

.product-table {
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

.product-table th, .product-table td {
  border:1px solid #ccc;
  padding:6px;
}

.page-number {
  position:absolute;
  bottom:10mm;
  right:15mm;
  font-size:12px;
}

.actions {
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
}
</style>
</head>

<body>

<div id="invoiceContainer"></div>

<div class="actions">
  <button onclick="window.print()">طباعة</button>
  <button onclick="exportPDF()">PDF</button>
  <button onclick="exportPNG()">PNG</button>
</div>

<script type="module">

import { getDocument, loadCustomers, loadProducts } from "./js/firebase.js";

// =========================
// أدوات
// =========================
function mmToPx(mm){ return mm * 3.78 }

function getUsableHeight(){
  return mmToPx(297 - (20 + 25));
}

// =========================
// إنشاء صف
// =========================
function createRow(item, products){

  const product = products.find(p => p.id === item.productId) || {};

  const tr = document.createElement('tr');

  tr.innerHTML = `
    <td>${item.name || product.name || '-'}</td>
    <td>${item.quantity || 0}</td>
    <td>${(item.price || 0).toFixed(2)}</td>
    <td>${((item.price || 0) * (item.quantity || 0)).toFixed(2)}</td>
  `;

  return tr;
}

// =========================
// قياس الصفوف
// =========================
async function measureRows(rows){

  const box = document.createElement('div');
  box.style.position='absolute';
  box.style.visibility='hidden';
  box.style.top='-9999px';
  box.style.width='794px';

  document.body.appendChild(box);

  const table=document.createElement('table');
  table.className='product-table';
  const tbody=document.createElement('tbody');
  table.appendChild(tbody);
  box.appendChild(table);

  const heights=[];

  for(let r of rows){
    tbody.innerHTML='';
    const c=r.cloneNode(true);
    tbody.appendChild(c);

    await new Promise(x=>setTimeout(x,30));

    heights.push(c.getBoundingClientRect().height);
  }

  document.body.removeChild(box);
  return heights;
}

// =========================
// تقسيم الصفحات
// =========================
async function splitPages(rows){

  const heights = await measureRows(rows);

  const usable = getUsableHeight();
  const BUFFER = 60;

  const pages=[];
  let current=[];
  let h=0;

  for(let i=0;i<rows.length;i++){

    if(current.length && h + heights[i] > usable - BUFFER){
      pages.push(current);
      current=[];
      h=0;
    }

    current.push(rows[i]);
    h += heights[i];
  }

  if(current.length) pages.push(current);

  return pages;
}

// =========================
// إنشاء صفحة
// =========================
function createPage(rows, pageNum, total, order, customer){

  const page=document.createElement('div');
  page.className='page';

  page.innerHTML = `
    <div class="header">
      <div>
        <h2>فاتورة</h2>
        <p>رقم الطلب: ${order.id}</p>
        <p>العميل: ${customer.name || '-'}</p>
      </div>
      <img src="./images/logo.svg" class="logo">
    </div>
  `;

  const table=document.createElement('table');
  table.className='product-table';

  table.innerHTML=`
    <thead>
      <tr>
        <th>المنتج</th>
        <th>الكمية</th>
        <th>السعر</th>
        <th>الإجمالي</th>
      </tr>
    </thead>
  `;

  const tbody=document.createElement('tbody');
  rows.forEach(r=>tbody.appendChild(r.cloneNode(true)));

  table.appendChild(tbody);
  page.appendChild(table);

  const num=document.createElement('div');
  num.className='page-number';
  num.textContent=`${pageNum} / ${total}`;

  page.appendChild(num);

  return page;
}

// =========================
// تشغيل
// =========================
async function render(){

  const orderId = new URLSearchParams(location.search).get('id');

  const order = await getDocument('orders', orderId);
  if (!order) return alert("الطلب غير موجود");

  const customers = await loadCustomers();
  const products = await loadProducts();

  const customer = customers.find(c => c.id === order.customerId) || {};

  const rows = (order.items || []).map(item => createRow(item, products));

  const pages = await splitPages(rows);

  const container=document.getElementById('invoiceContainer');

  pages.forEach((p,i)=>{
    container.appendChild(createPage(p,i+1,pages.length,order,customer));
  });

}

render();

// =========================
// اسم الملف
// =========================
function getFileName(order, customer){
  const today = new Date().toISOString().split('T')[0];
  const name = (customer.name || 'client').replace(/[^\w\u0600-\u06FF]/g,'_');
  return `${name}_${order.id}_${today}`;
}

// =========================
// PDF
// =========================
window.exportPDF = async function(){
  const el=document.getElementById('invoiceContainer');
  await html2pdf().from(el).save("invoice.pdf");
}

// =========================
// PNG
// =========================
window.exportPNG = async function(){
  const canvas = await html2canvas(document.getElementById('invoiceContainer'),{scale:3});
  const link=document.createElement('a');
  link.download="invoice.png";
  link.href=canvas.toDataURL();
  link.click();
}

</script>

</body>
</html>
