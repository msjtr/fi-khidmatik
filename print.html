<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة الفاتورة - نظام الفواتير</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .invoice-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .invoice-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .invoice-header h1 { font-size: 32px; margin-bottom: 10px; }
        .invoice-header p { font-size: 14px; opacity: 0.9; margin: 5px 0; }
        .invoice-body { padding: 30px; }
        .info-section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .info-box { flex: 1; min-width: 200px; }
        .info-box h3 {
            color: #1e3a8a;
            font-size: 16px;
            margin-bottom: 10px;
            border-right: 3px solid #3b82f6;
            padding-right: 10px;
        }
        .info-box p { font-size: 14px; margin: 5px 0; color: #334155; }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        .items-table th {
            background: #f1f5f9;
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
        }
        .items-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        .totals-section {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .totals-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }
        .totals-row.total {
            border-top: 2px solid #86efac;
            margin-top: 10px;
            padding-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #166534;
        }
        .payment-info {
            background: #fef3c7;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .footer {
            background: #f8fafc;
            padding: 20px;
            text-align: center;
            color: #64748b;
            font-size: 12px;
            border-top: 1px solid #e2e8f0;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
        .btn-secondary { background: #64748b; color: white; }
        .btn-secondary:hover { background: #475569; transform: translateY(-2px); }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-new { background: #dbeafe; color: #1e40af; }
        .status-processing { background: #fef3c7; color: #b45309; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-message { text-align: center; padding: 40px; color: #dc2626; }
        @media print {
            body { background: white; padding: 0; }
            .action-buttons, .no-print { display: none !important; }
            .invoice-container { box-shadow: none; border-radius: 0; }
            .invoice-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .totals-section, .payment-info { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div id="app" class="invoice-container">
        <div class="invoice-header">
            <h1><i class="fas fa-file-invoice"></i> فاتورة إلكترونية</h1>
            <p>منصة في خدمتك - المملكة العربية السعودية - حائل</p>
            <p>الرقم الضريبي: 312495447600003</p>
        </div>
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>جاري تحميل بيانات الفاتورة...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
            authDomain: "msjt301-974bb.firebaseapp.com",
            projectId: "msjt301-974bb",
            storageBucket: "msjt301-974bb.firebasestorage.app",
            messagingSenderId: "186209858482",
            appId: "1:186209858482:web:186ca610780799ef562aab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let customers = [];
        let products = [];

        async function loadData() {
            try {
                const customersSnap = await getDocs(collection(db, 'customers'));
                const productsSnap = await getDocs(collection(db, 'products'));
                customers = customersSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                products = productsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                return true;
            } catch (error) {
                console.error('خطأ:', error);
                return false;
            }
        }

        async function loadOrder(orderId) {
            try {
                const orderDoc = await getDoc(doc(db, 'orders', orderId));
                if (!orderDoc.exists()) return null;
                return { id: orderDoc.id, ...orderDoc.data() };
            } catch (error) {
                console.error('خطأ في جلب الطلب:', error);
                return null;
            }
        }

        function getCustomerName(customerId) {
            const customer = customers.find(c => c.id === customerId);
            return customer ? customer.name : 'غير معروف';
        }

        function getCustomerPhone(customerId) {
            const customer = customers.find(c => c.id === customerId);
            return customer ? customer.phone : '';
        }

        function getCustomerCity(customerId) {
            const customer = customers.find(c => c.id === customerId);
            return customer ? customer.city : '';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
        }

        function formatTime(time24) {
            if (!time24) return '';
            let [h, m] = time24.split(':');
            let hour = parseInt(h);
            let ampm = hour >= 12 ? 'مساءً' : 'صباحاً';
            hour = hour % 12 || 12;
            return `${hour.toString().padStart(2, '0')}:${m} ${ampm}`;
        }

        function getStatusClass(status) {
            const classes = {
                'جديد': 'status-new',
                'تحت التنفيذ': 'status-processing',
                'تم التنفيذ': 'status-completed'
            };
            return classes[status] || 'status-new';
        }

        function getStatusIcon(status) {
            const icons = {
                'جديد': '🆕', 'تحت التنفيذ': '⚙️', 'تم التنفيذ': '✅',
                'تحت المراجعة': '🔍', 'مسترجع': '↩️', 'ملغي': '❌'
            };
            return icons[status] || '📋';
        }

        function getShippingMethodText(method) {
            const methods = {
                'pickup': '🏪 استلام من المقر',
                'delivery': '🚚 شحن منزلي',
                'noship': '📥 لا يتطلب شحن'
            };
            return methods[method] || method;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderInvoice(order) {
            if (!order) {
                return '<div class="error-message"><i class="fas fa-exclamation-circle fa-3x"></i><p>الطلب غير موجود</p></div>';
            }
            
            let subtotal = 0;
            const itemsRows = [];
            const items = order.items || [];
            
            items.forEach((item, index) => {
                const itemName = item.name;
                const itemPrice = item.price || 0;
                const itemQuantity = item.quantity || 0;
                const itemTotal = itemPrice * itemQuantity;
                subtotal += itemTotal;
                
                itemsRows.push(`
                    <tr>
                        <td>${index + 1}</td>
                        <td style="text-align: right;">${escapeHtml(itemName)}</td>
                        <td>${itemQuantity}</td>
                        <td>${itemPrice.toFixed(2)}</td>
                        <td>${itemTotal.toFixed(2)}</td>
                    </tr>
                `);
            });
            
            let discountValue = order.discount || 0;
            if (order.discountType === 'percent' && discountValue > 0) {
                discountValue = (subtotal * discountValue) / 100;
            }
            
            const afterDiscount = subtotal - discountValue;
            const tax = afterDiscount * 0.15;
            const total = afterDiscount + tax;
            
            const paymentMethodName = order.paymentMethodName || 
                (order.paymentMethod === 'mada' ? 'مدى' :
                order.paymentMethod === 'mastercard' ? 'ماستركارد' :
                order.paymentMethod === 'visa' ? 'فيزا' :
                order.paymentMethod === 'stcpay' ? 'STCPay' :
                order.paymentMethod === 'tamara' ? 'تمارا' :
                order.paymentMethod === 'tabby' ? 'تابي' : 'أخرى');
            
            return `
                <div class="invoice-body">
                    <div class="info-section">
                        <div class="info-box">
                            <h3><i class="fas fa-receipt"></i> معلومات الفاتورة</h3>
                            <p><strong>رقم الفاتورة:</strong> ${escapeHtml(order.orderNumber || order.id)}</p>
                            <p><strong>التاريخ:</strong> ${formatDate(order.orderDate)}</p>
                            <p><strong>الوقت:</strong> ${formatTime(order.orderTime)}</p>
                            <p><strong>الحالة:</strong> <span class="status-badge ${getStatusClass(order.status)}">${getStatusIcon(order.status)} ${order.status}</span></p>
                        </div>
                        <div class="info-box">
                            <h3><i class="fas fa-user"></i> بيانات العميل</h3>
                            <p><strong>الاسم:</strong> ${escapeHtml(getCustomerName(order.customerId))}</p>
                            ${getCustomerPhone(order.customerId) ? `<p><strong>الجوال:</strong> ${getCustomerPhone(order.customerId)}</p>` : ''}
                            ${getCustomerCity(order.customerId) ? `<p><strong>المدينة:</strong> ${getCustomerCity(order.customerId)}</p>` : ''}
                        </div>
                        <div class="info-box">
                            <h3><i class="fas fa-truck"></i> معلومات الشحن</h3>
                            <p><strong>طريقة الاستلام:</strong> ${getShippingMethodText(order.shippingMethod)}</p>
                            ${order.shippingAddress ? `
                                ${order.shippingAddress.city ? `<p><strong>المدينة:</strong> ${order.shippingAddress.city}</p>` : ''}
                                ${order.shippingAddress.street ? `<p><strong>الشارع:</strong> ${order.shippingAddress.street}</p>` : ''}
                            ` : ''}
                            ${order.extraEmail ? `<p><strong>البريد الإلكتروني:</strong> ${order.extraEmail}</p>` : ''}
                        </div>
                    </div>
                    
                    <table class="items-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>المنتج</th>
                                <th>الكمية</th>
                                <th>السعر</th>
                                <th>الإجمالي</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsRows.length ? itemsRows.join('') : '<tr><td colspan="5" style="text-align: center;">لا توجد منتجات</td></tr>'}
                        </tbody>
                    </table>
                    
                    <div class="totals-section">
                        <div class="totals-row">
                            <span>المجموع الفرعي:</span>
                            <span>${subtotal.toFixed(2)} ريال</span>
                        </div>
                        ${discountValue > 0 ? `
                        <div class="totals-row">
                            <span>الخصم:</span>
                            <span style="color: #dc2626;">- ${discountValue.toFixed(2)} ريال</span>
                        </div>
                        ` : ''}
                        <div class="totals-row">
                            <span>الضريبة 15%:</span>
                            <span>${tax.toFixed(2)} ريال</span>
                        </div>
                        <div class="totals-row total">
                            <span>الإجمالي النهائي:</span>
                            <span style="color: #166534;">${total.toFixed(2)} ريال</span>
                        </div>
                    </div>
                    
                    <div class="payment-info">
                        <div><i class="fas fa-credit-card"></i> <strong>طريقة الدفع:</strong> ${paymentMethodName}</div>
                        ${order.approvalCode ? `<div><i class="fas fa-check-circle"></i> <strong>رمز الموافقة:</strong> ${order.approvalCode}</div>` : ''}
                    </div>
                </div>
                
                <div class="footer">
                    <p>شكراً لتسوقكم معنا</p>
                    <p>هذه الفاتورة إلكترونية ولا تحتاج توقيع</p>
                    <p style="margin-top: 10px;">
                        <i class="fas fa-phone"></i> 0540000000 |
                        <i class="fas fa-envelope"></i> info@example.com
                    </p>
                </div>
            `;
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            let orderId = urlParams.get('order');
            
            // إذا لم يوجد orderId في الرابط، حاول استقباله عبر postMessage
            if (!orderId) {
                window.addEventListener('message', async (event) => {
                    if (event.data && event.data.type === 'PRINT_ORDER') {
                        orderId = event.data.orderId;
                        if (orderId) {
                            await loadAndDisplay(orderId);
                        }
                    }
                });
                document.getElementById('content').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-info-circle fa-3x"></i>
                        <p>يرجى اختيار طلب للطباعة من صفحة إدارة الطلبات</p>
                        <button onclick="window.close()" class="btn btn-primary" style="margin-top: 20px;">
                            <i class="fas fa-times"></i> إغلاق
                        </button>
                    </div>
                `;
                return;
            }
            
            await loadAndDisplay(orderId);
        }
        
        async function loadAndDisplay(orderId) {
            const content = document.getElementById('content');
            await loadData();
            const order = await loadOrder(orderId);
            
            if (!order) {
                content.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle fa-3x"></i>
                        <p>الطلب غير موجود أو تم حذفه</p>
                        <button onclick="window.close()" class="btn btn-primary" style="margin-top: 20px;">
                            <i class="fas fa-times"></i> إغلاق
                        </button>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = renderInvoice(order);
            
            // طباعة تلقائية بعد التحميل
            setTimeout(() => {
                window.print();
            }, 500);
        }
        
        init();
    </script>
    
    <div class="action-buttons no-print">
        <button onclick="window.print()" class="btn btn-primary">
            <i class="fas fa-print"></i> طباعة الفاتورة
        </button>
        <button onclick="window.close()" class="btn btn-secondary">
            <i class="fas fa-times"></i> إغلاق
        </button>
    </div>
</body>
</html>
