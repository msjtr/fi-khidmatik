<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>طباعة الفاتورة</title>

<!-- حل favicon -->
<link rel="icon" href="data:,">

<style>
body{font-family:tahoma;background:#f5f7fa;margin:0}
.page{
  width:210mm;min-height:297mm;margin:auto;
  background:#fff;padding:15mm;box-sizing:border-box;
}
.header{display:flex;justify-content:space-between;border-bottom:2px solid #eee}
.info{margin-top:10px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th{background:#2c3e50;color:#fff;padding:10px}
td{padding:8px;border-bottom:1px solid #eee;text-align:center}
.totals{margin-top:20px}
#qr{margin-top:20px}
.actions{text-align:center;margin:10px}
@media print {.actions{display:none}}
</style>

</head>
<body>

<div class="actions">
  <button onclick="window.print()">🖨️ طباعة</button>
</div>

<div class="page">

<div class="header">
  <div>
    <h2>فاتورة إلكترونية</h2>
    رقم: <span id="invoiceNumber"></span><br>
    التاريخ: <span id="date"></span><br>
    الحالة: <span id="status"></span>
  </div>

  <div>
    منصة في خدمتك<br>
    الرقم الضريبي: 312495447600003
  </div>
</div>

<div class="info">
  العميل: <span id="clientName"></span><br>
  الجوال: <span id="phone"></span>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>المنتج</th>
<th>الكمية</th>
<th>السعر</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<div class="totals">
  <div>المجموع: <span id="subtotal"></span></div>
  <div>الضريبة: <span id="tax"></span></div>
  <div><strong>الإجمالي: <span id="total"></span></strong></div>
</div>

<div id="qr"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- QR -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
// ================= Firebase =================
const firebaseConfig = {
  apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
  authDomain: "msjt301-974bb.firebaseapp.com",
  projectId: "msjt301-974bb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= ID =================
const id = new URLSearchParams(window.location.search).get("id");

// ================= تشغيل =================
window.onload = loadData;

// ================= تحميل =================
async function loadData(){

if(!id){
  return error("لا يوجد رقم");
}

// نحاول أولاً orders (نظامك)
let snap = await db.collection("orders").doc(id).get();

let data = null;
let isOrder = false;

if(snap.exists){
  data = snap.data();
  isOrder = true;
}else{
  snap = await db.collection("invoices").doc(id).get();
  if(snap.exists){
    data = snap.data();
  }else{
    return error("غير موجود");
  }
}

// ================= تعبئة =================
set("invoiceNumber", data.orderNumber || data.invoiceNumber);
set("date", data.createdAt || data.date);
set("status", data.status || "-");

// العميل
if(isOrder){
  set("clientName", data.customerName || "عميل");
  set("phone", data.customerPhone || "-");
}else{
  set("clientName", data.clientName);
  set("phone", data.phone || "-");
}

// ================= المنتجات =================
let subtotal = 0;
document.getElementById("items").innerHTML = "";

(data.items || []).forEach((item,i)=>{

  const price = item.price || 0;
  const qty = item.quantity || item.qty || 1;

  const total = price * qty;
  subtotal += total;

  document.getElementById("items").innerHTML += `
  <tr>
    <td>${i+1}</td>
    <td>${item.productName || item.name}</td>
    <td>${qty}</td>
    <td>${total.toFixed(2)} ريال</td>
  </tr>`;
});

// ================= الحساب =================
const tax = subtotal * 0.15;
const total = subtotal + tax;

set("subtotal", subtotal.toFixed(2)+" ريال");
set("tax", tax.toFixed(2)+" ريال");
set("total", total.toFixed(2)+" ريال");

// ================= QR =================
QRCode.toCanvas(document.getElementById("qr"),
`Total:${total} Tax:${tax} Date:${data.createdAt || data.date}`);
}

// ================= أدوات =================
function set(id,val){
document.getElementById(id).innerText = val || "-";
}

function error(msg){
document.body.innerHTML = `<h2 style="text-align:center">${msg}</h2>`;
}
</script>

</body>
</html>
