<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>الفاتورة الإلكترونية - في خدمتك</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9ecef; padding: 20px; font-family: 'Tajawal', sans-serif; }
        .page { 
            width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 0 auto 20px; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #1e3a5f; padding-bottom: 15px; margin-bottom: 20px; }
        .logo-text .name { font-size: 24px; font-weight: 800; color: #1e3a5f; }
        .invoice-title { background: #1e3a5f; color: white; padding: 5px 20px; border-radius: 20px; font-size: 18px; }
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .info-item label { display: block; font-size: 12px; color: #666; }
        .info-item span { font-weight: 700; color: #1e3a5f; }
        .address-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background: #1e3a5f; color: white; padding: 10px; font-size: 14px; }
        td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 13px; }
        .totals { width: 250px; margin-right: auto; }
        .total-row { display: flex; justify-content: space-between; padding: 5px 0; }
        .grand-total { border-top: 2px solid #1e3a5f; margin-top: 5px; padding-top: 10px; font-weight: 800; color: #1e3a5f; font-size: 16px; }
        .barcodes { display: flex; justify-content: space-around; margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ccc; }
        .qr-item { text-align: center; font-size: 10px; color: #777; width: 130px; }
        .qr-code { width: 120px; height: 120px; margin: 0 auto 5px; }
        .preview-buttons { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1000; }
        button { padding: 10px 25px; border: none; border-radius: 25px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; }
        .btn-print { background: #1e3a5f; color: white; }
        @media print { .no-print { display: none !important; } .page { box-shadow: none; margin: 0; width: 100%; } }
    </style>
</head>
<body>

    <div id="printContent">
        <div style="text-align:center; padding: 50px;">جاري تجهيز الفاتورة...</div>
    </div>

    <div class="preview-buttons no-print">
        <button class="btn-print" onclick="window.print()">🖨️ طباعة الفاتورة</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
            authDomain: "msjt301-974bb.firebaseapp.com",
            projectId: "msjt301-974bb",
            storageBucket: "msjt301-974bb.firebasestorage.app",
            messagingSenderId: "186209858482",
            appId: "1:186209858482:web:186ca610780799ef562aab"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const sellerData = {
            name: "في خدمتك",
            taxNumber: "312495447600003"
        };

        // الدالة الجديدة المعتمدة على EasyQRCodeJS
        function generateQR(id, text) {
            const container = document.getElementById(id);
            if (!container) return;
            container.innerHTML = "";
            
            new QRCode(container, {
                text: text,
                width: 120,
                height: 120,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.L,
                // خصائص المكتبة الحديثة لمعالجة البيانات الضخمة
                quietZone: 10,
                version: 0 // تلقائي
            });
        }

        function renderInvoice(order) {
            const subtotal = Number(order.subtotal) || 0;
            const tax = Number(order.tax) || (subtotal * 0.15);
            const total = Number(order.total) || (subtotal + tax);

            const html = `
                <div class="page">
                    <div class="header">
                        <div class="logo-text"><div class="name">${sellerData.name}</div></div>
                        <div class="invoice-title">فاتورة ضريبية مبسطة</div>
                    </div>

                    <div class="info-grid">
                        <div class="info-item"><label>رقم الفاتورة</label><span>${order.orderNumber || order.id.substring(0,8)}</span></div>
                        <div class="info-item"><label>التاريخ</label><span>${order.orderDate || '---'}</span></div>
                        <div class="info-item"><label>المجموع</label><span>${total.toFixed(2)} ريال</span></div>
                    </div>

                    <div class="address-box">
                        <div class="card">
                            <h4>المورد</h4>
                            <p><strong>${sellerData.name}</strong><br>الرقم الضريبي: ${sellerData.taxNumber}</p>
                        </div>
                        <div class="card">
                            <h4>العميل</h4>
                            <p><strong>${order.customerName || 'عميل'}</strong><br>${order.customerPhone || ''}</p>
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr><th>الوصف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
                        </thead>
                        <tbody>
                            ${(order.items || []).map(item => `
                                <tr>
                                    <td>${item.name}</td>
                                    <td>${item.quantity || 1}</td>
                                    <td>${Number(item.price).toFixed(2)}</td>
                                    <td>${(item.quantity * item.price).toFixed(2)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <div class="totals">
                        <div class="total-row"><span>المجموع:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                        <div class="total-row"><span>الضريبة:</span><span>${tax.toFixed(2)} ريال</span></div>
                        <div class="total-row grand-total"><span>الإجمالي:</span><span>${total.toFixed(2)} ريال</span></div>
                    </div>

                    <div class="barcodes">
                        <div class="qr-item"><div id="zatcaQR" class="qr-code"></div>باركود الزكاة</div>
                        <div class="qr-item"><div id="verifyQR" class="qr-code"></div>التحقق</div>
                    </div>
                </div>
            `;

            document.getElementById('printContent').innerHTML = html;

            // توليد الباركود بالبيانات كاملة دون خوف من الـ Overflow
            const zatcaData = `S:${sellerData.name}|V:${sellerData.taxNumber}|D:${order.orderDate}|T:${total.toFixed(2)}`;
            generateQR("zatcaQR", zatcaData);
            generateQR("verifyQR", window.location.href);
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('id');
            if (!docId) return;

            try {
                const doc = await db.collection("orders").doc(docId).get();
                if (doc.exists) renderInvoice({ id: doc.id, ...doc.data() });
            } catch (e) { console.error(e); }
        }

        window.onload = init;
    </script>
</body>
</html>
