<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>فاتورة إلكترونية - منصة في خدمتك</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, 'Noto Sans Arabic', Arial, sans-serif;
            direction: rtl;
            padding: 20px;
        }
        /* حاوية الفاتورة - عرض مناسب */
        .invoice-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border-radius: 16px;
            overflow: visible; /* تجنب القص */
        }
        .invoice-container {
            padding: 35px 40px;
            background: white;
            position: relative;
        }
        /* تنسيق الطباعة المتقدم - بدون قص */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .invoice-wrapper {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
                margin: 0;
                overflow: visible;
            }
            .invoice-container {
                padding: 0.7in;
                overflow: visible;
                page-break-after: avoid;
                page-break-inside: avoid;
            }
            .action-buttons {
                display: none;
            }
            /* فصل صفحة الأحكام */
            .terms-page {
                page-break-before: always;
                margin-top: 0;
            }
            /* منع الكسر داخل الصفوف والعناصر */
            .product-table tr, .product-table td, .product-table th,
            .info-row, .summary-box, .company-box, .customer-box,
            .terms-box {
                page-break-inside: avoid;
            }
            /* تكرار رأس الجدول في كل صفحة */
            .product-table thead {
                display: table-header-group;
            }
            /* رأس ثابت في كل صفحة (شعار ومعلومات الفاتورة الأساسية) */
            .print-header {
                position: fixed;
                top: 0;
                right: 0;
                left: 0;
                background: white;
                padding: 10px 0.7in;
                border-bottom: 2px solid #e2e8f0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                z-index: 100;
            }
            /* تذييل ثابت في كل صفحة */
            .print-footer {
                position: fixed;
                bottom: 0;
                right: 0;
                left: 0;
                background: white;
                padding: 8px 0.7in;
                border-top: 1px solid #e2e8f0;
                text-align: center;
                font-size: 10px;
                color: #475569;
                z-index: 100;
            }
            /* إزالة الرأس الثابت من الصفحة الأولى لعدم التداخل مع الرأس الأصلي؟ الأفضل جعل الرأس الأصلي يظهر فقط في أول صفحة، لكننا سنستخدم رأس ثابت متكرر */
            /* لضمان عدم ازدواجية الرأس في الصفحة الأولى، نخفي الرأس الثابت مؤقتًا؟ لا، سيكون الرأس الثابت هو نفسه في كل الصفحات */
            /* ولكن الرأس الأصلي في HTML سيظهر فقط في أول صفحة، لذا سنخفي الرأس الثابت للصفحة الأولى باستخدام CSS؟ صعب.
               بدلاً من ذلك، سنقوم بإزالة الرأس الثابت والاعتماد على تكرار العناصر عبر CSS Grid؟ 
               حل أفضل: استخدام @top-center و @bottom-center لكنه لا يدعم HTML معقد. 
               لذلك سأعتمد على تكرار رأس وتذييل بسيط عبر خاصية content، وسيتم عرض معلومات الفاتورة الأساسية في الرأس الثابت دون تكرار.
            */
            /* إعدادات الصفحة مع ترقيم */
            @page {
                size: A4;
                margin: 1.2in 0.6in 0.8in 0.6in; /* أعلى وأسفل لاستيعاب الرأس والتذييل الثابتين */
            }
            @page :after {
                content: counter(page) " / " counter(pages);
                font-size: 10px;
                color: #64748b;
                text-align: center;
                width: 100%;
                position: fixed;
                bottom: 15px;
            }
            /* تجنب تداخل المحتوى مع الرأس والتذييل الثابت */
            .invoice-container {
                margin-top: 60px;
                margin-bottom: 40px;
            }
            /* إخفاء الرأس الثابت في الشاشة العادية */
            .print-header, .print-footer {
                display: none;
            }
            body.print-mode .print-header,
            body.print-mode .print-footer {
                display: flex;
            }
        }
        /* أنماط عامة */
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .grid-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 25px 0;
        }
        .info-row {
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #1e3a8a;
            border-right: 4px solid #3b82f6;
            padding-right: 12px;
            margin: 30px 0 15px 0;
        }
        .company-box, .customer-box {
            background: #f8fafc;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            line-height: 1.6;
        }
        .product-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 13px;
        }
        .product-table th, .product-table td {
            border: 1px solid #cbd5e1;
            padding: 10px 6px;
            vertical-align: middle;
            text-align: center;
        }
        .product-table th {
            background: #1e3a8a;
            color: white;
            font-weight: 600;
        }
        .product-img {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
        }
        .desc-text {
            font-size: 12px;
            max-width: 180px;
            white-space: normal;
            word-break: break-word;
            text-align: right;
        }
        .summary-box {
            background: #f0fdf4;
            border-radius: 16px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid #bbf7d0;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #cbd5e1;
        }
        .summary-row.total {
            font-size: 18px;
            font-weight: bold;
            color: #166534;
            border-bottom: none;
            margin-top: 8px;
            padding-top: 12px;
            border-top: 2px solid #86efac;
        }
        .terms-box {
            background: #fefce8;
            padding: 20px;
            border-radius: 16px;
            font-size: 12px;
            line-height: 1.6;
            color: #1e293b;
            margin-top: 30px;
            border: 1px solid #fde047;
        }
        .terms-box h4 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #854d0e;
        }
        .terms-box ol {
            padding-right: 20px;
            margin: 10px 0;
        }
        .terms-box li {
            margin-bottom: 6px;
        }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 12px;
            color: #475569;
        }
        .badge-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .terms-page {
            page-break-before: always;
            margin-top: 0;
        }
        .action-buttons {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .btn-print { background: #3b82f6; color: white; }
        .btn-pdf { background: #ef4444; color: white; }
        .btn-png { background: #8b5cf6; color: white; }
        .btn-close { background: #64748b; color: white; }
        @media (max-width: 750px) {
            .invoice-container { padding: 20px; }
            .grid-2cols { grid-template-columns: 1fr; gap: 15px; }
            .product-table th, .product-table td { padding: 6px 3px; font-size: 11px; }
            .desc-text { max-width: 120px; }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinner {
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        /* تحسين الصور */
        .product-img {
            max-width: 45px;
            max-height: 45px;
        }
        /* تجنب القص */
        .invoice-container, .invoice-wrapper {
            overflow: visible;
        }
    </style>
</head>
<body>
<div id="loading" class="text-center py-20">
    <div class="spinner"></div>
    <p>جاري تحميل الفاتورة...</p>
</div>
<div id="invoiceWrapper" style="display: none;"></div>
<div class="action-buttons" id="actionButtons" style="display: none;">
    <button class="btn btn-print" onclick="handlePrintWithHeader()"><i class="fas fa-print"></i> طباعة</button>
    <button class="btn btn-pdf" onclick="handlePDF()"><i class="fas fa-file-pdf"></i> PDF</button>
    <button class="btn btn-png" onclick="handlePNG()"><i class="fas fa-image"></i> صورة</button>
    <button class="btn btn-close" onclick="closeInvoiceWindow()"><i class="fas fa-times"></i> إغلاق</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let customersMap = new Map();
    let productsMap = new Map();

    async function loadCustomersAndProducts() {
        try {
            const [customersSnap, productsSnap] = await Promise.all([
                getDocs(collection(db, 'customers')),
                getDocs(collection(db, 'products'))
            ]);
            customersSnap.forEach(docSnap => customersMap.set(docSnap.id, docSnap.data()));
            productsSnap.forEach(docSnap => productsMap.set(docSnap.id, docSnap.data()));
        } catch (err) {
            console.warn("خطأ في تحميل البيانات:", err);
        }
    }

    async function getOrder(orderId) {
        const orderRef = doc(db, 'orders', orderId);
        const orderSnap = await getDoc(orderRef);
        if (!orderSnap.exists()) return null;
        return { id: orderSnap.id, ...orderSnap.data() };
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
    }

    function formatTime(time24) {
        if (!time24) return '';
        let [h, m] = time24.split(':');
        let hour = parseInt(h);
        let ampm = hour >= 12 ? 'مساءً' : 'صباحاً';
        hour = hour % 12 || 12;
        return `${hour.toString().padStart(2,'0')}:${m} ${ampm}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getStatusBadgeClass(status) {
        const map = {
            'جديد': 'bg-blue-100 text-blue-800',
            'تحت التنفيذ': 'bg-yellow-100 text-yellow-800',
            'تم التنفيذ': 'bg-green-100 text-green-800',
            'تحت المراجعة': 'bg-purple-100 text-purple-800',
            'مسترجع': 'bg-orange-100 text-orange-800',
            'ملغي': 'bg-red-100 text-red-800'
        };
        return map[status] || 'bg-gray-100 text-gray-800';
    }

    // تحسين جلب الصورة: دعم روابط Firebase Storage التامة
    function getSafeImageUrl(item, productId) {
        let imgUrl = '';
        if (item.image && item.image.trim() !== "") {
            imgUrl = item.image;
        } else if (productId && productsMap.has(productId)) {
            const prod = productsMap.get(productId);
            if (prod.image && prod.image.trim() !== "") imgUrl = prod.image;
        }
        // إذا كان الرابط من Firebase Storage قد لا يعمل بسبب CORS أو auth، نستخدم صورة افتراضية عالية الجودة
        if (imgUrl && (imgUrl.startsWith('http') || imgUrl.startsWith('data:'))) {
            return imgUrl;
        }
        // صورة افتراضية تعرض أيقونة المنتج
        return 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%233b82f6%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2240%22%3E📦%3C/text%3E%3C/svg%3E';
    }

    async function renderInvoice() {
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        const autoAction = urlParams.get('auto');
        
        if (!orderId) {
            document.getElementById('loading').innerHTML = '<div class="text-center text-red-600 p-10"><i class="fas fa-exclamation-triangle text-4xl mb-3"></i><br>رقم الطلب غير موجود</div>';
            return;
        }
        
        await loadCustomersAndProducts();
        const order = await getOrder(orderId);
        if (!order) {
            document.getElementById('loading').innerHTML = '<div class="text-center text-red-600 p-10"><i class="fas fa-times-circle text-4xl mb-3"></i><br>الطلب غير موجود</div>';
            return;
        }
        
        const customer = customersMap.get(order.customerId) || { name: 'غير معروف', phone: '', city: '', street: '', email: '' };
        
        let subtotal = 0;
        const itemsRows = [];
        const items = order.items || [];
        for (const [idx, item] of items.entries()) {
            const price = parseFloat(item.price || 0);
            const qty = parseFloat(item.quantity || 0);
            const total = price * qty;
            subtotal += total;
            const productId = item.productId || null;
            const imgSrc = getSafeImageUrl(item, productId);
            const description = item.description || (productId && productsMap.get(productId)?.description) || '';
            itemsRows.push(`
                <tr>
                    <td>${idx+1}</td>
                    <td style="text-align: right;">${escapeHtml(item.name)}</td>
                    <td><img src="${imgSrc}" class="product-img" alt="صورة المنتج" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23f1f5f9%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22%3E🖼️%3C/text%3E%3C/svg%3E'"></td>
                    <td>${escapeHtml(item.barcode || '—')}</td>
                    <td class="desc-text">${escapeHtml(description).substring(0, 80)}${description.length > 80 ? '…' : ''}</td>
                    <td>${qty}</td>
                    <td>${price.toFixed(2)} ريال</td>
                    <td>${total.toFixed(2)} ريال</td>
                </tr>
            `);
        }
        
        let discountValue = parseFloat(order.discount || 0);
        if (order.discountType === 'percent' && discountValue > 0) discountValue = (subtotal * discountValue) / 100;
        const afterDiscount = subtotal - discountValue;
        const tax = afterDiscount * 0.15;
        const total = afterDiscount + tax;
        
        const paymentMethodName = order.paymentMethodName || 
            (order.paymentMethod === 'mada' ? 'مدى' :
            order.paymentMethod === 'mastercard' ? 'ماستركارد' :
            order.paymentMethod === 'visa' ? 'فيزا' :
            order.paymentMethod === 'stcpay' ? 'STCPay' :
            order.paymentMethod === 'tamara' ? 'تمارا' :
            order.paymentMethod === 'tabby' ? 'تابي' : 'أخرى');
        
        const shippingMethodText = {
            'pickup': '🏪 استلام من المقر',
            'delivery': '🚚 شحن منزلي',
            'noship': '📥 لا يتطلب شحن'
        }[order.shippingMethod] || order.shippingMethod || 'غير محدد';
        
        // شعار عالي الجودة (رابط افتراضي لكن قابل للتعديل)
        const logoUrl = 'https://via.placeholder.com/150x60/3b82f6/white?text=%D9%81%D9%8A%20%D8%AE%D8%AF%D9%85%D8%AA%D9%83';
        
        // بناء الفاتورة الكاملة مع رأس وتذييل ثابت للطباعة (سيتم إضافتها عبر CSS)
        const html = `
        <div class="invoice-wrapper" id="mainInvoice">
            <!-- رأس متكرر للطباعة سيظهر عبر @media print -->
            <div class="print-header" style="display: none;">
                <div>
                    <img src="${logoUrl}" alt="شعار" style="height: 40px;" onerror="this.style.display='none'">
                    <span class="font-bold">منصة في خدمتك</span>
                </div>
                <div>
                    <span>فاتورة: ${escapeHtml(order.orderNumber || order.id)}</span>
                    <span style="margin-right: 15px;">تاريخ: ${formatDate(order.orderDate)}</span>
                </div>
            </div>
            <div class="print-footer" style="display: none;">
                <span>هاتف: 966555698774 | البريد: info@fi-khidmatik.com | www.khidmatik.com</span>
                <span style="margin-right: 15px;">الصفحة <span class="pageNumber"></span> / <span class="totalPages"></span></span>
            </div>
            
            <div class="invoice-container">
                <!-- رأس الفاتورة الرئيسي (يظهر في أول صفحة فقط) -->
                <div class="flex-between">
                    <div>
                        <img src="${logoUrl}" alt="شعار المنصة" style="height: 70px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 80%22%3E%3Crect width=%22200%22 height=%2280%22 fill=%22%233b82f6%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2224%22 font-weight=%22bold%22 dy=%22.3em%22%3Eفي خدمتك%3C/text%3E%3C/svg%3E'">
                        <div class="mt-2"><strong>منصة في خدمتك</strong><br><span class="text-xs">رقم شهادة العمل الحر: FL-765735204</span><br><span class="text-xs">الرقم الضريبي: 312495447600003</span></div>
                    </div>
                    <div class="text-left">
                        <h1 class="text-2xl font-bold text-blue-800">فاتورة إلكترونية</h1>
                        <p><strong>رقم الفاتورة:</strong> ${escapeHtml(order.orderNumber || order.id)}</p>
                        <p><strong>التاريخ:</strong> ${formatDate(order.orderDate)} &nbsp;|&nbsp; <strong>الوقت:</strong> ${formatTime(order.orderTime)}</p>
                        <p><span class="badge-status ${getStatusBadgeClass(order.status)} px-3 py-1 rounded-full text-xs">${order.status || 'جديد'}</span></p>
                    </div>
                </div>
                
                <div class="grid-2cols">
                    <div class="company-box">
                        <h3 class="font-bold text-blue-800"><i class="fas fa-building"></i> مصدرة من:</h3>
                        <p>منصة في خدمتك<br>المملكة العربية السعودية<br>حائل - حي النقرة - شارع سعد المشاط<br>رقم المبنى: 3085 الرقم الإضافي: 7718 الرمز البريدي: 55431</p>
                    </div>
                    <div class="customer-box">
                        <h3 class="font-bold text-blue-800"><i class="fas fa-user"></i> مصدرة إلى:</h3>
                        <p><strong>العميل:</strong> ${escapeHtml(customer.name)}<br>
                        <strong>الدولة:</strong> المملكة العربية السعودية<br>
                        <strong>المدينة:</strong> ${escapeHtml(customer.city || '—')}<br>
                        <strong>العنوان:</strong> ${escapeHtml(customer.street || '—')}<br>
                        <strong>الجوال:</strong> ${escapeHtml(customer.phone || '—')}<br>
                        <strong>البريد:</strong> ${escapeHtml(customer.email || '—')}</p>
                    </div>
                </div>
                
                <div class="info-row">
                    <span><i class="fas fa-credit-card"></i> <strong>طريقة الدفع:</strong> ${paymentMethodName}</span>
                    <span><i class="fas fa-check-circle"></i> <strong>رمز الموافقة:</strong> ${order.approvalCode || '—'}</span>
                </div>

                <div class="summary-box">

                <div class="footer-note">
                    <p><i class="fas fa-phone-alt"></i> هاتف: 966555698774 &nbsp;|&nbsp; <i class="fas fa-envelope"></i> info@fi-khidmatik.com &nbsp;|&nbsp; <i class="fas fa-globe"></i> www.khidmatik.com</p>
                    <p class="mt-2 font-bold text-blue-800">شكراً لتسوقكم معنا 🤍</p>
                </div>
            </div>
            
            <!-- صفحة مستقلة للشروط والأحكام -->
            <div class="invoice-container terms-page">
                <div class="terms-box" style="margin-top:0;">
                    <h4><i class="fas fa-gavel"></i> الشروط والأحكام التفصيلية</h4>
                    <p>يُعد هذا المستند (فاتورة) اتفاقًا ملزمًا قانونيًا بين الطرفين، ويعتبر اعتماد العميل أو سداد أي دفعة أو بدء التنفيذ إقرارًا صريحًا ونهائيًا بالموافقة على جميع ما ورد فيه من شروط وأحكام دون أي تحفظ.</p>

                        <li><strong>الموافقات الخارجية:</strong> تخضع لسياسات الجهات المختصة.</li>
                        <li><strong>الرسوم الخارجية:</strong> لا تشمل رسوم السيرفرات أو النطاقات أو التراخيص.</li>
                        <li><strong>خدمات الطرف الثالث:</strong> يتحمل العميل مسؤولية أدائها.</li>
                        <li><strong>المدفوعات الخارجية:</strong> غير قابلة للاسترجاع.</li>
                        <li><strong>الدفع نيابة عن العميل:</strong> يُعد دينًا مستحقًا.</li>
                        <li><strong>الضريبة:</strong> جميع الأسعار لا تشمل ضريبة القيمة المضافة (تضاف 15%).</li>
                        <li><strong>نطاق التسليم:</strong> حسب النطاق المحدد فقط.</li>
                        <li><strong>المنتج النهائي:</strong> لا يشمل الملفات المفتوحة أو الكود المصدري.</li>
                        <li><strong>الكود المصدري:</strong> ملك حصري لمقدم الخدمة.</li>
                        <li><strong>نقل الملكية:</strong> باتفاق مستقل ومقابل مالي.</li>
                        <li><strong>عدم طلب التسليم:</strong> لا يلتزم بتسليم المخرجات.</li>
                        <li><strong>حق إعادة الاستخدام:</strong> يحتفظ مقدم الخدمة به.</li>
                        <li><strong>نظام الدفع:</strong> وفق الآلية المتفق عليها.</li>
                        <li><strong>تأخر السداد:</strong> يوقف العمل فورًا.</li>
                        <li><strong>عدم الاسترجاع:</strong> لا يحق المطالبة باسترجاع أي مبلغ بعد البدء.</li>
                        <li><strong>إيقاف المشروع من مقدم الخدمة:</strong> في حال المخالفة.</li>
                        <li><strong>احتساب الأعمال:</strong> حسب نسبة الإنجاز.</li>
                        <li><strong>الرسوم الإدارية:</strong> 20% على الأعمال المنفذة.</li>
                        <li><strong>الضمان:</strong> حسب الخطة التشغيلية.</li>
                        <li><strong>نطاق الضمان:</strong> الأخطاء الفنية الناتجة عن مقدم الخدمة.</li>
                        <li><strong>الاستثناءات:</strong> لا يشمل سوء الاستخدام أو تعديلات العميل.</li>
                        <li><strong>انتهاء العلاقة:</strong> بعد التسليم النهائي.</li>
                        <li><strong>المسؤولية بعد التسليم:</strong> لا يتحمل مقدم الخدمة مسؤولية لاحقة.</li>
                        <li><strong>التشغيل:</strong> العميل يتحمل مسؤولية التشغيل.</li>
                        <li><strong>البيانات:</strong> العميل مسؤول عن النسخ الاحتياطية.</li>
                        <li><strong>براءة الذمة:</strong> لا مسؤولية عن خدمات الأطراف الثالثة.</li>
                        <li><strong>وسائل التواصل:</strong> المعتمدة فقط.</li>
                        <li><strong>التفويض:</strong> إشعار رسمي مسبق.</li>
                        <li><strong>النسخ الإلكترونية:</strong> معتمدة قانونيًا.</li>
                        <li><strong>طبيعة العلاقة:</strong> علاقة تعاقدية مستقلة.</li>
                        <li><strong>كامل الاتفاق:</strong> يلغي أي اتفاقات سابقة.</li>
                        <li><strong>الأخطاء غير المقصودة:</strong> لا تؤثر على صحة باقي البنود.</li>

                        <li><strong>اللغة المعتمدة:</strong> العربية.</li>
                        <li><strong>حل النزاعات:</strong> وديًا أولاً.</li>
                        <li><strong>الجهة المختصة:</strong> يحددها مقدم الخدمة.</li>
                        <li><strong>القوة القاهرة:</strong> لا مسؤولية عن التأخير بسبب ظروف خارجة.</li>
                        <li><strong>السرية:</strong> الالتزام بعدم الإفصاح.</li>
                        <li><strong>التعديلات خارج النطاق:</strong> بعرض وسعر مستقل.</li>
                        <li><strong>التوقف المؤقت:</strong> عند عدم تجاوب العميل.</li>

                        <li><strong>الاعتراض:</strong> كتابي خلال 7 أيام.</li>

                        <li><strong>تفسير البنود:</strong> بما يحقق الغرض منها.</li>
                        <li><strong>حق رفض الخدمة:</strong> محفوظ لمقدم الخدمة.</li>
                        <li><strong>التنازل عن المطالبات:</strong> بما يتجاوز قيمة الفاتورة.</li>
                        <li><strong>حدود المسؤولية:</strong> لا تتجاوز المبلغ المدفوع.</li>
                        <li><strong>الاستخدام غير المشروع:</strong> يتحمله العميل.</li>
                        <li><strong>الملكية الفكرية:</strong> محفوظة لمقدم الخدمة.</li>
                        <li><strong>تحديث الشروط:</strong> تسري على الأعمال الجديدة.</li>
                        <li><strong>استقلالية البنود:</strong> لا يؤثر بطلان بند على الآخرين.</li>
                        <li><strong>الشروط الإضافية:</strong> تُوثق في ملحق مستقل.</li>
                    </ol>
                    <p class="mt-3"><strong>الإقرار:</strong> أقر أنا العميل بالاطلاع على جميع الشروط والأحكام أعلاه وأوافق عليها بالكامل وأتعهد بالالتزام بها دون أي استثناء.</p>
                </div>
                <div class="footer-note" style="border: none; margin-top: 20px;">
                    <p>هذه الفاتورة إلكترونية صادرة من منصة في خدمتك - نسخة معتمدة قانونياً</p>
                </div>
            </div>
        </div>
        `;
        
        const wrapper = document.getElementById('invoiceWrapper');
        wrapper.innerHTML = html;
        document.getElementById('loading').style.display = 'none';
        wrapper.style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
        
        if (autoAction === 'print') setTimeout(() => handlePrintWithHeader(), 600);
        else if (autoAction === 'pdf') setTimeout(() => handlePDF(), 600);
        else if (autoAction === 'png') setTimeout(() => handlePNG(), 600);
    }
    
    // دالة الطباعة مع إظهار الرأس والتذييل الثابت
    window.handlePrintWithHeader = () => {
        const headers = document.querySelectorAll('.print-header, .print-footer');
        headers.forEach(el => el.style.display = 'flex');
        window.print();
        setTimeout(() => {
            headers.forEach(el => el.style.display = 'none');
        }, 500);
    };
    
    window.handlePDF = async () => {
        const element = document.querySelector('.invoice-wrapper');
        if (element) {
            try {
                // إظهار الرأس والتذييل مؤقتًا للـ PDF
                const headers = document.querySelectorAll('.print-header, .print-footer');
                headers.forEach(el => el.style.display = 'flex');
                const opt = {
                    margin: [0.5, 0.5, 0.5, 0.5],
                    filename: `فاتورة_${Date.now()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, letterRendering: true, useCORS: true },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                };
                await html2pdf().set(opt).from(element).save();
                headers.forEach(el => el.style.display = 'none');
            } catch (err) {
                console.error("PDF error:", err);
                alert("حدث خطأ أثناء إنشاء PDF");
            }
        }
    };
    
    window.handlePNG = async () => {
        const element = document.querySelector('.invoice-wrapper');
        if (element) {
            try {
                const canvas = await html2canvas(element, { scale: 3, backgroundColor: '#ffffff', useCORS: true });
                const link = document.createElement('a');
                link.download = `فاتورة_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                alert("خطأ في حفظ الصورة");
            }
        }
    };
    
    window.closeInvoiceWindow = () => {
        if (window.close) window.close();
        else alert("يمكنك إغلاق النافذة يدويًا");
    };
    
    renderInvoice();
</script>
