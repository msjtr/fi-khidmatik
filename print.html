<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>في خدمتك - فاتورة إلكترونية</title>
    <link rel="stylesheet" href="print.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="terms.js"></script>
    <style>
        /* أنماط إضافية لضمان ظهور الشروط بشكل صحيح */
        .terms-main-container {
            width: 100%;
        }
        .main-title {
            color: #1e3a5f;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #1e3a5f;
            padding-bottom: 10px;
        }
        .legal-intro {
            background: #fef3c7;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-right: 5px solid #f59e0b;
            font-size: 12px;
            line-height: 1.8;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        .col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .terms-block {
            background: #fafafa;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .terms-block h3 {
            background: #1e3a5f;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 14px;
            display: inline-block;
        }
        .terms-block p {
            font-size: 11px;
            line-height: 1.85;
            color: #2d3a4a;
            margin-bottom: 8px;
        }
        .declaration {
            background: #f0f4f9;
            padding: 20px;
            border-radius: 14px;
            text-align: center;
            margin: 20px 0;
        }
        .declaration p {
            font-size: 13px;
            font-weight: bold;
        }
        .signature {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #cbd5e1;
        }
        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
<div class="invoice-wrapper" id="invoiceRoot"></div>
<div class="action-buttons">
    <button class="btn btn-primary" id="printBtn">🖨️ طباعة</button>
    <button class="btn btn-secondary" id="pdfBtn">📄 PDF</button>
    <button class="btn btn-danger" id="backBtn" onclick="window.close()">✖️ إغلاق</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let orderData = null;

    const sellerData = {
        name: "منصة في خدمتك",
        taxNumber: "312495447600003",
        licenseNumber: "FL-765735204",
        address: "حائل - حي النقرة - شارع سعد المشاط - مبنى 3085 - الرمز البريدي 55431",
        phone: "966534051317",
        whatsapp: "966545312021",
        email: "info@fi-khidmatik.com",
        website: "www.khidmatik.com"
    };

    function showLoading(msg) {
        let ov = document.getElementById('loadingOverlay');
        if (!ov) {
            ov = document.createElement('div');
            ov.id = 'loadingOverlay';
            ov.className = 'loading-overlay';
            ov.innerHTML = `<div class="loading-box"><div class="loading-spinner"></div><p id="loadingMsg">${msg}</p></div>`;
            document.body.appendChild(ov);
        }
        document.getElementById('loadingMsg').textContent = msg;
        ov.style.display = 'flex';
    }
    function hideLoading() { let ov = document.getElementById('loadingOverlay'); if(ov) ov.style.display = 'none'; }
    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast-message'; t.textContent = msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

    function cleanHtmlText(html) {
        if (!html) return '';
        let text = String(html);
        text = text.replace(/<[^>]*>/g, ' ');
        text = text.replace(/data-[a-z]+="[^"]*"/gi, '');
        text = text.replace(/\s+/g, ' ').trim();
        return text;
    }

    async function fetchOrderData() {
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        if (orderId && orderId !== 'null') {
            try {
                const orderSnap = await getDoc(doc(db, 'orders', orderId));
                if (orderSnap.exists()) {
                    orderData = { id: orderSnap.id, ...orderSnap.data() };
                    if (orderData.customerId) {
                        const custSnap = await getDoc(doc(db, 'customers', orderData.customerId));
                        if (custSnap.exists()) {
                            const c = custSnap.data();
                            orderData.customerName = c.name || c.customerName;
                            orderData.customerPhone = c.phone || c.mobile;
                            orderData.customerEmail = c.email;
                            const addrParts = [];
                            if (c.city) addrParts.push(c.city);
                            if (c.street) addrParts.push(c.street);
                            if (c.buildingNo) addrParts.push(`مبنى رقم ${c.buildingNo}`);
                            if (c.postalCode) addrParts.push(`الرمز البريدي ${c.postalCode}`);
                            orderData.customerAddress = addrParts.join(' - ') || 'لا يوجد عنوان';
                        }
                    }
                    if (orderData.items) {
                        for (let item of orderData.items) {
                            item.name = cleanHtmlText(item.name);
                            item.description = cleanHtmlText(item.description);
                        }
                    }
                    return;
                }
            } catch(e) { console.error(e); }
        }
        // بيانات تجريبية
        orderData = {
            orderNumber: "INV-2026-0407-001",
            orderDate: "2026-04-07",
            orderTime: "14:30",
            status: "مكتمل",
            customerName: "أحمد محمد السالم",
            customerPhone: "+966551234567",
            customerEmail: "ahmed@example.com",
            customerAddress: "الرياض - حي المروج - مبنى 2215 - الرمز البريدي 12282",
            subtotal: 19282,
            discount: 5784.60,
            tax: 2024.61,
            total: 15522.01,
            paymentMethodName: "تحويل بنكي",
            shippingMethod: "delivery",
            approvalCode: "AP-8821X9",
            items: [
                { name: "الباقة المتقدمة في تصميم المتاجر الإلكترونية", description: "تصميم متكامل + لوحة تحكم + بوابة دفع", image: "https://picsum.photos/id/48/200/200", quantity: 1, price: 12500 },
                { name: "استضافة سحابية", description: "استضافة لمدة عام + دعم فني 24/7", image: "https://picsum.photos/id/0/200/200", quantity: 2, price: 2391 }
            ]
        };
    }

    function formatTime12(t) { if(!t) return ''; let [h,m]=t.split(':'); let hour=parseInt(h); let ap=hour>=12?'مساءً':'صباحاً'; hour=hour%12||12; return `${hour}:${m} ${ap}`; }
    function formatDateYMD(d) { if(!d) return ''; let p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; }
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function getShippingMethodText(method) {
        if (method === 'delivery') return 'شحن منزلي';
        if (method === 'pickup') return 'استلام من المقر';
        if (method === 'noship') return 'لا يحتاج شحن (منتج رقمي)';
        return method || 'غير محدد';
    }

    function buildHeader(title = "فاتورة إلكترونية") {
        return `<div class="header-top">
            <div class="logo-area"><img src="images/logo.svg" class="logo-img" onerror="this.src='https://placehold.co/65x65/1e3a5f/white?text=في+خدمتك'"><div><div class="platform-name">${sellerData.name}</div><div class="platform-slogan">خدمات تقنية متكاملة</div></div></div>
            <div class="invoice-title">${title}</div>
            <div class="legal-numbers"><div>رقم شهادة العمل الحر: ${sellerData.licenseNumber}</div><div>الرقم الضريبي: ${sellerData.taxNumber}</div></div>
        </div>`;
    }

    function buildFooter(pageNum, totalPages) {
        return `<div class="footer-note">
            <div class="contact-info"><span>📞 ${sellerData.phone}</span><span>💬 ${sellerData.whatsapp}</span><span>✉️ ${sellerData.email}</span><span>🌐 ${sellerData.website}</span></div>
            <div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
            <div class="page-number">صفحة ${pageNum} من ${totalPages}</div>
        </div>`;
    }

    function buildInvoicePage() {
        const itemsHtml = (orderData.items || []).map((item, idx) => `
            <tr><td style="text-align:center">${idx+1}</td>
            <td style="text-align:center"><img src="${item.image}" class="product-img" crossorigin="anonymous" onerror="this.style.display='none'"></td>
            <td style="text-align:right"><strong>${escapeHtml(item.name)}</strong><br><small>${escapeHtml(item.description)}</small></td>
            <td style="text-align:center">${item.quantity}</td>
            <td style="text-align:center">${item.price.toFixed(2)} ريال</td>
            <td style="text-align:center">${(item.price*item.quantity).toFixed(2)} ريال</td>
         `).join('');
        const subtotal = orderData.subtotal || orderData.items.reduce((s,i)=>s+(i.price*i.quantity),0);
        const total = orderData.total || (subtotal - orderData.discount + orderData.tax);
        const shipText = getShippingMethodText(orderData.shippingMethod);
        return `<div class="invoice-page">
            ${buildHeader("فاتورة إلكترونية")}
            <div class="info-row">
                <div><strong>رقم الفاتورة:</strong> ${orderData.orderNumber}</div>
                <div><strong>التاريخ:</strong> ${formatDateYMD(orderData.orderDate)} - ${formatTime12(orderData.orderTime)}</div>
                <div><span class="status-badge">${orderData.status}</span></div>
            </div>
            <div class="addresses">
                <div class="address-box"><strong>مصدرة من</strong>${sellerData.name}<br>المملكة العربية السعودية<br>${sellerData.address}<br>📞 ${sellerData.phone}<br>✉️ ${sellerData.email}</div>
                <div class="address-box"><strong>مصدرة إلى</strong>${escapeHtml(orderData.customerName)}<br>${escapeHtml(orderData.customerAddress)}<br>📞 ${escapeHtml(orderData.customerPhone)}<br>✉️ ${escapeHtml(orderData.customerEmail)}</div>
            </div>
            <div class="payment-approval">
                <div class="payment-box"><strong>طريقة الدفع:</strong> ${orderData.paymentMethodName}</div>
                <div class="payment-box"><strong>طريقة الاستلام:</strong> ${shipText}</div>
                <div class="approval-box"><strong>رمز الموافقة:</strong> ${orderData.approvalCode}</div>
            </div>
            <table class="invoice-table"><thead><tr><th>#</th><th>الصورة</th><th>المنتج / الوصف</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالي</th></tr></thead><tbody>${itemsHtml}</tbody></table>
            <div class="totals">
                <div><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                <div><span>الخصم:</span><span>- ${orderData.discount.toFixed(2)} ريال</span></div>
                <div><span>ضريبة القيمة المضافة 15%:</span><span>${orderData.tax.toFixed(2)} ريال</span></div>
                <div class="grand-total"><span>الإجمالي النهائي:</span><span>${total.toFixed(2)} ريال</span></div>
            </div>
            <div class="barcodes-container"><div class="barcode-item"><div id="platformQR" class="qr-placeholder"></div></div></div>
            ${buildFooter(1, 2)}
        </div>`;
    }

    async function renderCompleteInvoice() {
        showLoading('جاري تحميل الفاتورة...');
        await fetchOrderData();
        
        // استخدام المتغيرات من terms.js
        const finalHtml = buildInvoicePage() + 
            `<div class="terms-section-page">${buildHeader("الشروط والأحكام")}${termsContent}${buildFooter(2, 2)}</div>` +
            `<div class="terms-section-page">${buildHeader("الشروط والأحكام (تابع)")}${termsPage2Content}${buildFooter(3, 3)}</div>`;
        
        document.getElementById('invoiceRoot').innerHTML = finalHtml;
        
        setTimeout(() => {
            const qr = document.getElementById('platformQR');
            if (qr && typeof QRCode !== 'undefined') new QRCode(qr, { text: `https://${sellerData.website}`, width: 100, height: 100 });
        }, 100);
        hideLoading();
    }

    async function generatePDF() {
        const root = document.getElementById('invoiceRoot');
        const pages = root.querySelectorAll('.invoice-page, .terms-section-page');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        showLoading('جاري إنشاء PDF...');
        try {
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 3, useCORS: true, backgroundColor: '#fff' });
                if (i !== 0) pdf.addPage();
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
            }
            pdf.save(`فاتورة_${orderData.orderNumber}.pdf`);
            showToast('تم حفظ PDF بنجاح');
        } catch(e) { showToast('خطأ في إنشاء PDF'); console.error(e); }
        finally { hideLoading(); }
    }

    document.getElementById('printBtn').onclick = () => window.print();
    document.getElementById('pdfBtn').onclick = generatePDF;
    renderCompleteInvoice();
</script>
</body>
</html>
