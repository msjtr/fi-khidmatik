<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>فاتورة إلكترونية - منصة في خدمتك</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/print.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="loading" class="text-center py-20">
    <div class="loading-spinner-simple"></div>
    <p class="text-gray-600">جاري تحميل الفاتورة...</p>
</div>
<div id="invoiceContainer" style="display: none;"></div>
<div class="action-buttons" id="actionButtons" style="display: none;">
    <button class="btn btn-print" id="printBtn"><i class="fas fa-print"></i> طباعة</button>
    <button class="btn btn-pdf" id="pdfBtn"><i class="fas fa-file-pdf"></i> PDF</button>
    <button class="btn btn-png" id="pngBtn"><i class="fas fa-image"></i> صورة</button>
    <button class="btn btn-close" onclick="window.close()"><i class="fas fa-times"></i> إغلاق</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let customersMap = new Map();
    let productsMap = new Map();
    let currentFileName = "";
    
    // ===== الثوابت المعدلة =====
    const MM_TO_PX = 3.78;
    const TOP_MARGIN_PX = 15 * MM_TO_PX;      // هامش علوي 15mm
    const BOTTOM_MARGIN_PX = 20 * MM_TO_PX;   // هامش سفلي 20mm
    const PAGE_HEIGHT_PX = 297 * MM_TO_PX;    // ارتفاع A4
    const MAX_CONTENT_HEIGHT_PX = PAGE_HEIGHT_PX - TOP_MARGIN_PX - BOTTOM_MARGIN_PX;
    const BUFFER_PX = 20;  // مساحة أمان
    
    async function loadCustomersAndProducts() {
        const customersSnap = await getDocs(collection(db, 'customers'));
        customersSnap.forEach(docSnap => customersMap.set(docSnap.id, docSnap.data()));
        const productsSnap = await getDocs(collection(db, 'products'));
        productsSnap.forEach(docSnap => productsMap.set(docSnap.id, docSnap.data()));
    }

    async function getOrder(orderId) {
        const orderRef = doc(db, 'orders', orderId);
        const orderSnap = await getDoc(orderRef);
        if (!orderSnap.exists()) return null;
        return { id: orderSnap.id, ...orderSnap.data() };
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
    }
    
    function formatTime(time24) {
        if (!time24) return '';
        let [h, m] = time24.split(':');
        let hour = parseInt(h);
        let ampm = hour >= 12 ? 'مساءً' : 'صباحاً';
        hour = hour % 12 || 12;
        return `${hour.toString().padStart(2,'0')}:${m} ${ampm}`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function getStatusClass(status) {
        const map = {
            'جديد': 'bg-blue-100 text-blue-800',
            'تحت التنفيذ': 'bg-yellow-100 text-yellow-800',
            'تم التنفيذ': 'bg-green-100 text-green-800',
            'تحت المراجعة': 'bg-purple-100 text-purple-800',
            'مسترجع': 'bg-orange-100 text-orange-800',
            'ملغي': 'bg-red-100 text-red-800'
        };
        return map[status] || 'bg-gray-100 text-gray-800';
    }
    
    function showLoading() { 
        let overlay = document.getElementById('loadingOverlay'); 
        if (!overlay) { 
            overlay = document.createElement('div'); 
            overlay.id = 'loadingOverlay'; 
            overlay.className = 'loading-overlay'; 
            overlay.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner fa-spin fa-2x"></i><p class="mt-2">جاري إنشاء الفاتورة...</p></div>`; 
            document.body.appendChild(overlay); 
        } 
        overlay.style.display = 'flex'; 
    }
    
    function hideLoading() { 
        const overlay = document.getElementById('loadingOverlay'); 
        if (overlay) overlay.style.display = 'none'; 
    }
    
    async function measureHeight(element) {
        const container = document.createElement('div');
        container.style.position = 'absolute';
        container.style.visibility = 'hidden';
        container.style.top = '-9999px';
        container.style.width = '210mm';
        container.style.direction = 'rtl';
        document.body.appendChild(container);
        container.appendChild(element);
        await new Promise(r => requestAnimationFrame(() => setTimeout(r, 50)));
        const height = element.getBoundingClientRect().height;
        document.body.removeChild(container);
        return height;
    }
    
    function createProductRow(item, productImage, description, price, qty, itemTotal) {
        const tr = document.createElement('tr');
        const imgSrc = productImage && productImage.trim() !== '' ? productImage : '';
        
        let processedDescription = description || '';
        if (processedDescription) {
            processedDescription = processedDescription.replace(/\n/g, "<br>");
        }
        
        const imgHtml = imgSrc ? 
            `<img src="${imgSrc}" class="product-img" loading="eager" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'product-img-fallback\'><i class=\'fas fa-box\'></i></div>';">` :
            `<div class="product-img-fallback"><i class="fas fa-box"></i></div>`;
        
        tr.innerHTML = `
            <td style="text-align: right; font-weight: 500;">${escapeHtml(item.name)}</td>
            <td>${imgHtml}</td>
            <td>${escapeHtml(item.barcode || '—')}</td>
            <td class="desc-text">${processedDescription}</td>
            <td>${qty}</td>
            <td>${price.toFixed(2)} ريال</td>
            <td>${itemTotal.toFixed(2)} ريال</td>
        `;
        return tr;
    }
    
    function splitIntoPages(rows, rowHeights, maxHeight) {
        const pages = [];
        let currentPage = [];
        let currentHeight = 0;

        for (let i = 0; i < rows.length; i++) {
            const nextHeight = rowHeights[i];

            if (currentHeight + nextHeight > maxHeight - BUFFER_PX) {
                if (currentPage.length > 0) {
                    pages.push(currentPage);
                }
                currentPage = [];
                currentHeight = 0;
            }

            currentPage.push(i);
            currentHeight += nextHeight;
        }

        if (currentPage.length) {
            pages.push(currentPage);
        }

        return pages;
    }
    
    async function renderInvoice() {
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        const autoAction = urlParams.get('auto');
        
        if (!orderId) {
            document.getElementById('loading').innerHTML = '<div class="text-center text-red-600 p-10">رقم الطلب غير موجود</div>';
            return;
        }
        
        await loadCustomersAndProducts();
        const order = await getOrder(orderId);
        if (!order) {
            document.getElementById('loading').innerHTML = '<div class="text-center text-red-600 p-10">الطلب غير موجود</div>';
            return;
        }
        
        const customer = customersMap.get(order.customerId) || { name: '__________', phone: '__________', city: '__________', street: '__________', email: '__________' };
        const clientName = (customer.name || 'client').replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '_');
        const orderNumber = order.orderNumber || order.id;
        const today = new Date();
        const dateStr = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2,'0')}-${today.getDate().toString().padStart(2,'0')}`;
        currentFileName = `${clientName}_${orderNumber}_${dateStr}`;
        
        let subtotal = 0;
        const items = order.items || [];
        for (const item of items) {
            const price = item.price || 0;
            const qty = item.quantity || 0;
            subtotal += price * qty;
        }
        
        let discountValue = order.discount || 0;
        if (order.discountType === 'percent' && discountValue > 0) discountValue = (subtotal * discountValue) / 100;
        const afterDiscount = subtotal - discountValue;
        const tax = afterDiscount * 0.15;
        const total = afterDiscount + tax;
        
        const paymentMethodName = order.paymentMethodName || (order.paymentMethod === 'mada' ? 'مدى' : order.paymentMethod === 'mastercard' ? 'ماستركارد' : order.paymentMethod === 'visa' ? 'فيزا' : order.paymentMethod === 'stcpay' ? 'STCPay' : order.paymentMethod === 'tamara' ? 'تمارا' : order.paymentMethod === 'tabby' ? 'تابي' : 'أخرى');
        const shippingMethodText = { 'pickup': '🏪 استلام من المقر', 'delivery': '🚚 شحن منزلي', 'noship': '📥 لا يتطلب شحن' }[order.shippingMethod] || 'استلام من المقر';
        
        const productRowsData = [];
        for (const item of items) {
            const price = item.price || 0;
            const qty = item.quantity || 0;
            const itemTotal = price * qty;
            let productImage = '';
            let description = item.description || '';
            
            if (item.productId) {
                const prod = productsMap.get(item.productId);
                if (prod) {
                    if (prod.image) productImage = prod.image;
                    if (!description && prod.description) description = prod.description;
                }
            }
            if (!productImage && item.image) productImage = item.image;
            if (description && typeof description === 'string') description = escapeHtml(description);
            productRowsData.push({ item, productImage, description: description || '', price, qty, itemTotal });
        }
        
        const logoPath = 'images/logo.svg';
        
        const headerHTML = `
            <div class="logo-header">
                <div class="logo-area">
                    <img src="${logoPath}" alt="منصة في خدمتك" class="logo-img" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'logo-fallback\'><i class=\'fas fa-handshake\'></i></div>';">
                </div>
                <div class="invoice-title text-left">
                    <h1>فاتورة إلكترونية</h1>
                    <p><strong>رقم الفاتورة:</strong> ${escapeHtml(order.orderNumber || order.id)}</p>
                    <p><strong>التاريخ:</strong> ${formatDate(order.orderDate)} | <strong>الوقت:</strong> ${formatTime(order.orderTime)}</p>
                    <p><span class="badge-status ${getStatusClass(order.status)}">${order.status || 'جديد'}</span></p>
                </div>
            </div>
            <div class="company-badge">
                <span><i class="fas fa-briefcase"></i> <strong>منصة في خدمتك</strong></span>
                <span><i class="fas fa-id-card"></i> رقم شهادة العمل الحر: FL-765735204</span>
                <span><i class="fas fa-chart-line"></i> الرقم الضريبي: 312495447600003</span>
            </div>
            <div class="two-columns">
                <div class="info-card"><h3><i class="fas fa-building ml-2"></i> مصدرة من</h3><p>منصة في خدمتك<br>المملكة العربية السعودية<br>حائل - حي النقرة - شارع سعد المشاط<br>رقم المبنى: 3085 | الرمز البريدي: 55431</p></div>
                <div class="info-card"><h3><i class="fas fa-user ml-2"></i> مصدرة إلى</h3><p><strong>العميل:</strong> ${escapeHtml(customer.name || '__________')}<br><strong>المدينة:</strong> ${escapeHtml(customer.city || '__________')}<br><strong>العنوان:</strong> ${escapeHtml(customer.street || '__________')}<br><strong>الجوال:</strong> ${escapeHtml(customer.phone || '__________')}<br><strong>البريد:</strong> ${escapeHtml(customer.email || '__________')}</p></div>
            </div>
            <div class="info-row"><span><i class="fas fa-credit-card"></i> <strong>طريقة الدفع:</strong> ${paymentMethodName}</span><span><i class="fas fa-check-circle"></i> <strong>رمز الموافقة:</strong> ${order.approvalCode || 'APV-' + Math.floor(Math.random()*10000)}</span></div>
            <div class="info-row"><span><i class="fas fa-truck"></i> <strong>طريقة الاستلام:</strong> ${shippingMethodText}</span></div>
            <div class="section-title">تفاصيل المنتجات / الخدمات</div>
        `;
        
        const footerHTML = `
            <div class="footer-static">
                <div class="contact-links">
                    <span><i class="fas fa-phone-alt"></i> هاتف: 966534051317</span>
                    <span><i class="fab fa-whatsapp"></i> واتساب: 966545312021</span>
                    <span><i class="fas fa-envelope"></i> info@fi-khidmatik.com</span>
                    <span><i class="fas fa-globe"></i> www.khidmatik.com</span>
                </div>
                <div class="footer-copyright">هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
            </div>
        `;
        
        const summaryHTML = `
            <div class="summary-box">
                <div class="summary-row"><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                <div class="summary-row"><span>إجمالي الخصم:</span><span style="color:#dc2626;">- ${discountValue.toFixed(2)} ريال</span></div>
                <div class="summary-row"><span>ضريبة القيمة المضافة (15%):</span><span>${tax.toFixed(2)} ريال</span></div>
                <div class="summary-row total"><span>الإجمالي النهائي شامل الضريبة:</span><span>${total.toFixed(2)} ريال</span></div>
            </div>
            <div class="terms-box"><h4><i class="fas fa-info-circle"></i> تعليمات الفاتورة</h4><p>تخضع هذه الفاتورة لكامل الشروط والأحكام المرفقة، ويُعد اعتمادها أو سداد أي مبلغ بموجبها إقرارًا صريحًا ونهائيًا بالموافقة على جميع بنودها دون أي تحفظ، مع إقرار العميل بمسؤوليته عن الاطلاع عليها</p></div>
            <div class="thanks-block"><p class="font-bold text-blue-800"><i class="fas fa-heart"></i> شكراً لتسوقكم معنا</p></div>
        `;
        
        const headerDiv = document.createElement('div'); headerDiv.innerHTML = headerHTML;
        const footerDiv = document.createElement('div'); footerDiv.innerHTML = footerHTML;
        const summaryDiv = document.createElement('div'); summaryDiv.innerHTML = summaryHTML;
        
        const headerHeight = await measureHeight(headerDiv);
        const footerHeight = await measureHeight(footerDiv);
        const summaryHeight = await measureHeight(summaryDiv);
        
        const rowElements = [];
        const rowHeights = [];
        for (const data of productRowsData) {
            const row = createProductRow(data.item, data.productImage, data.description, data.price, data.qty, data.itemTotal);
            const height = await measureHeight(row);
            rowElements.push(row);
            rowHeights.push(height);
        }
        
        const maxRowsHeight = MAX_CONTENT_HEIGHT_PX - headerHeight - footerHeight;
        const pageGroups = splitIntoPages(rowElements, rowHeights, maxRowsHeight);
        
        const container = document.getElementById('invoiceContainer');
        container.innerHTML = '';
        
        for (let p = 0; p < pageGroups.length; p++) {
            const rowIndices = pageGroups[p];
            const isLastPage = (p === pageGroups.length - 1);
            
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'page-content-wrapper';
            
            const inner = document.createElement('div');
            inner.className = 'page-inner-content';
            
            const headerClone = document.createElement('div');
            headerClone.innerHTML = headerHTML;
            if (pageGroups.length > 1) {
                const titleSpan = headerClone.querySelector('.section-title');
                if (titleSpan) {
                    titleSpan.innerHTML = `تفاصيل المنتجات / الخدمات (صفحة ${p+1} من ${pageGroups.length})`;
                }
            }
            inner.appendChild(headerClone);
            
            const table = document.createElement('table');
            table.className = 'product-table';
            const thead = document.createElement('thead');
            thead.innerHTML = `<tr><th>اسم المنتج</th><th>الصورة</th><th>الباركود</th><th>الوصف</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالي</th></tr>`;
            table.appendChild(thead);
            const tbody = document.createElement('tbody');
            for (const idx of rowIndices) {
                tbody.appendChild(rowElements[idx].cloneNode(true));
            }
            table.appendChild(tbody);
            inner.appendChild(table);
            
            // ===== إضافة الملخص في الصفحة الأخيرة (دائماً) =====
            if (isLastPage) {
                const summaryClone = document.createElement('div');
                summaryClone.innerHTML = summaryHTML;
                inner.appendChild(summaryClone);
                console.log('✅ تم إضافة الملخص إلى الصفحة', p + 1);
            }
            
            const footerClone = document.createElement('div');
            footerClone.innerHTML = footerHTML;
            inner.appendChild(footerClone);
            
            wrapper.appendChild(inner);
            
            const spacer = document.createElement('div');
            spacer.className = 'bottom-spacer';
            wrapper.appendChild(spacer);
            
            pageDiv.appendChild(wrapper);
            
            const pageNumber = document.createElement('div');
            pageNumber.className = 'page-number';
            pageNumber.textContent = `صفحة ${p+1} / ${pageGroups.length}`;
            pageDiv.appendChild(pageNumber);
            
            container.appendChild(pageDiv);
        }
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('invoiceContainer').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
        
        document.getElementById('printBtn').onclick = () => window.print();
        document.getElementById('pdfBtn').onclick = () => exportPDF();
        document.getElementById('pngBtn').onclick = () => exportPNG();
        
        if (autoAction === 'print') setTimeout(() => window.print(), 500);
        else if (autoAction === 'pdf') setTimeout(() => exportPDF(), 500);
        else if (autoAction === 'png') setTimeout(() => exportPNG(), 500);
    }
    
    async function exportPDF() {
        const element = document.getElementById('invoiceContainer');
        if (!element) return;
        const btn = document.getElementById('pdfBtn');
        btn.disabled = true;
        showLoading();
        try {
            const opt = {
                margin: [0, 0, 0, 0],
                filename: `${currentFileName}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true, logging: false, dpi: 300 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true }
            };
            await html2pdf().set(opt).from(element).save();
        } catch (error) {
            console.error(error);
            alert('حدث خطأ أثناء تصدير PDF');
        } finally {
            btn.disabled = false;
            hideLoading();
        }
    }
    
    async function exportPNG() {
        const element = document.getElementById('invoiceContainer');
        if (!element) return;
        const btn = document.getElementById('pngBtn');
        btn.disabled = true;
        showLoading();
        try {
            const canvas = await html2canvas(element, { scale: 3, backgroundColor: '#ffffff', useCORS: true, logging: false });
            const link = document.createElement('a');
            link.download = `${currentFileName}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (error) {
            console.error(error);
            alert('حدث خطأ أثناء تصدير الصورة');
        } finally {
            btn.disabled = false;
            hideLoading();
        }
    }
    
    renderInvoice();
</script>
</body>
</html>
