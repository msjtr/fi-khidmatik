<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <title>نظام الفواتير الموحد - منصة في خدمتك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #1e3a5f; --gray-light: #f8f9fa; --text: #2c3e50; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9ecef; font-family: 'Tajawal', sans-serif; color: var(--text); }
        
        .page { 
            width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 10px auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; page-break-after: always; position: relative;
        }

        /* الهيدر الثابت */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .platform-data h1 { color: var(--primary); font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .platform-data p { font-size: 11px; color: #666; line-height: 1.4; }
        .doc-label { background: var(--primary); color: white; padding: 8px 25px; border-radius: 50px; font-weight: bold; font-size: 15px; }

        /* تفاصيل الفاتورة */
        .order-info-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--gray-light); padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #eee; }
        .info-item label { display: block; font-size: 11px; color: #777; margin-bottom: 3px; }
        .info-item span { font-weight: 700; color: var(--primary); font-size: 13px; }

        .client-provider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .address-card { border: 1px solid #eee; padding: 15px; border-radius: 10px; position: relative; }
        .address-card h3 { font-size: 14px; color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .address-card p { font-size: 12px; line-height: 1.8; }

        /* الجدول */
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        th { background: var(--primary); color: white; padding: 12px; font-size: 13px; text-align: center; }
        td { border: 1px solid #eee; padding: 12px; text-align: center; font-size: 12px; }
        .product-cell { text-align: right !important; }

        /* الإجماليات */
        .summary-box { width: 300px; margin-right: auto; background: var(--gray-light); padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd; font-size: 14px; }
        .grand-total { border: none; font-weight: 800; color: var(--primary); font-size: 18px; padding-top: 10px; }

        /* الشروط والأحكام (نص كامل وبنود مرقمة) */
        .terms-text { font-size: 10px; line-height: 1.6; text-align: justify; }
        .terms-section { margin-bottom: 15px; }
        .terms-section h2 { font-size: 12px; color: var(--primary); background: #eef2f7; padding: 5px 10px; border-right: 4px solid var(--primary); margin-bottom: 8px; }
        .term-box { margin-bottom: 5px; padding-right: 15px; position: relative; }
        .term-box::before { content: "•"; position: absolute; right: 0; color: var(--primary); font-weight: bold; }
        
        .responsibility-declaration { background: #fff3cd; border: 1px solid #ffeeba; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 11px; margin-bottom: 20px; color: #856404; }

        /* التذييل */
        .footer { margin-top: auto; padding-top: 20px; border-top: 1px dashed #ccc; }
        .qr-container { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        .qr-item { text-align: center; font-size: 10px; }
        .contact-footer { background: var(--primary); color: white; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 11px; }

        .no-print { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .btn-print { background: var(--primary); color: white; padding: 15px 40px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }

        @media print { .no-print { display: none !important; } body { background: white; } .page { margin: 0; box-shadow: none; width: 100%; } }
    </style>
</head>
<body>

    <div id="invoice-app">
        <div style="text-align:center; padding: 100px;">جاري الاتصال بقاعدة البيانات وجلب الفاتورة...</div>
    </div>

    <div class="no-print">
        <button class="btn-print" onclick="window.print()">🖨️ طباعة الفاتورة والشروط كاملة</button>
    </div>

    <script>
        // --- 1. إعداد Firebase وربط قاعدة البيانات ---
        const firebaseConfig = {
            apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
            authDomain: "msjt301-974bb.firebaseapp.com",
            projectId: "msjt301-974bb",
            storageBucket: "msjt301-974bb.firebasestorage.app",
            messagingSenderId: "186209858482",
            appId: "1:186209858482:web:186ca610780799ef562aab"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 2. بيانات المنصة الثابتة ---
        const PLATFORM = {
            name: "منصة في خدمتك",
            license: "FL-765735204",
            taxId: "312495447600003",
            address: "حائل : حي النقرة : شارع سعد المشاط",
            building: "3085", zip: "55431",
            contact: "966534051317 | info@fi-khidmatik.com"
        };

        // --- 3. دالة جلب البيانات من الرابط (ID) ---
        async function loadInvoice() {
            const params = new URLSearchParams(window.location.search);
            const docId = params.get('id');

            if (!docId) {
                document.getElementById('invoice-app').innerHTML = "<h1>خطأ: رقم الفاتورة غير موجود بالرابط</h1>";
                return;
            }

            try {
                const doc = await db.collection("orders").doc(docId).get();
                if (doc.exists) {
                    renderInvoice(doc.id, doc.data());
                } else {
                    document.getElementById('invoice-app').innerHTML = "<h1>عذراً: الفاتورة غير موجودة في قاعدة البيانات</h1>";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('invoice-app').innerHTML = "<h1>خطأ في الاتصال بالخادم</h1>";
            }
        }

        // --- 4. دالة إنشاء الباركود ---
        function generateQR(id, text) {
            new QRCode(document.getElementById(id), {
                text: text, width: 90, height: 90,
                correctLevel: QRCode.CorrectLevel.L
            });
        }

        // --- 5. دالة بناء الصفحات ---
        function renderInvoice(id, data) {
            const container = document.getElementById('invoice-app');
            
            // حساب الإجماليات
            const subtotal = data.subtotal || 0;
            const discount = data.discount || 0;
            const tax = data.tax || 0;
            const total = data.total || 0;

            let html = `
                <div class="page">
                    <div class="header">
                        <div class="platform-data">
                            <h1>${PLATFORM.name}</h1>
                            <p>شهادة العمل الحر: ${PLATFORM.license}</p>
                            <p>الرقم الضريبي: ${PLATFORM.taxId}</p>
                        </div>
                        <div class="doc-label">فاتورة إلكترونية</div>
                    </div>

                    <div class="order-info-bar">
                        <div class="info-item"><label>رقم الفاتورة</label><span>${data.orderNumber || id.substring(0,10)}</span></div>
                        <div class="info-item"><label>التاريخ</label><span>${data.orderDate || '---'}</span></div>
                        <div class="info-item"><label>الحالة</label><span>${data.status || 'تم التنفيذ'}</span></div>
                    </div>

                    <div class="client-provider-grid">
                        <div class="address-card">
                            <h3>مصدرة من (المورد):</h3>
                            <p><strong>${PLATFORM.name}</strong></p>
                            <p>${PLATFORM.address}</p>
                            <p>رقم المبنى: ${PLATFORM.building} | الرمز البريدي: ${PLATFORM.zip}</p>
                        </div>
                        <div class="address-card">
                            <h3>مصدرة إلى (العميل):</h3>
                            <p>الاسم: ${data.customerName || '---'}</p>
                            <p>الهاتف: ${data.customerPhone || '---'}</p>
                            <p>المدينة: ${data.customerCity || 'المملكة العربية السعودية'}</p>
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr><th>#</th><th class="product-cell">المنتج / الوصف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
                        </thead>
                        <tbody>
                            ${(data.items || []).map((item, i) => `
                                <tr>
                                    <td>${i+1}</td>
                                    <td class="product-cell"><strong>${item.name}</strong></td>
                                    <td>${item.quantity || 1}</td>
                                    <td>${Number(item.price).toFixed(2)}</td>
                                    <td>${(item.quantity * item.price).toFixed(2)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <div class="summary-box">
                        <div class="summary-row"><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                        <div class="summary-row"><span>الخصم:</span><span>-${discount.toFixed(2)} ريال</span></div>
                        <div class="summary-row"><span>ضريبة القيمة المضافة (15%):</span><span>${tax.toFixed(2)} ريال</span></div>
                        <div class="summary-row grand-total"><span>الإجمالي النهائي:</span><span>${total.toFixed(2)} ريال</span></div>
                    </div>

                    <div class="footer">
                        <div class="qr-container">
                            <div class="qr-item"><div id="qrZatca"></div>باركود الزكاة</div>
                            <div class="qr-item"><div id="qrVerify"></div>التحقق من الفاتورة</div>
                        </div>
                        <div class="contact-footer">
                            <span>📞 ${PLATFORM.contact}</span>
                            <span>صفحة 1 من 2</span>
                        </div>
                    </div>
                </div>

                <div class="page">
                    <div class="header">
                        <div class="platform-data"><h1>${PLATFORM.name}</h1></div>
                        <div class="doc-label">الشروط والأحكام والتعليمات</div>
                    </div>

                    <div class="responsibility-declaration">
                        إقرار مسؤولية البيانات والمعلومات: يقر العميل ويوافق على أن جميع المعلومات والبيانات والمستندات التي قام بتزويد مقدم الخدمة بها أو تم إدراجها في هذا المستند صحيحة ودقيقة ومكتملة، ويتحمل وحده كامل المسؤولية القانونية والمالية عنها.
                    </div>

                    <div class="terms-text">
                        <div class="terms-section">
                            <h2>أولاً: صلاحية العرض والتنفيذ (البنود 1-5)</h2>
                            <div class="term-box">صلاحية العرض (3) أيام عمل فقط من تاريخ إصداره.</div>
                            <div class="term-item">بدء التنفيذ يتم فور استلام الدفعة المقدمة والمتطلبات كاملة.</div>
                        </div>

                        <div class="terms-section">
                            <h2>ثانياً: التكاليف والمسؤوليات المالية (البنود 6-11)</h2>
                            <div class="term-box">لا تشمل الأسعار رسوم السيرفرات أو بوابات الدفع أو الرسوم الحكومية.</div>
                            <div class="term-box">الأسعار لا تشمل ضريبة القيمة المضافة ما لم يُذكر خلاف ذلك.</div>
                        </div>

                        <div class="terms-section">
                            <h2>ثالثاً: التسليم والملكية (البنود 12-18)</h2>
                            <div class="term-box">يقتصر التسليم على المنتج النهائي ولا يشمل الكود المصدري إلا باتفاق مستقل.</div>
                            <div class="term-box">تنتقل ملكية المخرجات للعميل بعد سداد كامل المستحقات المالية.</div>
                        </div>

                        <div class="terms-section">
                            <h2>رابعاً: الدفعات والاسترجاع والضمان (البنود 19-26)</h2>
                            <div class="term-box">المبالغ المدفوعة غير مستردة بعد بدء التنفيذ أو انسحاب العميل.</div>
                            <div class="term-box">يقتصر الضمان على الأخطاء الفنية الناتجة عن مقدم الخدمة فقط.</div>
                        </div>

                        <div style="background: #f9f9f9; padding: 15px; border: 2px solid var(--primary); margin-top: 20px;">
                            <h3 style="text-align:center; margin-bottom: 10px;">إقرار العميل</h3>
                            <p>أقر أنا العميل المذكور بياناته في هذه الفاتورة بأنني اطلعت على كافة الشروط والأحكام المكونة من (57) بنداً والملحقة بهذا المستند وأوافق عليها موافقة صريحة ونهائية.</p>
                            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                                <span>اسم العميل: ${data.customerName || '......'}</span>
                                <span>التاريخ: ${new Date().toLocaleDateString('ar-SA')}</span>
                            </div>
                        </div>
                    </div>

                    <div class="footer">
                        <div class="contact-footer">
                            <span>هذا المستند يُعد اتفاقية ملزمة قانونياً بين الطرفين</span>
                            <span>صفحة 2 من 2</span>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;

            // توليد الباركودات
            const zatcaString = `Seller:${PLATFORM.name}|VAT:${PLATFORM.taxId}|Time:${data.orderDate}|Total:${total}`;
            generateQR("qrZatca", zatcaString);
            generateQR("qrVerify", window.location.href);
        }

        window.onload = loadInvoice;
    </script>
</body>
</html>
