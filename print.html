    function showLoading() {
        let ov = document.getElementById('loadingOverlay');
        if (!ov) {

            `;

        ov.style.display = 'flex';

    function hideLoading() {
        let ov = document.getElementById('loadingOverlay');
        if (ov) ov.style.display = 'none';
    }

    function showToast(msg, isError = false) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isError ? '#ef4444' : '#10b981';
        t.innerHTML = (isError ? '❌ ' : '✅ ') + msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function formatDate(d) {
        if (!d) return '';
        let parts = d.split('-');
        return parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : d;
    }

    function formatTime(time24) {
        if (!time24) return '';
        let [h, m] = time24.split(':');
        let hour = parseInt(h);
        let ap = hour >= 12 ? 'مساءً' : 'صباحاً';
        hour = hour % 12 || 12;
        return `${hour}:${m} ${ap}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getStatusClass(status) {
        const classes = {
            'جديد': 'status-new',
            'تحت التنفيذ': 'status-processing',
            'تم التنفيذ': 'status-completed',
            'ملغي': 'status-cancelled'
        };
        return classes[status] || 'status-new';
    }

    function getShippingText(method) {
        if (method === 'delivery') return '🚚 شحن منزلي';
        if (method === 'noship') return '📥 لا يتطلب شحن';
        return '🏪 استلام من المقر';
    }

    function getPaymentName(method) {
        const names = {
            'mada': 'مدى', 'mastercard': 'ماستركارد', 'visa': 'فيزا',
            'stcpay': 'STCPay', 'tamara': 'تمارا', 'tabby': 'تابي'
        };
        return names[method] || method || 'مدى';
    }

    async function fetchOrder(orderId) {
        console.log('جاري جلب الطلب:', orderId);
        
        const orderDoc = await db.collection('orders').doc(orderId).get();
        if (!orderDoc.exists) throw new Error('الطلب غير موجود');
        
        const order = { id: orderDoc.id, ...orderDoc.data() };
        
        let customer = { name: 'غير معروف', phone: '', email: '', address: '' };
        if (order.customerId) {
            try {
                const customerDoc = await db.collection('customers').doc(order.customerId).get();
                if (customerDoc.exists) customer = customerDoc.data();
            } catch(e) { console.warn(e); }
        }
        
        const items = [];
        for (const item of (order.items || [])) {
            let productImage = item.image || '';
            let productName = item.name || 'منتج';
            let productDesc = item.description || '';
            
            if (item.productId && item.productId !== 'null' && !item.productId.startsWith('temp_')) {
                try {
                    const productDoc = await db.collection('products').doc(item.productId).get();
                    if (productDoc.exists) {
                        const product = productDoc.data();
                        productImage = product.image || productImage;
                        productName = product.name || productName;
                        productDesc = product.description || productDesc;
                    }
                } catch(e) { console.warn(e); }
            }
            
            items.push({
                ...item,
                productName: productName,
                description: productDesc,
                image: productImage,
                price: item.price || 0
            });
        }
        
        return {
            ...order,
            customerName: customer.name,
            customerPhone: customer.phone,
            customerEmail: customer.email,
            customerAddress: customer.address || '',
            items: items,
            paymentMethodName: getPaymentName(order.paymentMethod)
        };
    }

                        '<div class="w-14 h-14 bg-gray-100 rounded-lg mx-auto flex items-center justify-center"><i class="fas fa-image text-gray-400 text-xl"></i></div>'
                    }
                </td>
                <td class="p-3">
                    <strong class="text-gray-800">${escapeHtml(item.productName)}</strong><br>
                    <small class="text-gray-500 text-xs">${escapeHtml(item.description)}</small>
                </td>
                <td class="p-3 text-center">${item.quantity}</td>
                <td class="p-3 text-center">${(item.price || 0).toFixed(2)} ريال</td>
                <td class="p-3 text-center font-semibold">${((item.price || 0) * item.quantity).toFixed(2)} ريال</td>
            </tr>

        const subtotal = order.subtotal || order.items?.reduce((s, i) => s + ((i.price || 0) * i.quantity), 0) || 0;
        const discount = order.discount || 0;
        const tax = order.tax || ((subtotal - discount) * 0.15);
        const total = order.total || (subtotal - discount + tax);

                    </div>
                </div>
                
                <div class="p-6">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 p-4 bg-gray-50 rounded-xl">
                        <div><div class="text-xs text-gray-500 mb-1">رقم الفاتورة</div><div class="font-bold text-blue-600">${order.orderNumber}</div></div>
                        <div><div class="text-xs text-gray-500 mb-1">التاريخ</div><div class="font-semibold">${formatDate(order.orderDate)}</div><div class="text-xs text-gray-500">${formatTime(order.orderTime)}</div></div>
                        <div><div class="text-xs text-gray-500 mb-1">الحالة</div><div class="status-badge ${getStatusClass(order.status)}">${order.status || 'مكتمل'}</div></div>
                        <div><div class="text-xs text-gray-500 mb-1">طريقة الدفع</div><div class="font-semibold">${order.paymentMethodName}</div></div>
                    </div>
                    
                    <div class="grid md:grid-cols-2 gap-4 mb-6">
                        <div class="border rounded-xl p-4 bg-gray-50">
                            <div class="font-bold text-blue-600 mb-2"><i class="fas fa-building ml-2"></i>مصدرة من</div>
                            <div class="text-sm">${sellerData.name}<br>المملكة العربية السعودية<br>${sellerData.address}<br>📞 ${sellerData.phone}<br>✉️ ${sellerData.email}</div>
                        </div>
                        <div class="border rounded-xl p-4 bg-gray-50">
                            <div class="font-bold text-blue-600 mb-2"><i class="fas fa-user ml-2"></i>مصدرة إلى</div>
                            <div class="text-sm">${escapeHtml(order.customerName)}<br>${escapeHtml(order.customerAddress)}<br>📞 ${escapeHtml(order.customerPhone)}<br>✉️ ${escapeHtml(order.customerEmail)}</div>
                        </div>
                    </div>
                    
                    <div class="mb-6 p-3 bg-gray-100 rounded-lg text-center text-sm">
                        <i class="fas fa-truck ml-2"></i> طريقة الاستلام: ${getShippingText(order.shippingMethod)}
                        ${order.approvalCode ? `<span class="mr-4"><i class="fas fa-check-circle ml-1 text-green-600"></i> رمز الموافقة: ${order.approvalCode}</span>` : ''}
                    </div>
                    
                    <div class="overflow-x-auto mb-6">
                        <table class="w-full border-collapse">
                            <thead><tr class="bg-gray-100">
                                <th class="p-3 border text-center">#</th><th class="p-3 border text-center">الصورة</th>
                                <th class="p-3 border text-right">المنتج</th><th class="p-3 border text-center">الكمية</th>
                                <th class="p-3 border text-center">السعر</th><th class="p-3 border text-center">الإجمالي</th>
                            </tr></thead>
                            <tbody>${itemsHtml}</tbody>
                        </table>
                    </div>
                    
                    <div class="flex justify-end">
                        <div class="w-80">
                            <div class="flex justify-between py-2 text-sm"><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                            ${discount > 0 ? `<div class="flex justify-between py-2 text-sm"><span>الخصم:</span><span class="text-red-600">- ${discount.toFixed(2)} ريال</span></div>` : ''}
                            <div class="flex justify-between py-2 text-sm"><span>ضريبة القيمة المضافة 15%:</span><span>${tax.toFixed(2)} ريال</span></div>
                            <div class="flex justify-between py-3 border-t-2 border-blue-600 font-bold text-lg"><span>الإجمالي النهائي:</span><span class="text-green-600">${total.toFixed(2)} ريال</span></div>
                        </div>
                    </div>
                    
                    <div class="flex justify-center gap-8 mt-8 p-4 bg-gray-50 rounded-xl">
                        <div class="text-center"><div id="zatcaQR" class="w-24 h-24 mx-auto"></div><p class="text-xs text-gray-500 mt-2">باركود هيئة الزكاة</p></div>
                        <div class="text-center"><div id="orderQR" class="w-24 h-24 mx-auto"></div><p class="text-xs text-gray-500 mt-2">باركود الطلب</p></div>
                    </div>
                    
                    <div class="text-center text-xs text-gray-500 mt-8 pt-4 border-t">
                        <div class="flex justify-center gap-4 flex-wrap mb-2">
                            <span>📞 ${sellerData.phone}</span>
                            <span>💬 ${sellerData.whatsapp}</span>
                            <span>✉️ ${sellerData.email}</span>
                            <span>🌐 ${sellerData.website}</span>
                        </div>
                        <div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
                    </div>
                </div>
            </div>
        `;
    }

    function generateZATCAQRData(order) {
        const timestamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');
        const total = (order.total || 0).toFixed(2);
        const tax = (order.tax || ((order.subtotal || 0) * 0.15)).toFixed(2);
        
        let tlvData = '';
        tlvData += String.fromCharCode(1) + String.fromCharCode(1) + '1';
        tlvData += String.fromCharCode(2) + String.fromCharCode(15) + sellerData.taxNumber;
        tlvData += String.fromCharCode(3) + String.fromCharCode(timestamp.length) + timestamp;
        tlvData += String.fromCharCode(4) + String.fromCharCode(total.length) + total;
        tlvData += String.fromCharCode(5) + String.fromCharCode(tax.length) + tax;
        
        return btoa(tlvData);
    }

    async function loadInvoice() {
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        
        if (!orderId || orderId === 'null') {
            document.getElementById('invoiceRoot').innerHTML = `<div class="bg-white rounded-2xl shadow-xl p-12 text-center"><i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i><h2 class="text-2xl font-bold">خطأ</h2><p>لم يتم تحديد رقم الطلب</p></div>`;
            return;
        }
        
        showLoading();
        
        try {
            const order = await fetchOrder(orderId);
            currentOrder = order;
            
            // دمج الفاتورة + الشروط والأحكام
            const fullHTML = buildInvoiceHTML(order) + termsHTML;
            document.getElementById('invoiceRoot').innerHTML = fullHTML;
            
            // تحديث اسم العميل والتاريخ في الشروط
            const customerNameSpans = document.querySelectorAll('.customer-name-terms');
            const customerDateSpans = document.querySelectorAll('.customer-date-terms');
            customerNameSpans.forEach(span => span.textContent = order.customerName);
            customerDateSpans.forEach(span => span.textContent = `${formatDate(order.orderDate)} - ${formatTime(order.orderTime)}`);
            
            // إنشاء QR Codes
            setTimeout(() => {
                const zatcaDiv = document.getElementById('zatcaQR');
                if (zatcaDiv && typeof QRCode !== 'undefined') {
                    try { new QRCode(zatcaDiv, { text: generateZATCAQRData(order), width: 100, height: 100 }); } catch(e) {}
                }
                const orderDiv = document.getElementById('orderQR');
                if (orderDiv && typeof QRCode !== 'undefined') {
                    try { new QRCode(orderDiv, { text: window.location.href, width: 100, height: 100 }); } catch(e) {}
                }
            }, 100);
            
            showToast('تم تحميل الفاتورة بنجاح');
        } catch (error) {
            document.getElementById('invoiceRoot').innerHTML = `<div class="bg-white rounded-2xl shadow-xl p-12 text-center"><i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i><h2>خطأ</h2><p>${error.message}</p><button onclick="location.reload()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg">إعادة المحاولة</button></div>`;
            showToast(error.message, true);
        } finally {
            hideLoading();
        }
    }

    async function generatePDF() {
        const pages = document.querySelectorAll('.invoice-page, .terms-page');
        if (!pages.length) { showToast('لا توجد فاتورة للتصدير', true); return; }
        
        showLoading();
        
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 2, useCORS: false, backgroundColor: '#ffffff', logging: false, allowTaint: true });
                if (i !== 0) pdf.addPage();
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            }
            
            pdf.save(`فاتورة_${currentOrder?.orderNumber || 'invoice'}.pdf`);
            showToast('تم حفظ PDF بنجاح');
        } catch(error) {
            showToast('خطأ في إنشاء PDF: ' + error.message, true);
        } finally {
            hideLoading();
        }
    }

    document.getElementById('pdfBtn').onclick = generatePDF;
    loadInvoice();
</script>
</body>
</html>
