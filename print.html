<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>في خدمتك - فاتورة إلكترونية</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9ecef; font-family: 'Segoe UI', 'Cairo', 'Tahoma', sans-serif; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .invoice-wrapper { max-width: 210mm; margin: 0 auto; background: white; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); border-radius: 8px; }
        .invoice-page, .terms-section-page { width: 210mm; min-height: 297mm; background: white; padding: 15mm 12mm; page-break-after: always; break-inside: avoid; position: relative; }
        .header-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #1e3a5f; padding-bottom: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 65px; height: 65px; object-fit: contain; }
        .platform-name { font-size: 20px; font-weight: bold; color: #1e3a5f; }
        .platform-slogan { font-size: 10px; color: #6c757d; }
        .invoice-title { font-size: 24px; font-weight: bold; color: #1e3a5f; }
        .legal-numbers { text-align: left; font-size: 10px; color: #4a5568; line-height: 1.5; }
        .info-row { display: flex; justify-content: space-between; background: #f8fafc; padding: 12px 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #e2e8f0; }
        .status-badge { background: #10b981; color: white; padding: 4px 12px; border-radius: 30px; font-size: 11px; display: inline-block; }
        .addresses { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .address-box { flex: 1; background: #f9f9fb; padding: 15px; border-radius: 14px; border: 1px solid #e9ecef; font-size: 11px; line-height: 1.7; }
        .address-box strong { display: block; margin-bottom: 10px; color: #1e3a5f; border-right: 3px solid #1e3a5f; padding-right: 8px; }
        .payment-approval { display: flex; gap: 15px; margin: 15px 0; }
        .payment-box, .approval-box { flex: 1; background: #f1f5f9; padding: 10px 12px; border-radius: 10px; font-size: 11px; }
        .payment-box strong, .approval-box strong { display: block; margin-bottom: 5px; color: #1e3a5f; }
        .invoice-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 11px; }
        .invoice-table th { background: #1e3a5f; color: white; padding: 10px 8px; border: 1px solid #2d4a7a; text-align: center; }
        .invoice-table td { border: 1px solid #cbd5e1; padding: 10px 8px; vertical-align: middle; }
        .product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; background: #f1f5f9; }
        .totals { width: 280px; margin-right: auto; margin-top: 20px; border-top: 2px solid #e2e8f0; padding-top: 12px; }
        .totals div { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; }
        .grand-total { font-weight: bold; font-size: 16px; color: #1e3a5f; border-top: 2px solid #1e3a5f; margin-top: 6px; padding-top: 10px; }
        .barcodes-container { display: flex; justify-content: center; margin: 20px 0; padding: 15px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; }
        .qr-placeholder { width: 100px; height: 100px; }
        .footer-note { margin-top: 30px; font-size: 10px; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 15px; }
        .contact-info { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin: 12px 0; padding: 10px; background: #f1f5f9; border-radius: 10px; }
        .page-number { text-align: left; font-size: 10px; color: #94a3b8; margin-top: 12px; direction: ltr; }
        .action-buttons { display: flex; justify-content: center; gap: 15px; margin: 20px auto; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 25px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; }
        .btn { padding: 8px 20px; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-secondary { background: #334155; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        @media print { body { background: white; padding: 0; margin: 0; } .action-buttons { display: none !important; } .invoice-page, .terms-section-page { page-break-after: always; } }
        .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .loading-box { background: white; padding: 30px; border-radius: 16px; text-align: center; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1e3a5f; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast-message { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: #10b981; color: white; border-radius: 8px; z-index: 10000; font-size: 14px; }
        .terms-main-container { width: 100%; }
        .main-title { color: #1e3a5f; font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #1e3a5f; padding-bottom: 10px; }
        .legal-intro { background: #fef3c7; padding: 18px; border-radius: 12px; margin-bottom: 30px; border-right: 5px solid #f59e0b; font-size: 12px; line-height: 1.8; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .col { display: flex; flex-direction: column; gap: 20px; }
        .terms-block { background: #fafafa; padding: 16px 18px; border-radius: 14px; border: 1px solid #e5e7eb; break-inside: avoid; page-break-inside: avoid; }
        .terms-block h3 { background: #1e3a5f; color: white; padding: 6px 16px; border-radius: 30px; font-size: 14px; margin-bottom: 14px; display: inline-block; }
        .terms-block p { font-size: 11px; line-height: 1.85; color: #2d3a4a; margin-bottom: 8px; }
        .declaration { background: #f0f4f9; padding: 20px; border-radius: 14px; text-align: center; margin: 20px 0; }
        .declaration p { font-size: 13px; font-weight: bold; }
        .signature { display: flex; justify-content: space-between; margin-top: 25px; padding-top: 20px; border-top: 1px solid #cbd5e1; }
        @media (max-width: 768px) { .invoice-page { padding: 8mm 6mm; } .addresses, .payment-approval { flex-direction: column; } .action-buttons { gap: 8px; padding: 8px 15px; } .btn { padding: 6px 12px; font-size: 12px; } .two-columns { grid-template-columns: 1fr; gap: 15px; } }
    </style>
</head>
<body>
<div class="invoice-wrapper" id="invoiceRoot"></div>

</div>

<script>

    let orderData = {

    // محتوى الشروط (الصفحة الأولى)

            ويعتبر اعتماد العميل أو سداد أي دفعة أو بدء التنفيذ إقرارًا صريحًا ونهائيًا

        </div>
        <div class="two-columns">
            <div class="col">
                <div class="terms-block"><h3>أولاً: صلاحية العرض والتنفيذ</h3>
                    <p><strong>1.</strong> مدة صلاحية العرض: 3 أيام عمل فقط.<br><strong>2.</strong> بدء التنفيذ بعد استلام الدفعة المقدمة والمتطلبات.<br><strong>3.</strong> مدة التنفيذ تحتسب من اكتمال المتطلبات.<br><strong>4.</strong> لا مسؤولية عن تأخير خارج الإرادة.<br><strong>5.</strong> الموافقات الخارجية وفق سياسات الجهات.</p>

                    <p><strong>11.</strong> التسليم حسب النطاق المحدد.<br><strong>12.</strong> المنتج النهائي فقط.<br><strong>13.</strong> الكود المصدري ملكية حصرية لمقدم الخدمة.<br><strong>14.</strong> نقل الملكية باتفاق وسداد كامل.<br><strong>15.</strong> عدم طلب التسليم يلغي الالتزام.<br><strong>16.</strong> حق إعادة الاستخدام محفوظ.</p>

                </div>
            </div>
            <div class="col">
                <div class="terms-block"><h3>خامساً: الضمان</h3>
                    <p><strong>23.</strong> الضمان حسب طبيعة المشروع.<br><strong>24.</strong> يقتصر على الأخطاء الفنية لمقدم الخدمة.<br><strong>25.</strong> استثناءات: سوء استخدام أو تعديلات خارجية.</p>
                </div>
                <div class="terms-block"><h3>سادساً: انتهاء العلاقة والمسؤولية</h3>
                    <p><strong>26.</strong> تنتهي العلاقة بعد التسليم.<br><strong>27.</strong> لا مسؤولية لاحقة.<br><strong>28.</strong> تشغيل المشروع على العميل.<br><strong>29.</strong> حفظ النسخ الاحتياطية على العميل.<br><strong>30.</strong> براءة ذمة من خدمات الأطراف الثالثة.</p>

                <div class="terms-block"><h3>سابعاً: التواصل والتنفيذ</h3>
                    <p><strong>31.</strong> وسائل التواصل الرسمية فقط.<br><strong>32.</strong> التفويض بإشعار رسمي.<br><strong>33.</strong> النسخ الإلكترونية معتمدة قانونياً.</p>
                </div>
                <div class="terms-block"><h3>ثامناً: البنود القانونية</h3>
                    <p><strong>34.</strong> علاقة تعاقدية مستقلة.<br><strong>35.</strong> كامل الاتفاق.<br><strong>36.</strong> الأخطاء غير المقصودة لا تبطل البنود.<br><strong>37.</strong> عدم التنازل عن الحقوق.<br><strong>38.</strong> اللغة العربية المعتمدة.</p>
                </div>
            </div>
        </div>
    </div>`;

    // محتوى الشروط (الصفحة الثانية مع الإقرار)
    const termsPage2Content = `
    <div class="terms-main-container">
        <div class="main-title">📜 الشروط والأحكام (تابع)</div>
        <div class="two-columns">
            <div class="col">
                <div class="terms-block"><h3>تاسعاً: النزاعات</h3>
                    <p><strong>39.</strong> حل النزاعات ودياً.<br><strong>40.</strong> الجهة المختصة يحددها مقدم الخدمة.</p>
                </div>
                <div class="terms-block"><h3>عاشراً: البنود المتقدمة</h3>
                    <p><strong>41.</strong> القوة القاهرة.<br><strong>42.</strong> السرية.<br><strong>43.</strong> التعديلات خارج النطاق بعرض منفصل.<br><strong>44.</strong> التوقف المؤقت عند عدم تجاوب العميل.<br><strong>45.</strong> الاستلام الحكمي بعد 7 أيام.<br><strong>46.</strong> الاعتراض خلال 7 أيام كتابياً.</p>
                </div>
            </div>
            <div class="col">
                <div class="terms-block"><h3>حادي عشر: البنود المالية المتقدمة</h3>
                    <p><strong>47.</strong> المدفوعات الخارجية غير مستحقة لمقدم الخدمة.<br><strong>48.</strong> المدفوعات بالنيابة ضمن تكاليف المشروع.<br><strong>49.</strong> تفسير البنود بما يحفظ حقوق مقدم الخدمة.<br><strong>50.</strong> حق رفض الخدمة أو إيقافها.</p>
                </div>
                <div class="terms-block"><h3>ثاني عشر: الحماية القانونية</h3>
                    <p><strong>51.</strong> التنازل عن المطالبات التي تتجاوز قيمة الفاتورة.<br><strong>52.</strong> حدود المسؤولية = إجمالي المبلغ المدفوع.<br><strong>53.</strong> لا مسؤولية عن الاستخدام غير المشروع.<br><strong>54.</strong> الملكية الفكرية محفوظة لمقدم الخدمة.<br><strong>55.</strong> حق تحديث الشروط مستقبلاً.<br><strong>56.</strong> استقلالية البنود.<br><strong>57.</strong> الشروط الإضافية توثق في ملحق مستقل.</p>
                </div>
            </div>
        </div>
        <div class="declaration">
            <p>أقر أنا العميل بالاطلاع على جميع الشروط والأحكام أعلاه وأوافق عليها بالكامل وأتعهد بالالتزام بها دون أي استثناء.</p>
        </div>
        <div class="signature">
            <div><strong>الاسم:</strong> _________________</div>
            <div><strong>التاريخ:</strong> _________________</div>
        </div>
        <div style="margin-top: 15px;"><strong>التوقيع:</strong> _________________</div>
    </div>`;

    function showLoading(msg) {
        let ov = document.getElementById('loadingOverlay');
        if (!ov) {
            ov = document.createElement('div');
            ov.id = 'loadingOverlay';
            ov.className = 'loading-overlay';
            ov.innerHTML = `<div class="loading-box"><div class="loading-spinner"></div><p id="loadingMsg">${msg}</p></div>`;
            document.body.appendChild(ov);
        }
        document.getElementById('loadingMsg').textContent = msg;
        ov.style.display = 'flex';
    }
    function hideLoading() { let ov = document.getElementById('loadingOverlay'); if(ov) ov.style.display = 'none'; }
    function showToast(msg) { let t = document.createElement('div'); t.className = 'toast-message'; t.textContent = msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

    function formatTime12(t) { if(!t) return ''; let [h,m]=t.split(':'); let hour=parseInt(h); let ap=hour>=12?'مساءً':'صباحاً'; hour=hour%12||12; return `${hour}:${m} ${ap}`; }
    function formatDateYMD(d) { if(!d) return ''; let p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; }
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function getShippingMethodText(method) {
        if (method === 'delivery') return 'شحن منزلي';
        if (method === 'pickup') return 'استلام من المقر';
        if (method === 'noship') return 'لا يحتاج شحن (منتج رقمي)';
        return method || 'غير محدد';
    }

    function buildHeader(title = "فاتورة إلكترونية") {
        return `<div class="header-top">
            <div class="logo-area"><img src="images/logo.svg" class="logo-img" onerror="this.src='https://placehold.co/65x65/1e3a5f/white?text=في+خدمتك'"><div><div class="platform-name">${sellerData.name}</div><div class="platform-slogan">خدمات تقنية متكاملة</div></div></div>
            <div class="invoice-title">${title}</div>
            <div class="legal-numbers"><div>رقم شهادة العمل الحر: ${sellerData.licenseNumber}</div><div>الرقم الضريبي: ${sellerData.taxNumber}</div></div>
        </div>`;
    }

    function buildFooter(pageNum, totalPages) {
        return `<div class="footer-note">
            <div class="contact-info"><span>📞 ${sellerData.phone}</span><span>💬 ${sellerData.whatsapp}</span><span>✉️ ${sellerData.email}</span><span>🌐 ${sellerData.website}</span></div>
            <div>هذه الفاتورة إلكترونية - نسخة معتمدة قانونياً</div>
            <div class="page-number">صفحة ${pageNum} من ${totalPages}</div>
        </div>`;
    }

    function buildInvoicePage() {
        const itemsHtml = (orderData.items || []).map((item, idx) => `
            <tr><td style="text-align:center">${idx+1}</td>
            <td style="text-align:center"><img src="${item.image}" class="product-img" crossorigin="anonymous" onerror="this.style.display='none'"></td>
            <td style="text-align:right"><strong>${escapeHtml(item.name)}</strong><br><small>${escapeHtml(item.description)}</small></td>
            <td style="text-align:center">${item.quantity}</td>
            <td style="text-align:center">${item.price.toFixed(2)} ريال</td>
            <td style="text-align:center">${(item.price*item.quantity).toFixed(2)} ريال</td>
         `).join('');
        const subtotal = orderData.subtotal || orderData.items.reduce((s,i)=>s+(i.price*i.quantity),0);
        const total = orderData.total || (subtotal - orderData.discount + orderData.tax);
        const shipText = getShippingMethodText(orderData.shippingMethod);
        return `<div class="invoice-page">
            ${buildHeader("فاتورة إلكترونية")}
            <div class="info-row">
                <div><strong>رقم الفاتورة:</strong> ${orderData.orderNumber}</div>
                <div><strong>التاريخ:</strong> ${formatDateYMD(orderData.orderDate)} - ${formatTime12(orderData.orderTime)}</div>
                <div><span class="status-badge">${orderData.status}</span></div>
            </div>
            <div class="addresses">
                <div class="address-box"><strong>مصدرة من</strong>${sellerData.name}<br>المملكة العربية السعودية<br>${sellerData.address}<br>📞 ${sellerData.phone}<br>✉️ ${sellerData.email}</div>
                <div class="address-box"><strong>مصدرة إلى</strong>${escapeHtml(orderData.customerName)}<br>${escapeHtml(orderData.customerAddress)}<br>📞 ${escapeHtml(orderData.customerPhone)}<br>✉️ ${escapeHtml(orderData.customerEmail)}</div>
            </div>
            <div class="payment-approval">
                <div class="payment-box"><strong>طريقة الدفع:</strong> ${orderData.paymentMethodName}</div>
                <div class="payment-box"><strong>طريقة الاستلام:</strong> ${shipText}</div>
                <div class="approval-box"><strong>رمز الموافقة:</strong> ${orderData.approvalCode}</div>
            </div>
            <table class="invoice-table"><thead><tr><th>#</th><th>الصورة</th><th>المنتج / الوصف</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالي</th></tr></thead><tbody>${itemsHtml}</tbody></table>
            <div class="totals">
                <div><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>
                <div><span>الخصم:</span><span>- ${orderData.discount.toFixed(2)} ريال</span></div>
                <div><span>ضريبة القيمة المضافة 15%:</span><span>${orderData.tax.toFixed(2)} ريال</span></div>
                <div class="grand-total"><span>الإجمالي النهائي:</span><span>${total.toFixed(2)} ريال</span></div>
            </div>
            <div class="barcodes-container"><div class="barcode-item"><div id="platformQR" class="qr-placeholder"></div></div></div>
            ${buildFooter(1, 3)}
        </div>`;
    }

    function renderCompleteInvoice() {
        showLoading('جاري تحميل الفاتورة...');
        
        const finalHtml = buildInvoicePage() + 
            `<div class="terms-section-page">${buildHeader("الشروط والأحكام")}${termsContent}${buildFooter(2, 3)}</div>` +
            `<div class="terms-section-page">${buildHeader("الشروط والأحكام (تابع)")}${termsPage2Content}${buildFooter(3, 3)}</div>`;
        
        document.getElementById('invoiceRoot').innerHTML = finalHtml;
        
        setTimeout(() => {
            const qr = document.getElementById('platformQR');
            if (qr && typeof QRCode !== 'undefined') {
                new QRCode(qr, { text: `https://${sellerData.website}`, width: 100, height: 100 });
            }
        }, 100);
        hideLoading();
    }

    async function generatePDF() {
        const root = document.getElementById('invoiceRoot');
        const pages = root.querySelectorAll('.invoice-page, .terms-section-page');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        showLoading('جاري إنشاء PDF...');
        try {
            for (let i = 0; i < pages.length; i++) {
                const canvas = await html2canvas(pages[i], { scale: 3, useCORS: true, backgroundColor: '#fff' });
                if (i !== 0) pdf.addPage();
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
            }
            pdf.save(`فاتورة_${orderData.orderNumber}.pdf`);
            showToast('تم حفظ PDF بنجاح');
        } catch(e) { showToast('خطأ في إنشاء PDF'); console.error(e); }
        finally { hideLoading(); }
    }

    document.getElementById('printBtn').onclick = () => window.print();
    document.getElementById('pdfBtn').onclick = generatePDF;
    
    // بدء التشغيل
    renderCompleteInvoice();
</script>
</body>
</html>
