<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة الفاتورة - منصة في خدمتك</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="css/invoice.css">

    <style>
        .control-panel { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
        .btn-action { font-family: 'Tajawal'; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-pdf { background: #1a1a1a; color: white; }
        #loader { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; font-family: 'Tajawal'; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media print { .control-panel { display: none !important; } }
    </style>
</head>
<body>

    <div class="control-panel">
        <button class="btn-action btn-pdf" onclick="window.downloadPDF()">📥 حفظ PDF</button>
        <button class="btn-action" onclick="window.print()">🖨️ طباعة</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-text">جاري تحميل المكتبات الأساسية...</p>
    </div>

    <div id="print-app"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // دالة لانتظار تحميل Firebase قبل البدء
        function initializeSystem() {
            if (typeof firebase !== 'undefined') {
                console.log("Firebase Ready ✅");
                const firebaseConfig = {
                    apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
                    authDomain: "msjt301-974bb.firebaseapp.com",
                    projectId: "msjt301-974bb",
                    storageBucket: "msjt301-974bb.firebasestorage.app",
                    messagingSenderId: "186209858482",
                    appId: "1:186209858482:web:186ca610780799ef562aab"
                };

                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                window.db = db;

                // تعريف الدالة المطلوبة عالمياً
                window.getDocument = async (col, id) => {
                    try {
                        const snap = await db.collection(col).doc(id).get();
                        return snap.exists ? { id: snap.id, ...snap.data(), success: true } : { success: false };
                    } catch (e) {
                        console.error("خطأ في جلب البيانات:", e);
                        return { success: false, error: e.message };
                    }
                };

                // إطلاق محرك الطباعة بعد التأكد من جاهزية الدالة
                startPrintEngine();
            } else {
                console.log("Waiting for Firebase...");
                setTimeout(initializeSystem, 100); // محاولة مرة أخرى بعد 100 ملي ثانية
            }
        }

        function startPrintEngine() {
            const script = document.createElement('script');
            script.type = 'module';
            script.src = 'js/print.js';
            document.body.appendChild(script);
            document.getElementById('loader-text').innerText = "جاري جلب بيانات الطلب...";
        }

        // بدء عملية الفحص
        initializeSystem();
    </script>
</body>
</html>
