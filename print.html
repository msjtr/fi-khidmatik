<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* التنسيقات العامة */
        :root { --primary: #1e3a5f; --gray-bg: #f4f7f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #e9ecef; }
        
        .page { 
            width: 210mm; min-height: 297mm; padding: 15mm; 
            margin: 20px auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; page-break-after: always;
        }

        /* ترويسة ثابتة لكل الصفحات [cite: 1, 2] */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; 
        }
        .header-info h1 { color: var(--primary); font-size: 22px; font-weight: 800; }
        .header-info p { font-size: 11px; color: #555; }
        .doc-label { background: var(--primary); color: white; padding: 5px 15px; border-radius: 20px; font-size: 13px; }

        /* تذييل ثابت لكل الصفحات [cite: 8] */
        .footer { margin-top: auto; padding-top: 15px; border-top: 1px dashed #ccc; font-size: 10px; }
        .contact-info { 
            background: var(--primary); color: white; padding: 8px; 
            border-radius: 5px; display: flex; justify-content: space-between; margin-top: 5px; 
        }
        
        /* تنسيق الشروط والأحكام [cite: 11, 12, 13] */
        .terms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 10px; }
        .section-h { background: var(--gray-bg); padding: 4px; font-weight: bold; color: var(--primary); margin-top: 10px; }
        
        @media print { .no-print { display: none; } body { background: white; } .page { margin: 0; width: 100%; box-shadow: none; } }
    </style>
</head>
<body>

    <div class="page">
        <div class="header">
            <div class="header-info">

                <p>رقم شهادة العمل الحر: FL-765735204 [cite: 1]</p>
                <p>الرقم الضريبي: 312495447600003 [cite: 1]</p>
            </div>
            <div class="doc-label">فاتورة إلكترونية</div>
        </div>
        
        <div class="footer">
            <p style="text-align:center">تخضع هذه الفاتورة لكامل الشروط والأحكام المرفقة [cite: 8]</p>
            <div class="contact-info">
