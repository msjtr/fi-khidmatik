<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاتورة إلكترونية</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#eef2f5; font-family:Cairo; padding:20px; }

.invoice {
    background:#fff;
    margin-bottom:30px;
    page-break-after:always;
    break-after:page;
    position:relative;
}

.invoice-content { padding:20px; }

.invoice-header {
    border-bottom:2px solid #1e3a5f;
    margin-bottom:15px;
}

.logo-img { height:60px; }

.page-number {
    position:absolute;
    bottom:10px;
    right:20px;
    font-size:12px;
    font-weight:bold;
}

.footer-static {
    text-align:center;
    margin-top:20px;
    font-size:12px;
    border-top:1px solid #ddd;
    padding-top:10px;
}

.terms-content {
    font-size:13px;
    line-height:1.8;
}

@media print {
    body { background:#fff; padding:0; }
    .invoice { margin:0; }
}
</style>
</head>

<body>

<div id="invoiceContainer"></div>

<script>

// ================= الفاتورة =================
function createInvoiceHTML(order) {

    return `
    <div class="invoice">
        <div class="invoice-content">

            <div class="invoice-header">
                <img src="images/logo.svg" class="logo-img">
                <h1>فاتورة إلكترونية</h1>
                <p>رقم الفاتورة: ${order.id}</p>
            </div>

            <p>اسم العميل: ${order.customer}</p>
            <p>المبلغ: ${order.total} ريال</p>

            <div class="footer-static">
                منصة في خدمتك
            </div>

            <div class="page-number">صفحة 1 من 3</div>

        </div>
    </div>
    `;
}

// ================= الصفحات الإضافية =================
function createTermsPages(order) {

    return `
    
    <!-- الصفحة الثانية -->
    <div class="invoice">
        <div class="invoice-content">

            <div class="invoice-header">
                <h2>الشروط والأحكام</h2>
            </div>

            <div class="terms-content">
                <h3>أولاً</h3>
                <p>مدة العرض 3 أيام.</p>
                <p>يبدأ التنفيذ بعد الدفع.</p>

                <h3>ثانياً</h3>
                <p>لا تشمل الرسوم الخارجية.</p>
            </div>

            <div class="footer-static">منصة في خدمتك</div>
            <div class="page-number">صفحة 2 من 3</div>

        </div>
    </div>

    <!-- الصفحة الثالثة -->
    <div class="invoice">
        <div class="invoice-content">

            <div class="invoice-header">
                <h2>تكملة الشروط</h2>
            </div>

            <div class="terms-content">
                <h3>الإقرار</h3>
                <p>أقر أنا العميل بالموافقة على جميع الشروط.</p>
            </div>

            <div class="footer-static">منصة في خدمتك</div>
            <div class="page-number">صفحة 3 من 3</div>

        </div>
    </div>
    `;
}

// ================= تشغيل =================
function render() {

    const order = {
        id: "INV-001",
        customer: "محمد",
        total: 5000
    };

    const invoiceHTML = createInvoiceHTML(order);
    const termsHTML = createTermsPages(order);

    document.getElementById("invoiceContainer").innerHTML =
        invoiceHTML + termsHTML;
}

render();

</script>

</body>
</html>
