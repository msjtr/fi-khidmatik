<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            direction: rtl;
            padding: 20px;
        }

        .invoice-container {
            max-width: 210mm;
            margin: 0 auto;
        }

        /* A4 Page - Strict dimensions */
        .page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            position: relative;
            page-break-after: always;
            break-after: page;
            display: flex;
            flex-direction: column;
        }

        /* Main content wrapper - respects top margin 20mm, bottom margin handled by flex spacing */
        .page-content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-top: 20mm;   /* Top margin: 20mm */
            padding-left: 15mm;  /* Right margin (RTL so left is right) */
            padding-right: 15mm; /* Left margin */
            position: relative;
        }

        /* Inner content - bottom margin 25mm is enforced by spacer */
        .page-inner-content {
            flex: 1;
        }

        /* Bottom spacer to enforce 25mm bottom margin */
        .bottom-margin-spacer {
            height: 25mm;
            width: 100%;
        }

        /* Page number - positioned within bottom margin */
        .page-number {
            position: absolute;
            bottom: 8mm;
            right: 15mm;
            font-size: 10px;
            color: #64748b;
            font-weight: 500;
            z-index: 10;
        }
        
        .page-date {
            position: absolute;
            bottom: 8mm;
            left: 15mm;
            font-size: 9px;
            color: #94a3b8;
            z-index: 10;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .page {
                box-shadow: none;
                border-radius: 0;
                margin: 0;
                page-break-after: always;
                min-height: 297mm;
            }
            .page-content-wrapper {
                padding-top: 20mm;
                padding-left: 15mm;
                padding-right: 15mm;

            .action-buttons {

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",

        appId: "1:186209858482:web:186ca610780799ef562aab"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let customersMap = new Map();
    let productsMap = new Map();
    let currentFileName = "";

    // ==== Core Pagination Constants ====
    const A4_HEIGHT_MM = 297;
    const TOP_MARGIN_MM = 20;
    const BOTTOM_MARGIN_MM = 25;
    const USABLE_HEIGHT_MM = A4_HEIGHT_MM - TOP_MARGIN_MM - BOTTOM_MARGIN_MM; // 252mm
    
    // Convert mm to pixels (1mm = 3.779527px for precise rendering)
    const MM_TO_PX = 3.779527;
    const USABLE_HEIGHT_PX = USABLE_HEIGHT_MM * MM_TO_PX; // ~952px
    
    async function loadCustomersAndProducts() {
        const customersSnap = await getDocs(collection(db, 'customers'));
        customersSnap.forEach(docSnap => customersMap.set(docSnap.id, docSnap.data()));
        const productsSnap = await getDocs(collection(db, 'products'));
        productsSnap.forEach(docSnap => productsMap.set(docSnap.id, docSnap.data()));
    }

    async function getOrder(orderId) {
        const orderRef = doc(db, 'orders', orderId);
        const orderSnap = await getDoc(orderRef);
        if (!orderSnap.exists()) return null;
        return { id: orderSnap.id, ...orderSnap.data() };
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
    }

    function formatTime(time24) {
        if (!time24) return '';
        let [h, m] = time24.split(':');
        let hour = parseInt(h);
        let ampm = hour >= 12 ? 'مساءً' : 'صباحاً';
        hour = hour % 12 || 12;
        return `${hour.toString().padStart(2,'0')}:${m} ${ampm}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getStatusClass(status) {
        const map = {
            'جديد': 'bg-blue-100 text-blue-800',
            'تحت التنفيذ': 'bg-yellow-100 text-yellow-800',
            'تم التنفيذ': 'bg-green-100 text-green-800',
            'تحت المراجعة': 'bg-purple-100 text-purple-800',
            'مسترجع': 'bg-orange-100 text-orange-800',
            'ملغي': 'bg-red-100 text-red-800'
        };
        return map[status] || 'bg-gray-100 text-gray-800';
    }

    function showLoading() {
        let overlay = document.getElementById('loadingOverlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'loadingOverlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner fa-spin fa-2x"></i><p class="mt-2">جاري إنشاء الفاتورة...</p></div>`;
            document.body.appendChild(overlay);

        overlay.style.display = 'flex';
    }

        const overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.style.display = 'none';
    }

                </div>

                <span><i class="fas fa-id-card"></i> رقم شهادة العمل الحر: FL-765735204</span>
                <span><i class="fas fa-chart-line"></i> الرقم الضريبي: 312495447600003</span>
            </div>
            <div class="two-columns">

                    <h3><i class="fas fa-building ml-2"></i> مصدرة من</h3>

                </div>

        footer.innerHTML = `

                <span><i class="fas fa-phone-alt"></i> هاتف: 966534051317</span>

    function createSummaryAndTerms(subtotal, discountValue, tax, total) {
        const div = document.createElement('div');
        div.innerHTML = `
            <div class="summary-box">
                <div class="summary-row"><span>المجموع الفرعي:</span><span>${subtotal.toFixed(2)} ريال</span></div>

                <div class="summary-row"><span>ضريبة القيمة المضافة (15%):</span><span>${tax.toFixed(2)} ريال</span></div>

    // Create product row as DOM element for height measurement
    function createProductRowElement(serialNumber, item, productImage, description, price, qty, itemTotal) {
        const row = document.createElement('tr');
        const imgSrc = productImage && productImage.trim() !== '' ? productImage : 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23e2e8f0%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22%3Eصورة%3C/text%3E%3C/svg%3E';
        row.innerHTML = `
            <td class="text-center font-bold">${serialNumber}</td>
            <td style="text-align: right;">${escapeHtml(item.name)}</td>
            <td><img src="${imgSrc}" class="product-img" crossorigin="anonymous" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23e2e8f0%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22%3Eصورة%3C/text%3E%3C/svg%3E'"></td>
            <td>${escapeHtml(item.barcode || '—')}</td>
            <td class="desc-text">${escapeHtml(description).substring(0, 65)}${description.length > 65 ? '…' : ''}</td>
            <td>${qty}</td>
            <td>${price.toFixed(2)} ريال</td>
            <td>${itemTotal.toFixed(2)} ريال</td>
        `;
        return row;
    }

    // Measure height of any element in pixels
    async function measureElementHeight(element) {
        const clone = element.cloneNode(true);
        clone.style.position = 'absolute';
        clone.style.visibility = 'hidden';
        clone.style.top = '-9999px';
        clone.style.left = '-9999px';
        clone.style.width = '180mm'; // content width (210mm - 30mm margins)
        document.body.appendChild(clone);
        await new Promise(r => setTimeout(r, 30));
        const height = clone.scrollHeight;
        document.body.removeChild(clone);
        return height;
    }

    async function renderInvoice() {
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        const autoAction = urlParams.get('auto');
        
        if (!orderId) {
            document.getElementById('loading').innerHTML = '<div class="text-center text-red-600 p-10">رقم الطلب غير موجود</div>';
            return;
        }
        
        await loadCustomersAndProducts();
        const order = await getOrder(orderId);
        if (!order) {
            document.getElementById('loading').innerHTML = '<div class="text-center text-red-600 p-10">الطلب غير موجود</div>';
            return;
        }
        
        const customer = customersMap.get(order.customerId) || { name: '__________', phone: '__________', city: '__________', street: '__________', email: '__________' };
        const clientName = (customer.name || 'client').replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '_');
        const orderNumber = order.orderNumber || order.id;
        const today = new Date();
        const dateStr = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2,'0')}-${today.getDate().toString().padStart(2,'0')}`;
        currentFileName = `${clientName}_${orderNumber}_${dateStr}`;
        const todayStr = `${today.getDate().toString().padStart(2,'0')}/${(today.getMonth()+1).toString().padStart(2,'0')}/${today.getFullYear()}`;
        
        let subtotal = 0;
        const items = order.items || [];
        for (const item of items) {
            const price = item.price || 0;
            const qty = item.quantity || 0;
            subtotal += price * qty;
        }
        
        let discountValue = order.discount || 0;
        if (order.discountType === 'percent' && discountValue > 0) discountValue = (subtotal * discountValue) / 100;
        const afterDiscount = subtotal - discountValue;
        const tax = afterDiscount * 0.15;
        const total = afterDiscount + tax;
        
        const paymentMethodName = order.paymentMethodName || 
            (order.paymentMethod === 'mada' ? 'مدى' : order.paymentMethod === 'mastercard' ? 'ماستركارد' :
            order.paymentMethod === 'visa' ? 'فيزا' : order.paymentMethod === 'stcpay' ? 'STCPay' :
            order.paymentMethod === 'tamara' ? 'تمارا' : order.paymentMethod === 'tabby' ? 'تابي' : 'أخرى');
        
        const shippingMethodText = {
            'pickup': '🏪 استلام من المقر',
            'delivery': '🚚 شحن منزلي',
            'noship': '📥 لا يتطلب شحن'
        }[order.shippingMethod] || 'استلام من المقر';
        
        // Prepare product rows data
        const productRowsData = [];
        let serial = 1;
        for (const item of items) {
            const price = item.price || 0;
            const qty = item.quantity || 0;
            const itemTotal = price * qty;
            let productImage = '';
            let description = item.description || '';
            if (item.productId) {
                const prod = productsMap.get(item.productId);
                if (prod) {
                    if (prod.image) productImage = prod.image;
                    if (!description && prod.description) description = prod.description;
                }
            }
            if (!productImage && item.image) productImage = item.image;
            productRowsData.push({ serial: serial++, item, productImage, description: description || '', price, qty, itemTotal });
        }
        
        // Build static header & footer & summary
        const headerElement = createHeaderSection(order, customer, paymentMethodName, shippingMethodText, todayStr);
        const footerElement = createFooterSection();
        const summaryElement = createSummaryAndTerms(subtotal, discountValue, tax, total);
        
        // Measure fixed parts height (header + footer + summary)
        const headerHeight = await measureElementHeight(headerElement);
        const footerHeight = await measureElementHeight(footerElement);
        const summaryHeight = await measureElementHeight(summaryElement);
        const tableHeaderHeight = 40; // Approx table header height in px
        
        // Available height for product rows = USABLE_HEIGHT_PX - header - footer - summary - tableHeader - buffer
        const BUFFER_PX = 15;
        let availableForRows = USABLE_HEIGHT_PX - headerHeight - footerHeight - summaryHeight - tableHeaderHeight - BUFFER_PX;
        
        // Measure each product row height dynamically
        const rowHeights = [];
        const measureContainer = document.createElement('div');
        measureContainer.style.position = 'absolute';
        measureContainer.style.visibility = 'hidden';
        measureContainer.style.top = '-9999px';
        measureContainer.style.width = '180mm';
        document.body.appendChild(measureContainer);
        
        const tempTable = document.createElement('table');
        tempTable.className = 'product-table';
        const tempTbody = document.createElement('tbody');
        tempTable.appendChild(tempTbody);
        measureContainer.appendChild(tempTable);
        
        for (const rowData of productRowsData) {
            tempTbody.innerHTML = '';
            const row = createProductRowElement(rowData.serial, rowData.item, rowData.productImage, rowData.description, rowData.price, rowData.qty, rowData.itemTotal);
            tempTbody.appendChild(row);
            await new Promise(r => setTimeout(r, 15));
            rowHeights.push(row.scrollHeight);
        }
        document.body.removeChild(measureContainer);
        
        // Paginate rows based on accumulated height - NO SPLITTING
        const pages = [];
        let currentPageRows = [];
        let currentHeight = 0;
        
        for (let i = 0; i < productRowsData.length; i++) {
            const rowH = rowHeights[i];
            if (currentPageRows.length > 0 && currentHeight + rowH > availableForRows) {
                pages.push([...currentPageRows]);
                currentPageRows = [];
                currentHeight = 0;
            }
            currentPageRows.push(i);
            currentHeight += rowH;
        }
        if (currentPageRows.length > 0) pages.push(currentPageRows);
        
        // Build final pages
        const container = document.getElementById('invoiceContainer');
        container.innerHTML = '';
        const totalPages = pages.length;
        
        for (let pageIdx = 0; pageIdx < pages.length; pageIdx++) {
            const pageRowIndices = pages[pageIdx];
            const isLastPage = (pageIdx === totalPages - 1);
            
            const page = document.createElement('div');
            page.className = 'page';
            
            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'page-content-wrapper';
            
            const innerContent = document.createElement('div');
            innerContent.className = 'page-inner-content';
            
            // Clone header for this page
            const headerClone = headerElement.cloneNode(true);
            if (totalPages > 1) {
                const titleDiv = headerClone.querySelector('.section-title');
                if (titleDiv) titleDiv.innerHTML = `تفاصيل المنتجات / الخدمات (صفحة ${pageIdx+1} من ${totalPages})`;
            }
            innerContent.appendChild(headerClone);
            
            // Build product table
            const table = document.createElement('table');
            table.className = 'product-table';
            const thead = document.createElement('thead');
            thead.innerHTML = `<tr><th>#</th><th>اسم المنتج</th><th>الصورة</th><th>الباركود</th><th>الوصف</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالي</th></tr>`;
            table.appendChild(thead);
            const tbody = document.createElement('tbody');
            for (const idx of pageRowIndices) {
                const rd = productRowsData[idx];
                tbody.appendChild(createProductRowElement(rd.serial, rd.item, rd.productImage, rd.description, rd.price, rd.qty, rd.itemTotal));
            }
            table.appendChild(tbody);
            innerContent.appendChild(table);
            
            // Add summary only on last page
            if (isLastPage) {
                innerContent.appendChild(summaryElement.cloneNode(true));
            }
            
            // Add footer
            innerContent.appendChild(footerElement.cloneNode(true));
            
            contentWrapper.appendChild(innerContent);
            
            // Bottom margin spacer
            const spacer = document.createElement('div');
            spacer.className = 'bottom-margin-spacer';
            contentWrapper.appendChild(spacer);
            
            page.appendChild(contentWrapper);
            
            // Page numbering
            const pageNumDiv = document.createElement('div');
            pageNumDiv.className = 'page-number';
            pageNumDiv.textContent = `${pageIdx+1} / ${totalPages}`;
            page.appendChild(pageNumDiv);
            
            const pageDateDiv = document.createElement('div');
            pageDateDiv.className = 'page-date';
            pageDateDiv.textContent = `تم الإنشاء: ${todayStr}`;
            page.appendChild(pageDateDiv);
            
            container.appendChild(page);
        }
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('invoiceContainer').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
        
        document.getElementById('printBtn').onclick = () => { window.print(); setTimeout(() => window.close(), 1500); };
        document.getElementById('pdfBtn').onclick = () => exportPDF();
        document.getElementById('pngBtn').onclick = () => exportPNG();
        
        if (autoAction === 'print') { setTimeout(() => { window.print(); setTimeout(() => window.close(), 1500); }, 500); }
        else if (autoAction === 'pdf') setTimeout(() => exportPDF(), 500);
        else if (autoAction === 'png') setTimeout(() => exportPNG(), 500);
    }
    
    async function exportPDF() {
        const element = document.getElementById('invoiceContainer');
        if (!element) return;
        const btn = document.getElementById('pdfBtn');
        btn.disabled = true;
        showLoading();
        try {
            const opt = {
                margin: [0, 0, 0, 0],
                filename: `${currentFileName}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            await html2pdf().set(opt).from(element).save();
        } catch (error) {
            alert('حدث خطأ أثناء تصدير PDF');
        } finally {
            btn.disabled = false;
            hideLoading();
        }
    }
    
    async function exportPNG() {
        const element = document.getElementById('invoiceContainer');
        if (!element) return;
        const btn = document.getElementById('pngBtn');
        btn.disabled = true;
        showLoading();
        try {
            const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
            const link = document.createElement('a');
            link.download = `${currentFileName}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (error) {
            alert('حدث خطأ أثناء تصدير الصورة');
        } finally {
            btn.disabled = false;
            hideLoading();
        }
    }
    
    renderInvoice();
</script>
</body>
</html>
