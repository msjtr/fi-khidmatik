<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab",
        measurementId: "G-NDVGC9GPQZ"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Helper functions
    async function getCollection(collectionName) {
        const snapshot = await db.collection(collectionName).get();
        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }
    async function addDocument(collectionName, data) {
        return await db.collection(collectionName).add(data);
    }
    async function updateDocument(collectionName, id, data) {
        await db.collection(collectionName).doc(id).update(data);
    }
    async function deleteDocument(collectionName, id) {
        await db.collection(collectionName).doc(id).delete();
    }

    // Orders
    async function loadOrders() {
        const snapshot = await db.collection('orders').get();
        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }
    async function addOrder(data) {
        const newOrder = {
            orderNumber: data.orderNumber || `ORD-${Date.now()}`,
            customerName: data.customerName,
            customerPhone: data.customerPhone,
            paymentMethod: data.paymentMethod,
            status: data.status || 'غير مدفوع',
            date: data.date || new Date().toISOString().slice(0,10),
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            items: data.items || [],
            totalAmount: data.totalAmount
        };
        return await addDocument('orders', newOrder);
    }
    async function updateOrderStatus(id, status) {
        await updateDocument('orders', id, { status });
    }
    async function deleteOrder(id) {
        await deleteDocument('orders', id);
    }

    // Customers
    async function loadCustomers() {
        let customers = await getCollection('customers');
        if (customers.length > 0) return customers;
        const orders = await loadOrders();
        const uniqueNames = [...new Set(orders.map(o => o.customerName).filter(n => n))];
        return uniqueNames.map(name => ({ id: name, name, phone: '', email: '', address: '' }));
    }
    async function addCustomer(data) {
        return await addDocument('customers', data);
    }
    async function updateCustomer(id, data) {
        await updateDocument('customers', id, data);
    }
    async function deleteCustomer(id) {
        await deleteDocument('customers', id);
    }

    // Products
    async function loadProducts() {
        return await getCollection('products');
    }
    async function addProduct(data) {
        if (!data.imageUrl || data.imageUrl.trim() === '') data.imageUrl = '/images/default-product.png';
        return await addDocument('products', data);
    }
    async function updateProduct(id, data) {
        if (data.imageUrl && data.imageUrl.trim() === '') data.imageUrl = '/images/default-product.png';
        await updateDocument('products', id, data);
    }
    async function deleteProduct(id) {
        await deleteDocument('products', id);
    }
    async function updateProductQuantity(id, quantity) {
        await updateDocument('products', id, { quantity });
    }

    // Settings
    async function getSettingsDoc(docId) {
        const docRef = db.collection('settings').doc(docId);
        const docSnap = await docRef.get();
        return docSnap.exists ? docSnap.data() : null;
    }
    async function setSettingsDoc(docId, data) {
        await db.collection('settings').doc(docId).set(data, { merge: true });
    }

    // Excel import with advanced columns
    function importProductsFromExcel(file, callback) {
        const reader = new FileReader();
        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            if (!rows || rows.length < 2) {
                callback({ success: false, error: 'الملف فارغ أو لا يحتوي على بيانات' });
                return;
            }
            const headers = rows[0];
            const colIndex = {
                name: headers.findIndex(h => h.includes('اسم المنتج')),
                code: headers.findIndex(h => h.includes('كود المنتج')),
                barcode: headers.findIndex(h => h.includes('باركود')),
                description: headers.findIndex(h => h.includes('وصف')),
                quantity: headers.findIndex(h => h.includes('الكمية')),
                cost: headers.findIndex(h => h.includes('سعر التكلفة')),
                price: headers.findIndex(h => h.includes('سعر البيع')),
                discountPrice: headers.findIndex(h => h.includes('سعر التخفيض')),
                mainImage: headers.findIndex(h => h.includes('الصورة الرئيسية')),
                image2: headers.findIndex(h => h.includes('صورة 2')),
                image3: headers.findIndex(h => h.includes('صورة 3')),
                image4: headers.findIndex(h => h.includes('صورة 4')),
                image5: headers.findIndex(h => h.includes('صورة 5'))
            };
            let count = 0;
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;
                const name = colIndex.name !== -1 ? row[colIndex.name] : null;
                if (!name) continue;
                const product = {
                    name: name.toString().trim(),
                    code: colIndex.code !== -1 ? (row[colIndex.code] || '').toString().trim() : '',
                    barcode: colIndex.barcode !== -1 ? (row[colIndex.barcode] || '').toString().trim() : '',
                    description: colIndex.description !== -1 ? (row[colIndex.description] || '').toString().trim() : '',
                    quantity: colIndex.quantity !== -1 ? parseFloat(row[colIndex.quantity]) || 0 : 0,
                    costPrice: colIndex.cost !== -1 ? parseFloat(row[colIndex.cost]) || 0 : 0,
                    price: colIndex.price !== -1 ? parseFloat(row[colIndex.price]) || 0 : 0,
                    discountPrice: colIndex.discountPrice !== -1 ? parseFloat(row[colIndex.discountPrice]) || 0 : 0,
                    images: []
                };
                if (colIndex.mainImage !== -1 && row[colIndex.mainImage]) product.images.push(row[colIndex.mainImage].toString().trim());
                if (colIndex.image2 !== -1 && row[colIndex.image2]) product.images.push(row[colIndex.image2].toString().trim());
                if (colIndex.image3 !== -1 && row[colIndex.image3]) product.images.push(row[colIndex.image3].toString().trim());
                if (colIndex.image4 !== -1 && row[colIndex.image4]) product.images.push(row[colIndex.image4].toString().trim());
                if (colIndex.image5 !== -1 && row[colIndex.image5]) product.images.push(row[colIndex.image5].toString().trim());
                product.imageUrl = product.images.length > 0 ? product.images[0] : '/images/default-product.png';
                await addProduct(product);
                count++;
            }
            callback({ success: true, count });
        };
        reader.readAsArrayBuffer(file);
    }

    // Download Excel template
    window.downloadProductTemplate = () => {
        const headers = [
            'اسم المنتج',
            'كود المنتج',
            'باركود المنتج',
            'وصف المنتج',
            'الكمية',
            'سعر التكلفة',
            'سعر البيع',
            'سعر التخفيض',
            'الصورة الرئيسية',
            'صورة 2',
            'صورة 3',
            'صورة 4',
            'صورة 5'
        ];
        const exampleRow = [
            'منتج تجريبي',
            'PROD-001',
            '1234567890123',
            'هذا وصف للمنتج التجريبي',
            '10',
            '50',
            '100',
            '80',
            'https://example.com/image1.jpg',
            'https://example.com/image2.jpg',
            'https://example.com/image3.jpg',
            'https://example.com/image4.jpg',
            'https://example.com/image5.jpg'
        ];
        const data = [headers, exampleRow];
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'منتجات');
        XLSX.writeFile(wb, 'قالب_استيراد_المنتجات.xlsx');
    };

    // ---------- Quill Editor Integration ----------
    let currentQuill = null; // to store Quill instance in modal

    // Product Modal with Quill
    let currentEditingProductId = null;
    let productImagesBase64 = [];

    function showProductModal(product = null) {
        currentEditingProductId = product ? product.id : null;
        productImagesBase64 = [];
        if (product && product.images) {
            productImagesBase64 = [...product.images];
        }
        const modalHtml = `
            <div id="productModal" class="modal-backdrop">
                <div class="modal-content">
                    <h3 class="text-xl font-bold mb-4">${product ? 'تعديل المنتج' : 'إضافة منتج جديد'}</h3>
                    <form id="productForm" class="space-y-3">
                        <div><label>اسم المنتج *</label><input type="text" id="prodName" value="${product ? product.name : ''}" required></div>
                        <div><label>كود المنتج</label><input type="text" id="prodCode" value="${product ? product.code || '' : ''}"></div>
                        <div><label>باركود المنتج</label><input type="text" id="prodBarcode" value="${product ? product.barcode || '' : ''}"></div>
                        <div><label>الوصف (محرر متقدم)</label><div id="descriptionEditor" style="min-height:150px;"></div></div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label>الكمية</label><input type="number" id="prodQuantity" value="${product ? product.quantity || 0 : 0}"></div>
                            <div><label>سعر التكلفة</label><input type="number" id="prodCost" value="${product ? product.costPrice || 0 : 0}"></div>
                            <div><label>سعر البيع</label><input type="number" id="prodPrice" value="${product ? product.price || 0 : 0}"></div>
                            <div><label>سعر التخفيض</label><input type="number" id="prodDiscount" value="${product ? product.discountPrice || 0 : 0}"></div>
                        </div>
                        <div>
                            <label>الصور (يمكن رفع عدة صور)</label>
                            <input type="file" id="productImages" multiple accept="image/*">
                            <div id="imagePreviewContainer" class="flex flex-wrap gap-2 mt-2">
                                ${productImagesBase64.map((img, idx) => `
                                    <div class="image-preview">
                                        <img src="${img}" style="width:80px;height:80px;object-fit:cover;">
                                        <div class="remove-image" onclick="removeImageAtIndex(${idx})">×</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="flex justify-end gap-2 pt-3">
                            <button type="button" onclick="closeModal()" class="btn-secondary">إلغاء</button>
                            <button type="submit" class="btn-primary">حفظ</button>
                        </div>
                    </form>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        // Initialize Quill after modal is in DOM
        const quill = new Quill('#descriptionEditor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            },
            placeholder: 'أدخل وصف المنتج...',
            direction: 'rtl'
        });
        currentQuill = quill;
        // Set initial content if product exists
        if (product && product.description) {
            quill.root.innerHTML = product.description;
        } else {
            quill.root.innerHTML = '';
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('prodName').value;
            if (!name) return alert('الاسم مطلوب');
            const descriptionHtml = quill.root.innerHTML;
            const productData = {
                name,
                code: document.getElementById('prodCode').value,
                barcode: document.getElementById('prodBarcode').value,
                description: descriptionHtml,
                quantity: parseFloat(document.getElementById('prodQuantity').value) || 0,
                costPrice: parseFloat(document.getElementById('prodCost').value) || 0,
                price: parseFloat(document.getElementById('prodPrice').value) || 0,
                discountPrice: parseFloat(document.getElementById('prodDiscount').value) || 0,
                images: productImagesBase64,
                imageUrl: productImagesBase64.length > 0 ? productImagesBase64[0] : '/images/default-product.png'
            };
            if (currentEditingProductId) {
                await updateProduct(currentEditingProductId, productData);
            } else {
                await addProduct(productData);
            }
            closeModal();
            renderSection('products');
        });

        document.getElementById('productImages').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (let file of files) {
                const reader = new FileReader();
                await new Promise((resolve) => {
                    reader.onload = (ev) => {
                        productImagesBase64.push(ev.target.result);
                        resolve();
                    };
                    reader.readAsDataURL(file);
                });
            }
            updateImagePreview();
        });
        window.removeImageAtIndex = (idx) => {
            productImagesBase64.splice(idx, 1);
            updateImagePreview();
        };
        function updateImagePreview() {
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = productImagesBase64.map((img, idx) => `
                <div class="image-preview">
                    <img src="${img}" style="width:80px;height:80px;object-fit:cover;">
                    <div class="remove-image" onclick="removeImageAtIndex(${idx})">×</div>
                </div>
            `).join('');
        }
    }

    // Invoice Instructions with Quill
    async function renderInvoiceInstructions(container) {
        let invoiceDoc = await getSettingsDoc('invoiceInstructions');
        let text = invoiceDoc?.text || 'شكراً لتسوقكم معنا.';
        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-6">
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-file-invoice-dollar ml-2"></i>تعليمات الفاتورة</h2>
                <div id="invoiceEditor" style="min-height:200px; margin-bottom:1rem;"></div>
                <button onclick="window.saveInvoiceInstructions()" class="btn-primary mt-4">حفظ التعليمات</button>
            </div>
        `;
        // Initialize Quill after container is ready
        const quill = new Quill('#invoiceEditor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            },
            placeholder: 'أدخل تعليمات الفاتورة...',
            direction: 'rtl'
        });
        quill.root.innerHTML = text;
        window.saveInvoiceInstructions = async () => {
            const newText = quill.root.innerHTML;
            await setSettingsDoc('invoiceInstructions', { text: newText });
            alert('تم حفظ التعليمات');
        };
    }

    // ---------- New Order Modal with Product Selection ----------
    let cartItems = [];

    function showNewOrderModal() {
        cartItems = [];
        renderNewOrderModal();
    }

    async function renderNewOrderModal() {
        const products = await loadProducts();
        const modalHtml = `
            <div id="orderModal" class="modal-backdrop">
                <div class="modal-content" style="width:900px">
                    <h3 class="text-xl font-bold mb-4">إنشاء طلب جديد</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <h4 class="font-semibold mb-2">بيانات العميل</h4>
                            <input type="text" id="customerName" placeholder="اسم العميل" class="mb-2">
                            <input type="text" id="customerPhone" placeholder="رقم الهاتف" class="mb-2">
                            <select id="paymentMethod" class="mb-4">
                                <option value="نقدي">نقدي</option>
                                <option value="بطاقة ائتمان">بطاقة ائتمان</option>
                                <option value="تحويل بنكي">تحويل بنكي</option>
                            </select>
                            <h4 class="font-semibold mb-2">إضافة منتج إلى السلة</h4>
                            <select id="productSelect" class="mb-2">
                                <option value="">-- اختر منتج --</option>
                                ${products.map(p => `<option value="${p.id}" data-price="${p.price}" data-name="${p.name}">${p.name} - ${p.price} ريال</option>`).join('')}
                            </select>
                            <div class="flex gap-2">
                                <input type="number" id="productQty" placeholder="الكمية" value="1" class="w-24">
                                <button onclick="addToCart()" class="btn-primary text-sm">إضافة إلى السلة</button>
                            </div>
                        </div>
                        <div>
                            <h4 class="font-semibold mb-2">السلة</h4>
                            <div id="cartItemsList" class="max-h-64 overflow-y-auto border rounded p-2 bg-gray-50"></div>
                            <div class="mt-2 font-bold">المجموع: <span id="cartTotal">0</span> ريال</div>
                        </div>
                    </div>
                    <div class="flex justify-end gap-2 mt-4">
                        <button onclick="closeModal()" class="btn-secondary">إلغاء</button>
                        <button onclick="saveNewOrder()" class="btn-primary">حفظ الطلب</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        window.addToCart = () => {
            const select = document.getElementById('productSelect');
            const productId = select.value;
            if (!productId) return;
            const product = products.find(p => p.id === productId);
            const qty = parseInt(document.getElementById('productQty').value) || 1;
            const existing = cartItems.find(item => item.productId === productId);
            if (existing) {
                existing.quantity += qty;
            } else {
                cartItems.push({
                    productId: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: qty
                });
            }
            updateCartDisplay();
            document.getElementById('productQty').value = '1';
            select.value = '';
        };
        window.updateCartDisplay = () => {
            const container = document.getElementById('cartItemsList');
            let total = 0;
            container.innerHTML = cartItems.map((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <span>${item.name} x ${item.quantity}</span>
                        <span>${itemTotal} ريال</span>
                        <div>
                            <button onclick="adjustCartItem(${idx}, -1)" class="text-blue-600">-</button>
                            <button onclick="adjustCartItem(${idx}, 1)" class="text-blue-600">+</button>
                            <button onclick="removeCartItem(${idx})" class="text-red-600 ml-2"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').innerText = total;
        };
        window.adjustCartItem = (idx, delta) => {
            if (cartItems[idx].quantity + delta > 0) {
                cartItems[idx].quantity += delta;
            } else {
                cartItems.splice(idx, 1);
            }
            updateCartDisplay();
        };
        window.removeCartItem = (idx) => {
            cartItems.splice(idx, 1);
            updateCartDisplay();
        };
        window.saveNewOrder = async () => {
            const customerName = document.getElementById('customerName').value;
            const customerPhone = document.getElementById('customerPhone').value;
            const paymentMethod = document.getElementById('paymentMethod').value;
            if (!customerName) return alert('يرجى إدخال اسم العميل');
            if (cartItems.length === 0) return alert('أضف منتجات إلى السلة');
            const totalAmount = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            await addOrder({
                orderNumber: `ORD-${Date.now()}`,
                customerName,
                customerPhone,
                paymentMethod,
                status: 'غير مدفوع',
                date: new Date().toISOString().slice(0,10),
                items: cartItems,
                totalAmount
            });
            closeModal();
            renderSection('orders');
        };
    }

    // ---------- باقي الأقسام (مختصرة لكن كاملة) ----------
    let currentSection = 'orders';

    async function renderSection(section) {
        const container = document.getElementById('page-content');
        if (!container) return;
        try {
            switch(section) {
                case 'orders': await renderOrders(container); break;
                case 'customers': await renderCustomers(container); break;
                case 'products': await renderProducts(container); break;
                case 'inventory': await renderInventory(container); break;
                case 'payment-methods': await renderPaymentMethods(container); break;
                case 'invoice': await renderInvoiceInstructions(container); break;
                case 'general': await renderGeneralSettings(container); break;
                default: await renderOrders(container);
            }
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="bg-red-100 p-4 rounded">خطأ: ${err.message}</div>`;
        }
    }

    // Orders section
    async function renderOrders(container) {
        container.innerHTML = `<div class="loading-spinner"></div><div class="text-center">جاري تحميل الطلبات...</div>`;
        let orders = await loadOrders();
        const getStatusClass = (status) => {
            const map = {
                'مدفوع': 'bg-green-100 text-green-700',
                'غير مدفوع': 'bg-red-100 text-red-700',
                'مسترجع': 'bg-orange-100 text-orange-700',
                'ملغي': 'bg-gray-100 text-gray-700'
            };
            return map[status] || 'bg-gray-100';
        };
        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold"><i class="fas fa-truck-fast ml-2"></i>الطلبات</h2>
                    <button onclick="window.showNewOrderModal()" class="btn-primary"><i class="fas fa-plus ml-1"></i>طلب جديد</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full">
                        <thead class="bg-gray-100">
                            <tr><th class="p-3">رقم الطلب</th><th class="p-3">اسم العميل</th><th class="p-3">طريقة الدفع</th><th class="p-3">الحالة</th><th class="p-3">التاريخ</th><th class="p-3">الإجراءات</th></tr>
                        </thead>
                        <tbody>
                            ${orders.length === 0 ? '发展<td colspan="6" class="text-center p-6">لا توجد طلبات</td>' : orders.map(order => `
                                <tr class="border-b">
                                    <td class="p-3">${order.orderNumber || order.id.slice(-6)}</td>
                                    <td class="p-3">${order.customerName || '-'}</td>
                                    <td class="p-3">${order.paymentMethod || '-'}</td>
                                    <td class="p-3"><span class="badge-status ${getStatusClass(order.status)}">${order.status || 'غير مدفوع'}</span></td>
                                    <td class="p-3">${order.date || '-'}</td>
                                    <td class="p-3">
                                        <button onclick="window.editOrder('${order.id}')" class="text-blue-600 ml-2"><i class="fas fa-edit"></i></button>
                                        <button onclick="window.deleteOrderItem('${order.id}')" class="text-red-600 ml-2"><i class="fas fa-trash"></i></button>
                                        <button onclick="window.refundOrder('${order.id}')" class="text-orange-600"><i class="fas fa-undo-alt"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        window.editOrder = async (id) => {
            let orders = await loadOrders();
            let order = orders.find(o => o.id === id);
            if (!order) return;
            const newStatus = prompt('تغيير الحالة (مدفوع/غير مدفوع/مسترجع/ملغي):', order.status);
            if (newStatus && ['مدفوع','غير مدفوع','مسترجع','ملغي'].includes(newStatus)) {
                await updateOrderStatus(id, newStatus);
                renderSection('orders');
            }
        };
        window.deleteOrderItem = async (id) => { if (confirm('حذف الطلب؟')) await deleteOrder(id) && renderSection('orders'); };
        window.refundOrder = async (id) => { if (confirm('استرداد الطلب؟')) await updateOrderStatus(id, 'مسترجع') && renderSection('orders'); };
    }

    // Customers
    async function renderCustomers(container) {
        container.innerHTML = `<div class="loading-spinner"></div><div class="text-center">جاري تحميل العملاء...</div>`;
        let customers = await loadCustomers();
        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold"><i class="fas fa-users ml-2"></i>العملاء</h2>
                    <button onclick="window.showAddCustomerModal()" class="btn-primary"><i class="fas fa-plus ml-1"></i>عميل جديد</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full"><thead class="bg-gray-100"><tr><th class="p-3">الاسم</th><th class="p-3">الهاتف</th><th class="p-3">البريد</th><th class="p-3">العنوان</th><th class="p-3">إجراءات</th></tr></thead><tbody>
                        ${customers.length === 0 ? '<tr><td colspan="5" class="text-center p-6">لا يوجد عملاء</td></tr>' : customers.map(c => `
                            <tr class="border-b"><td class="p-3">${c.name}</td><td class="p-3">${c.phone || '-'}</td><td class="p-3">${c.email || '-'}</td><td class="p-3">${c.address || '-'}</td>
                            <td class="p-3"><button onclick="window.editCustomer('${c.id}')" class="text-blue-600 ml-2"><i class="fas fa-edit"></i></button><button onclick="window.deleteCustomerItem('${c.id}')" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr>
                        `).join('')}
                    </tbody></table>
                </div>
            </div>
        `;
        window.showAddCustomerModal = async () => {
            const name = prompt('الاسم:'); if(!name) return;
            const phone = prompt('الهاتف:'); const email = prompt('البريد:'); const address = prompt('العنوان:');
            await addCustomer({ name, phone, email, address }); renderSection('customers');
        };
        window.editCustomer = async (id) => {
            let customers = await loadCustomers(); let cust = customers.find(c=>c.id===id);
            const name = prompt('الاسم الجديد:', cust.name); if(!name) return;
            const phone = prompt('الهاتف الجديد:', cust.phone);
            const email = prompt('البريد الجديد:', cust.email);
            const address = prompt('العنوان الجديد:', cust.address);
            await updateCustomer(id, { name, phone, email, address }); renderSection('customers');
        };
        window.deleteCustomerItem = async (id) => { if(confirm('حذف العميل؟')) await deleteCustomer(id) && renderSection('customers'); };
    }

    // Products section with edit modal
    async function renderProducts(container) {
        container.innerHTML = `<div class="loading-spinner"></div><div class="text-center">جاري تحميل المنتجات...</div>`;
        let products = await loadProducts();
        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-6">
                <div class="flex flex-wrap justify-between items-center mb-6 gap-2">
                    <h2 class="text-2xl font-bold"><i class="fas fa-boxes ml-2"></i>المنتجات</h2>
                    <div class="flex gap-2">
                        <button onclick="window.showProductModal()" class="btn-primary"><i class="fas fa-plus ml-1"></i>إضافة منتج</button>
                        <button onclick="window.downloadProductTemplate()" class="btn-secondary"><i class="fas fa-download ml-1"></i>تحميل قالب Excel</button>
                        <input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="window.handleExcelUpload(this)">
                        <button onclick="document.getElementById('excelFileInput').click()" class="btn-success"><i class="fas fa-file-excel ml-1"></i>رفع Excel</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    ${products.length === 0 ? '<div class="col-span-full text-center p-8">لا توجد منتجات</div>' : products.map(p => `
                        <div class="border rounded-lg p-4 shadow-sm card-hover">
                            <img src="${p.imageUrl || '/images/default-product.png'}" class="w-full h-40 object-cover rounded mb-3" onerror="this.src='/images/default-product.png'">
                            <h3 class="font-bold">${p.name}</h3>
                            <p class="text-blue-600 font-bold">${p.price} ريال</p>
                            <p class="text-gray-600">الكمية: ${p.quantity || 0}</p>
                            <div class="flex justify-between mt-3 pt-2 border-t">
                                <button onclick="window.editProductModal('${p.id}')" class="text-blue-600"><i class="fas fa-edit ml-1"></i>تعديل</button>
                                <button onclick="window.deleteProductItem('${p.id}')" class="text-red-600"><i class="fas fa-trash ml-1"></i>حذف</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        window.editProductModal = async (id) => {
            let products = await loadProducts();
            let product = products.find(p => p.id === id);
            if (product) showProductModal(product);
        };
        window.deleteProductItem = async (id) => { if(confirm('حذف المنتج؟')) await deleteProduct(id) && renderSection('products'); };
        window.handleExcelUpload = (input) => {
            const file = input.files[0];
            if (file) importProductsFromExcel(file, (res) => { if(res.success) alert(`تم استيراد ${res.count} منتج`); else alert(res.error || 'فشل الاستيراد'); renderSection('products'); });
            input.value = '';
        };
    }

    // Inventory
    async function renderInventory(container) {
        container.innerHTML = `<div class="loading-spinner"></div><div class="text-center">جاري تحميل المخزون...</div>`;
        let products = await loadProducts();
        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-6">
                <h2 class="text-2xl font-bold mb-6"><i class="fas fa-warehouse ml-2"></i>المخزون</h2>
                <div class="overflow-x-auto"><table class="min-w-full"><thead class="bg-gray-100"><tr><th class="p-3">المنتج</th><th class="p-3">الكمية الحالية</th><th class="p-3">تحديث الكمية</th></tr></thead><tbody>
                    ${products.length === 0 ? '<tr><td colspan="3" class="text-center p-6">لا توجد منتجات</td></tr>' : products.map(p => `
                        <tr class="border-b"><td class="p-3">${p.name}</td><td class="p-3"><span class="font-bold ${p.quantity < 5 ? 'text-red-600' : 'text-green-600'}">${p.quantity || 0}</span></td>
                        <td class="p-3"><div class="flex gap-2"><input type="number" id="qty-${p.id}" value="${p.quantity || 0}" class="border rounded p-2 w-24"><button onclick="window.updateQuantity('${p.id}')" class="btn-primary text-sm py-1">تحديث</button></div></td></tr>
                    `).join('')}
                </tbody></table></div>
            </div>
        `;
        window.updateQuantity = async (id) => {
            const input = document.getElementById(`qty-${id}`);
            const newQty = parseInt(input.value);
            if (!isNaN(newQty)) { await updateProductQuantity(id, newQty); renderSection('inventory'); alert('تم تحديث الكمية'); } else alert('أدخل رقماً صحيحاً');
        };
    }

    // Payment methods
    async function renderPaymentMethods(container) {
        let methodsDoc = await getSettingsDoc('paymentMethods');
        let methods = methodsDoc?.methods || ['نقدي', 'بطاقة ائتمان', 'تحويل بنكي'];
        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold"><i class="fas fa-credit-card ml-2"></i>طرق الدفع</h2>
                    <button onclick="window.addPaymentMethod()" class="btn-primary"><i class="fas fa-plus ml-1"></i>إضافة طريقة</button>
                </div>
                <ul class="space-y-2">${methods.map((m, idx) => `<li class="flex justify-between items-center border p-3 rounded"><span>${m}</span><button onclick="window.deletePaymentMethod(${idx})" class="text-red-600"><i class="fas fa-trash"></i></button></li>`).join('')}</ul>
            </div>
        `;
        window.addPaymentMethod = async () => {
            const newMethod = prompt('أدخل طريقة الدفع الجديدة:');
            if (newMethod && newMethod.trim()) {
                let current = await getSettingsDoc('paymentMethods');
                let methods = current?.methods || [];
                methods.push(newMethod.trim());
                await setSettingsDoc('paymentMethods', { methods });
                renderSection('payment-methods');
            }
        };
        window.deletePaymentMethod = async (idx) => {
            let current = await getSettingsDoc('paymentMethods');
            let methods = current?.methods || [];
            methods.splice(idx, 1);
            await setSettingsDoc('paymentMethods', { methods });
            renderSection('payment-methods');
        };
    }

    // General settings
    async function renderGeneralSettings(container) {
        let general = await getSettingsDoc('general');
        let data = general || { siteName: 'متجرك', currency: 'ريال', platformStamp: 'جميع الحقوق محفوظة', contactEmail: 'info@shop.com', whatsapp: '' };
        container.innerHTML = `
            <div class="bg-white rounded-2xl shadow p-6">
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-sliders-h ml-2"></i>الإعدادات العامة</h2>
                <div class="space-y-4">
                    <div><label>اسم الموقع:</label><input id="siteName" class="w-full border rounded p-2" value="${data.siteName}"></div>
                    <div><label>رمز العملة:</label><input id="currency" class="w-full border rounded p-2" value="${data.currency}"></div>
                    <div><label>ختم المنصة:</label><textarea id="platformStamp" rows="2" class="w-full border rounded p-2">${data.platformStamp}</textarea></div>
                    <div><label>بريد الدعم:</label><input id="contactEmail" class="w-full border rounded p-2" value="${data.contactEmail}"></div>
                    <div><label>واتساب الدعم:</label><input id="whatsapp" class="w-full border rounded p-2" value="${data.whatsapp}"></div>
                    <button onclick="window.saveGeneralSettings()" class="btn-primary">حفظ الإعدادات</button>
                </div>
            </div>
        `;
        window.saveGeneralSettings = async () => {
            const settings = {
                siteName: document.getElementById('siteName').value,
                currency: document.getElementById('currency').value,
                platformStamp: document.getElementById('platformStamp').value,
                contactEmail: document.getElementById('contactEmail').value,
                whatsapp: document.getElementById('whatsapp').value
            };
            await setSettingsDoc('general', settings);
            alert('تم حفظ الإعدادات');
        };
    }

    // Navigation
    function setActiveNav(section) {
        document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('sidebar-active'));
        document.getElementById(`nav-${section}`)?.classList.add('sidebar-active');
    }
    window.changeSection = (section) => {
        currentSection = section;
        setActiveNav(section);
        renderSection(section);
    };
    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
            const section = item.getAttribute('data-section');
            if (section) changeSection(section);
        });
    });

    // Global close modal function
    window.closeModal = () => {
        const modal = document.getElementById('productModal') || document.getElementById('orderModal');
        if (modal) modal.remove();
        if (currentQuill) currentQuill = null;
    };
    window.showProductModal = showProductModal;
    window.showNewOrderModal = showNewOrderModal;

    renderSection('orders');
</script>
</body>
</html>
