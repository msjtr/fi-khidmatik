<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="admin/css/admin.css">
    
    <style>
        :root { --sidebar-width: 280px; --header-height: 70px; }
        body { margin: 0; font-family: 'Tajawal', sans-serif; background-color: #f8fafc; display: flex; height: 100vh; overflow: hidden; }
        .main-wrapper { display: flex; width: 100%; height: 100%; }
        #sidebar-placeholder { width: var(--sidebar-width); height: 100%; background: #fff; flex-shrink: 0; border-left: 1px solid #e2e8f0; }
        .content-area { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        #header-placeholder { height: var(--header-height); flex-shrink: 0; }
        #module-container { flex-grow: 1; padding: 25px; overflow-y: auto; background: #f8fafc; }
        .loader-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #64748b; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>
        <div class="content-area">
            <div id="header-placeholder"></div>
            <main id="module-container">
                <div class="loader-box">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: #f97316;"></i>
                    <p style="margin-top: 15px; font-weight: bold;">جاري تحميل نظام تيرا...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        /**
         * 1. وظائف المودال (لضمان عمل الأزرار فور التحميل)
         */
        window.closeCustomerModal = () => { 
            const m = document.getElementById('customer-modal'); 
            if(m) m.style.display='none'; 
        };
        window.openCustomerModal = (title) => { 
            const m = document.getElementById('customer-modal'); 
            if(m) { 
                m.style.display='flex'; 
                document.getElementById('modal-title').innerText = title; 
            } 
        };

        /**
         * 2. دالة التحميل (المسار الجديد: الدخول لمجلد admin أولاً)
         */
        async function loadComponent(id, fileName) {
            // التعديل الجوهري: إضافة مجلد admin للمسار
            const path = `admin/components/${fileName}`; 
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
                console.log(`✅ تم تحميل المكون: ${path}`);
            } catch (error) {
                console.error(`❌ فشل في: ${path}`, error);
                document.getElementById(id).innerHTML = `<div style="color:red; padding:20px;">خطأ: لم يتم العثور على المكون في ${path}</div>`;
            }
        }

        async function loadModule(moduleName) {
            const container = document.getElementById('module-container');
            // الموديولات أيضاً داخل مجلد admin/modules
            const path = `admin/modules/${moduleName}.html`;
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error('Not Found');
                const html = await response.text();
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#64748b;">
                    <i class="fas fa-search fa-2x"></i>
                    <p>تعذر العثور على ${moduleName} في مسار الموديولات.</p>
                </div>`;
            }
        }

        /**
         * 3. التشغيل عند التحميل
         */
        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات من مجلد admin/components
            await Promise.all([
                loadComponent('sidebar-placeholder', 'sidebar.html'),
                loadComponent('header-placeholder', 'header.html'),
                loadComponent('modals-placeholder', 'modals.html')
            ]);

            // تحميل الموديول الافتراضي
            loadModule('dashboard');
        });
    </script>
</body>
</html>
