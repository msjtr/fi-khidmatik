<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
    
    <style>
        :root { --sidebar-width: 280px; --header-height: 70px; }
        body { margin: 0; font-family: 'Tajawal', sans-serif; background-color: #f8fafc; display: flex; height: 100vh; overflow: hidden; }
        .main-wrapper { display: flex; width: 100%; height: 100%; }
        #sidebar-placeholder { width: var(--sidebar-width); height: 100%; background: #fff; flex-shrink: 0; border-left: 1px solid #e2e8f0; }
        .content-area { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        #header-placeholder { height: var(--header-height); flex-shrink: 0; }
        #module-container { flex-grow: 1; padding: 25px; overflow-y: auto; background: #f8fafc; }
        .loader-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #64748b; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>
        <div class="content-area">
            <div id="header-placeholder"></div>
            <main id="module-container">
                <div class="loader-box">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: #f97316;"></i>
                    <p style="margin-top: 15px; font-weight: bold;">جاري تحميل نظام تيرا...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        /**
         * 1. وظائف المودال (لضمان استجابة الأزرار)
         */
        window.closeCustomerModal = () => { 
            const m = document.getElementById('customer-modal'); 
            if(m) m.style.display='none'; 
        };
        window.openCustomerModal = (title) => { 
            const m = document.getElementById('customer-modal'); 
            if(m) { 
                m.style.display='flex'; 
                const titleEl = document.getElementById('modal-title');
                if(titleEl) titleEl.innerText = title; 
            } 
        };

        /**
         * 2. دالة تحميل المكونات (المسار الذي نجح سابقاً admin/components/)
         */
        async function loadComponent(id, fileName) {
            const path = `admin/components/${fileName}`; 
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
                console.log(`✅ تم تحميل المكون: ${path}`);
            } catch (error) {
                console.error(`❌ فشل تحميل المكون: ${path}`, error);
            }
        }

        /**
         * 3. دالة تحميل الموديولات (تجربة المسارات المتاحة)
         */
        async function loadModule(moduleName) {
            const container = document.getElementById('module-container');
            const pathsToTry = [
                `admin/modules/${moduleName}.html`,
                `modules/${moduleName}.html`
            ];

            for (const path of pathsToTry) {
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        const html = await response.text();
                        container.innerHTML = html;
                        console.log(`✅ تم تحميل الموديول: ${path}`);
                        return;
                    }
                } catch (e) {}
            }
            container.innerHTML = `<div style="padding:20px; text-align:center; color:#ef4444;">تعذر العثور على ملف الموديول (${moduleName}.html)</div>`;
        }

        /**
         * 4. بدء التشغيل
         */
        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات الثابتة بالتوازي
            await Promise.all([
                loadComponent('sidebar-placeholder', 'sidebar.html'),
                loadComponent('header-placeholder', 'header.html'),
                loadComponent('modals-placeholder', 'modals.html')
            ]);

            // تحميل الصفحة الافتراضية
            loadModule('dashboard');
        });
    </script>
</body>
</html>
