<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيرا جيت واي | لوحة التحكم</title>
    
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- المسارات النسبية تعمل جيداً للـ CSS -->
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/customers.css">
</head>
<body class="tera-admin-body">

    <div class="admin-layout">
        <div id="sidebar-container"></div>
        <main class="main-wrapper">
            <div id="header-container"></div>
            <section id="module-container" class="content-area">
                <div class="initial-loader">
                    <div class="spinner-tera"></div>
                    <p>جاري المزامنة...</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import './js/core/firebase.js'; 
        import './js/main.js';          

        class TeraRouter {
            constructor() {
                this.moduleContainer = document.getElementById('module-container');
                // تحديد اسم المشروع لضمان عمل المسارات على GitHub Pages
                this.repoName = 'fi-khidmatik';
                this.init();
            }

            async init() {
                try {
                    // تحميل المكونات الثابتة
                    await Promise.all([
                        this.loadComponent('sidebar-container', `./admin/components/sidebar.html`),
                        this.loadComponent('header-container', `./admin/components/header.html`)
                    ]);

                    window.addEventListener('hashchange', () => this.handleRouting());
                    this.handleRouting();
                } catch (err) {
                    console.error("Initialization Error:", err);
                }
            }

            async loadComponent(containerId, path) {
                const response = await fetch(path);
                if (response.ok) {
                    document.getElementById(containerId).innerHTML = await response.text();
                }
            }

            async handleRouting() {
                const hash = window.location.hash || '#dashboard';
                const moduleName = hash.replace('#', '');
                
                try {
                    const response = await fetch(`./admin/modules/${moduleName}.html`);
                    if (!response.ok) throw new Error();
                    this.moduleContainer.innerHTML = await response.text();
                    
                    // تشغيل المنطق البرمجي الخاص بالموديول
                    this.initModuleJS(moduleName);
                } catch (e) {
                    this.moduleContainer.innerHTML = `<h2>الصفحة ${moduleName} غير موجودة</h2>`;
                }
            }

            async initModuleJS(name) {
                const jsMap = {
                    'customers': 'js/modules/customers-ui.js',
                    'orders-dashboard': 'js/modules/orders-dashboard.js',
                    'inventory': 'js/modules/inventory.js',
                    'products': 'js/modules/products-ui.js'
                };

                if (jsMap[name]) {
                    try {
                        // بناء المسار المطلق الصحيح الذي أكدت أنت أنه يعمل
                        const moduleUrl = `${window.location.origin}/${this.repoName}/${jsMap[name]}`;
                        
                        // استيراد الموديول برمجياً مع كسر الكاش لضمان رؤية التحديثات
                        const module = await import(`${moduleUrl}?update=${Date.now()}`);
                        
                        // محاولة تشغيل دالة التشغيل (مثل initCustomersUI)
                        const funcName = `init${name.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('')}UI`;
                        
                        if (typeof module[funcName] === 'function') {
                            module[funcName](this.moduleContainer);
                            console.log(`✅ الموديول ${name} جاهز`);
                        }
                    } catch (err) {
                        console.error(`❌ فشل في تشغيل منطق ${name}:`, err);
                    }
                }
            }
        }

        window.teraApp = new TeraRouter();
    </script>

    <style>
        :root { --tera-orange: #f97316; }
        body { margin: 0; background: #f8fafc; font-family: 'Cairo', sans-serif; }
        .admin-layout { display: flex; height: 100vh; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px; }
        .spinner-tera { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: var(--tera-orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
