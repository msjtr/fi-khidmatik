<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيرا جيت واي | لوحة التحكم</title>
    
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/customers.css">
</head>
<body>

    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="logo-section">
                <img src="images/logo.svg" alt="Tera Logo">
                <span>تيرا جيت واي</span>
            </div>
            <nav class="nav-menu" id="main-nav">
                <a href="javascript:void(0)" class="nav-item active" onclick="loadModule('dashboard', this)">
                    <i class="fas fa-chart-line"></i> الرئيسية
                </a>
                <a href="javascript:void(0)" class="nav-item" onclick="loadModule('customers', this)">
                    <i class="fas fa-users"></i> قاعدة العملاء
                </a>
                <a href="javascript:void(0)" class="nav-item" onclick="loadModule('orders', this)">
                    <i class="fas fa-file-invoice-dollar"></i> الطلبات والفواتير
                </a>
                <a href="javascript:void(0)" class="nav-item" onclick="loadModule('inventory', this)">
                    <i class="fas fa-boxes"></i> المخزن
                </a>
                <a href="javascript:void(0)" class="nav-item" onclick="loadModule('settings', this)">
                    <i class="fas fa-cog"></i> الإعدادات
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="global-search" placeholder="ابحث في تيرا جيت واي...">
                </div>
                <div class="user-info">
                    <div class="user-text">
                        <span class="user-name">محمد بن صالح</span>
                        <span class="user-role">مدير النظام</span>
                    </div>
                    <img src="admin/images/default-product.png" class="avatar" alt="Admin Profile">
                </div>
            </header>

            <section id="module-container" class="content-body">
                <div class="loading-state" id="main-loader" style="text-align: center; padding: 100px;">
                    <div class="spinner"></div>
                    <p style="margin-top: 20px; font-family: 'Cairo'; font-weight: 600;">جاري مزامنة محرك تيرا جيت واي...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-placeholder"></div>

    <script type="module">
        import './js/core/firebase.js'; // تهيئة قاعدة البيانات
        import './js/main.js';         // تهيئة المنطق الرئيسي

        /**
         * دالة تحميل الموديولات ديناميكياً
         * تعمل على جلب ملفات الـ HTML من مجلد admin/modules/
         */
        window.loadModule = async (name, element) => {
            const container = document.getElementById('module-container');
            
            // 1. تحديث شكل القائمة الجانبية (Active State)
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');

            // 2. إظهار اللودر أثناء الجلب
            container.innerHTML = `<div class="loading-state" style="text-align: center; padding: 100px;"><div class="spinner"></div></div>`;

            try {
                const response = await fetch(`admin/modules/${name}.html`);
                if (!response.ok) throw new Error('Module Not Found');
                const html = await response.text();
                container.innerHTML = html;

                // 3. إذا كان الموديول هو العملاء، نقوم بتشغيل محرك الـ UI الخاص به
                if (name === 'customers') {
                    const { initCustomersUI } = await import('./js/modules/customers-ui.js');
                    initCustomersUI(container);
                }
            } catch (error) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:red;">⚠️ فشل تحميل الموديول: ${name}</div>`;
            }
        };

        // تشغيل موديول "الرئيسية" تلقائياً عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            loadModule('dashboard');
        });

        // إغلاق المودال عالمياً
        window.closeCustomerModal = () => {
            const modal = document.querySelector('.modal-wrapper') || document.getElementById('customer-modal');
            if (modal) {
                modal.style.opacity = '0';
                setTimeout(() => modal.remove(), 300);
            }
        };
    </script>
</body>
</html>
