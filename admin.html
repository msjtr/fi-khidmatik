<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-wrapper">
        <header class="main-header">
            <div class="header-right">
                <button id="sidebar-toggle" class="btn-toggle"><i class="fas fa-bars"></i></button>
                <div class="logo-box">
                    <img src="images/logo.svg" alt="Tera" class="logo-img" onerror="this.src='https://placehold.jp/e67e22/ffffff/50x50.png?text=T'">
                    <span class="logo-name">Tera Gateway</span>
                </div>
            </div>
            <div id="current-datetime" class="header-date"></div>
        </header>

        <div class="layout-container">
            <aside id="sidebar" class="admin-sidebar">
                <nav class="side-nav">
                    <ul>
                        <li class="active" data-module="dashboard"><i class="fas fa-home"></i> <span>الرئيسية</span></li>
                        <li data-module="products"><i class="fas fa-box"></i> <span>المنتجات</span></li>
                        <li data-module="orders"><i class="fas fa-receipt"></i> <span>الطلبات</span></li>
                        <li data-module="customers"><i class="fas fa-users"></i> <span>العملاء</span></li>
                        <li data-module="settings"><i class="fas fa-user-cog"></i> <span>الإعدادات</span></li>
                    </ul>
                </nav>
            </aside>

            <main id="main-content" class="admin-content">
                <div class="welcome-msg">جاري تحميل البيانات...</div>
            </main>
        </div>
    </div>

    <script>
        // دالة الفتح والإغلاق
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');
        
        toggleBtn.onclick = () => {
            sidebar.classList.toggle('is-hidden');
        };

        // دالة التاريخ
        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('current-datetime').innerText = now.toLocaleDateString('ar-SA', options);
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
