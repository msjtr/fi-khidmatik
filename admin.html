<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
    
    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #sidebar-placeholder {
            width: var(--sidebar-width);
            height: 100%;
            background: #fff;
            flex-shrink: 0;
            transition: width 0.3s ease;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header-placeholder {
            height: var(--header-height);
            flex-shrink: 0;
        }

        #module-container {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            background: #f8fafc;
        }

        .loader-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }

        .sidebar-collapsed #sidebar-placeholder {
            width: 85px;
        }
    </style>
</head>
<body class="loading">

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>

        <div class="content-area">
            <div id="header-placeholder"></div>

            <main id="module-container">
                <div class="loader-box">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: #f97316;"></i>
                    <p style="margin-top: 15px; font-weight: bold;">جاري تحميل نظام تيرا...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        /**
         * 1. دوال الأمان (تمنع توقف الأزرار)
         */
        window.closeCustomerModal = () => { const m = document.getElementById('customer-modal'); if(m) m.style.display='none'; };
        window.openCustomerModal = (t) => { 
            const m = document.getElementById('customer-modal'); 
            if(m) { m.style.display='flex'; document.getElementById('modal-title').innerText = t; } 
        };
        window.closeConfirmModal = () => { const m = document.getElementById('confirm-modal'); if(m) m.style.display='none'; };

        /**
         * 2. دالة تحميل المكونات (تم تعديل المسار ليكون متوافقاً مع الصورة)
         */
        async function loadComponent(id, fileName) {
            // المسار المباشر للمجلد الظاهر في الصورة
            const path = `components/${fileName}`;
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
                console.log(`✅ تم تحميل المكون بنجاح: ${path}`);
            } catch (error) {
                console.error(`❌ فشل تحميل المكون من المسار: ${path}`, error);
                document.getElementById(id).innerHTML = `<div style="color:red; padding:20px; text-align:center;">خطأ في تحميل ${fileName} <br> تأكد من وجود الملف في مجلد components</div>`;
            }
        }

        /**
         * 3. دالة تحميل الموديولات (تأكد من وجود مجلد modules بجانب مجلد components)
         */
        async function loadModule(moduleName) {
            const container = document.getElementById('module-container');
            container.innerHTML = '<div class="loader-box"><i class="fas fa-circle-notch fa-spin fa-2x" style="color:#f97316;"></i></div>';
            
            const path = `modules/${moduleName}.html`;
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error('Not Found');
                const html = await response.text();
                container.innerHTML = html;
                document.title = `Tera Gateway | ${moduleName.toUpperCase()}`;
            } catch (error) {
                container.innerHTML = `<div style="text-align:center; padding:50px;">
                    <i class="fas fa-file-exclamation fa-3x" style="color:#cbd5e1;"></i>
                    <p style="margin-top:15px;">الموديول "${moduleName}" غير موجود في مجلد modules</p>
                </div>`;
            }
        }

        /**
         * 4. تنفيذ التحميل عند فتح الصفحة
         */
        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات الظاهرة في الصورة
            await Promise.all([
                loadComponent('sidebar-placeholder', 'sidebar.html'),
                loadComponent('header-placeholder', 'header.html'),
                loadComponent('modals-placeholder', 'modals.html')
            ]);

            // تحميل الموديول الافتراضي (تأكد من وجود ملف dashboard.html داخل مجلد modules)
            loadModule('dashboard');
            
            document.body.classList.remove('loading');
        });
    </script>
</body>
</html>
