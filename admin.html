<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيرا جيت واي | لوحة التحكم</title>
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css?v=2.3">
    <link rel="stylesheet" href="css/table.css?v=2.3">
    <link rel="stylesheet" href="css/customers.css?v=2.3">
</head>
<body class="tera-admin-body">

    <div class="admin-layout">
        <div id="sidebar-container"></div>
        <main class="main-wrapper">
            <div id="header-container"></div>
            <section id="module-container" class="content-area">
                <div class="initial-loader">
                    <div class="spinner-tera"></div>
                    <p>جاري تشغيل محرك تيرا...</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { db, auth } from './js/core/config.js';
        import './js/main.js';

        // إصلاح خطأ ReferenceError: جعل الدالة عالمية ليراها الـ HTML
        window.handleNavClick = (view) => {
            window.location.hash = view;
        };

        class TeraRouter {
            constructor() {
                this.moduleContainer = document.getElementById('module-container');
                const isGitHub = window.location.hostname.includes('github.io');
                this.baseUrl = isGitHub ? '/fi-khidmatik' : '';
                this.version = Date.now();
                this.init();
            }

            async init() {
                try {
                    await Promise.all([
                        this.loadComponent('sidebar-container', `${this.baseUrl}/admin/components/sidebar.html`),
                        this.loadComponent('header-container', `${this.baseUrl}/admin/components/header.html`)
                    ]);
                    window.addEventListener('hashchange', () => this.handleRouting());
                    this.handleRouting();
                } catch (err) {
                    console.error("🔴 Router Init Error:", err);
                }
            }

            async loadComponent(containerId, path) {
                try {
                    const response = await fetch(`${path}?v=${this.version}`);
                    if (!response.ok) throw new Error(`Status: ${response.status}`);
                    document.getElementById(containerId).innerHTML = await response.text();
                } catch (e) { console.error(`❌ Component Fail: ${path}`, e); }
            }

            async handleRouting() {
                const hash = window.location.hash || '#dashboard';
                const moduleName = hash.replace('#', '');
                
                // تحديد المسار بناءً على اسم الموديول (حل مشكلة الـ 404)
                // إذا كان الموديول هو dashboard ابحث عنه في components كما في ملفاتك
                let folder = 'modules';
                if (moduleName === 'dashboard') folder = 'components'; 

                const modulePath = `${this.baseUrl}/admin/${folder}/${moduleName}.html`;
                
                try {
                    const response = await fetch(`${modulePath}?v=${this.version}`);
                    if (!response.ok) throw new Error('Not Found');
                    this.moduleContainer.innerHTML = await response.text();
                    
                    // تحديث الـ Active State في القائمة
                    if (window.syncNavigationUI) window.syncNavigationUI(hash);
                } catch (e) {
                    this.moduleContainer.innerHTML = `<div style="padding:50px; text-align:center;"><h2>الموديول ${moduleName} غير موجود</h2><p>${modulePath}</p></div>`;
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => { window.teraApp = new TeraRouter(); });
    </script>
</body>
</html>
