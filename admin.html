<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tera Gateway | نظام إدارة التقسيط الذكي</title>
    
    <!-- الهوية البصرية والخطوط -->
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- مكتبات الدعم الخارجية -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- SweetAlert2 مهم جداً لمعاينة الخريطة والتنبيهات -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- استدعاء ملفات التنسيق المحدثة v12.12.13 (إصلاح مشاكل التداخل) -->
    <link rel="stylesheet" href="css/admin.css?v=12.12.13">
    <link rel="stylesheet" href="css/sidebar.css?v=12.12.13"> 
    <link rel="stylesheet" href="css/customers.css?v=12.12.13">

    <style>
        :root { 
            --tera-orange: #f97316;
            --tera-bg: #f8fafc; 
            --tera-dark: #0f172a;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--tera-bg); 
            margin: 0; 
            overflow: hidden; 
            color: var(--tera-dark);
        }

        .admin-layout { 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }

        .main-wrapper { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            min-width: 0; 
            background: var(--tera-bg);
            position: relative;
        }

        /* منطقة المحتوى الديناميكي */
        .content-area { 
            flex: 1; 
            padding: 0; 
            overflow-y: auto; 
            scroll-behavior: smooth;
            position: relative; /* لضمان عدم تداخل العناصر */
        }

        /* لودر تيرا الذكي */
        .loader-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
        }

        .spinner-tera { 
            width: 50px; 
            height: 50px; 
            border: 4px solid #e2e8f0; 
            border-top: 4px solid var(--tera-orange); 
            border-radius: 50%; 
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* تخصيص السكرول بار */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--tera-orange); }
    </style>
</head>
<body class="tera-gateway-v12">

    <div class="admin-layout">
        <!-- القائمة الجانبية -->
        <aside id="sidebar-container"></aside>
        
        <main class="main-wrapper">
            <!-- الهيدر العلوي -->
            <header id="header-container"></header>
            
            <!-- منطقة حقن الموديولات (هنا يظهر جدول العملاء) -->
            <section id="module-container" class="content-area">
                <div class="loader-box">
                    <div class="spinner-tera"></div>
                    <p style="color: var(--tera-orange); margin-top: 20px; font-weight: 700;">TERA ENGINE v12.12.13</p>
                </div>
            </section>
        </main>
    </div>

    <!-- حاوية النوافذ المنبثقة (Modal Root) -->
    <!-- تم وضعها هنا لضمان أنها فوق كل شيء برمجياً -->
    <div id="modal-root"></div>

    <!-- المحرك الرئيسي لنظام تيرا -->
    <script type="module">
        import { ensureDbReady } from './js/core/config.js';
        import { initCustomers } from './js/modules/customers-ui.js';

        class TeraApp {
            constructor() {
                this.container = document.getElementById('module-container');
                this.version = "12.12.13";
                this.init();
            }

            async init() {
                try {
                    // التأكد من اتصال Firestore
                    await ensureDbReady();

                    // شحن الهيكل الثابت
                    await this.loadStaticComponents();

                    // وظيفة التنقل العالمية
                    window.navigateTo = (moduleName) => {
                        window.location.hash = `#${moduleName}`;
                    };

                    window.addEventListener('hashchange', () => this.route());
                    
                    // تشغيل الراوتر
                    this.route(); 

                } catch (err) {
                    console.error("🔴 Boot Error:", err);
                    this.container.innerHTML = `<div class="text-center p-5 mt-5">
                        <h2 class="text-danger">عذراً، فشل تشغيل محرك تيرا</h2>
                        <p>${err.message}</p>
                        <button class="btn btn-warning" onclick="location.reload()">تحديث الصفحة</button>
                    </div>`;
                }
            }

            async loadStaticComponents() {
                const components = [
                    { id: 'sidebar-container', name: 'sidebar' },
                    { id: 'header-container', name: 'header' }
                ];

                for (const comp of components) {
                    try {
                        const res = await fetch(`./admin/components/${comp.name}.html?v=${this.version}`);
                        if (res.ok) {
                            document.getElementById(comp.id).innerHTML = await res.text();
                        }
                    } catch (e) { console.warn(`Component fail: ${comp.name}`); }
                }
            }

            async route() {
                const hash = window.location.hash.replace('#', '') || 'dashboard';
                
                // إظهار اللودر
                this.container.innerHTML = `<div class="loader-box"><div class="spinner-tera"></div></div>`;

                try {
                    if (hash === 'customers') {
                        // تشغيل موديول العملاء المطور
                        await initCustomers(this.container);
                    } else {
                        // تحميل الموديولات الأخرى
                        const res = await fetch(`./admin/modules/${hash}.html?v=${this.version}`);
                        if (res.ok) {
                            this.container.innerHTML = await res.text();
                        } else {
                            throw new Error("Module Not Found");
                        }
                    }
                    this.updateActiveUI(hash);
                } catch (e) {
                    this.container.innerHTML = `<div class="text-center p-5 mt-5"><h3 class="text-muted">القسم [${hash}] غير متوفر حالياً</h3></div>`;
                }
            }

            updateActiveUI(hash) {
                document.querySelectorAll('.nav-link, .nav-item').forEach(el => {
                    const moduleAttr = el.getAttribute('data-module') || el.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                    el.classList.toggle('active', moduleAttr === hash);
                });
            }
        }

        // إطلاق التطبيق
        window.Tera = new TeraApp();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
