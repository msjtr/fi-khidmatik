<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | تيرا جيت واي</title>
    
    <link rel="icon" href="data:,">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="./css/admin.css">

    <style>
        /* تنسيق أولي لضمان عدم تداخل العناصر قبل تحميل المكونات */
        .admin-layout { display: flex; min-height: 100vh; }
        .main-body { flex-grow: 1; background: #f8fafc; transition: all 0.3s; }
        .loader-wrapper { display: flex; justify-content: center; align-items: center; height: 300px; }
    </style>
</head>
<body>

    <div class="admin-layout">
        <aside id="sidebar-placeholder"></aside>

        <main class="main-body">
            <header id="header-placeholder"></header>

            <div id="main-content-area" style="padding: 25px;">
                <div class="loader-wrapper">
                    <div style="text-align: center;">
                        <i class="fas fa-circle-notch fa-spin fa-3x" style="color: #2563eb;"></i>
                        <p style="margin-top: 15px; font-weight: bold;">جاري تحميل نظام تيرا...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modals-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script type="module">
        // تم تعديل المسار ليكون مباشراً من المجلد الرئيسي كما في هيكلتك
        import { initCustomersUI } from './js/modules/customers-ui.js';

        // دالة جلب المكونات الفرعية (HTML)
        async function fetchComponent(id, path) {
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`ملف غير موجود: ${path}`);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
                return true;
            } catch (err) {
                console.error(`❌ خطأ في تحميل ${id}:`, err.message);
                return false;
            }
        }

        async function initializeApp() {
            try {
                // تحميل المكونات من مجلد admin/components
                await Promise.all([
                    fetchComponent('sidebar-placeholder', './admin/components/sidebar.html'),
                    fetchComponent('header-placeholder', './admin/components/header.html'),
                    fetchComponent('modals-placeholder', './admin/components/modals.html')
                ]);

                // تشغيل واجهة إدارة العملاء
                const container = document.getElementById('main-content-area');
                if (container) {
                    await initCustomersUI(container);
                }

                // تشغيل محرر النصوص Quill بعد تأكد تحميل المودال
                if (document.querySelector('#cust-notes-editor')) {
                    window.quill = new Quill('#cust-notes-editor', {
                        theme: 'snow',
                        placeholder: 'ملاحظات إضافية عن العميل...',
                        modules: { 
                            toolbar: [['bold', 'italic', 'underline'], [{ 'color': [] }], ['link']] 
                        }
                    });
                }

                // ضبط مسار الشعار في الهيدر أو السايدبار
                document.querySelectorAll('.logo-img').forEach(img => {
                    img.src = './images/logo.svg';
                });

                console.log("✅ تم تشغيل نظام تيرا جيت واي بنجاح.");

            } catch (error) {
                console.error("❌ حدث خطأ أثناء تشغيل النظام:", error);
                document.getElementById('main-content-area').innerHTML = `
                    <div style="background: #fee2e2; border: 1px solid #ef4444; padding: 20px; border-radius: 12px; color: #b91c1c;">
                        <h3 style="margin-top: 0;">تعذر تحميل النظام</h3>
                        <p>تأكد من وجود ملفات البرمجة والمكونات في مساراتها الصحيحة.</p>
                        <code>${error.message}</code>
                    </div>
                `;
            }
        }

        // بدء التشغيل فور اكتمال تحميل الصفحة
        window.addEventListener('DOMContentLoaded', initializeApp);
    </script>

</body>
</html>
