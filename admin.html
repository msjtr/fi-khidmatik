<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tera Gateway | لوحة التحكم المتكاملة</title>
    
    <link rel="icon" href="/fi-khidmatik/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/fi-khidmatik/css/admin.css">
    <link rel="stylesheet" href="/fi-khidmatik/css/table.css">
    
    <link rel="stylesheet" href="/fi-khidmatik/css/customers.css">

    <style>
        :root { 
            --primary: #e67e22; 
            --dark: #1e293b; 
            --bg: #f8fafc; 
            --sidebar-width: 260px; 
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); height: 100vh; overflow: hidden; }
        
        .app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        /* الهيدر العلوي */
        .app-header {
            background: white; padding: 0 25px; display: flex; justify-content: space-between;
            align-items: center; height: 70px; box-shadow: 0 2px 15px rgba(0,0,0,0.04); z-index: 1001;
        }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .sidebar-trigger { background: #fef5e8; border: none; font-size: 1.2rem; cursor: pointer; color: var(--primary); padding: 10px; border-radius: 8px; transition: 0.3s; }
        .sidebar-trigger:hover { background: var(--primary); color: white; }
        .app-brand { font-weight: 800; font-size: 1.3rem; color: var(--dark); display: flex; align-items: center; gap: 12px; }
        .app-brand img { width: 42px; height: 42px; object-fit: contain; }
        .header-clock { font-size: 0.85rem; color: #64748b; font-weight: 600; text-align: left; }

        /* الجسم الرئيسي */
        .app-body { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* القائمة الجانبية المحدثة */
        .app-sidebar {
            width: var(--sidebar-width); background: white; border-left: 1px solid #edf2f7;
            transition: var(--transition); z-index: 1000; display: flex; flex-direction: column;
        }
        .app-sidebar.is-closed { width: 0; transform: translateX(100%); visibility: hidden; }

        .side-nav ul { list-style: none; padding: 10px 0; }
        .nav-item {
            padding: 14px 22px; display: flex; align-items: center; gap: 14px;
            color: #64748b; text-decoration: none; font-weight: 600; transition: 0.2s;
            border-right: 4px solid transparent; cursor: pointer; border-radius: 0 50px 50px 0;
            margin: 4px 0 4px 15px;
        }
        .nav-item:hover, .nav-item.active { background: #fef5e8; color: var(--primary); border-right-color: var(--primary); }
        .nav-item i { width: 20px; font-size: 1.1rem; text-align: center; }

        /* منطقة المحتوى */
        .app-content { flex: 1; overflow-y: auto; padding: 0; background: #f8fafc; position: relative; scroll-behavior: smooth; }
        
        #module-container { padding: 25px; min-height: 100%; }

        /* شاشة التحميل الذكية */
        #loader {
            position: absolute; inset: 0; background: rgba(255,255,255,0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 768px) {
            .app-sidebar { position: fixed; height: calc(100% - 70px); top: 70px; right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
            .header-clock { display: none; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="app-header">
        <div class="header-right">
            <button id="sidebar-toggle" class="sidebar-trigger" title="قائمة التحكم">
                <i class="fas fa-bars-staggered"></i>
            </button>
            <div class="app-brand">
                <img src="/fi-khidmatik/images/logo.svg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968322.png'" alt="Tera Logo">
                <span>Tera Gateway</span>
            </div>
        </div>
        <div id="current-datetime" class="header-clock"></div>
    </header>

    <div class="app-body">
        <aside id="main-sidebar" class="app-sidebar">
            <nav class="side-nav">
                <div style="padding: 20px 25px 10px; font-size: 0.7rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">النظام الرئيسي</div>
                <ul id="admin-menu">
                    <a href="#dashboard" class="nav-item active" data-module="dashboard"><i class="fas fa-chart-pie"></i> <span>الإحصائيات</span></a>
                    <a href="#products" class="nav-item" data-module="products"><i class="fas fa-boxes-stacked"></i> <span>المنتجات</span></a>
                    <a href="#orders" class="nav-item" data-module="orders"><i class="fas fa-receipt"></i> <span>الطلبات</span></a>
                    <a href="#customers" class="nav-item" data-module="customers"><i class="fas fa-users-gear"></i> <span>العملاء</span></a>
                    <a href="#settings" class="nav-item" data-module="settings"><i class="fas fa-gears"></i> <span>الإعدادات</span></a>
                </ul>
            </nav>
            <div style="margin-top: auto; padding: 20px; border-top: 1px solid #f1f5f9; font-size: 0.75rem; color: #cbd5e1; text-align: center;">
                v4.1 Build 2026
            </div>
        </aside>

        <main class="app-content" id="scroll-target">
            <div id="loader">
                <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary);"></i>
                <p style="margin-top:15px; font-weight:700; color: var(--dark);">جاري تحميل الموديول...</p>
            </div>
            
            <div id="module-container">
                </div>
        </main>
    </div>
</div>

<script type="module" src="/fi-khidmatik/js/main.js"></script>

<script>
    (function() {
        // 1. تحديث الوقت الحي (السعودية)
        function updateTime() {
            const el = document.getElementById('current-datetime');
            if (el) {
                const now = new Date();
                el.innerText = now.toLocaleDateString('ar-SA', {
                    weekday: 'long', day: 'numeric', month: 'long',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
            }
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. التحكم السلس في القائمة الجانبية
        const toggleBtn = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('main-sidebar');
        if (toggleBtn && sidebar) {
            toggleBtn.onclick = () => sidebar.classList.toggle('is-closed');
        }

        // 3. إدارة حالة العناصر النشطة (Active State)
        window.setActiveNavItem = function(moduleName) {
            document.querySelectorAll('#admin-menu .nav-item').forEach(item => {
                const isActive = item.getAttribute('data-module') === moduleName;
                item.classList.toggle('active', isActive);
            });
        };

        // 4. السيطرة على الـ Loader برمجياً
        window.toggleLoader = function(show) {
            const loader = document.getElementById('loader');
            if (loader) loader.style.display = show ? 'flex' : 'none';
        };

        // إغلاق القائمة تلقائياً في الشاشات الصغيرة عند اختيار عنصر
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                if (window.innerWidth < 768) {
                    sidebar.classList.add('is-closed');
                }
            });
        });

    })();
</script>
</body>
</html>
