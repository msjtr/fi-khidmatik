<header class="admin-header">
    <div class="header-right">
        <button id="sidebar-toggle" class="sidebar-btn"><i class="fas fa-bars"></i></button>
        <div class="logo-area">
            <img src="images/logo.svg" alt="Tera Gateway" class="logo-img" onerror="this.src='https://placehold.jp/e67e22/ffffff/50x50.png?text=T'">
            <span class="logo-text">Tera Gateway</span>
        </div>
    </div>
    <div id="current-datetime" class="datetime-display"></div>
</header>

<div class="main-layout">
    <aside id="sidebar-container" class="sidebar">
        <nav class="sidebar-nav">
            <ul id="main-menu">
                <li class="active" data-module="dashboard">
                    <i class="fas fa-th-large"></i> <span>الرئيسية</span>
                </li>
                <li data-module="products">
                    <i class="fas fa-box-open"></i> <span>المنتجات</span>
                </li>
                <li data-module="orders">
                    <i class="fas fa-file-invoice-dollar"></i> <span>الطلبات</span>
                </li>
                <li data-module="customers">
                    <i class="fas fa-user-friends"></i> <span>العملاء</span>
                </li>
                <li data-module="settings">
                    <i class="fas fa-cog"></i> <span>الإعدادات</span>
                </li>
            </ul>
        </nav>
    </aside>
    <main id="main-content" class="content-body">
        </main>
</div>
