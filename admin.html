<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
            --bg-color: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #sidebar-placeholder {
            width: var(--sidebar-width);
            height: 100%;
            background: #fff;
            flex-shrink: 0;
            border-left: 1px solid #e2e8f0;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header-placeholder {
            height: var(--header-height);
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }

        #main-content {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .loader-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>

        <div class="content-area">
            <div id="header-placeholder"></div>

            <main id="main-content">
                <div class="loader-box">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: #f97316;"></i>
                    <p style="margin-top: 15px; font-weight: bold;">جاري تحميل النظام...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        /**
         * دالة تحميل الملفات مع المسار الصحيح بناءً على الصورة
         * المسار: admin/components/
         */
        async function loadFile(targetId, fileName) {
            // إضافة "admin/" قبل "components/" لأن المجلد متداخل حسب الصورة
            const path = `admin/components/${fileName}`;
            
            try {
                console.log(`🔍 محاولة جلب: ${path}`);
                const response = await fetch(path);
                
                if (!response.ok) {
                    // تجربة المسار البديل في حال كان ملف admin.html داخل مجلد admin أصلاً
                    const fallbackPath = `components/${fileName}`;
                    console.warn(`⚠️ المسار الأول فشل، تجربة المسار البديل: ${fallbackPath}`);
                    const fallbackRes = await fetch(fallbackPath);
                    if (!fallbackRes.ok) throw new Error('File not found in both paths');
                    
                    const html = await fallbackRes.text();
                    document.getElementById(targetId).innerHTML = html;
                    return;
                }

                const html = await response.text();
                document.getElementById(targetId).innerHTML = html;
                console.log(`✅ تم تحميل: ${path}`);
            } catch (error) {
                console.error(`❌ فشل تحميل: ${fileName}`, error);
                document.getElementById(targetId).innerHTML = 
                    `<div style="color:red; padding:20px; text-align:center;">
                        خطأ 404: الملف ${fileName} غير موجود.<br>
                        تأكد من وجوده داخل: <b>admin/components/</b>
                    </div>`;
            }
        }

        // بدء التحميل عند جاهزية الصفحة
        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل الأجزاء الثابتة
            await Promise.all([
                loadFile('sidebar-placeholder', 'sidebar.html'),
                loadFile('header-placeholder', 'header.html'),
                loadFile('modals-placeholder', 'modals.html')
            ]);

            // تحميل الصفحة الرئيسية
            loadFile('main-content', 'dashboard.html');
        });

        // دوال المودال العالمية
        window.openCustomerModal = (title) => {
            const m = document.getElementById('customer-modal');
            if(m) { m.style.display = 'flex'; document.getElementById('modal-title').innerText = title; }
        };
        window.closeCustomerModal = () => {
            const m = document.getElementById('customer-modal');
            if(m) m.style.display = 'none';
        };
    </script>
</body>
</html>
