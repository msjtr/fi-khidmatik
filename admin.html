<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | تيرا جيت واي</title>
    
    <link rel="icon" href="data:,">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div class="admin-layout" style="display: flex; min-height: 100vh;">
        <aside id="sidebar-placeholder" style="width: 260px;"></aside>

        <main class="main-body" style="flex-grow: 1; background: #f8fafc;">
            <header id="header-placeholder"></header>

            <div id="main-content-area" style="padding: 25px;">
                <div class="loader">جاري تشغيل نظام تيرا...</div>
            </div>
        </main>
    </div>

    <div id="modals-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script type="module">
        // تأكد أن مسار JS يبدأ بـ ./admin/js أو حسب هيكلتك
        import { initCustomersUI } from './admin/js/modules/customers-ui.js';

        async function loadComponent(id, path) {
            try {
                const res = await fetch(path);
                if (!res.ok) throw new Error(`404: ${path}`);
                document.getElementById(id).innerHTML = await res.text();
            } catch (err) {
                console.error("خطأ في تحميل المكون:", err);
            }
        }

        async function startApp() {
            try {
                // تحميل المكونات من مجلد admin/components
                await Promise.all([
                    loadComponent('sidebar-placeholder', './admin/components/sidebar.html'),
                    loadComponent('header-placeholder', './admin/components/header.html'),
                    loadComponent('modals-placeholder', './admin/components/modals.html')
                ]);

                // تشغيل واجهة العملاء في الحاوية الرئيسية
                const container = document.getElementById('main-content-area');
                await initCustomersUI(container);

                // تفعيل محرر النصوص Quill
                if (document.querySelector('#cust-notes-editor')) {
                    window.quill = new Quill('#cust-notes-editor', {
                        theme: 'snow',
                        placeholder: 'اكتب ملاحظات العميل هنا...',
                        modules: { toolbar: [['bold', 'italic'], [{ 'color': [] }], ['link']] }
                    });
                }

                // ضبط مسار الشعار
                const logoImg = document.querySelector('.logo-img');
                if(logoImg) logoImg.src = './images/logo.svg';

                console.log("✅ نظام تيرا يعمل الآن بمسارات صحيحة.");

            } catch (err) {
                console.error("❌ فشل بدء التطبيق:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', startApp);
    </script>
</body>
</html>
