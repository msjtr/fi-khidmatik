<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تيرا جيت واي | لوحة الإدارة</title>
    
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/customers.css">

    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
            --primary-blue: #2563eb;
            --bg-body: #f1f5f9;
            --border-color: #e2e8f0;
        }
        body { margin: 0; font-family: 'Tajawal', sans-serif; background-color: var(--bg-body); display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        .main-wrapper { display: flex; width: 100%; height: 100%; }
        #sidebar-placeholder { width: var(--sidebar-width); height: 100%; background: #fff; flex-shrink: 0; border-left: 1px solid var(--border-color); z-index: 1000; }
        .content-area { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #header-placeholder { height: var(--header-height); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); z-index: 999; }
        #module-container { flex-grow: 1; padding: 20px; overflow-y: auto; scroll-behavior: smooth; }
        .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; background: var(--bg-body); position: absolute; top: 0; left: 0; z-index: 9999; transition: opacity 0.5s ease; }
        .loading-state.hidden { opacity: 0; pointer-events: none; }
        #module-container::-webkit-scrollbar { width: 6px; }
        #module-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <aside id="sidebar-placeholder"></aside>
        
        <div class="content-area">
            <header id="header-placeholder"></header>
            
            <main id="module-container">
                <div class="loading-state" id="main-loader">
                    <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary-blue);"></i>
                    <p style="margin-top: 20px; font-weight: 700; color: #1e293b;">جاري تحميل نظام تيرا جيت واي...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script>
        /**
         * دالة جلب المكونات
         * المسار هنا يشير إلى مجلد admin/components/ الموجود في نفس مستوى admin.html
         */
        async function loadCoreComponent(id, fileName) {
            const container = document.getElementById(id);
            const path = `admin/components/${fileName}`;
            
            try {
                const response = await fetch(`${path}?v=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                const html = await response.text();
                container.innerHTML = html;
                return true;
            } catch (err) {
                console.error(`❌ فشل تحميل: ${fileName}`, err);
                container.innerHTML = `<div style="color:red; padding:20px; text-align:center;">خطأ في تحميل ${fileName}</div>`;
                return false;
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات الأساسية
            await Promise.all([
                loadCoreComponent('sidebar-placeholder', 'sidebar.html'),
                loadCoreComponent('header-placeholder', 'header.html'),
                loadCoreComponent('modals-placeholder', 'modals.html')
            ]);

            // إخفاء الـ Loader
            const loader = document.getElementById('main-loader');
            if (loader) {
                loader.classList.add('hidden');
                setTimeout(() => loader.remove(), 600);
            }

            // تشغيل مسارات النظام (الراوتنج)
            if (typeof window.handleRoute === 'function') {
                window.handleRoute();
            }
        });
    </script>

    <script type="module" src="js/main.js"></script>

</body>
</html>
