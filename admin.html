<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="app-shell">
    <header class="app-header">
        <div class="app-brand"><span>Tera<b>Gateway</b></span></div>
        <div id="current-datetime" class="header-clock"></div>
    </header>

    <div class="app-body">
        <aside class="app-sidebar">
            <nav class="side-nav">
                <div class="nav-label">الرئيسية</div>
                <a class="nav-item" data-module="dashboard" style="cursor:pointer;"><i class="fas fa-chart-line"></i> الإحصائيات</a>
                
                <div class="nav-label">إدارة العمليات</div>
                <a class="nav-item active" data-module="customers" style="cursor:pointer;"><i class="fas fa-users"></i> قاعدة العملاء</a>
                <a class="nav-item" data-module="orders" style="cursor:pointer;"><i class="fas fa-file-signature"></i> طلبات الأقساط</a>
                
                <div class="nav-label">النظام</div>
                <a class="nav-item" data-module="reports" style="cursor:pointer;"><i class="fas fa-print"></i> التقارير</a>
                <a class="nav-item" data-module="settings" style="cursor:pointer;"><i class="fas fa-sliders"></i> الإعدادات</a>
            </nav>
        </aside>

        <main class="app-content">
            <div id="module-container"></div>
        </main>
    </div>
</div>

<script type="module">
    // تصحيح المسارات: إزالة السلاش الأول ليعمل على GitHub Pages
    // وتعديل مسار dashboard-core ليطابق مكانه الفعلي في /js/
    import { initCustomers } from './js/modules/customers-core.js';
    import { initDashboard } from './js/dashboard-core.js'; 
    
    const container = document.getElementById('module-container');

    async function loadModule(name) {
        container.innerHTML = '<div style="text-align:center; padding:100px;"><i class="fas fa-circle-notch fa-spin fa-3x" style="color:#1e293b"></i></div>';
        
        try {
            // المسار النسبي للموديولات
            const response = await fetch(`admin/modules/${name}.html`);
            if (!response.ok) throw new Error('Not Found');
            
            const html = await response.text();
            container.innerHTML = html;

            // تشغيل المنطق البرمجي بناءً على الصفحة
            if (name === 'customers') await initCustomers(container);
            if (name === 'dashboard') await initDashboard(container);
            
        } catch (error) {
            console.error("Module load error:", error);
            container.innerHTML = `<div style="text-align:center; padding:100px;"><h2>قسم ${name} قيد التجهيز أو غير موجود</h2><p>تأكد من رفع ملفات admin/modules/</p></div>`;
        }
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            loadModule(item.getAttribute('data-module'));
        });
    });

    // تحميل صفحة العملاء كبداية
    document.addEventListener('DOMContentLoaded', () => {
        loadModule('customers');
    });
</script>

<script>
    // تحديث الوقت والتاريخ
    function updateClock() {
        const now = new Date();
        const element = document.getElementById('current-datetime');
        if (element) {
            element.innerText = now.toLocaleDateString('ar-SA', {
                weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit'
            });
        }
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
