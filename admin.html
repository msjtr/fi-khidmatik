<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">

    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
            --primary-blue: #2563eb;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* حاوية القائمة الجانبية */
        #sidebar-placeholder {
            width: var(--sidebar-width);
            height: 100%;
            background: #fff;
            flex-shrink: 0;
            border-left: 1px solid #e2e8f0;
            z-index: 100;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* لمنع تداخل المحتوى مع الهيدر */
        }

        /* حاوية الهيدر */
        #header-placeholder {
            height: var(--header-height);
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        /* الحاوية الرئيسية للموديولات (التي يتم التبديل داخلها) */
        #module-container {
            flex-grow: 1;
            padding: 0; /* التنسيق يتم داخل الموديولات نفسها */
            overflow-y: auto;
            position: relative;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--primary-blue);
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <aside id="sidebar-placeholder"></aside>

        <div class="content-area">
            <header id="header-placeholder"></header>

            <main id="module-container">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p style="margin-top: 15px; font-weight: bold;">جاري تهيئة النظام...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        /**
         * دالة تحميل المكونات الثابتة
         */
        async function loadStaticComponent(id, fileName) {
            const path = `admin/components/${fileName}`;
            try {
                const response = await fetch(`${path}?v=${Date.now()}`);
                if (!response.ok) throw new Error('File not found');
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
                console.log(`✅ تم تحميل: ${fileName}`);
            } catch (err) {
                console.error(`❌ فشل تحميل ${fileName}:`, err);
            }
        }

        // تشغيل التحميل عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات الأساسية بالتوازي
            await Promise.all([
                loadStaticComponent('sidebar-placeholder', 'sidebar.html'),
                loadStaticComponent('header-placeholder', 'header.html'),
                loadStaticComponent('modals-placeholder', 'modals.html')
            ]);
            
            // بعد تحميل السايدبار، نتأكد من تفعيل نظام التوجيه
            if (window.handleRoute) {
                window.handleRoute(); 
            }
        });
    </script>

    <script type="module" src="js/main.js"></script>

</body>
</html>
