<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/table.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.ckeditor.com/ckeditor5/40.0.0/super-build/ckeditor.js"></script>
</head>
<body>
    <div id="app" style="display: flex; flex-direction: column; height: 100vh; overflow: hidden;">
        
        <header class="admin-header">
            <div class="logo">
                <img src="images/logo.svg" alt="Tera" class="header-logo-img" onerror="this.src='https://placehold.jp/e67e22/ffffff/50x50.png?text=T'">
                <h2>تيرا جيتواي</h2>
            </div>
            <div id="current-datetime" class="datetime"></div>
        </header>
        
        <div class="main-layout" style="display: flex; flex: 1; overflow: hidden;">
            
            <aside id="sidebar-container" class="sidebar">
                <nav class="sidebar-nav">
                    <ul id="main-menu">
                        <li class="active" data-module="dashboard">
                            <i class="fas fa-th-large"></i>
                            <span>الرئيسية</span>
                        </li>
                        <li data-module="products">
                            <i class="fas fa-box-open"></i>
                            <span>المنتجات</span>
                        </li>
                        <li data-module="orders">
                            <i class="fas fa-file-invoice-dollar"></i>
                            <span>الطلبات</span>
                        </li>
                        <li data-module="customers">
                            <i class="fas fa-user-friends"></i>
                            <span>العملاء</span>
                        </li>
                        <li data-module="settings">
                            <i class="fas fa-user-shield"></i>
                            <span>الإعدادات</span>
                        </li>
                    </ul>
                </nav>
            </aside>
            
            <main id="main-content" class="main-content">
                <div class="loader-wrapper" id="page-loader">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px; font-weight: 500; color: #64748b;">جاري التحميل...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modal-container"></div>

    <script>
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            const dtElement = document.getElementById('current-datetime');
            if(dtElement) dtElement.innerText = now.toLocaleDateString('ar-SA', options);
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
