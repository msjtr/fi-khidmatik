<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - متجرك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="admin/css/style.css">
    <link rel="stylesheet" href="admin/css/admin.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-white shadow-xl z-10 flex flex-col overflow-y-auto border-l border-gray-200">
            <div class="p-5 border-b border-gray-200 flex items-center gap-3">
                <i class="fas fa-crown text-2xl text-blue-600"></i>
                <div>
                    <h1 class="text-xl font-extrabold logo">متجرك الذكي</h1>
                    <p class="text-xs text-gray-500">نظام إدارة متكامل</p>
                </div>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="admin/modules/orders.html" target="contentFrame" class="sidebar-item" data-section="orders"><i class="fas fa-truck-fast w-6"></i> <span>الطلبات</span></a>
                <a href="admin/modules/customers.html" target="contentFrame" class="sidebar-item" data-section="customers"><i class="fas fa-users w-6"></i> <span>العملاء</span></a>
                <a href="admin/modules/products.html" target="contentFrame" class="sidebar-item" data-section="products"><i class="fas fa-boxes w-6"></i> <span>المنتجات</span></a>
                <a href="admin/modules/inventory.html" target="contentFrame" class="sidebar-item" data-section="inventory"><i class="fas fa-warehouse w-6"></i> <span>المخزون</span></a>
                <a href="admin/modules/payments.html" target="contentFrame" class="sidebar-item" data-section="payments"><i class="fas fa-credit-card w-6"></i> <span>طرق الدفع</span></a>
                <a href="admin/modules/invoice.html" target="contentFrame" class="sidebar-item" data-section="invoice"><i class="fas fa-file-invoice-dollar w-6"></i> <span>تعليمات الفاتورة</span></a>
                <a href="admin/modules/general.html" target="contentFrame" class="sidebar-item" data-section="general"><i class="fas fa-sliders-h w-6"></i> <span>الإعدادات العامة</span></a>
            </nav>
            <div class="p-4 border-t border-gray-200 text-xs text-gray-400 text-center">
                © 2025 جميع الحقوق محفوظة
            </div>
        </aside>
        <main class="flex-1 p-4 overflow-hidden bg-gray-50">
            <iframe name="contentFrame" id="contentFrame" src="admin/modules/orders.html" class="w-full h-full rounded-xl shadow-sm"></iframe>
        </main>
    </div>
    <script>
        const links = document.querySelectorAll('.sidebar-item');
        const iframe = document.getElementById('contentFrame');
        function setActive(section) {
            links.forEach(link => link.classList.remove('sidebar-active'));
            const activeLink = Array.from(links).find(link => link.getAttribute('data-section') === section);
            if (activeLink) activeLink.classList.add('sidebar-active');
        }
        iframe.addEventListener('load', () => {
            const src = iframe.contentWindow.location.pathname;
            const section = src.split('/').pop().replace('.html', '');
            setActive(section);
        });
        links.forEach(link => {
            link.addEventListener('click', () => {
                const section = link.getAttribute('data-section');
                setActive(section);
            });
        });
    </script>
</body>
</html>
