<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tera Gateway | نظام إدارة التقسيط الذكي</title>
    
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- استدعاء ملفات التنسيق المحدثة -->
    <link rel="stylesheet" href="css/admin.css?v=12.12.10">
    <link rel="stylesheet" href="css/sidebar.css?v=12.12.10"> 
    <link rel="stylesheet" href="css/table.css?v=12.12.10">
    <link rel="stylesheet" href="css/customers.css?v=12.12.10">

    <style>
        :root { 
            --tera-orange: #f97316;
            --tera-bg: #f8fafc; 
            --tera-dark: #0f172a;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--tera-bg); margin: 0; overflow: hidden; }
        .admin-layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        .main-wrapper { display: flex; flex-direction: column; flex: 1; min-width: 0; background: var(--tera-bg); }
        .content-area { flex: 1; padding: 20px; overflow-y: auto; scroll-behavior: smooth; }
        
        .loader-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; }
        .spinner-tera { width: 40px; height: 40px; border: 4px solid #f1f5f9; border-top: 4px solid var(--tera-orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="tera-gateway-v12">

    <div class="admin-layout">
        <aside id="sidebar-container"></aside>
        
        <main class="main-wrapper">
            <header id="header-container"></header>
            
            <!-- منطقة عرض الموديولات البرمجية -->
            <section id="module-container" class="content-area">
                <div class="loader-box">
                    <div class="spinner-tera"></div>
                    <p style="color: var(--tera-orange); margin-top: 15px;">Tera Engine v12.12.10</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { ensureDbReady } from './js/core/config.js';
        
        // استيراد الموديولات البرمجية مباشرة لضمان عملها
        import { initDashboard } from './js/modules/dashboard.js';
        import { initCustomers } from './js/modules/customers-ui.js';

        class TeraApp {
            constructor() {
                this.container = document.getElementById('module-container');
                this.version = "12.12.10";
                this.init();
            }

            async init() {
                try {
                    await ensureDbReady();

                    // تعريف وظيفة التنقل
                    window.navigateTo = (moduleName) => {
                        window.location.hash = `#${moduleName}`;
                    };

                    // تحميل الهيكل الثابت (القائمة والهيدر)
                    await this.loadStaticComponents();

                    window.addEventListener('hashchange', () => this.route());
                    this.route(); // تشغيل الراوتر لأول مرة

                } catch (err) {
                    console.error("System Boot Error:", err);
                    this.container.innerHTML = `<p style="color:red; text-align:center;">خطأ في تشغيل النظام: ${err.message}</p>`;
                }
            }

            async loadStaticComponents() {
                // شحن القائمة الجانبية والهيدر (بفرض أنها ملفات HTML بسيطة)
                const components = ['sidebar-container', 'header-container'];
                for (const id of components) {
                    const name = id.split('-')[0];
                    const res = await fetch(`./admin/components/${name}.html?v=${this.version}`);
                    if (res.ok) document.getElementById(id).innerHTML = await res.text();
                }
            }

            async route() {
                const hash = window.location.hash.replace('#', '') || 'dashboard';
                this.container.innerHTML = '<div class="loader-box"><div class="spinner-tera"></div></div>';

                // منطق التشغيل بناءً على الموديول
                try {
                    if (hash === 'dashboard') {
                        await initDashboard(this.container);
                    } else if (hash === 'customers') {
                        await initCustomers(this.container);
                    } else {
                        // في حال كان القسم مجرد ملف HTML بدون منطق برمجى معقد
                        const res = await fetch(`./admin/modules/${hash}.html?v=${this.version}`);
                        if (res.ok) this.container.innerHTML = await res.text();
                    }
                    
                    this.updateActiveLink(hash);
                } catch (e) {
                    console.error("Routing Error:", e);
                    this.container.innerHTML = `<div style="text-align:center; padding:50px;">
                        <h3>القسم (${hash}) تحت الصيانة</h3>
                        <button onclick="navigateTo('dashboard')">العودة للرئيسية</button>
                    </div>`;
                }
            }

            updateActiveLink(hash) {
                document.querySelectorAll('.nav-item').forEach(el => {
                    el.classList.toggle('active', el.getAttribute('data-module') === hash);
                });
            }
        }

        window.Tera = new TeraApp();
    </script>
</body>
</html>
