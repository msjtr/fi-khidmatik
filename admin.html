<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="app-shell">
    <header class="app-header">
        <div class="app-brand"><span>Tera<b>Gateway</b></span></div>
        <div id="current-datetime" class="header-clock"></div>
    </header>

    <div class="app-body">
        <aside class="app-sidebar">
            <nav class="side-nav">
                <div class="nav-label">الرئيسية</div>
                <a href="#dashboard" class="nav-item"><i class="fas fa-chart-line"></i> الإحصائيات</a>
                
                <div class="nav-label">إدارة العمليات</div>
                <a href="#customers" class="nav-item"><i class="fas fa-users"></i> قاعدة العملاء</a>
                <a href="#orders" class="nav-item"><i class="fas fa-file-signature"></i> طلبات الأقساط</a>
                <a href="#products" class="nav-item"><i class="fas fa-box-open"></i> المنتجات</a>
                
                <div class="nav-label">النظام</div>
                <a href="#reports" class="nav-item"><i class="fas fa-print"></i> التقارير</a>
                <a href="#settings" class="nav-item"><i class="fas fa-sliders"></i> الإعدادات</a>
            </nav>
        </aside>

        <main class="app-content">
            <div id="module-container">
                <div style="text-align:center; padding:50px; color:#64748b;">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                    <p style="margin-top:10px;">جاري تحميل لوحة التحكم...</p>
                </div>
            </div>
        </main>
    </div>
</div>

<script type="module" src="js/main.js"></script>

<script>
    /**
     * تحديث الساعة والتاريخ بشكل مستمر
     */
    function updateClock() {
        const now = new Date();
        const element = document.getElementById('current-datetime');
        if (element) {
            element.innerText = now.toLocaleDateString('ar-SA', {
                weekday: 'long', 
                day: 'numeric', 
                month: 'long', 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
        }
    }
    setInterval(updateClock, 1000);
    updateClock();

    /**
     * إدارة حالة القائمة الجانبية (Active Class)
     */
    function setActiveNavLink() {
        const hash = window.location.hash || '#dashboard';
        const navItems = document.querySelectorAll('.nav-item');
        
        navItems.forEach(item => {
            item.classList.remove('active');
            if(item.getAttribute('href') === hash) {
                item.classList.add('active');
            }
        });
    }

    // التنفيذ عند تغيير الرابط أو تحميل الصفحة
    window.addEventListener('hashchange', setActiveNavLink);
    window.addEventListener('DOMContentLoaded', setActiveNavLink);
</script>
</body>
</html>
