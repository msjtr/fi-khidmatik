<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيرا جيت واي | لوحة التحكم</title>
    
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css?v=2.1">
    <link rel="stylesheet" href="css/table.css?v=2.1">
    <link rel="stylesheet" href="css/customers.css?v=2.1">
</head>
<body class="tera-admin-body">

    <div class="admin-layout">
        <!-- القائمة الجانبية -->
        <div id="sidebar-container"></div>
        
        <main class="main-wrapper">
            <!-- الهيدر العلوي -->
            <div id="header-container"></div>
            
            <!-- منطقة المحتوى المتغيرة -->
            <section id="module-container" class="content-area">
                <div class="initial-loader">
                    <div class="spinner-tera"></div>
                    <p>جاري تشغيل محرك تيرا...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- المحرك الرئيسي للنظام -->
    <script type="module">
        // 1. استيراد الإعدادات والمحرك الرئيسي أولاً لضمان جاهزية Firebase
        import { db, auth } from './js/core/config.js';
        import './js/main.js';

        class TeraRouter {
            constructor() {
                this.moduleContainer = document.getElementById('module-container');
                
                // ذكاء اصطناعي لتحديد المسار: إذا كان على GitHub Pages يضيف اسم المستودع، وإذا كان محلياً يتركه فارغاً
                const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
                this.repoName = 'fi-khidmatik';
                this.baseUrl = isLocal ? window.location.origin : `${window.location.origin}/${this.repoName}`;
                
                this.version = Date.now();
                this.init();
            }

            async init() {
                try {
                    // تحميل المكونات الأساسية
                    await Promise.all([
                        this.loadComponent('sidebar-container', `${this.baseUrl}/admin/components/sidebar.html`),
                        this.loadComponent('header-container', `${this.baseUrl}/admin/components/header.html`)
                    ]);

                    window.addEventListener('hashchange', () => this.handleRouting());
                    this.handleRouting();
                } catch (err) {
                    console.error("🔴 Tera Router Init Error:", err);
                }
            }

            async loadComponent(containerId, path) {
                try {
                    const response = await fetch(`${path}?v=${this.version}`);
                    if (!response.ok) throw new Error(`Status: ${response.status}`);
                    const html = await response.text();
                    document.getElementById(containerId).innerHTML = html;
                } catch (e) {
                    console.error(`❌ Failed to load component: ${path}`, e);
                }
            }

            async handleRouting() {
                const hash = window.location.hash || '#dashboard';
                const moduleName = hash.replace('#', '');
                
                // مؤشر تحميل لطيف
                this.moduleContainer.innerHTML = `
                    <div class="initial-loader">
                        <div class="spinner-tera"></div>
                        <p>جاري تحميل ${moduleName}...</p>
                    </div>`;
                
                try {
                    const response = await fetch(`${this.baseUrl}/admin/modules/${moduleName}.html?v=${this.version}`);
                    if (!response.ok) throw new Error('Module Not Found');
                    
                    const html = await response.text();
                    this.moduleContainer.innerHTML = html;
                    
                    // تشغيل المنطق البرمجي الخاص بالموديول
                    await this.initModuleJS(moduleName);
                } catch (e) {
                    this.renderError(moduleName);
                }
            }

            async initModuleJS(name) {
                const jsMap = {
                    'customers': './js/modules/customers-ui.js',
                    'orders': './js/modules/orders.js',
                    'products': './js/modules/products-ui.js'
                };

                if (jsMap[name]) {
                    try {
                        const moduleUrl = `${jsMap[name]}?v=${this.version}`;
                        const module = await import(moduleUrl);
                        
                        // بناء اسم الدالة تلقائياً: customers -> initCustomersUI
                        const funcName = `init${name.charAt(0).toUpperCase() + name.slice(1)}UI`;
                        
                        if (typeof module[funcName] === 'function') {
                            await module[funcName](this.moduleContainer);
                            console.log(`✅ [${name}] تم الربط بنجاح`);
                        }
                    } catch (err) {
                        console.error(`🔴 Logic Error in [${name}]:`, err);
                    }
                }
            }

            renderError(module) {
                this.moduleContainer.innerHTML = `
                    <div style="text-align:center; padding:100px 20px;">
                        <i class="fas fa-search fa-4x" style="color:#cbd5e1; margin-bottom:20px;"></i>
                        <h2>الموديول [${module}] غير جاهز بعد</h2>
                        <p>يرجى التأكد من إضافة الملف في المسار: admin/modules/${module}.html</p>
                        <button onclick="window.location.hash='#dashboard'" class="btn-back">العودة للرئيسية</button>
                    </div>`;
            }
        }

        // تشغيل المحرك بعد التأكد من جاهزية الـ DOM
        window.addEventListener('DOMContentLoaded', () => {
            window.teraApp = new TeraRouter();
        });
    </script>

    <style>
        :root { --tera-orange: #f97316; --tera-slate: #1e293b; --tera-bg: #f1f5f9; }
        body { margin: 0; background: var(--tera-bg); font-family: 'Cairo', sans-serif; overflow: hidden; }
        .admin-layout { display: flex; height: 100vh; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-area { flex: 1; overflow-y: auto; padding: 25px; }
        .initial-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; }
        .spinner-tera { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: var(--tera-orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        .btn-back { background: var(--tera-orange); color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; margin-top: 20px; font-family: 'Cairo'; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
