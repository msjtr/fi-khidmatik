<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيرا جيت واي | لوحة التحكم</title>
    
    <!-- الروابط الأساسية -->
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- ملفات الستايل المحدثة -->
    <link rel="stylesheet" href="css/admin.css?v=12.12.6">
    <link rel="stylesheet" href="css/sidebar.css?v=12.12.6"> <!-- المسار المعتمد -->
    <link rel="stylesheet" href="css/table.css?v=12.12.6">
    <link rel="stylesheet" href="css/customers.css?v=12.12.6">

    <style>
        /* لودر احترافي أثناء التنقل بين الموديولات */
        .loader-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: #f97316;
        }
        .spinner-tera {
            width: 40px;
            height: 40px;
            border: 4px solid #f1f5f9;
            border-top: 4px solid #f97316;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="tera-admin-body">

    <div class="admin-layout">
        <!-- الحاوية الأساسية للسايدبار (سيتم حقن المكون بداخلها) -->
        <div id="sidebar-container" class="sidebar-container"></div>
        
        <main class="main-wrapper">
            <!-- الهيدر العلوي -->
            <header id="header-container" class="top-bar"></header>
            
            <!-- منطقة عرض المحتوى المتغيرة -->
            <section id="module-container" class="content-area">
                <div class="loader-box">
                    <div class="spinner-tera"></div>
                    <p style="margin-top: 15px; font-weight: bold; color: #64748b;">جاري تشغيل محرك تيرا...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- المحرك الرئيسي -->
    <script type="module">
        import { db, auth } from './js/core/config.js';
        import './js/main.js';

        class TeraRouter {
            constructor() {
                this.moduleContainer = document.getElementById('module-container');
                const hostname = window.location.hostname;
                
                // تحديد المسار الأساسي ديناميكياً
                this.baseUrl = hostname.includes('github.io') ? '/fi-khidmatik' : '';
                this.version = "12.12.6";
                this.init();
            }

            async init() {
                try {
                    // تحميل المكونات الهيكلية (السايدبار والهيدر)
                    await Promise.all([
                        this.loadComponent('sidebar-container', `${this.baseUrl}/admin/components/sidebar.html`),
                        this.loadComponent('header-container', `${this.baseUrl}/admin/components/header.html`)
                    ]);

                    // تفعيل مراقب تغيير الروابط
                    window.addEventListener('hashchange', () => this.handleRouting());
                    
                    // تشغيل التوجيه لأول مرة بناءً على الـ Hash الحالي
                    this.handleRouting();

                } catch (err) {
                    console.error("🔴 Router Init Error:", err);
                }
            }

            async loadComponent(containerId, path) {
                try {
                    const response = await fetch(`${path}?v=${this.version}`);
                    if (!response.ok) throw new Error(`Status: ${response.status}`);
                    const html = await response.text();
                    document.getElementById(containerId).innerHTML = html;
                } catch (e) { 
                    console.error(`❌ Component Fail: ${path}`, e); 
                }
            }

            async handleRouting() {
                const hash = window.location.hash || '#dashboard';
                const moduleName = hash.replace('#', '');
                
                // تحديد مجلد الملف (dashboard في components والبقية في modules)
                const folder = (moduleName === 'dashboard') ? 'components' : 'modules';
                const modulePath = `${this.baseUrl}/admin/${folder}/${moduleName}.html`;
                
                try {
                    this.moduleContainer.innerHTML = '<div class="loader-box"><div class="spinner-tera"></div></div>';

                    const response = await fetch(`${modulePath}?v=${this.version}`);
                    if (!response.ok) throw new Error(`Module not found`);

                    const content = await response.text();
                    this.moduleContainer.innerHTML = content;
                    
                    // مزامنة حالة القائمة الجانبية (Active Class)
                    if (window.syncNavigationUI) {
                        window.syncNavigationUI(hash);
                    }

                } catch (e) {
                    this.moduleContainer.innerHTML = `
                        <div class="loader-box" style="color:#ef4444;">
                            <i class="fas fa-exclamation-circle fa-3x"></i>
                            <h2 style="margin-top:20px;">خطأ في تحميل النظام</h2>
                            <p>الموديول [${moduleName}] غير موجود في المسار المحدد.</p>
                        </div>
                    `;
                }
            }
        }

        // تشغيل الراوتر
        window.addEventListener('DOMContentLoaded', () => { 
            window.teraApp = new TeraRouter(); 
        });
    </script>
</body>
</html>
