<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tera Gateway | نظام إدارة التقسيط الذكي</title>
    
    <!-- الهوية البصرية والخطوط -->
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- مكتبات الدعم الخارجية -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- استدعاء ملفات التنسيق المحدثة v12.12.12 -->
    <link rel="stylesheet" href="css/admin.css?v=12.12.12">
    <link rel="stylesheet" href="css/sidebar.css?v=12.12.12"> 
    <link rel="stylesheet" href="css/table.css?v=12.12.12">
    <link rel="stylesheet" href="css/customers.css?v=12.12.12">
    <link rel="stylesheet" href="css/modals.css?v=12.12.12">

    <style>
        :root { 
            --tera-orange: #f97316;
            --tera-bg: #f8fafc; 
            --tera-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--tera-bg); 
            margin: 0; 
            overflow: hidden; 
            color: var(--tera-dark);
        }

        /* تخطيط الإدارة الرئيسي */
        .admin-layout { 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }

        .main-wrapper { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            min-width: 0; 
            background: var(--tera-bg);
            position: relative;
        }

        .content-area { 
            flex: 1; 
            padding: 0; 
            overflow-y: auto; 
            scroll-behavior: smooth;
        }

        /* تأثيرات الانتقال الاحترافية */
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* مؤشر تحميل تيرا */
        .loader-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
        }

        .spinner-tera { 
            width: 50px; 
            height: 50px; 
            border: 4px solid #e2e8f0; 
            border-top: 4px solid var(--tera-orange); 
            border-radius: 50%; 
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* تخصيص السكرول بار ليناسب التصميم الحديث */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--tera-orange); }
    </style>
</head>
<body class="tera-gateway-v12">

    <div class="admin-layout">
        <!-- القائمة الجانبية (تشحن من sidebar.html) -->
        <aside id="sidebar-container"></aside>
        
        <main class="main-wrapper">
            <!-- الهيدر العلوي (يشحن من header.html) -->
            <header id="header-container"></header>
            
            <!-- منطقة حقن الموديولات الديناميكية -->
            <section id="module-container" class="content-area">
                <div class="loader-box">
                    <div class="spinner-tera"></div>
                    <p style="color: var(--tera-orange); margin-top: 20px; font-weight: 700; letter-spacing: 1px;">TERA ENGINE v12.12.12</p>
                </div>
            </section>
        </main>
    </div>

    <!-- حاوية النوافذ المنبثقة المستقلة -->
    <div id="modal-root"></div>

    <!-- المحرك الرئيسي للنظام -->
    <script type="module">
        import { ensureDbReady } from './js/core/config.js';
        import { initCustomers } from './js/modules/customers-ui.js';

        class TeraApp {
            constructor() {
                this.container = document.getElementById('module-container');
                this.version = "12.12.12";
                this.init();
            }

            async init() {
                try {
                    // 1. التأكد من جهوزية Firestore قبل أي عملية
                    await ensureDbReady();

                    // 2. شحن المكونات الهيكلية (Sidebar/Header)
                    await this.loadStaticComponents();

                    // 3. تعريف وظيفة التنقل العالمية
                    window.navigateTo = (moduleName) => {
                        window.location.hash = `#${moduleName}`;
                    };

                    window.addEventListener('hashchange', () => this.route());
                    
                    // تشغيل الراوتر الافتراضي
                    this.route(); 

                } catch (err) {
                    console.error("🔴 System Boot Error:", err);
                    this.container.innerHTML = `
                        <div class="text-center p-5">
                            <i class="fas fa-wifi-slash fa-3x text-danger mb-3"></i>
                            <h2 class="fw-bold">خطأ في الاتصال بالسحابة</h2>
                            <p class="text-muted">${err.message}</p>
                            <button class="btn btn-orange mt-3" onclick="location.reload()">محاولة التوصيل مجدداً</button>
                        </div>`;
                }
            }

            async loadStaticComponents() {
                const components = [
                    { id: 'sidebar-container', name: 'sidebar' },
                    { id: 'header-container', name: 'header' }
                ];

                for (const comp of components) {
                    try {
                        const res = await fetch(`./admin/components/${comp.name}.html?v=${this.version}`);
                        if (res.ok) {
                            document.getElementById(comp.id).innerHTML = await res.text();
                        }
                    } catch (e) { console.warn(`Component load failed: ${comp.name}`); }
                }
            }

            async route() {
                const hash = window.location.hash.replace('#', '') || 'dashboard';
                
                // إظهار اللودر عند التبديل بين الأقسام
                this.container.innerHTML = `
                    <div class="loader-box animate-fade-in">
                        <div class="spinner-tera"></div>
                    </div>`;

                try {
                    if (hash === 'customers') {
                        // استدعاء موديول العملاء المطور V12.12.12
                        await initCustomers(this.container);
                    } else {
                        // تحميل موديولات الـ HTML التقليدية
                        const res = await fetch(`./admin/modules/${hash}.html?v=${this.version}`);
                        if (res.ok) {
                            this.container.innerHTML = await res.text();
                        } else {
                            throw new Error("Module Not Found");
                        }
                    }
                    this.updateActiveUI(hash);
                } catch (e) {
                    this.container.innerHTML = `
                        <div class="text-center p-5 mt-5">
                            <i class="fas fa-layer-group fa-3x text-light mb-3"></i>
                            <h3 class="text-muted">القسم [${hash}] تحت الصيانة أو غير موجود</h3>
                            <a href="#dashboard" class="btn btn-outline-primary mt-3 rounded-pill">العودة للرئيسية</a>
                        </div>`;
                }
            }

            updateActiveUI(hash) {
                document.querySelectorAll('.nav-link, .nav-item').forEach(el => {
                    const moduleAttr = el.getAttribute('data-module') || el.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                    el.classList.toggle('active', moduleAttr === hash);
                });
            }
        }

        // إطلاق محرك تيرا
        window.Tera = new TeraApp();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
