<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>
        body { background: #f1f5f9; font-family: 'Tahoma', system-ui; }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #374151;
        }
        .sidebar-item:hover { background-color: #f3f4f6; }
        .sidebar-active {
            background-color: #eff6ff;
            color: #1e40af;
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        iframe {
            width: 100%;
            height: calc(100vh - 2rem);
            border: none;
            background: #f9fafb;
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="antialiased">
    <div class="flex h-screen overflow-hidden">
        <!-- الشريط الجانبي -->
        <aside class="w-72 bg-white shadow-xl z-10 flex flex-col overflow-y-auto border-l border-gray-200">
            <div class="p-5 border-b border-gray-200">
                <h1 class="text-2xl font-extrabold text-blue-700"><i class="fas fa-tachometer-alt ml-2"></i>لوحة التحكم</h1>
                <p class="text-xs text-gray-500 mt-1">إدارة شاملة • متجرك الذكي</p>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="modules/orders.html" target="contentFrame" class="sidebar-item" data-section="orders"><i class="fas fa-truck-fast w-6"></i> <span>الطلبات</span></a>
                <a href="modules/customers.html" target="contentFrame" class="sidebar-item" data-section="customers"><i class="fas fa-users w-6"></i> <span>العملاء</span></a>
                <a href="modules/products.html" target="contentFrame" class="sidebar-item" data-section="products"><i class="fas fa-boxes w-6"></i> <span>المنتجات</span></a>
                <a href="modules/inventory.html" target="contentFrame" class="sidebar-item" data-section="inventory"><i class="fas fa-warehouse w-6"></i> <span>المخزون</span></a>
                <a href="modules/payments.html" target="contentFrame" class="sidebar-item" data-section="payments"><i class="fas fa-credit-card w-6"></i> <span>طرق الدفع</span></a>
                <a href="modules/invoice.html" target="contentFrame" class="sidebar-item" data-section="invoice"><i class="fas fa-file-invoice-dollar w-6"></i> <span>تعليمات الفاتورة</span></a>
                <a href="modules/general.html" target="contentFrame" class="sidebar-item" data-section="general"><i class="fas fa-sliders-h w-6"></i> <span>الإعدادات العامة</span></a>
            </nav>
            <div class="p-4 border-t border-gray-200 text-xs text-gray-400">نظام إداري متكامل v7.0</div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="flex-1 p-4 overflow-hidden">
            <iframe name="contentFrame" id="contentFrame" src="modules/orders.html" class="w-full h-full"></iframe>
        </main>
    </div>

    <script>
        // إضافة class active للعنصر النشط في الشريط الجانبي
        const links = document.querySelectorAll('.sidebar-item');
        const iframe = document.getElementById('contentFrame');
        
        function setActive(section) {
            links.forEach(link => link.classList.remove('sidebar-active'));
            const activeLink = Array.from(links).find(link => link.getAttribute('data-section') === section);
            if (activeLink) activeLink.classList.add('sidebar-active');
        }
        
        iframe.addEventListener('load', () => {
            // استخراج القسم من عنوان iframe
            const src = iframe.contentWindow.location.pathname;
            const section = src.split('/').pop().replace('.html', '');
            setActive(section);
        });
        
        // عند النقر على رابط، تفعيل الـ active فوراً
        links.forEach(link => {
            link.addEventListener('click', () => {
                const section = link.getAttribute('data-section');
                setActive(section);
            });
        });
    </script>
</body>
</html>
