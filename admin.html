<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="admin/css/admin.css">

    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #sidebar-placeholder {
            width: var(--sidebar-width);
            height: 100%;
            background: #fff;
            flex-shrink: 0;
            border-left: 1px solid #e2e8f0;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header-placeholder {
            height: var(--header-height);
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }

        /* الحاوي الذي يحتاجه main.js */
        #module-container {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #2563eb;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>

        <div class="content-area">
            <div id="header-placeholder"></div>

            <main id="module-container">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p style="margin-top: 15px; font-weight: bold;">جاري تشغيل النظام...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        /**
         * دالة تحميل المكونات الثابتة
         */
        async function loadStatic(id, fileName) {
            const path = `admin/components/${fileName}`;
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error('Not Found');
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
            } catch (err) {
                console.error(`❌ فشل تحميل المكون: ${path}`);
            }
        }

        // تحميل الهيكل الأساسي قبل تشغيل الـ JS الرئيسي
        window.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadStatic('sidebar-placeholder', 'sidebar.html'),
                loadStatic('header-placeholder', 'header.html'),
                loadStatic('modals-placeholder', 'modals.html')
            ]);
        });
    </script>

    <script type="module" src="js/main.js"></script>

</body>
</html>
