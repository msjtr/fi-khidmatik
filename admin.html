<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيرا جيت واي | لوحة التحكم المركزية</title>
    
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/customers.css">
</head>
<body class="tera-admin-body">

    <div class="admin-layout">
        <div id="sidebar-container"></div>

        <main class="main-wrapper">
            <div id="header-container">
                <header class="top-bar-placeholder" style="height: 70px; background: white; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; padding: 0 30px;">
                    <div class="loading-pulse" style="color: #94a3b8; font-weight: 600;"><i class="fas fa-circle-notch fa-spin"></i> جاري ربط محرك تيرا...</div>
                </header>
            </div>

            <section id="module-container" class="content-area">
                <div class="initial-loader">
                    <div class="spinner-tera"></div>
                    <p style="margin-top: 20px; font-weight: 700; color: #64748b;">جاري المزامنة...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-container"></div>

    <script type="module">
        // استيراد التهيئة الأساسية
        import './js/core/firebase.js'; 
        import './js/main.js';          

        class TeraRouter {
            constructor() {
                this.moduleContainer = document.getElementById('module-container');
                // نستخدم ./ لضمان المسار الصحيح من المجلد الرئيسي
                this.basePath = './admin'; 
                this.init();
            }

            async init() {
                try {
                    // تحميل المكونات الأساسية بالتوازي لسرعة الأداء
                    await Promise.all([
                        this.loadComponent('sidebar-container', `${this.basePath}/components/sidebar.html`),
                        this.loadComponent('header-container', `${this.basePath}/components/header.html`),
                        this.loadComponent('modal-container', `${this.basePath}/components/modals.html`).catch(() => {})
                    ]);

                    window.addEventListener('hashchange', () => this.handleRouting());
                    this.handleRouting();
                } catch (err) {
                    console.error("Initialization Error:", err);
                }
            }

            async loadComponent(containerId, path) {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`Missing ${path}`);
                const html = await response.text();
                const container = document.getElementById(containerId);
                container.innerHTML = html;
                this.executeScripts(container);
            }

            async handleRouting() {
                const hash = window.location.hash || '#dashboard';
                const moduleName = hash.replace('#', '');
                
                this.moduleContainer.innerHTML = `
                    <div class="initial-loader" style="animation: fadeIn 0.3s ease;">
                        <div class="spinner-tera"></div>
                        <p style="margin-top: 15px; font-weight: 700; color: #64748b;">جاري تحميل ${moduleName}...</p>
                    </div>
                `;

                try {
                    const response = await fetch(`${this.basePath}/modules/${moduleName}.html`);
                    if (!response.ok) throw new Error('Module not found');
                    const html = await response.text();
                    
                    this.moduleContainer.innerHTML = html;
                    this.executeScripts(this.moduleContainer);

                    // تحديث حالة القائمة الجانبية (Active)
                    this.updateActiveLinks(moduleName);

                    // تحميل المنطق البرمجي (JS) الخاص بالموديول بناءً على شجرتك
                    this.initModuleJS(moduleName);

                } catch (error) {
                    this.showError(moduleName);
                }
            }

            async initModuleJS(name) {
                try {
                    // خريطة الربط بين الموديول وملف الـ JS
                    const jsMap = {
                        'customers': './js/modules/customers-ui.js',
                        'orders-dashboard': './js/modules/orders-dashboard.js',
                        'inventory': './js/modules/inventory.js',
                        'products': './js/modules/products-ui.js',
                        'settings': './js/modules/settings.js'
                    };

                    if (jsMap[name]) {
                        const module = await import(`${jsMap[name]}?v=${Date.now()}`);
                        // تشغيل دالة البداية إذا كانت موجودة (مثلاً: initCustomersUI)
                        const initFuncName = `init${name.charAt(0).toUpperCase() + name.slice(1)}UI`;
                        if (module[initFuncName]) {
                            module[initFuncName](this.moduleContainer);
                        } else if (module.init) {
                            module.init();
                        }
                    }
                } catch (err) {
                    console.warn(`No specific JS loader for ${name} or error in JS:`, err);
                }
            }

            updateActiveLinks(name) {
                document.querySelectorAll('.nav-item').forEach(el => {
                    el.classList.remove('active');
                    if (el.getAttribute('onclick')?.includes(name) || el.getAttribute('href')?.includes(name)) {
                        el.classList.add('active');
                    }
                });
            }

            showError(name) {
                this.moduleContainer.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-file-circle-exclamation fa-4x" style="color:#f97316; margin-bottom:20px;"></i>
                        <h3 style="color:#1e293b; font-weight:800;">الصفحة غير موجودة</h3>
                        <p>تأكد من وجود الملف: <code>admin/modules/${name}.html</code></p>
                    </div>`;
            }

            executeScripts(container) {
                const scripts = container.querySelectorAll('script');
                scripts.forEach(script => {
                    const newScript = document.createElement('script');
                    Array.from(script.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(script.innerHTML));
                    script.parentNode.replaceChild(newScript, script);
                });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            window.teraApp = new TeraRouter();
        });

        window.loadModule = (name) => { window.location.hash = '#' + name; };
    </script>

    <style>
        /* التنسيقات الهيكلية الأساسية */
        :root { --tera-orange: #f97316; --tera-bg: #f8fafc; }
        body.tera-admin-body { margin: 0; padding: 0; background-color: var(--tera-bg); font-family: 'Cairo', sans-serif; overflow: hidden; }
        .admin-layout { display: flex; height: 100vh; width: 100vw; }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-area { flex: 1; overflow-y: auto; padding: 30px; }
        .initial-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
        .spinner-tera { width: 50px; height: 50px; border: 4px solid #e2e8f0; border-top-color: var(--tera-orange); border-radius: 50%; animation: spin 1s linear infinite; }
        .error-state { text-align: center; padding: 60px; background: white; border-radius: 20px; margin: 20px auto; max-width: 500px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</body>
</html>
