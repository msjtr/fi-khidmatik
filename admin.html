<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    
    <script src="https://cdn.ckeditor.com/ckeditor5/40.0.0/classic/ckeditor.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div class="app-shell">
        <header class="app-header">
            <div class="header-right">
                <button id="sidebar-toggle" class="sidebar-trigger">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="app-brand">
                    <img src="images/logo.svg" alt="Tera" onerror="this.src='https://placehold.jp/e67e22/ffffff/50x50.png?text=T'">
                    <span>Tera Gateway</span>
                </div>
            </div>
            <div id="current-datetime" class="header-clock"></div>
        </header>

        <div class="app-body">
            <aside id="main-sidebar" class="app-sidebar">
                <nav class="side-nav">
                    <ul id="admin-menu">
                        <li class="nav-item active" data-module="dashboard">
                            <i class="fas fa-chart-line"></i> <span>الرئيسية</span>
                        </li>
                        <li class="nav-item" data-module="products">
                            <i class="fas fa-box"></i> <span>المنتجات</span>
                        </li>
                        <li class="nav-item" data-module="orders">
                            <i class="fas fa-receipt"></i> <span>طلبات التقسيط</span>
                        </li>
                        <li class="nav-item" data-module="customers">
                            <i class="fas fa-users"></i> <span>العملاء</span>
                        </li>
                        <li class="nav-item" data-module="settings">
                            <i class="fas fa-cog"></i> <span>الإعدادات</span>
                        </li>
                    </ul>
                </nav>
            </aside>

            <main id="main-content" class="app-content">
                <div id="loader" class="content-loader" style="display:none; text-align: center; padding: 50px;">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i> <br> جاري التحميل...
                </div>
                <div id="module-container">
                    </div>
            </main>
        </div>
    </div>

    <script>
        // دالة تنفيذ الموديولات - مرتبطة بـ main.js
        window.executeModule = function(moduleName) {
            console.log("محاولة فتح: " + moduleName);
            const loader = document.getElementById('loader');
            const container = document.getElementById('module-container');
            
            if (typeof window.switchModule === 'function') {
                container.innerHTML = ''; // تنظيف الحاوية
                loader.style.display = 'block';
                window.switchModule(moduleName);
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            } else {
                console.error("خطأ: ملف main.js لم يتم تحميله بعد أو دالة switchModule غير معرفة.");
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('main-sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle');
            const menuItems = document.querySelectorAll('.nav-item');

            toggleBtn.onclick = (e) => {
                e.stopPropagation();
                sidebar.classList.toggle('is-closed');
            };

            menuItems.forEach(item => {
                item.onclick = function() {
                    menuItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    const targetModule = this.getAttribute('data-module');
                    window.executeModule(targetModule);

                    if (window.innerWidth < 768) {
                        sidebar.classList.add('is-closed');
                    }
                };
            });

            const updateTime = () => {
                const now = new Date();
                document.getElementById('current-datetime').innerText = now.toLocaleDateString('ar-SA', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
            };
            setInterval(updateTime, 1000); updateTime();
        });
    </script>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
