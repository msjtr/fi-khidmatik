<script type="module">
    // تعريف switchModule مباشرة في هذا الملف
    window.switchModule = function(moduleName) {
        console.log('تم النقر على:', moduleName);
        
        const container = document.getElementById('module-container');
        const loader = document.getElementById('loader');
        
        if (!container) {
            console.error('container غير موجود');
            return;
        }
        
        // إظهار loader
        if (loader) loader.style.display = 'block';
        
        // محتوى كل موديول
        const contents = {
            dashboard: `
                <div style="padding: 25px;">
                    <h1 style="color: #2c3e50;"><i class="fas fa-chart-line" style="color: #e67e22;"></i> لوحة التحكم الرئيسية</h1>
                    <p>مرحباً بك في نظام Tera Gateway</p>
                    <hr>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
                        <div onclick="window.switchModule('products')" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px; border-radius: 15px; color: white; cursor: pointer; text-align: center;">
                            <i class="fas fa-box fa-2x"></i>
                            <h3>المنتجات</h3>
                            <p>إدارة المخزون</p>
                        </div>
                        <div onclick="window.switchModule('orders')" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); padding: 25px; border-radius: 15px; color: white; cursor: pointer; text-align: center;">
                            <i class="fas fa-receipt fa-2x"></i>
                            <h3>الطلبات</h3>
                            <p>متابعة الطلبات</p>
                        </div>
                        <div onclick="window.switchModule('customers')" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); padding: 25px; border-radius: 15px; color: white; cursor: pointer; text-align: center;">
                            <i class="fas fa-users fa-2x"></i>
                            <h3>العملاء</h3>
                            <p>إدارة العملاء</p>
                        </div>
                        <div onclick="window.switchModule('settings')" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); padding: 25px; border-radius: 15px; color: white; cursor: pointer; text-align: center;">
                            <i class="fas fa-cog fa-2x"></i>
                            <h3>الإعدادات</h3>
                            <p>تكوين النظام</p>
                        </div>
                    </div>
                </div>
            `,
            products: `
                <div style="padding: 25px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2><i class="fas fa-box" style="color: #e67e22;"></i> إدارة المنتجات</h2>
                        <button onclick="alert('إضافة منتج جديد')" style="background: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">
                            <i class="fas fa-plus"></i> منتج جديد
                        </button>
                    </div>
                    <div style="background: white; border-radius: 12px; padding: 20px;">
                        <p style="text-align: center; color: #7f8c8d;">قائمة المنتجات ستظهر هنا</p>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 20px;">
                            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px;">
                                <h4>منتج تجريبي 1</h4>
                                <p>السعر: 100 ر.س</p>
                                <p>المخزون: 10</p>
                            </div>
                            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px;">
                                <h4>منتج تجريبي 2</h4>
                                <p>السعر: 200 ر.س</p>
                                <p>المخزون: 5</p>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            orders: `
                <div style="padding: 25px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2><i class="fas fa-receipt" style="color: #e67e22;"></i> طلبات التقسيط</h2>
                        <button onclick="alert('طلب جديد')" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">
                            <i class="fas fa-plus"></i> طلب جديد
                        </button>
                    </div>
                    <div style="background: white; border-radius: 12px; padding: 20px;">
                        <p style="text-align: center; color: #7f8c8d;">قائمة الطلبات ستظهر هنا</p>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px;">
                            <div style="background: #f8f9fa; padding: 15px; border-radius: 10px;">
                                <div><strong>عميل: أحمد محمد</strong></div>
                                <div>المبلغ: 1500 ر.س</div>
                                <div>الحالة: قيد الانتظار</div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            customers: `
                <div style="padding: 25px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2><i class="fas fa-users" style="color: #e67e22;"></i> إدارة العملاء</h2>
                        <button onclick="alert('إضافة عميل جديد')" style="background: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">
                            <i class="fas fa-user-plus"></i> عميل جديد
                        </button>
                    </div>
                    <div style="background: white; border-radius: 12px; overflow: hidden;">
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead style="background: #f8f9fa;">
                                <tr>
                                    <th style="padding: 12px; text-align: right;">الاسم</th>
                                    <th style="padding: 12px; text-align: right;">الجوال</th>
                                    <th style="padding: 12px; text-align: right;">المدينة</th>
                                    <th style="padding: 12px; text-align: center;">الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr style="border-bottom: 1px solid #f1f5f9;">
                                    <td style="padding: 10px;">محمد عبدالله</td>
                                    <td style="padding: 10px;">0501234567</td>
                                    <td style="padding: 10px;">الرياض</td>
                                    <td style="padding: 10px; text-align: center;">
                                        <button style="color: #f39c12; background: none; border: none; cursor: pointer;">تعديل</button>
                                        <button style="color: #e74c3c; background: none; border: none; cursor: pointer;">حذف</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `,
            settings: `
                <div style="padding: 25px;">
                    <h2><i class="fas fa-cog" style="color: #e67e22;"></i> إعدادات النظام</h2>
                    <div style="background: white; border-radius: 12px; padding: 20px; margin-top: 20px;">
                        <form id="settings-form">
                            <div style="margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 5px;">اسم الشركة</label>
                                <input type="text" value="تيرا جيتواي" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                            </div>
                            <div style="margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 5px;">نسبة الضريبة (%)</label>
                                <input type="number" value="15" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                            </div>
                            <button type="submit" style="background: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">
                                حفظ الإعدادات
                            </button>
                        </form>
                    </div>
                </div>
            `
        };
        
        // عرض المحتوى المطلوب
        container.innerHTML = contents[moduleName] || contents.dashboard;
        
        // إخفاء loader
        if (loader) loader.style.display = 'none';
        
        // تحديث القائمة النشطة
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.getAttribute('data-module') === moduleName) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
        
        // تحديث عنوان الصفحة
        const titles = {
            dashboard: 'الرئيسية',
            products: 'المنتجات',
            orders: 'الطلبات',
            customers: 'العملاء',
            settings: 'الإعدادات'
        };
        document.title = `Tera Gateway | ${titles[moduleName] || 'لوحة التحكم'}`;
    };
    
    // ربط الأحداث بعناصر القائمة
    document.querySelectorAll('.nav-item').forEach(item => {
        // إزالة أي مستمعات سابقة
        const newItem = item.cloneNode(true);
        item.parentNode.replaceChild(newItem, item);
        
        newItem.addEventListener('click', (e) => {
            e.preventDefault();
            const module = newItem.getAttribute('data-module');
            console.log('تم النقر على:', module);
            if (module) {
                window.switchModule(module);
            }
        });
    });
    
    // تحميل الموديول الافتراضي
    const hash = window.location.hash.substring(1);
    const defaultModule = hash && ['dashboard', 'products', 'orders', 'customers', 'settings'].includes(hash) 
        ? hash 
        : 'dashboard';
    
    window.switchModule(defaultModule);
    
    // تحديث الساعة
    function updateDateTime() {
        const el = document.getElementById('current-datetime');
        if (el) {
            const now = new Date();
            el.innerText = now.toLocaleDateString('en-GB', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });
        }
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);
    
    // زر القائمة للجوال
    const toggleBtn = document.getElementById('sidebar-toggle');
    const sidebar = document.getElementById('main-sidebar');
    if (toggleBtn && sidebar) {
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('is-closed');
        });
    }
    
    console.log('✅ النظام جاهز للعمل');
</script>
