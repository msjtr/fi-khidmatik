<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --sidebar-width: 280px; --header-height: 70px; }
        body { margin: 0; font-family: 'Tajawal', sans-serif; background-color: #f8fafc; display: flex; height: 100vh; overflow: hidden; }
        .main-wrapper { display: flex; width: 100%; height: 100%; }
        #sidebar-placeholder { width: var(--sidebar-width); height: 100%; background: #fff; flex-shrink: 0; border-left: 1px solid #e2e8f0; }
        .content-area { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        #header-placeholder { height: var(--header-height); background: #fff; border-bottom: 1px solid #e2e8f0; }
        #module-container { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .loader-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>
        <div class="content-area">
            <div id="header-placeholder"></div>
            <main id="module-container">
                <div class="loader-box">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: #f97316;"></i>
                    <p style="margin-top: 15px;">جاري الاتصال بـ Tera Gateway...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        /**
         * تم تعديل المسار هنا ليناسب الهيكل الظاهر في صورتك:
         * المكونات موجودة داخل: admin/components/
         */
        async function loadComponent(id, fileName) {
            // إضافة admin/ للمسار لأن الـ Console أظهر أنها مفقودة من الرابط
            const path = `admin/components/${fileName}`; 
            
            try {
                const response = await fetch(path);
                
                // إذا فشل المسار الأول، نجرب المسار المباشر (للتوافق مع الاستضافات المختلفة)
                if (!response.ok) {
                    const fallbackPath = `components/${fileName}`;
                    const fallbackRes = await fetch(fallbackPath);
                    if (!fallbackRes.ok) throw new Error("File not found in both paths");
                    
                    const html = await fallbackRes.text();
                    document.getElementById(id).innerHTML = html;
                    return;
                }

                const html = await response.text();
                document.getElementById(id).innerHTML = html;
                console.log(`✅ تم تحميل المكون: ${path}`);
            } catch (err) {
                console.error(`❌ فشل تحميل: ${fileName}`, err);
                document.getElementById(id).innerHTML = `<div style="color:red; padding:10px; font-size:12px;">خطأ في تحميل ${fileName}</div>`;
            }
        }

        // تشغيل التحميل
        window.addEventListener('DOMContentLoaded', async () => {
            // نستخدم Promise.all لضمان تحميل الكل معاً
            await Promise.all([
                loadComponent('sidebar-placeholder', 'sidebar.html'),
                loadComponent('header-placeholder', 'header.html'),
                loadComponent('modals-placeholder', 'modals.html')
            ]);

            // تحميل لوحة البيانات الافتراضية
            // تأكد أن لديك مجلد admin/modules/dashboard.html
            const container = document.getElementById('module-container');
            try {
                const res = await fetch('admin/modules/dashboard.html');
                if(res.ok) container.innerHTML = await res.text();
            } catch(e) {
                console.log("Dashboard module not loaded yet.");
            }
        });

        // دوال المودال العالمية
        window.openCustomerModal = (t) => {
            const m = document.getElementById('customer-modal');
            if(m) { m.style.display='flex'; document.getElementById('modal-title').innerText=t; }
        };
        window.closeCustomerModal = () => {
            const m = document.getElementById('customer-modal');
            if(m) m.style.display='none';
        };
    </script>
</body>
</html>
