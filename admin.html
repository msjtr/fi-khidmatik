<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tera Gateway | نظام إدارة التقسيط الذكي</title>
    
    <!-- الهوية البصرية -->
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- استدعاء ملفات التنسيق المحدثة v12.12.12 -->
    <link rel="stylesheet" href="css/admin.css?v=12.12.12">
    <link rel="stylesheet" href="css/sidebar.css?v=12.12.12"> 
    <link rel="stylesheet" href="css/table.css?v=12.12.12">
    <link rel="stylesheet" href="css/customers.css?v=12.12.12">
    <link rel="stylesheet" href="css/modals.css?v=12.12.12"> <!-- الملف المستقل -->

    <style>
        :root { 
            --tera-orange: #f97316;
            --tera-bg: #f8fafc; 
            --tera-dark: #0f172a;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--tera-bg); 
            margin: 0; 
            overflow: hidden; 
            color: var(--tera-dark);
        }

        .admin-layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        .main-wrapper { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            min-width: 0; 
            background: var(--tera-bg);
            position: relative;
        }

        .content-area { 
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            scroll-behavior: smooth;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loader-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
        }

        .spinner-tera { 
            width: 50px; 
            height: 50px; 
            border: 4px solid #e2e8f0; 
            border-top: 4px solid var(--tera-orange); 
            border-radius: 50%; 
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--tera-orange); }
    </style>
</head>
<body class="tera-gateway-v12">

    <div class="admin-layout">
        <aside id="sidebar-container"></aside>
        
        <main class="main-wrapper">
            <header id="header-container"></header>
            
            <section id="module-container" class="content-area">
                <div class="loader-box">
                    <div class="spinner-tera"></div>
                    <p style="color: var(--tera-orange); margin-top: 20px; font-weight: 700;">TERA ENGINE v12.12.12</p>
                </div>
            </section>
        </main>
    </div>

    <!-- حاوية النوافذ المنبثقة المستقلة -->
    <div id="modal-root"></div>

    <script type="module">
        import { ensureDbReady } from './js/core/config.js';
        import { initDashboard } from './js/modules/dashboard.js';
        import { initCustomers } from './js/modules/customers-ui.js';

        class TeraApp {
            constructor() {
                this.container = document.getElementById('module-container');
                this.modalRoot = document.getElementById('modal-root');
                this.version = "12.12.12";
                this.init();
            }

            async init() {
                try {
                    await ensureDbReady();

                    window.navigateTo = (moduleName) => {
                        window.location.hash = `#${moduleName}`;
                    };

                    // تحميل المكونات الثابتة (شاملة ملف modals.html المستقل)
                    await this.loadStaticComponents();

                    window.addEventListener('hashchange', () => this.route());
                    this.route(); 

                } catch (err) {
                    console.error("System Boot Error:", err);
                    this.container.innerHTML = `<div style="text-align:center; padding:100px;"><h2>خطأ في تشغيل المحرك</h2><p>${err.message}</p></div>`;
                }
            }

            async loadStaticComponents() {
                // إضافة 'modals' إلى قائمة المكونات ليتم شحنها في حاوية modal-root
                const components = [
                    { id: 'sidebar-container', name: 'sidebar' },
                    { id: 'header-container', name: 'header' },
                    { id: 'modal-root', name: 'modals' } // ربط ملف modals.html
                ];

                for (const comp of components) {
                    try {
                        const res = await fetch(`./admin/components/${comp.name}.html?v=${this.version}`);
                        if (res.ok) {
                            document.getElementById(comp.id).innerHTML = await res.text();
                        }
                    } catch (e) {
                        console.warn(`Failed to load component: ${comp.name}`, e);
                    }
                }
            }

            async route() {
                const hash = window.location.hash.replace('#', '') || 'dashboard';
                this.container.innerHTML = '<div class="loader-box"><div class="spinner-tera"></div></div>';

                try {
                    if (hash === 'dashboard') {
                        await initDashboard(this.container);
                    } else if (hash === 'customers') {
                        await initCustomers(this.container);
                    } else {
                        const res = await fetch(`./admin/modules/${hash}.html?v=${this.version}`);
                        if (res.ok) this.container.innerHTML = await res.text();
                        else throw new Error("Module not found");
                    }
                    this.updateActiveLink(hash);
                } catch (e) {
                    this.container.innerHTML = `<div style="text-align:center; padding:100px;"><h3>القسم غير متوفر حالياً</h3></div>`;
                }
            }

            updateActiveLink(hash) {
                document.querySelectorAll('.nav-link, .nav-item').forEach(el => {
                    const moduleAttr = el.getAttribute('data-module') || el.getAttribute('href')?.replace('#', '');
                    el.classList.toggle('active', moduleAttr === hash);
                });
            }
        }

        window.Tera = new TeraApp();
    </script>
</body>
</html>
