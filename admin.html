<div id="customer-modal" class="tera-modal-overlay">
    <div class="tera-modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="modal-title" style="margin:0; font-size: 1.3rem; color: var(--dark);">إضافة عميل</h2>
            <button id="delete-btn" onclick="deleteCustomer()" style="display:none; background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:12px; cursor:pointer; font-weight:bold;">
                <i class="fas fa-trash-can"></i> حذف
            </button>
        </div>

        <form id="customer-form">
            <input type="hidden" id="edit-customer-id">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label style="display:block; font-size:0.8rem; margin-bottom:5px; font-weight:700;">الاسم الكامل</label>
                    <input type="text" id="cust-name" required style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
                </div>
                <div class="input-group">
                    <label style="display:block; font-size:0.8rem; margin-bottom:5px; font-weight:700;">البريد الإلكتروني</label>
                    <input type="email" id="cust-email" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
                </div>
                <div class="input-group">
                    <label style="display:block; font-size:0.8rem; margin-bottom:5px; font-weight:700;">رقم الجوال</label>
                    <input type="tel" id="cust-phone" required style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
                </div>
                <div class="input-group">
                    <label style="display:block; font-size:0.8rem; margin-bottom:5px; font-weight:700;">رقم الهوية</label>
                    <input type="text" id="cust-idNumber" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
                </div>
                <div class="input-group">
                    <label style="display:block; font-size:0.8rem; margin-bottom:5px; font-weight:700;">المدينة</label>
                    <input type="text" id="cust-city" value="حائل" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
                </div>
                <div class="input-group">
                    <label style="display:block; font-size:0.8rem; margin-bottom:5px; font-weight:700;">الحي</label>
                    <input type="text" id="cust-district" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
                </div>
            </div>

            <div id="join-date-box" style="margin-top:15px; padding:10px; background:#f8fafc; border-radius:10px; display:none;">
                <span style="font-size:0.8rem; color:#64748b;"><i class="fas fa-calendar-alt"></i> تاريخ الانضمام: </span>
                <span id="join-date-val" style="font-size:0.8rem; font-weight:bold; color:var(--dark);"></span>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px;">
                <button type="submit" class="btn-primary-tera" style="padding:12px 30px;">حفظ التغييرات</button>
                <button type="button" onclick="closeCustomerModal()" style="padding:12px 20px; border:none; background:#f1f5f9; border-radius:12px; cursor:pointer;">إلغاء</button>
            </div>
        </form>
    </div>
</div>

<script>
    // الدوال العامة للتحكم بالنافذة والحذف
    window.openCustomerModal = async (id = null) => {
        document.getElementById('customer-form').reset();
        document.getElementById('customer-modal').style.display = 'flex';
        const delBtn = document.getElementById('delete-btn');
        const joinBox = document.getElementById('join-date-box');

        if (id) {
            document.getElementById('modal-title').innerText = "تعديل بيانات العميل";
            document.getElementById('edit-customer-id').value = id;
            delBtn.style.display = 'block';
            if (window.fetchCustomerToForm) await window.fetchCustomerToForm(id);
        } else {
            document.getElementById('modal-title').innerText = "إضافة عميل جديد";
            document.getElementById('edit-customer-id').value = '';
            delBtn.style.display = 'none';
            joinBox.style.display = 'none';
        }
    };

    window.closeCustomerModal = () => document.getElementById('customer-modal').style.display = 'none';
    
    window.deleteCustomer = async () => {
        const id = document.getElementById('edit-customer-id').value;
        if (confirm("هل أنت متأكد من حذف هذا العميل من نظام Tera؟")) {
            if (window.handleDelete) await window.handleDelete(id);
        }
    };
</script>
