<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin Pro</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;display:flex;background:#f1f5f9;}
.sidebar{width:240px;background:#1e293b;color:white;height:100vh;padding:20px;}
.sidebar a{display:block;padding:10px;margin:5px 0;cursor:pointer;}
.sidebar a:hover{background:#334155;}
.main{flex:1;padding:20px;}
.card{background:white;padding:20px;border-radius:10px;}
table{width:100%;border-collapse:collapse;}
th{background:#3b82f6;color:white;}
td,th{padding:10px;text-align:center;border-bottom:1px solid #eee;}
img{width:60px;height:60px;border-radius:8px;object-fit:cover;}
</style>
</head>

<body>

<div class="sidebar">
<h2>⚙️ الإدارة</h2>
<a onclick="loadProducts()">🛒 المنتجات</a>
</div>

<div class="main">
<div class="card">
<h3 id="title">🛒 المنتجات</h3>
<div id="content"></div>
</div>
</div>

<script type="module">

// ================= Firebase =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, getDocs,
addDoc, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= عرض المنتجات =================
window.loadProducts = async () => {

const snap = await getDocs(collection(db,"products"));

let html = `
<input placeholder="بحث..." oninput="search(this.value)">
<br><br>

<input type="file" onchange="importExcel(this.files[0])">

<br><br>

<table>
<tr>
<th>صورة</th>
<th>اسم</th>
<th>كود</th>
<th>سعر</th>
<th>خصم</th>
<th>مخزون</th>
<th>إدارة</th>
</tr>`;

snap.forEach(d=>{
const p = d.data();

html += `
<tr>
<td><img src="${p.image}"></td>
<td>${p.name}</td>
<td>${p.code}</td>
<td>
${p.discount>0 
? `<del>${p.price}</del> ${p.finalPrice}`
: p.price}
</td>
<td>${p.discount||0}%</td>
<td style="color:${p.stock<=5?'red':'black'}">${p.stock}</td>
<td>
<button onclick="edit('${d.id}')">✏️</button>
<button onclick="del('${d.id}')">❌</button>
</td>
</tr>`;
});

html += '</table>';
content.innerHTML = html;
};

// ================= Excel احترافي =================
window.importExcel = function(file){

const reader = new FileReader();

reader.onload = function(e){

const data = new Uint8Array(e.target.result);
const workbook = XLSX.read(data,{type:'array'});
const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

let valid=[], errors=[];

json.forEach((row,i)=>{
if(!row["اسم المنتج"] || !row["كود المنتج"]){
errors.push(i+1);
}else{
valid.push(row);
}
});

window.previewData = valid;

let html = `
<h3>📋 معاينة</h3>
<p>✅ صالح: ${valid.length}</p>
<p>❌ أخطاء: ${errors.length}</p>

<button onclick="confirmImport()">استيراد</button>
<hr>
`;

valid.forEach(r=>{
html += `<p>${r["اسم المنتج"]} - ${r["كود المنتج"]}</p>`;
});

content.innerHTML = html;
};

reader.readAsArrayBuffer(file);
};

// ================= تأكيد الاستيراد =================
window.confirmImport = async ()=>{

let added=0, updated=0;

const snap = await getDocs(collection(db,"products"));
let map={};

snap.forEach(d=> map[d.data().code]={id:d.id});

for(let row of window.previewData){

const price = Number(row["سعر المنتج"]||0);
const discount = Number(row["تخفيض"]||0);

const finalPrice = discount>0
? price - (price*discount/100)
: price;

const data = {
name: row["اسم المنتج"],
code: row["كود المنتج"],
description: row["وصف المنتج"],
stock: Number(row["الكميه"]),
price,
discount,
finalPrice,
image: row["صورة المنتج"],
images:[
row["صوره واحد"],
row["صوره ثنين"],
row["صوره ثلاثه"]
].filter(i=>i)
};

if(map[data.code]){
await updateDoc(doc(db,"products",map[data.code].id),data);
updated++;
}else{
await addDoc(collection(db,"products"),data);
added++;
}
}

content.innerHTML = `
<h2>📊 التقرير</h2>
<p>إضافة: ${added}</p>
<p>تحديث: ${updated}</p>
`;

};

// ================= تعديل =================
window.edit = async (id)=>{
const name = prompt("اسم");
const price = prompt("سعر");
const stock = prompt("كمية");

await updateDoc(doc(db,"products",id),{
name,
price:Number(price),
stock:Number(stock)
});

loadProducts();
};

// ================= حذف =================
window.del = async (id)=>{
await deleteDoc(doc(db,"products",id));
loadProducts();
};

// ================= بحث =================
window.search = (t)=>{
document.querySelectorAll("table tr").forEach((r,i)=>{
if(i===0)return;
r.style.display = r.innerText.includes(t)?'':'none';
});
};

// ================= تشغيل =================
loadProducts();

</script>

</body>
</html>
