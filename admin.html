<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | تيرا جيت واي</title>
    
    <link rel="icon" href="data:,">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="admin-container">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header id="header-container"></header>

            <div id="content-area">
                <div class="loading-spinner">جاري تحميل النظام...</div>
            </div>
        </main>
    </div>

    <div id="modals-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="module">
        // استيراد الدوال الأساسية من الموديولات
        import { initCustomersUI } from './js/modules/customers-ui.js';

        async function initApp() {
            try {
                // أولاً: تحميل ملف المودالز المحدث الذي قمنا بتعديله
                const modalRes = await fetch('components/modals.html');
                document.getElementById('modals-placeholder').innerHTML = await modalRes.text();

                // ثانياً: تشغيل واجهة العملاء وربطها بالجدول
                const contentArea = document.getElementById('content-area');
                await initCustomersUI(contentArea);

                // ثالثاً: تفعيل محرر النصوص (Quill) بعد تحميل المودالز
                window.quill = new Quill('#cust-notes-editor', {
                    theme: 'snow',
                    modules: {
                        toolbar: [
                            ['bold', 'italic', 'underline'],
                            [{ 'color': [] }],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            ['link', 'clean']
                        ]
                    }
                });

                console.log("✅ تم تشغيل النظام بنجاح وربط جميع الأزرار.");
                
            } catch (error) {
                console.error("❌ فشل في تشغيل النظام:", error);
            }
        }

        // بدء التشغيل
        document.addEventListener('DOMContentLoaded', initApp);
    </script>

</body>
</html>
