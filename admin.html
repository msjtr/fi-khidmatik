<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fi-Khidmatik | لوحة التحكم</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
            --bg-color: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #sidebar-placeholder {
            width: var(--sidebar-width);
            height: 100%;
            background: #fff;
            flex-shrink: 0;
            border-left: 1px solid #e2e8f0;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header-placeholder {
            height: var(--header-height);
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }

        #main-content {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .loader-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>

        <div class="content-area">
            <div id="header-placeholder"></div>

            <main id="main-content">
                <div class="loader-box">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: #f97316;"></i>
                    <p style="margin-top: 15px; font-weight: bold;">جاري تحميل النظام والبيانات...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        // 1. إعدادات Firebase (استبدل القيم ببيانات مشروعك الخاصة)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        // تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        /**
         * دالة جلب بيانات العملاء من Firestore
         */
        async function fetchCustomerData() {
            const tableBody = document.getElementById('customers-table-body');
            if (!tableBody) return; // الخروج إذا لم يكن الجدول موجوداً في الصفحة الحالية

            try {
                // استبدل 'customers' باسم المجموعة (Collection) لديك في Firestore
                const snapshot = await db.collection('customers').get();
                let html = '';
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    html += `
                        <tr>
                            <td>${data.name || '-'}</td>
                            <td>${data.phone || '-'}</td>
                            <td>${data.status || 'منتظم'}</td>
                            <td>
                                <button onclick="viewDetails('${doc.id}')" class="btn-action">عرض</button>
                            </td>
                        </tr>
                    `;
                });
                tableBody.innerHTML = html;
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
                tableBody.innerHTML = '<tr><td colspan="4">تعذر تحميل البيانات من القاعدة</td></tr>';
            }
        }

        /**
         * دالة تحميل الملفات من مجلد admin/components
         */
        async function loadFile(targetId, fileName) {
            const path = `admin/components/${fileName}`;
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const html = await response.text();
                document.getElementById(targetId).innerHTML = html;
                console.log(`✅ Loaded: ${path}`);
                
                // إذا تم تحميل الداشبورد أو الجداول، نقوم بجلب البيانات فوراً
                if (fileName === 'dashboard.html' || fileName === 'tables.html') {
                    fetchCustomerData();
                }
            } catch (error) {
                console.error(`❌ Error: ${path}`, error);
                document.getElementById(targetId).innerHTML = `<div style="color:red; padding:10px;">خطأ 404: تعذر العثور على ${path}</div>`;
            }
        }

        // بدء التشغيل عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل القوائم الثابتة
            await Promise.all([
                loadFile('sidebar-placeholder', 'sidebar.html'),
                loadFile('header-placeholder', 'header.html'),
                loadFile('modals-placeholder', 'modals.html')
            ]);

            // تحميل الصفحة الرئيسية (الداشبورد)
            loadFile('main-content', 'dashboard.html');
        });

        // دوال التحكم العالمية للمودال
        window.openCustomerModal = (t) => {
            const m = document.getElementById('customer-modal');
            if(m) { m.style.display='flex'; document.getElementById('modal-title').innerText = t; }
        };
        window.closeCustomerModal = () => {
            const m = document.getElementById('customer-modal');
            if(m) m.style.display='none';
        };
    </script>
</body>
</html>
