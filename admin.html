<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera Gateway | لوحة التحكم</title>
    
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.5.1/css/all.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
    
    <style>
        /* تنسيق توزيع الصفحة الرئيسي */
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
        }

        #sidebar-placeholder {
            width: var(--sidebar-width);
            height: 100%;
            background: #fff;
            flex-shrink: 0;
            transition: width 0.3s ease;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header-placeholder {
            height: var(--header-height);
            flex-shrink: 0;
        }

        #module-container {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            background: #f8fafc;
        }

        /* حالة تصغير القائمة الجانبية */
        .sidebar-collapsed #sidebar-placeholder {
            width: 85px;
        }
    </style>
</head>
<body class="loading">

    <div class="main-wrapper">
        <div id="sidebar-placeholder"></div>

        <div class="content-area">
            <div id="header-placeholder"></div>

            <main id="module-container">
                <div class="loader-box">
                    <i class="fas fa-spinner-third fa-spin"></i>
                    <p>جاري تحميل البيانات...</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modals-placeholder"></div>

    <script>
        /**
         * 1. حل مشكلة أخطاء الدوال غير المعرفة (Global Error Prevention)
         * نقوم بتعريف الدوال هنا عالمياً لتكون جاهزة حتى قبل تحميل ملفات الـ HTML الفرعية
         */
        window.closeCustomerModal = function() {
            const modal = document.getElementById('customer-modal');
            if (modal) modal.style.display = 'none';
        };

        window.openCustomerModal = function(title = "إضافة عميل جديد") {
            const modal = document.getElementById('customer-modal');
            if (modal) {
                const titleEl = document.getElementById('modal-title');
                if (titleEl) titleEl.innerText = title;
                modal.style.display = 'flex';
            }
        };

        window.closeConfirmModal = function() {
            const modal = document.getElementById('confirm-modal');
            if (modal) modal.style.display = 'none';
        };

        /**
         * 2. دالة تحميل المكونات (Component Loader)
         */
        async function loadComponent(id, path) {
            try {
                const response = await fetch(path);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
                console.log(`✅ تم تحميل: ${path}`);
            } catch (error) {
                console.error(`❌ خطأ في تحميل ${path}:`, error);
            }
        }

        /**
         * 3. تحميل الموديولات (Module Switcher)
         */
        async function loadModule(moduleName) {
            const container = document.getElementById('module-container');
            container.innerHTML = '<div class="loader-box"><i class="fas fa-spinner-third fa-spin"></i></div>';
            
            try {
                const response = await fetch(`modules/${moduleName}.html`);
                if (!response.ok) throw new Error('Module not found');
                const html = await response.text();
                container.innerHTML = html;
                
                // تحديث عنوان الصفحة برمجياً
                document.title = `Tera Gateway | ${moduleName.toUpperCase()}`;
            } catch (error) {
                container.innerHTML = `<div class="error-box">تعذر تحميل الموديول: ${moduleName}</div>`;
            }
        }

        /**
         * 4. بدء التشغيل (Initialization)
         */
        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل المكونات الثابتة
            await loadComponent('sidebar-placeholder', 'components/sidebar.html');
            await loadComponent('header-placeholder', 'components/header.html');
            await loadComponent('modals-placeholder', 'components/modals.html');

            // تحميل الموديول الافتراضي (الرئيسية)
            loadModule('dashboard');
            
            document.body.classList.remove('loading');
        });
    </script>

</body>
</html>
