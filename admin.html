<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - متجرك الذكي</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        
        body { font-family: 'Tajawal', sans-serif; }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            color: #4b5563;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 4px;
        }
        
        .sidebar-link:hover:not(.disabled) {
            background: #f3f4f6;
            color: #1e40af;
            transform: translateX(-4px);
        }
        
        .sidebar-link.active {
            background: #eff6ff;
            color: #1e40af;
            font-weight: 700;
            border-left: 4px solid #1e40af;
        }

        .sidebar-link i { width: 20px; text-align: center; }

        /* Loader inside iframe container */
        .frame-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }
        
        #mainFrame {
            transition: opacity 0.3s ease;
            width: 100%;
            height: 100%;
        }

        /* Scrollbar styling */
        aside nav::-webkit-scrollbar { width: 5px; }
        aside nav::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100">

<div class="flex h-screen overflow-hidden">

    <aside class="w-72 bg-white shadow-2xl flex flex-col z-20">
        <div class="p-6 border-b border-gray-100">
            <h1 class="logo">متجرك الذكي</h1>
            <p class="text-xs text-gray-400 mt-1 font-medium">نظام الإدارة المتكامل v2.0</p>
        </div>
        
        <nav class="flex-1 p-4 overflow-y-auto">
            <div class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 px-3">الرئيسية</div>
            
            <a href="admin/modules/orders.html" class="sidebar-link active" data-module="orders">
                <i class="fas fa-shopping-basket"></i>
                <span>إدارة الطلبات</span>
            </a>
            
            <a href="admin/modules/customers.html" class="sidebar-link" data-module="customers">
                <i class="fas fa-user-friends"></i>
                <span>قاعدة العملاء</span>
            </a>
            
            <a href="admin/modules/products.html" class="sidebar-link" data-module="products">
                <i class="fas fa-box-open"></i>
                <span>المنتجات</span>
            </a>

            <div class="border-t border-gray-100 my-4"></div>
            <div class="text-[10px] uppercase tracking-widest text-gray-400 mb-2 px-3">الأدوات التقنية</div>

            <a href="print.html" class="sidebar-link" data-module="invoices">
                <i class="fas fa-print"></i>
                <span>نظام الفواتير</span>
            </a>
            
            <a href="admin/modules/reports.html" class="sidebar-link" data-module="reports">
                <i class="fas fa-chart-pie"></i>
                <span>التقارير</span>
            </a>

            <a href="admin/modules/settings.html" class="sidebar-link" data-module="settings">
                <i class="fas fa-sliders-h"></i>
                <span>الإعدادات</span>
            </a>
        </nav>
        
        <div class="p-4 bg-gray-50 border-t border-gray-100">
            <div class="flex items-center gap-3 text-gray-500">
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                    <i class="fas fa-user-shield text-xs"></i>
                </div>
                <div>
                    <p class="text-xs font-bold text-gray-700">المدير العام</p>
                    <p class="text-[10px]" id="currentDate"></p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <div class="flex items-center gap-4">
                <button id="refreshBtn" class="text-gray-400 hover:text-blue-600 transition-colors">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <h2 id="pageTitle" class="font-bold text-gray-700">الطلبات</h2>
            </div>
            <div class="flex items-center gap-4">
                <span class="flex h-2 w-2 rounded-full bg-green-500"></span>
                <span class="text-xs text-gray-500 font-medium">النظام متصل</span>
            </div>
        </header>

        <div class="flex-1 p-6 relative">
            <div class="frame-loader" id="frameLoader">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
            </div>
            
            <div class="w-full h-full bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <iframe 
                    id="mainFrame" 
                    name="frame" 
                    src="admin/modules/orders.html"
                    class="w-full h-full" 
                    frameborder="0">
                </iframe>
            </div>
        </div>
    </main>
</div>

<div id="toast" class="fixed bottom-6 left-6 transform -translate-x-full opacity-0 transition-all duration-500 z-50 flex items-center gap-3 px-5 py-3 rounded-xl shadow-2xl text-white">
    <i id="toastIcon" class="fas"></i>
    <span id="toastMessage" class="font-medium text-sm"></span>
</div>

<script>
    const frame = document.getElementById('mainFrame');
    const loader = document.getElementById('frameLoader');
    const pageTitle = document.getElementById('pageTitle');
    const links = document.querySelectorAll('.sidebar-link');

    /* =============================
       منطق التنقل وتغيير الصفحات
    ============================= */
    links.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const url = this.getAttribute('href');
            const title = this.querySelector('span').innerText;

            // تحديث الواجهة
            links.forEach(l => l.classList.remove('active'));
            this.classList.add('active');
            pageTitle.innerText = title;

            // تحميل الصفحة
            if (frame.src !== url) {
                loader.style.display = 'block';
                frame.style.opacity = '0.3';
                frame.src = url;
                localStorage.setItem('lastAdminPage', url);
            }
        });
    });

    // عند انتهاء تحميل الـ Iframe
    frame.addEventListener('load', () => {
        loader.style.display = 'none';
        frame.style.opacity = '1';
        
        // محاولة جلب عنوان الصفحة من الداخل إذا سمحت السياسة
        try {
            const innerTitle = frame.contentDocument.title;
            if (innerTitle) console.log("Loaded:", innerTitle);
        } catch(e) {}
    });

    /* =============================
       إصلاح التاريخ والتوقيت
    ============================= */
    function updateDateTime() {
        const now = new Date();
        const dateStr = now.toLocaleDateString('ar-SA', { day: 'numeric', month: 'short', year: 'numeric' });
        document.getElementById('currentDate').innerText = dateStr;
    }
    updateDateTime();

    /* =============================
       نظام التنبيهات (Toast)
    ============================= */
    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        const icon = document.getElementById('toastIcon');
        
        const types = {
            success: { bg: 'bg-green-600', icon: 'fa-check-circle' },
            error: { bg: 'bg-red-600', icon: 'fa-exclamation-triangle' },
            info: { bg: 'bg-blue-600', icon: 'fa-info-circle' }
        };

        const config = types[type] || types.success;
        
        toast.className = `fixed bottom-6 left-6 transition-all duration-500 z-50 flex items-center gap-3 px-5 py-3 rounded-xl shadow-2xl text-white ${config.bg}`;
        icon.className = `fas ${config.icon}`;
        document.getElementById('toastMessage').innerText = msg;
        
        // إظهار
        toast.classList.remove('-translate-x-full', 'opacity-0');
        
        setTimeout(() => {
            toast.classList.add('-translate-x-full', 'opacity-0');
        }, 3500);
    }

    // زر التحديث
    document.getElementById('refreshBtn').addEventListener('click', () => {
        loader.style.display = 'block';
        frame.contentWindow.location.reload();
        showToast('تم تحديث الصفحة بنجاح', 'info');
    });

    // استعادة آخر صفحة
    const lastPage = localStorage.getItem('lastAdminPage');
    if (lastPage) {
        frame.src = lastPage;
        // تحديث حالة الـ Active في القائمة
        links.forEach(l => {
            if(l.getAttribute('href') === lastPage) {
                links.forEach(link => link.classList.remove('active'));
                l.classList.add('active');
                pageTitle.innerText = l.querySelector('span').innerText;
            }
        });
    }

    // رسالة ترحيبية
    setTimeout(() => showToast('مرحباً بك في النظام الذكي', 'success'), 1000);
</script>

</body>
</html>
