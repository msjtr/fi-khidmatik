<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera V12 | إدارة الإتقان بلس</title>

    <link rel="icon" type="image/svg+xml" href="/Fi-Khidmatik-by-Al-Itqan-Plus/images/logo.svg">
    <link rel="shortcut icon" href="/Fi-Khidmatik-by-Al-Itqan-Plus/images/logo.svg">

    <!-- ملفات التنسيق الأساسية -->
    <link rel="stylesheet" href="css-styles/hhh-style.css">
    
    <!-- (تم إيقاف الملفات غير الموجودة حالياً لمنع الخطأ 404 حتى تقوم بإنشائها لاحقاً) -->
    <!-- <link rel="stylesheet" href="css-styles/auth-style.css"> -->
    <!-- <link rel="stylesheet" href="css-styles/list-table-style.css"> -->
</head>
<body>

    <div class="tera-layout">
        <header id="header-mount"></header>
        <aside id="sidebar-mount"></aside>
        
        <main id="main-view">
            <!-- الشعار المائي كخلفية جمالية للنظام -->
            <div style="position: absolute; bottom: -50px; left: -50px; opacity: 0.05; pointer-events: none; z-index: 0;">
                <img src="/Fi-Khidmatik-by-Al-Itqan-Plus/images/logo.svg" alt="إتقان بلس" style="width: 400px;" onerror="this.style.display='none'">
            </div>
            
            <!-- إطار العرض المركزي -->
            <iframe id="tera-iframe" name="tera-frame" src="pages/customers-list.html" style="position: relative; z-index: 1; width: 100%; height: 100%; border: none; transition: opacity 0.3s ease;"></iframe>
        </main>
        
        <footer id="footer-mount"></footer>
    </div>

    <!-- 1. ربط قاعدة البيانات والمحرك الأساسي -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/main.js"></script>

    <!-- 2. سكربت جلب الهيكل وتفعيل النظام -->
    <script type="module">
        async function mountTeraComponents() {
            const components = [
                { id: 'header-mount', path: 'mm/header.html' },
                { id: 'sidebar-mount', path: 'mm/sidebar.html' },
                { id: 'footer-mount', path: 'mm/footer.html' }
            ];

            // جلب القوائم والهيدر والفوتر
            for (const comp of components) {
                try {
                    const res = await fetch(comp.path);
                    if (res.ok) {
                        document.getElementById(comp.id).innerHTML = await res.text();
                    } else {
                        console.warn(`الملف غير موجود (404): ${comp.path}`);
                    }
                } catch (e) {
                    console.error(`خطأ في تحميل المكون: ${comp.path}`, e);
                }
            }

            // بعد تحميل الهيدر، نقوم بجلب الساعة (إن وجدت كملف منفصل) أو نعتمد على كود الهيدر مباشرة
            try {
                const clockRes = await fetch('mm/clock-view.html');
                if (clockRes.ok) {
                    const clockMount = document.getElementById('clock-mount');
                    if (clockMount) clockMount.innerHTML = await clockRes.text();
                }
            } catch (e) {
                console.warn('لم يتم العثور على ملف الساعة المنفصل، سيتم الاعتماد على الساعة المدمجة بالهيدر.');
            }

            // إطلاق إشارة بأن الواجهة جاهزة لتركيب التفاعلات وتشغيل الساعة
            setTimeout(() => {
                document.dispatchEvent(new Event('TeraLayoutReady'));
                setupSidebarInteractions(); 
                startInternalClock(); // ⏱️ تشغيل محرك الساعة فوراً
            }, 300);
        }

        // --- محرك الساعة الداخلي لحل مشكلة الأصفار ---
        function startInternalClock() {
            function updateClock() {
                const hoursEl = document.getElementById('c-hours');
                const minEl = document.getElementById('c-minutes');
                const secEl = document.getElementById('c-seconds');
                const ampmEl = document.getElementById('c-ampm');
                const hijriEl = document.getElementById('c-hijri');
                const gregEl = document.getElementById('c-greg');

                if (!hoursEl) return;

                const now = new Date();
                let h = now.getHours();
                let m = now.getMinutes();
                let s = now.getSeconds();
                let ampm = h >= 12 ? 'م' : 'ص';
                
                h = h % 12 || 12;

                hoursEl.innerText = String(h).padStart(2, '0');
                minEl.innerText = String(m).padStart(2, '0');
                secEl.innerText = String(s).padStart(2, '0');
                if(ampmEl) ampmEl.innerText = ampm;

                if (hijriEl && gregEl) {
                    let hijriFormat = new Intl.DateTimeFormat('en-GB-u-ca-islamic-umalqura', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(now);
                    hijriEl.innerText = hijriFormat.replace(/[a-zA-Z\sهـ]/g, '').trim();
                    
                    let gregFormat = new Intl.DateTimeFormat('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(now);
                    gregEl.innerText = gregFormat;
                }
            }
            updateClock();
            setInterval(updateClock, 1000);
        }

        // --- دالة التنقل للقائمة الجانبية وفتح الصفحات في الإطار (iFrame) ---
        window.teraNavigate = function(pageName) {
            const iframe = document.getElementById('tera-iframe');
            if (iframe) {
                iframe.style.opacity = '0.3';
                const targetPage = pageName.endsWith('.html') ? pageName : `${pageName}.html`;
                iframe.src = `pages/${targetPage}`;
                
                iframe.onload = () => { iframe.style.opacity = '1'; };
            }
        };

        // --- دالة القائمة المنسدلة لمدير النظام (الهيدر) ---
        window.toggleDropdown = function(event) {
            const dropdown = document.getElementById('user-dropdown');
            if (dropdown) dropdown.classList.toggle('active');
            if (event) event.stopPropagation();
        };

        // --- 🛠️ محرك تفاعلات القائمة الجانبية (الألوان والقوائم المنسدلة) ---
        function setupSidebarInteractions() {
            document.addEventListener('click', function(e) {
                
                // 1) إغلاق قائمة الهيدر المنسدلة عند النقر بالخارج
                const userProfileWrapper = e.target.closest('.user-profile-wrapper');
                const userDropdown = document.getElementById('user-dropdown');
                if (!userProfileWrapper && userDropdown && userDropdown.classList.contains('active')) {
                    userDropdown.classList.remove('active');
                }

                // 2) نقل اللون للزر النشط (Active State)
                const clickedLink = e.target.closest('.tera-nav-link');
                if (clickedLink) {
                    document.querySelectorAll('.tera-nav-link').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    clickedLink.classList.add('active');
                }

                // 3) فتح وإغلاق القوائم المنسدلة للجانبية بانسيابية (Accordion)
                const submenuBtn = e.target.closest('.has-submenu');
                if (submenuBtn) {
                    const targetId = submenuBtn.getAttribute('data-target');
                    const submenu = document.getElementById(targetId);
                    const arrow = submenuBtn.querySelector('.dropdown-arrow-icon');
                    
                    if (submenu) {
                        submenuBtn.classList.toggle('active');
                        if (submenu.style.maxHeight) {
                            submenu.style.maxHeight = null;
                            if (arrow) arrow.style.transform = 'rotate(0deg)';
                        } else {
                            submenu.style.maxHeight = submenu.scrollHeight + "px";
                            if (arrow) arrow.style.transform = 'rotate(180deg)';
                        }
                    }
                }

                // 4) زر طي القائمة الجانبية بالكامل وتوسيعها
                const toggleBtn = e.target.closest('#toggle-sidebar-btn');
                if (toggleBtn) {
                    const sidebar = document.getElementById('sidebar-mount');
                    const layout = document.querySelector('.tera-layout');
                    
                    if (window.innerWidth <= 992) {
                        if (sidebar) sidebar.classList.toggle('mobile-active');
                    } else {
                        if (layout) layout.classList.toggle('sidebar-collapsed');
                    }
                }
            });
        }

        // بدء التشغيل عند اكتمال تحميل هيكل الصفحة
        window.addEventListener('DOMContentLoaded', mountTeraComponents);
    </script>
</body>
</html>
