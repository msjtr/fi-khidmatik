<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>في خدمتك | Fi Khidmatik by Al-Itqan Plus</title>
    
    <!-- 1. ربط ملفات التنسيق (CSS) من المجلد الذي ظهر في صورتك -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/buttons-theme.css">
    
    <!-- أيقونات FontAwesome للجمالية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* إضافة لمسة Glassmorphism سريعة لتتوافق مع ذوقك */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 51, 102, 0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: #c5a059; font-family: 'Tajawal', sans-serif;
        }
    </style>
</head>
<body>

    <!-- شاشة التحميل الأولية -->
    <div id="loader" class="loading-overlay">
        <i class="fas fa-circle-notch fa-spin fa-3x mb-3"></i>
        <h2>جاري تشغيل تيرا جيت واي...</h2>
    </div>

    <div class="hub-container">
        <!-- القائمة الجانبية (Sidebar) -->
        <aside class="sidebar" id="sidebarMenu">
            <div class="brand-section">
                <h1 class="fw-900">في خدمتك</h1>
                <p>من الإتقان بلس</p>
                <small>V12.12.12 | فرع حائل</small>
            </div>

            <nav class="nav-menu">
                <!-- أزرار التحكم - مرتبة حسب موديولات main.js -->
                <button class="nav-link active" onclick="handleSidebarClick(this, 'dashboard')">
                    <i class="fas fa-chart-line me-2"></i> لوحة التحكم
                </button>
                <button class="nav-link" onclick="handleSidebarClick(this, 'customers')">
                    <i class="fas fa-users me-2"></i> إدارة العملاء
                </button>
                <button class="nav-link" onclick="handleSidebarClick(this, 'orders')">
                    <i class="fas fa-file-invoice-dollar me-2"></i> العقود والطلبات
                </button>
                <button class="nav-link" onclick="handleSidebarClick(this, 'system-logs')">
                    <i class="fas fa-history me-2"></i> سجل العمليات
                </button>
                <button class="nav-link" onclick="handleSidebarClick(this, 'map-bridge')">
                    <i class="fas fa-map-marked-alt me-2"></i> نظام الخرائط
                </button>
            </nav>

            <div class="user-info-bottom">
                <p><i class="fas fa-user-tie me-2"></i> م. محمد الشمري</p>
            </div>
        </aside>

        <!-- منطقة عرض المحتوى الديناميكي -->
        <main class="main-viewport">
            <div id="main-content-area" class="animate-fade-in">
                <!-- هنا يتم حقن الموديولات بواسطة main.js -->
            </div>
        </main>
    </div>

    <!-- 2. ربط ملفات البرمجة (JS) من مجلد js-logic الموضح في صورك -->
    
    <!-- استيراد المحرك الأساسي كموديول لدعم التوجيه (Routing) -->
    <script type="module" src="js-logic/main.js"></script>

    <!-- ربط متحكم الأزرار والوظائف العامة -->
    <script src="js-logic/btn-actions-controller.js"></script>

    <script>
        // إخفاء شاشة التحميل بعد جاهزية النظام
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 1000);
        });
    </script>
</body>
</html>
