<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera V12 | مؤسسة الإتقان بلس</title>
    
    <!-- 🖼️ أيقونة النظام - تأكد أن المجلد اسمه images وليس Images -->
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">

    <!-- 🎨 رابط التنسيق الموحد - تأكد من مطابقة حالة الأحرف تماماً -->
    <link rel="stylesheet" href="admin-customers-suite/css-styles/hub-style.css">

    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;
            --main-bg: #f4f7f9;
        }
        body {
            margin: 0; padding: 0;
            background: var(--main-bg);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }
        .tera-container {
            display: grid;
            grid-template-areas: "sidebar header" "sidebar main" "sidebar footer";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr auto;
            height: 100vh;
        }
        #sidebar-mount { grid-area: sidebar; z-index: 100; }
        #header-mount { grid-area: header; z-index: 90; }
        #main-viewport { grid-area: main; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        #footer-mount { grid-area: footer; z-index: 80; }
        .loader-hub { display: flex; justify-content: center; align-items: center; height: 100%; color: #001f3f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="tera-container">
        <aside id="sidebar-mount"></aside>
        <header id="header-mount"></header>
        <main id="main-viewport">
            <div id="dynamic-content-area" class="loader-hub">جاري مزامنة بيانات "الإتقان بلس"...</div>
        </main>
        <footer id="footer-mount"></footer>
    </div>

    <script>
        /**
         * دالة جلب المكونات مع تصحيح المسار التلقائي
         */
        async function injectComponent(elementId, fileName) {
            // استخدام مسار نسبي مباشر لضمان التوافق مع GitHub Pages
            const path = `admin-customers-suite/mm/${fileName}`;
            
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`فشل تحميل ${fileName} (Status: ${response.status})`);
                
                const htmlContent = await response.text();
                document.getElementById(elementId).innerHTML = htmlContent;
                console.log(`✅ تم تحميل: ${fileName}`);
            } catch (error) {
                console.error(`❌ خطأ: ${error.message}`);
                document.getElementById(elementId).innerHTML = 
                    `<div style="color:red; padding:10px; border:1px solid red; margin:5px;">
                        تعذر العثور على المكون: ${fileName} <br>
                        المسار المطلوب: ${path}
                    </div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            // تحميل الأجزاء الرئيسية
            injectComponent('sidebar-mount', 'sidebar.html');
            injectComponent('header-mount', 'header.html');
            injectComponent('footer-mount', 'footer.html');
            
            // تحميل واجهة الساعة (clock-view)
            setTimeout(() => {
                injectComponent('dynamic-content-area', 'clock-view.html');
            }, 600);
        });
    </script>
</body>
</html>
