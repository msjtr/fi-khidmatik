<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام Tera V12 | مؤسسة الإتقان بلس</title>

    <!-- 🖼️ التبويمة والشعار (تأكد من مسار الصورة) -->
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">

    <!-- 🎨 ربط ملفات التنسيق الأساسية -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/header-style.css">
    <link rel="stylesheet" href="css-styles/sidebar-style.css">
    <link rel="stylesheet" href="css-styles/footer-style.css">
    <link rel="stylesheet" href="css-styles/stats-visuals.css">

    <style>
        /* 💎 تنسيق الحاويات الرئيسي (Layout Controller) */
        :root {
            --sidebar-width: 260px;
            --header-height: 70px;
            --footer-height: 45px;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: #f8f9fa; 
        }

        .tera-admin-layout { 
            display: grid;
            /* تقسيم الشاشة: هيدر فوق، ثم (سايدبار + محتوى)، ثم فوتر تحت */
            grid-template-rows: var(--header-height) 1fr var(--footer-height);
            grid-template-columns: 1fr var(--sidebar-width);
            grid-template-areas: 
                "header header"
                "main sidebar"
                "footer footer";
            height: 100vh; 
        }

        #header-mount { 
            grid-area: header; 
            z-index: 1000; 
            background: #fff;
        }

        #sidebar-mount { 
            grid-area: sidebar; 
            z-index: 900; 
            background: #001f3f; 
        }

        .tera-view-window { 
            grid-area: main; 
            overflow: hidden; 
            background: #f4f7f6;
            position: relative;
        }

        #footer-mount { 
            grid-area: footer; 
            z-index: 1000; 
            background: #fff;
        }

        #tera-iframe { 
            width: 100%; height: 100%; border: none; 
            transition: all 0.3s ease;
        }

        /* إصلاح ظهور الشعار */
        .sidebar-brand img {
            max-width: 150px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="tera-admin-layout">
        <!-- 1. الهيدر -->
        <header id="header-mount"></header>

        <!-- 2. السايدبار (الجهة اليمنى) -->
        <aside id="sidebar-mount"></aside>

        <!-- 3. نافذة العرض الرئيسية -->
        <main class="tera-view-window">
            <iframe id="tera-iframe" name="tera-iframe" src="pages/customers-list.html"></iframe>
        </main>

        <!-- 4. التذييل -->
        <footer id="footer-mount"></footer>
    </div>

    <!-- 🧠 الربط البرمجي -->
    <script src="js-logic/main.js" type="module"></script>
    
    <script>
        // دالة تحميل المكونات مع معالجة الأخطاء وإصلاح الشعار
        async function loadTeraComponents() {
            const sections = [
                { id: 'header-mount', url: 'mm/header.html' },
                { id: 'sidebar-mount', url: 'mm/sidebar.html' },
                { id: 'footer-mount', url: 'mm/footer.html' }
            ];

            for (const section of sections) {
                try {
                    const res = await fetch(section.url);
                    if (res.ok) {
                        const html = await res.text();
                        document.getElementById(section.id).innerHTML = html;
                    }
                } catch (e) {
                    console.error("فشل تحميل المكون:", section.id);
                }
            }
            // إبلاغ النظام بأن الواجهة جاهزة لتشغيل الساعة والـ Auth
            document.dispatchEvent(new Event('TeraLayoutReady'));
        }

        window.addEventListener('DOMContentLoaded', loadTeraComponents);

        // نظام التنقل السلس
        window.teraNavigate = function(page) {
            const frame = document.getElementById('tera-iframe');
            frame.style.opacity = '0';
            setTimeout(() => {
                frame.src = `pages/${page}.html`;
                frame.onload = () => frame.style.opacity = '1';
            }, 200);
        };
    </script>
</body>
</html>
