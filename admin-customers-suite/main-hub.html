<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera V12 | الإتقان بلس - حائل</title>

    <!-- 1. الأيقونة الرسمية -->
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

    <!-- 2. إصلاح المسارات بناءً على المجلد الجديد (admin-customers-suite) -->
    <!-- تأكد أن هذا الملف موجود في الجذر أو بجانب مجلد admin-customers-suite -->
    <link rel="stylesheet" href="admin-customers-suite/css-styles/hub-style.css">
    <link rel="stylesheet" href="admin-customers-suite/css-styles/header-style.css">
    <link rel="stylesheet" href="admin-customers-suite/css-styles/sidebar-style.css">
    <link rel="stylesheet" href="admin-customers-suite/css-styles/footer-style.css">
    <link rel="stylesheet" href="admin-customers-suite/css-styles/list-table-style.css">

    <style>
        /* تنسيق الهيكل لضمان تجربة Modern Premium */
        body { margin: 0; background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .tera-container {
            display: grid;
            grid-template-areas: 
                "sidebar header"
                "sidebar main"
                "sidebar footer";
            grid-template-columns: 280px 1fr;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
        }
        #sidebar-mount { grid-area: sidebar; background: #001f3f; }
        #header-mount { grid-area: header; }
        #main-view { grid-area: main; overflow-y: auto; padding: 25px; background: #f8f9fa; }
        #footer-mount { grid-area: footer; }
    </style>
</head>
<body>

    <div class="tera-container">
        <aside id="sidebar-mount"></aside>
        <header id="header-mount"></header>
        <main id="main-view">
            <div id="content-area">
                <!-- شاشة ترحيبية تليق بمؤسسة الإتقان بلس -->
                <div style="text-align: center; margin-top: 15vh; opacity: 0.8;">
                    <h2 style="color: #001f3f;">نظام Tera لإدارة العمليات</h2>
                    <p style="color: #c5a059;">جاري مزامنة البيانات مع Firebase Cloud...</p>
                </div>
            </div>
        </main>
        <footer id="footer-mount"></footer>
    </div>

    <!-- 3. الربط البرمجي مع مراعاة مسار admin-customers-suite -->
    <script type="module" src="admin-customers-suite/js-logic/firebase.js"></script>
    <script type="module" src="admin-customers-suite/js-logic/main.js"></script>
    <script type="module" src="admin-customers-suite/js-logic/clock-logic.js"></script>

    <!-- 4. محرك تحميل المكونات من مجلد mm -->
    <script>
        async function loadComponent(id, file) {
            const mount = document.getElementById(id);
            try {
                // محاولة الجلب من المسار الفرعي المخصص للمكونات
                const response = await fetch(`admin-customers-suite/mm/${file}`);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                mount.innerHTML = await response.text();
                console.log(`✅ ${file} تم التحميل بنجاح`);
            } catch (err) {
                console.error(`❌ خطأ في تحميل ${file}:`, err);
                mount.innerHTML = `<div style="color:red; padding:20px;">تعذر تحميل ${file} - تأكد من المسار</div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadComponent('sidebar-mount', 'sidebar.html');
            loadComponent('header-mount', 'header.html');
            loadComponent('footer-mount', 'footer.html');
        });
    </script>
</body>
</html>
