<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera V12 | الإتقان بلس</title>
    
    <!-- ربط ملف التنسيق الموحد -->
    <link rel="stylesheet" href="css-styles/hhh-style.css">
</head>
<body>

    <!-- الهيكل الرئيسي المطابق لملف hhh-style.css -->
    <div class="tera-layout">
        <header id="header-mount"></header>
        <aside id="sidebar-mount"></aside>
        <main id="main-view">
            <!-- الشاشة التي تتغير عند الضغط على الأزرار -->
            <iframe id="tera-iframe" src="dashboard-home.html"></iframe>
        </main>
        <footer id="footer-mount"></footer>
    </div>

    <!-- كود الجافاسكريبت لربط وتشغيل كل شيء -->
    <script>
        // 1. دالة لجلب الملفات من مجلد mm
        async function loadComponent(id, fileName) {
            try {
                const response = await fetch(`mm/${fileName}`);
                if(response.ok) {
                    document.getElementById(id).innerHTML = await response.text();
                }
            } catch (error) {
                console.error(`خطأ في تحميل ${fileName}:`, error);
            }
        }

        // 2. دالة تشغيل الساعة الرقمية
        function runLiveClock() {
            setInterval(() => {
                const now = new Date();
                let h = now.getHours();
                const ampm = h >= 12 ? 'م' : 'ص';
                h = h % 12 || 12;

                const elH = document.getElementById('c-hours');
                if(elH) {
                    elH.innerText = String(h).padStart(2, '0');
                    document.getElementById('c-minutes').innerText = String(now.getMinutes()).padStart(2, '0');
                    document.getElementById('c-seconds').innerText = String(now.getSeconds()).padStart(2, '0');
                    document.getElementById('c-ampm').innerText = ampm;
                    
                    document.getElementById('c-greg').innerText = new Intl.DateTimeFormat('ar-SA', { day: '2-digit', month: 'short', year: 'numeric' }).format(now);
                    document.getElementById('c-hijri').innerText = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', { day: '2-digit', month: 'short', year: 'numeric' }).format(now);
                }
            }, 1000);
        }

        // 3. دالة التنقل للسايدبار
        window.teraNavigate = function(page) {
            document.getElementById('tera-iframe').src = `${page}.html`;
        };

        // 4. تسلسل التشغيل عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', async () => {
            // تحميل الهيدر والسايدبار والفوتر أولاً
            await Promise.all([
                loadComponent('header-mount', 'header.html'),
                loadComponent('sidebar-mount', 'sidebar.html'),
                loadComponent('footer-mount', 'footer.html')
            ]);
            
            // بعد تحميل الهيدر، نقوم بتحميل الساعة بداخله
            await loadComponent('clock-mount-point', 'clock-view.html');
            
            // تشغيل عداد الساعة
            runLiveClock();
        });
    </script>

</body>
</html>
