<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera V12 | مؤسسة الإتقان بلس</title>
    
    <!-- 🎨 استدعاء ملفات التنسيق -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/header-style.css">
    <link rel="stylesheet" href="css-styles/sidebar-style.css">
    <link rel="stylesheet" href="css-styles/footer-style.css">
    <link rel="stylesheet" href="css-styles/stats-visuals.css">
</head>
<body>

    <div class="tera-grid-container">
        <!-- الهيدر -->
        <header id="header-mount" class="header-area"></header>

        <!-- السايدبار (جهة اليمين) -->
        <aside id="sidebar-mount" class="sidebar-area"></aside>

        <!-- نافذة العرض الرئيسية -->
        <main class="main-content-area">
            <iframe id="tera-iframe" name="tera-iframe" src="pages/customers-list.html" frameborder="0"></iframe>
        </main>

        <!-- التذييل -->
        <footer id="footer-mount" class="footer-area"></footer>
    </div>

    <!-- 🧠 منطق التشغيل -->
    <script type="module">
        const loadPart = async (id, path) => {
            try {
                const r = await fetch(path);
                if(r.ok) document.getElementById(id).innerHTML = await r.text();
            } catch(e) { console.error("Error loading component"); }
        };

        window.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadPart('header-mount', 'mm/header.html'),
                loadPart('sidebar-mount', 'mm/sidebar.html'),
                loadPart('footer-mount', 'mm/footer.html')
            ]);
            document.dispatchEvent(new Event('TeraLayoutReady'));
        });

        window.teraNavigate = (p) => {
            const f = document.getElementById('tera-iframe');
            f.style.opacity = '0.4';
            f.src = `pages/${p}.html`;
            f.onload = () => f.style.opacity = '1';
        };
    </script>
</body>
</html>
