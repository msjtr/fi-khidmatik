<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tera V12 | لوحة تحكم الإتقان بلس</title>

    <!-- 🖼️ أيقونة المنصة -->
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">

    <!-- 🎨 ربط ملفات التنسيق المتكاملة -->
    <link rel="stylesheet" href="css-styles/hub-style.css">
    <link rel="stylesheet" href="css-styles/header-style.css">
    <link rel="stylesheet" href="css-styles/sidebar-style.css">
    <link rel="stylesheet" href="css-styles/footer-style.css">
    <link rel="stylesheet" href="css-styles/stats-visuals.css">
    <link rel="stylesheet" href="css-styles/buttons-theme.css">

    <style>
        /* 🛠️ هندسة الواجهة (تنسيق هيكلي حاسم لمنع التداخل) */
        :root {
            --sidebar-w: 280px;
            --header-h: 75px;
            --footer-h: 40px;
            --itqan-gold: #c5a059;
            --itqan-blue: #001f3f;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            overflow: hidden; /* منع التمرير المزدوج في الواجهة الرئيسية */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
        }

        /* حاوية الشبكة الرئيسية */
        .tera-main-wrapper {
            display: grid;
            height: 100vh;
            /* تقسيم المناطق: الهيدر في الأعلى، السايدبار على اليمين، والفوتر في الأسفل */
            grid-template-rows: var(--header-h) 1fr var(--footer-h);
            grid-template-columns: var(--sidebar-w) 1fr;
            grid-template-areas: 
                "header header"
                "sidebar main-view"
                "footer footer";
        }

        /* تخصيص المناطق المحجوزة */
        #header-mount { 
            grid-area: header; 
            z-index: 1000; 
            background: #fff;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        #sidebar-mount { 
            grid-area: sidebar; 
            z-index: 900; 
            background: var(--itqan-blue);
            border-left: 3px solid var(--itqan-gold);
            overflow-y: auto; /* تمرير داخل السايدبار فقط إذا لزم الأمر */
        }

        .tera-view-window { 
            grid-area: main-view; 
            background: #f8f9fa;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #footer-mount { 
            grid-area: footer; 
            z-index: 1000;
            background: #fff;
            border-top: 1px solid #eee;
        }

        /* إطار عرض الصفحات (Iframe) */
        #tera-iframe {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            transition: opacity 0.3s ease-in-out;
            background: transparent;
        }

        /* تأثير تحميل الصفحة */
        .iframe-loading { opacity: 0.3; filter: blur(2px); }

        /* 📱 تحسين الشاشات الصغيرة */
        @media (max-width: 1024px) {
            .tera-main-wrapper {
                grid-template-columns: 80px 1fr;
                --sidebar-w: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="tera-main-wrapper">
        <!-- 1. منطقة الهيدر (تحميل خارجي) -->
        <header id="header-mount"></header>

        <!-- 2. منطقة القائمة الجانبية (تحميل خارجي) -->
        <aside id="sidebar-mount"></aside>

        <!-- 3. نافذة المحتوى المتغير -->
        <main class="tera-view-window">
            <iframe id="tera-iframe" 
                    name="tera-iframe" 
                    src="pages/customers-list.html" 
                    title="Tera Content Window">
            </iframe>
        </main>

        <!-- 4. منطقة التذييل (تحميل خارجي) -->
        <footer id="footer-mount"></footer>
    </div>

    <!-- 🧠 الربط البرمجي والتحميل الذكي للمكونات -->
    <script type="module">
        /**
         * دالة تحميل المكونات (الهيدر، السايدبار، الفوتر)
         */
        async function mountTeraComponents() {
            const components = [
                { id: 'header-mount', url: 'mm/header.html' },
                { id: 'sidebar-mount', url: 'mm/sidebar.html' },
                { id: 'footer-mount', url: 'mm/footer.html' }
            ];

            for (const item of components) {
                try {
                    const response = await fetch(item.url);
                    if (response.ok) {
                        const html = await response.text();
                        const target = document.getElementById(item.id);
                        if (target) {
                            target.innerHTML = html;
                        }
                    }
                } catch (error) {
                    console.error(`[Tera Error] فشل تحميل المكون: ${item.url}`, error);
                }
            }

            // إرسال إشارة للنظام بأن الواجهة جاهزة (لتشغيل الساعة والـ Firebase)
            document.dispatchEvent(new Event('TeraLayoutReady'));
        }

        /**
         * نظام التنقل العالمي بين الصفحات
         * يتم استدعاؤه من السايدبار: onclick="window.teraNavigate('add-customer')"
         */
        window.teraNavigate = function(pageName) {
            const iframe = document.getElementById('tera-iframe');
            if (iframe) {
                iframe.classList.add('iframe-loading');
                iframe.src = `pages/${pageName}.html`;
                
                iframe.onload = () => {
                    iframe.classList.remove('iframe-loading');
                    console.log(`[Tera Nav] تم الانتقال بنجاح إلى: ${pageName}`);
                };
            }
        };

        // بدء التحميل عند جاهزية المستند
        window.addEventListener('DOMContentLoaded', mountTeraComponents);
    </script>
</body>
</html>
