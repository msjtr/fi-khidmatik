<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قائمة العملاء - Tera V12</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .page-header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .table-container { background: white; border-radius: 10px; overflow-x: auto; }
        .tera-table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        .tera-table th, .tera-table td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        
        /* تنسيق الإجراءات الجديد */
        .actions-cell { display: flex; gap: 8px; align-items: center; }
        .action-link { cursor: pointer; padding: 4px 8px; border-radius: 4px; text-decoration: none; font-size: 0.85em; font-weight: bold; border: 1px solid transparent; }
        .action-link.edit-btn { color: #3498db; border-color: #3498db; }
        .action-link.view-btn { color: #1abc9c; border-color: #1abc9c; }
        .action-link.print-btn { color: #7f8c8d; border-color: #7f8c8d; }
        .action-link.delete-btn { color: #e74c3c; border-color: #e74c3c; }
        .action-divider { color: #ddd; }

        /* Modal Settings */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; border-radius: 12px; padding: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .editor-container { height: 150px; margin-bottom: 15px; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 10px; }
        .log-table th, .log-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>قائمة العملاء</h1>
        <p>إجمالي العملاء: <span id="customers-count">0</span></p>
    </div>

    <div class="table-container">
        <table class="tera-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>الاسم</th>
                    <th>الجوال</th>
                    <th>حالة الحساب</th>
                    <th>التصنيف</th>
                    <th>السلوك</th>
                    <th style="width: 250px;">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customers-tbody"></tbody>
        </table>
    </div>

    <!-- مودال تعديل العميل والمرفقات -->
    <div id="edit-customer-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>تعديل الملف والمرفقات</h3>
            <form id="edit-customer-form">
                <input type="hidden" id="edit-doc-id">
                <div class="form-grid">
                    <div style="display:flex; flex-direction:column;"><label>الاسم</label><input type="text" id="edit-name"></div>
                    <div style="display:flex; flex-direction:column;"><label>الجوال</label><input type="text" id="edit-phone"></div>
                    <div style="display:flex; flex-direction:column;"><label>الحالة</label>
                        <select id="edit-accountStatus">
                            <option value="جديد">جديد</option><option value="نشط">نشط</option>
                            <option value="موقوف">موقوف</option><option value="محظور">محظور</option>
                        </select>
                    </div>
                </div>
                <div style="margin-top:15px;">
                    <label>الملاحظات (محرر Word)</label>
                    <div id="editor" class="editor-container"></div>
                </div>

                <div style="border-top:2px solid #eee; margin-top:20px; padding-top:15px;">
                    <h4>📎 المرفقات وسجل العمليات</h4>
                    <div style="display:flex; gap:10px; background:#f9f9f9; padding:10px; border-radius:8px;">
                        <input type="text" id="new-file-name" placeholder="اسم الملف" style="flex:1;">
                        <input type="file" id="new-file-input" style="flex:1;">
                        <button type="button" id="upload-btn" style="background:#3498db; color:white; border:none; padding:5px 15px; cursor:pointer;">رفع المرفق</button>
                    </div>
                    <table class="log-table">
                        <thead><tr><th>الملف</th><th>الموظف</th><th>الإضافة</th><th>الحذف</th><th>إجراء</th></tr></thead>
                        <tbody id="files-log-list"></tbody>
                    </table>
                </div>

                <div style="margin-top:20px; text-align:left;">
                    <button type="button" onclick="closeEditModal()">إلغاء</button>
                    <button type="submit" style="background:#2ecc71; color:white; border:none; padding:8px 25px; cursor:pointer;">حفظ التغييرات</button>
                </div>
            </form>
        </div>
    </div>

    <!-- مودال عرض تفاصيل العميل -->
    <div id="view-customer-modal" class="modal-overlay">
        <div class="modal-content" style="max-width:600px;">
            <h3>تفاصيل ملف العميل</h3>
            <div id="view-details-body" style="line-height:1.8;"></div>
            <button onclick="document.getElementById('view-customer-modal').classList.remove('active')" style="margin-top:15px; width:100%; padding:10px;">إغلاق</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script type="module" src="../js-logic/customers-list.js"></script>
</body>
</html>
