<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل عمليات العملاء - تيرا</title>
    <link rel="stylesheet" href="../css-styles/add-cust-style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .log-container { margin-top: 20px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .log-table { width: 100%; border-collapse: collapse; text-align: center; }
        .log-table th, .log-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; color: white; }
        
        /* تصميم النافذة المنبثقة للإضافة */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal.active { display:flex; }
        .modal-content { background:white; width:90%; max-width:900px; padding:30px; border-radius:15px; max-height:90vh; overflow-y:auto; }
    </style>
</head>
<body>

    <div class="page-container">
        <div class="form-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2>📋 سجل عمليات إضافة العملاء</h2>
                <p>متابعة إجراءات الموظفين والعمليات المسجلة</p>
            </div>
            <button id="open-add-modal" class="save-btn">+ إضافة عميل جديد</button>
        </div>

        <!-- جدول سجل العمليات الرئيسي -->
        <div class="log-container">
            <table class="log-table">
                <thead>
                    <tr style="background: #f8fafc;">
                        <th>التاريخ والوقت</th>
                        <th>اسم الموظف المنفذ</th>
                        <th>العميل المضاف</th>
                        <th>حالة الحساب</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="operations-log-tbody">
                    <!-- يتم تحميل البيانات هنا برمجياً -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- نافذة إضافة عميل (Modal) -->
    <div id="add-cust-modal" class="modal">
        <div class="modal-content">
            <h3>إضافة عميل جديد للنظام</h3>
            <form id="add-customer-form">
                <div class="form-grid">
                    <div class="input-group"><label>اسم العميل</label><input type="text" id="cust-name" required></div>
                    <div class="input-group"><label>الجوال (يبدأ بـ 5)</label><input type="text" id="cust-phone" required></div>
                    <div class="input-group">
                        <label>حالة الحساب</label>
                        <select id="cust-accountStatus">
                            <option value="جديد">جديد</option>
                            <option value="نشط">نشط</option>
                        </select>
                    </div>
                    <!-- باقي الحقول الـ 16 المعتمدة سابقاً تضاف هنا -->
                </div>
                <div class="editor-section">
                    <label>الملاحظات</label>
                    <div id="editor-container"></div>
                </div>
                <div class="form-footer">
                    <button type="submit" class="save-btn">تأكيد الإضافة</button>
                    <button type="button" class="cancel-btn" id="close-modal">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script type="module" src="../js-logic/add-cust.js"></script>
</body>
</html>
