<!-- 🎨 استدعاء ملف التنسيق الموحد من المسار الصحيح -->
<link rel="stylesheet" href="../css-styles/hub-style.css">

<div class="clock-display-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    
    <!-- بطاقة الساعة المتميزة لهوية Tera V12 -->
    <div class="itqan-clock-card" style="background: #ffffff; padding: 60px; border-radius: 40px; border: 3px solid #c5a059; box-shadow: 0 25px 50px rgba(0,0,0,0.1); position: relative; max-width: 600px; width: 90%;">
        
        <!-- الهوية البصرية لشعار المؤسسة -->
        <div class="clock-branding" style="margin-bottom: 30px;">
            <img src="../images/logo.svg" style="width: 90px; margin-bottom: 15px;" onerror="this.src='https://ui-avatars.com/api/?name=Tera+V12&background=001f3f&color=c5a059'">
            <h2 style="color: #001f3f; margin: 0; font-size: 2rem; font-weight: 800;">TERA <span style="color: #c5a059;">V12</span></h2>
            <p style="color: #888; font-weight: 600; margin-top: 5px;">توقيت مدينة حائل المحلي</p>
        </div>

        <!-- عرض التاريخ واليوم -->
        <div id="itqan-full-date" style="background: rgba(197, 160, 89, 0.1); color: #c5a059; padding: 12px 30px; border-radius: 50px; font-weight: 700; font-size: 1.3rem; margin-bottom: 30px; display: inline-block;">
            جاري جلب التاريخ...
        </div>

        <!-- الساعة الرقمية المركزية -->
        <div class="main-time-display" style="display: flex; align-items: center; justify-content: center; gap: 20px; background: #001f3f; padding: 45px; border-radius: 35px; color: #c5a059; box-shadow: inset 0 0 25px rgba(0,0,0,0.4);">
            
            <div class="unit">
                <span id="view-h" style="font-size: 6rem; font-weight: 900; line-height: 1;">00</span>
                <span style="display: block; font-size: 1rem; color: #fff; opacity: 0.6; margin-top: 10px;">ساعة</span>
            </div>

            <div class="separator" style="font-size: 4.5rem; font-weight: 900; animation: itqan-blink 1s infinite;">:</div>

            <div class="unit">
                <span id="view-m" style="font-size: 6rem; font-weight: 900; line-height: 1;">00</span>
                <span style="display: block; font-size: 1rem; color: #fff; opacity: 0.6; margin-top: 10px;">دقيقة</span>
            </div>

            <div class="separator" style="font-size: 4.5rem; font-weight: 900; opacity: 0.5;">:</div>

            <div class="unit">
                <span id="view-s" style="font-size: 3rem; font-weight: 700; color: #fff; line-height: 1;">00</span>
                <span style="display: block; font-size: 0.9rem; color: #c5a059; margin-top: 10px;">ثانية</span>
            </div>
        </div>

        <!-- تذييل الصفحة الإداري -->
        <div style="margin-top: 40px; border-top: 1px solid #f0f0f0; padding-top: 25px;">
            <p style="color: #001f3f; font-weight: 700; font-size: 1.1rem; margin: 0;">مؤسسة الإتقان بلس - حائل</p>
            <small style="color: #aaa;">نظام الإدارة التقنية والمالية المتطور</small>
        </div>
    </div>
</div>

<style>
    /* أنيميشن الوميض للنقطتين الفاصلتين */
    @keyframes itqan-blink {
        0%, 100% { opacity: 1; color: #c5a059; }
        50% { opacity: 0.2; color: #fff; }
    }
</style>

<script>
    /**
     * وظيفة تحديث الساعة والتاريخ
     * تعتمد على التوقيت المحلي للمملكة العربية السعودية
     */
    function startTeraClock() {
        const update = () => {
            const now = new Date();
            
            // تحديث التاريخ واليوم بالعربي
            const dateStr = now.toLocaleDateString('ar-SA', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            document.getElementById('itqan-full-date').textContent = dateStr;

            // تحديث الأرقام
            document.getElementById('view-h').textContent = String(now.getHours()).padStart(2, '0');
            document.getElementById('view-m').textContent = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('view-s').textContent = String(now.getSeconds()).padStart(2, '0');
        };

        setInterval(update, 1000);
        update();
    }

    // بدء العمل فور التحميل
    startTeraClock();
</script>
