<div class="footer-status-bar">
    <!-- القسم الأيمن: حقوق النشر ورقم الإصدار -->

    </div>

    <!-- القسم الأوسط: إشعارات حالة النظام -->
    <div class="footer-alerts" id="system-status-msg">
        <span class="alert-msg success-msg" id="alert-text">
            <svg id="alert-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <span id="alert-message-content">جميع الأنظمة تعمل بكفاءة</span>
        </span>
    </div>

    <!-- القسم الأيسر: حالة الاتصال مع نقطة نابضة -->
    <div class="footer-connection" id="system-connection-status">
        <span class="status-dot online" id="connection-dot"></span>
        <span class="status-text" id="connection-text" style="color: #2ecc71;">متصل بخوادم النظام</span>
    </div>
</div>

<!-- منطق تشغيل حالة الاتصال (JS) -->
<script>
    function updateOnlineStatus(event) {
        const isOnline = navigator.onLine;
        
        const connectionDot = document.getElementById('connection-dot');
        const connectionText = document.getElementById('connection-text');
        
        const alertBox = document.getElementById('alert-text');
        const alertIcon = document.getElementById('alert-icon');
        const alertContent = document.getElementById('alert-message-content');

        if (isOnline) {
            // حالة الاتصال جيدة
            connectionDot.className = 'status-dot online';
            connectionText.innerText = 'متصل بخوادم النظام';
            connectionText.style.color = '#2ecc71';
            
            alertBox.className = 'alert-msg success-msg';
            alertIcon.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>';
            alertContent.innerText = 'جميع الأنظمة تعمل بكفاءة';
        } else {
            // انقطاع الاتصال بالإنترنت
            connectionDot.className = 'status-dot offline';
            connectionText.innerText = 'غير متصل (يوجد خلل في الشبكة)';
            connectionText.style.color = '#e74c3c';
            
            alertBox.className = 'alert-msg error-msg';
            alertIcon.innerHTML = '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>';
            alertContent.innerText = 'تنبيه: تم فقدان الاتصال بقاعدة البيانات';
        }
    }

    // مراقبة حالة الإنترنت لحظة بلحظة
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    
    // التحقق فور تحميل الصفحة
    updateOnlineStatus();
</script>
    <!-- القسم الأوسط: إشعارات مشاكل/حالة النظام (تتغير برمجياً) -->
    <div class="footer-alerts" id="system-status-msg">
        <!-- الحالة الافتراضية السليمة -->
        <span class="alert-msg success-msg">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            جميع الأنظمة تعمل بكفاءة
        </span>
    </div>

    <!-- القسم الأيسر: حالة الاتصال مع نقطة نابضة -->
    <div class="footer-connection" id="system-connection-status">
        <span class="status-dot online"></span>
        <span class="status-text">متصل بخوادم النظام</span>
    </div>
</div>
