<!-- ==========================================
    تصميم الشريط الجانبي الكامل والثابت - Tera V12
=========================================== -->
<style>
    /* تخصيص شريط التمرير الذهبي النحيف */
    .sidebar-scrollable-content::-webkit-scrollbar {
        width: 4px;
    }
    .sidebar-scrollable-content::-webkit-scrollbar-track {
        background: transparent;
    }
    .sidebar-scrollable-content::-webkit-scrollbar-thumb {
        background: rgba(212, 175, 55, 0.2);
        border-radius: 10px;
    }
    .sidebar-scrollable-content::-webkit-scrollbar-thumb:hover {
        background: var(--itqan-gold-primary);
    }

    /* هيكلة الحاوية لضمان ثبات الترويسة */
    #sidebar-mount {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 0 !important;
        overflow: hidden;
    }

    /* الترويسة الثابتة */
    .sidebar-fixed-header {
        padding: 25px 15px 15px 15px;
        background: var(--itqan-navy-bg);
        border-bottom: 1px solid rgba(255,255,255,0.05);
        flex-shrink: 0;
        position: relative;
    }

    /* منطقة الأزرار القابلة للتمرير */
    .sidebar-scrollable-content {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px 15px 25px 15px;
    }

    .brand-logo-container img { max-width: 75px; margin-bottom: 10px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
    .brand-title-ar { font-weight: 900; font-size: 1.1rem; color: var(--itqan-gold-primary); text-align: center; }
    .brand-title-en { font-size: 0.65rem; color: #8ba1b5; text-align: center; letter-spacing: 1px; }

    /* تنسيق الأزرار */
    .nav-btn { 
        display: flex; align-items: center; width: 100%; padding: 12px 14px; 
        background: transparent; border: none; color: #cbd5e1; border-radius: 12px; 
        cursor: pointer; transition: 0.3s; margin-bottom: 4px; font-weight: 600; 
        font-family: inherit; font-size: 0.95rem;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.06); color: #FFF; }
    .nav-btn.active { background: rgba(212, 175, 55, 0.1); border-right: 4px solid var(--itqan-gold-primary); color: var(--itqan-gold-primary); }
    .nav-btn svg { margin-left: 12px; }

    /* تنسيق القوائم الفرعية */
    .submenu-container { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: rgba(0,0,0,0.2); border-radius: 10px; }
    .submenu-inner { display: flex; flex-direction: column; padding: 5px 0; }
    .submenu-item { 
        padding: 10px 20px; color: #94a3b8; background: transparent; border: none; 
        text-align: right; cursor: pointer; font-size: 0.85rem; font-family: inherit;
        transition: 0.3s;
    }
    .submenu-item:hover, .submenu-item.active { color: var(--itqan-gold-primary); padding-right: 25px; }

    .nav-section-title { font-size: 0.7rem; color: #5a718f; margin: 20px 10px 8px 0; font-weight: 800; text-transform: uppercase; }
    .collapse-btn { position: absolute; left: 10px; top: 10px; background: none; border: none; color: #6A7B9C; cursor: pointer; }
</style>

<!-- 1. الترويسة الثابتة (لا تتحرك عند التمرير) -->
<div class="sidebar-fixed-header">
    <button class="collapse-btn" id="toggle-sidebar-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="brand-logo-container"><img src="/Fi-Khidmatik-by-Al-Itqan-Plus/images/logo.svg" alt="Tera Logo"></div>
        <div class="brand-title-ar">في خدمتك من الإتقان بلس</div>
        <div class="brand-title-en">Fi Khidmatik by Al-Itqan Plus</div>
    </div>
</div>
