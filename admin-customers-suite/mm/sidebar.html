<!-- ==========================================
    تصميم الشريط الجانبي الفاخر الثابت - Tera V12
=========================================== -->
<style>
    /* 1. هيكلة الحاوية لضمان ثبات الترويسة */
    #sidebar-mount {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 0 !important; /* إلغاء البادينج الخارجي للتحكم الداخلي */
        overflow: hidden; /* منع التمرير في الحاوية الأم */
    }

    /* 2. الترويسة الثابتة (الشعار والعناوين) */
    .sidebar-fixed-header {
        padding: 25px 15px 15px 15px;
        background: var(--itqan-navy-bg);
        z-index: 10;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        flex-shrink: 0; /* منع انكماش الرأس */
    }

    .sidebar-header-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }

    /* 3. منطقة الأزرار المتحركة (Scrollable Area) */
    .sidebar-scrollable-content {
        flex-grow: 1;
        overflow-y: auto; /* التمرير هنا فقط */
        padding: 15px;
        scrollbar-gutter: stable;
    }

    /* 4. تخصيص شريط التمرير الذهبي المربوط بالقائمة */
    .sidebar-scrollable-content::-webkit-scrollbar {
        width: 5px;
    }
    .sidebar-scrollable-content::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.1);
    }
    .sidebar-scrollable-content::-webkit-scrollbar-thumb {
        background: rgba(106, 123, 156, 0.3);
        border-radius: 10px;
    }
    .sidebar-scrollable-content::-webkit-scrollbar-thumb:hover {
        background: var(--itqan-gold-primary); /* يضيء بالذهبي عند التمرير */
    }

    /* 5. تنسيقات العناصر الجمالية */
    .brand-logo-container img { 
        max-width: 75px; 
        margin-bottom: 12px; 
        filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); 
    }
    .brand-title-ar { font-weight: 900; font-size: 1.1rem; color: var(--itqan-gold-primary); text-align: center; }
    .brand-title-en { font-size: 0.7rem; color: #8ba1b5; text-align: center; margin-top: 4px; letter-spacing: 1px; }

    .nav-btn { 
        display: flex; 
        align-items: center; 
        width: 100%; 
        padding: 12px 15px; 
        background: transparent; 
        border: none; 
        color: #cbd5e1; 
        border-radius: 12px; 
        cursor: pointer; 
        transition: 0.3s; 
        margin-bottom: 4px;
        font-weight: 600;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.08); color: #FFF; }
    .nav-btn.active { background: rgba(212, 175, 55, 0.1); border-right: 4px solid var(--itqan-gold-primary); color: var(--itqan-gold-primary); }
    
    .submenu-container { 
        max-height: 0; 
        overflow: hidden; 
        transition: max-height 0.4s ease; 
        background: rgba(0,0,0,0.2); 
        border-radius: 10px; 
    }
    .submenu-inner { display: flex; flex-direction: column; padding: 5px 0; }
    .submenu-item { 
        padding: 10px 20px; 
        color: #94a3b8; 
        background: transparent; 
        border: none; 
        text-align: right; 
        cursor: pointer; 
        font-size: 0.85rem;
    }
    .submenu-item:hover, .submenu-item.active { color: var(--itqan-gold-primary); }

    /* زر القائمة الجانبية (ثابت لا يختفي) */
    .collapse-btn { 
        position: absolute; 
        left: 0; 
        top: 0; 
        background: none; 
        border: none; 
        color: #6A7B9C; 
        cursor: pointer; 
        z-index: 100;
    }
</style>

<!-- الترويسة الثابتة -->
<div class="sidebar-fixed-header">
    <div class="sidebar-header-content">
        <button class="collapse-btn" id="toggle-sidebar-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="brand-logo-container">
            <img src="/Fi-Khidmatik-by-Al-Itqan-Plus/images/logo.svg" alt="إتقان بلس">
        </div>
        <div class="brand-titles">
            <div class="brand-title-ar">في خدمتك من الإتقان بلس</div>
            <div class="brand-title-en">Fi Khidmatik by Al-Itqan Plus</div>
        </div>
    </div>
</div>

<!-- المحتوى القابل للتمرير -->
<div class="sidebar-scrollable-content">
    <nav class="sidebar-nav">
        <button class="nav-btn active" onclick="window.teraNavigate('dashboard')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span>الرئيسية</span>
        </button>

        <div style="font-size: 0.7rem; color: #5a718f; margin: 15px 10px 5px 0; font-weight: 800;">إدارة المتجر</div>

        <button class="nav-btn" onclick="window.teraNavigate('products')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8l-7-4-7 4v8l7 4 7-4z"/></svg>
            <span>المنتجات</span>
        </button>

        <div class="nav-item-wrapper">
            <button class="nav-btn has-submenu" data-target="customers-submenu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                <span>العملاء</span>
                <svg style="margin-right: auto;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="submenu-container" id="customers-submenu">
                <div class="submenu-inner">
                    <button class="submenu-item" onclick="window.teraNavigate('customers-list')">قائمة العملاء</button>
                    <button class="submenu-item" onclick="window.teraNavigate('add-customer')">إضافة عميل</button>
                </div>
            </div>
        </div>

        <div style="font-size: 0.7rem; color: #5a718f; margin: 15px 10px 5px 0; font-weight: 800;">الإعدادات</div>
        <!-- أضف باقي الأزرار هنا لتجربة التمرير -->
        <button class="nav-btn" onclick="window.teraNavigate('settings')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33"/></svg>
            <span>إعدادات النظام</span>
        </button>
    </nav>
</div>
