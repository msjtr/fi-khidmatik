<!-- ==========================================
    تصميم الشريط الجانبي الفاخر - Tera V12
=========================================== -->
<style>
    /* التنسيقات الأساسية للشعار والرأس */
    .sidebar-header { display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; position: relative; }
    .collapse-btn { position: absolute; left: 0; top: 0; background: none; border: none; color: #6A7B9C; cursor: pointer; transition: 0.3s; padding: 5px; }
    .collapse-btn:hover { color: var(--itqan-gold-primary); transform: scale(1.1); }
    .brand-logo-container img { max-width: 80px; margin-bottom: 12px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }
    .brand-titles { text-align: center; }
    .brand-title-ar { font-weight: 900; font-size: 1.15rem; color: var(--itqan-gold-primary); letter-spacing: 0.5px; }
    .brand-title-en { font-size: 0.7rem; color: #8ba1b5; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
    
    /* تنسيقات الأزرار الرئيسية */
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
    .nav-section-title { font-size: 0.75rem; color: #5a718f; margin: 15px 15px 5px 15px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
    
    .nav-btn { display: flex; align-items: center; width: 100%; padding: 14px 16px; background: transparent; border: none; color: #cbd5e1; border-radius: 14px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: right; font-family: inherit; font-size: 0.95rem; font-weight: 600; position: relative; overflow: hidden; }
    
    /* تأثير التأشير والنشط للأزرار الرئيسية */
    .nav-btn:hover { background: rgba(255,255,255,0.04); color: #FFF; transform: translateX(-4px); }
    .nav-btn.active { background: linear-gradient(90deg, rgba(212, 175, 55, 0.15) 0%, transparent 100%); border-right: 4px solid var(--itqan-gold-primary); color: var(--itqan-gold-primary); font-weight: 800; }
    
    .nav-btn svg { margin-left: 14px; opacity: 0.9; }
    .dropdown-arrow-icon { margin-left: 0 !important; margin-right: auto; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    /* ==========================================
       🌟 اللمسة الجمالية للقوائم الفرعية (العمق والتميز)
    ========================================== */
    .submenu-container { 
        max-height: 0; 
        overflow: hidden; 
        transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        /* خلفية داكنة جداً مع ظل داخلي لتعطي إحساساً بالعمق */
        background: #061124; 
        border-radius: 12px; 
        margin: 2px 10px; 
        box-shadow: inset 0 4px 10px rgba(0,0,0,0.3);
    }
    
    .submenu-inner { display: flex; flex-direction: column; padding: 10px 0; gap: 2px; }
    
    .submenu-item { 
        background: transparent; 
        border: none; 
        color: #8ba1b5; 
        padding: 10px 20px 10px 15px; 
        text-align: right; 
        cursor: pointer; 
        transition: all 0.3s ease; 
        font-family: inherit; 
        font-size: 0.85rem; 
        font-weight: 600; 
        position: relative;
        border-right: 2px solid transparent;
    }
    
    /* تأثير التأشير للخدمات الفرعية */
    .submenu-item:hover { 
        color: #FFF; 
        padding-right: 28px; /* حركة انسيابية لليمين */
    }
    
    /* 🎯 الزر الفرعي النشط (المربوط بالمحتوى حالياً) */
    .submenu-item.active { 
        color: var(--itqan-gold-primary); 
        border-right: 2px solid var(--itqan-gold-primary);
        background: linear-gradient(90deg, rgba(212, 175, 55, 0.08) 0%, transparent 100%);
        padding-right: 28px;
    }
</style>
