    .collapse-btn { position: absolute; left: 0; top: 0; background: none; border: none; color: #6A7B9C; cursor: pointer; transition: 0.3s; padding: 5px; }
    .collapse-btn:hover { color: #D4AF37; transform: scale(1.1); }

    .nav-btn.active { border-right: 4px solid #D4AF37; color: #D4AF37; }
    .nav-btn svg { margin-left: 12px; }
    .dropdown-arrow-icon { margin-left: 0 !important; margin-right: auto; transition: transform 0.3s; }
    
    .submenu-container { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(0,0,0,0.15); border-radius: 10px; margin-top: 5px; }
    .submenu-inner { display: flex; flex-direction: column; padding: 8px 15px 8px 0; gap: 2px; }

<!-- منطق تشغيل القائمة الجانبية (JS) -->
<script>
    // 1. تشغيل القوائم المنسدلة (Accordion)
    document.querySelectorAll('.has-submenu').forEach(button => {
        button.addEventListener('click', function() {
            this.classList.toggle('active');
            const targetId = this.getAttribute('data-target');
            const submenu = document.getElementById(targetId);
            const arrow = this.querySelector('.dropdown-arrow-icon');
            
            if (submenu.style.maxHeight) {
                submenu.style.maxHeight = null;
                arrow.style.transform = 'rotate(0deg)';
            } else {
                submenu.style.maxHeight = submenu.scrollHeight + "px";
                arrow.style.transform = 'rotate(180deg)';
            }
        });
    });

    // 2. دالة التنقل بين الصفحات داخل الإطار (iframe)
    function teraNavigate(pageName, clickedElement) {
        const iframe = document.getElementById('tera-iframe');
        if (iframe) {
            // إضافة صيغة html إذا لم تكن موجودة
            const targetUrl = pageName.endsWith('.html') ? pageName : pageName + '.html';
            iframe.src = targetUrl;
        }

        // إزالة حالة "النشط" من جميع الأزرار
        document.querySelectorAll('.tera-nav-link').forEach(btn => {
            btn.classList.remove('active');
        });

        // تفعيل حالة "النشط" للزر الذي تم النقر عليه
        if (clickedElement) {
            clickedElement.classList.add('active');
        }
    }
</script>
