<!-- تنسيقات القائمة الجانبية المدمجة -->
<style>
    .sidebar-header { display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; position: relative; }
    .collapse-btn { position: absolute; left: 0; top: 0; background: none; border: none; color: #6A7B9C; cursor: pointer; transition: 0.3s; padding: 5px; }
    .collapse-btn:hover { color: var(--itqan-gold-primary); transform: scale(1.1); }
    .brand-logo-container img { max-width: 75px; margin-bottom: 10px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
    .brand-titles { text-align: center; }
    .brand-title-ar { font-weight: 900; font-size: 1.15rem; color: var(--itqan-gold-primary); text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    .brand-title-en { font-size: 0.7rem; color: #cbd5e1; margin-top: 3px; letter-spacing: 0.5px; }
    
    .sidebar-nav { display: flex; flex-direction: column; gap: 6px; }
    .nav-section-title { font-size: 0.8rem; color: #6A7B9C; margin: 15px 15px 5px 15px; font-weight: bold; letter-spacing: 0.5px; }
    .nav-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 10px 0; }
    
    .nav-btn { display: flex; align-items: center; width: 100%; padding: 12px 15px; background: transparent; border: none; color: #cbd5e1; border-radius: 12px; cursor: pointer; transition: all 0.3s; text-align: right; font-family: inherit; font-size: 0.95rem; font-weight: 600; }
    .nav-btn:hover { background: rgba(255,255,255,0.08); color: #FFF; transform: translateX(-5px); }
    .nav-btn.active { background: rgba(212, 175, 55, 0.1); border-right: 4px solid var(--itqan-gold-primary); color: var(--itqan-gold-primary); font-weight: 800; }
    .nav-btn svg { margin-left: 12px; }
    .dropdown-arrow-icon { margin-left: 0 !important; margin-right: auto; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .submenu-container { max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(0,0,0,0.2); border-radius: 10px; margin-top: 5px; }
    .submenu-inner { display: flex; flex-direction: column; padding: 8px 15px 8px 0; gap: 4px; }
    .submenu-item { background: transparent; border: none; color: #94a3b8; padding: 10px 20px 10px 10px; text-align: right; cursor: pointer; transition: 0.3s; font-family: inherit; border-radius: 8px; font-size: 0.85rem; font-weight: 500; }
    .submenu-item:hover, .submenu-item.active { color: #FFF; background: rgba(255,255,255,0.05); padding-right: 25px; color: var(--itqan-gold-primary); }
</style>
