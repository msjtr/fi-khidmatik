<!-- الحاوية الرئيسية للهيدر (Flex Space-between يوزع العناصر لليمين واليسار) -->
<div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">

    <!-- 1. القسم الأيمن: بيانات المستخدم والقائمة المنسدلة -->
    <div class="user-profile-wrapper" onclick="window.toggleDropdown(event)" style="display: flex; align-items: center; gap: 12px; cursor: pointer; position: relative;">
        
        <!-- الأيقونة الرمزية -->
        <div id="user-avatar-icon" style="width: 45px; height: 45px; background: var(--itqan-gold-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem;">م.ص</div>
        
        <!-- الاسم والعبارة -->
        <div style="text-align: right;">
            <div id="display-user-name" style="font-weight: 800; color: var(--itqan-navy-bg);">محمد بن صالح الشمري</div>
            <div id="motivational-phrase" style="font-size: 0.8rem; color: #D4AF37; font-weight: bold;">يوم مليء بالنجاح والإنجازات! 🚀</div>
        </div>

        <!-- القائمة المنسدلة -->
        <div id="user-dropdown" class="dropdown-menu">
            <a href="javascript:void(0);" class="dropdown-item" onclick="teraNavigate('edit-profile')"><span style="font-size: 1.1rem;">📝</span> تعديل البيانات</a>
            <a href="javascript:void(0);" class="dropdown-item" onclick="teraNavigate('contact-info')"><span style="font-size: 1.1rem;">📞</span> بيانات التواصل</a>
            <a href="javascript:void(0);" class="dropdown-item" onclick="teraNavigate('change-password')"><span style="font-size: 1.1rem;">🔒</span> تغيير كلمة المرور</a>
            <div style="height: 1px; background: #e2e8f0; margin: 8px 0;"></div>
            <a href="javascript:void(0);" class="dropdown-item" style="color: #e74c3c; font-weight: bold;"><span style="font-size: 1.1rem;">🚪</span> تسجيل الخروج</a>
        </div>
    </div>

    <!-- 2. القسم الأيسر: الساعة ولوحة التحكم -->
    <div style="display: flex; align-items: center; gap: 15px;">
        
        <!-- حاوية الساعة (تم دمجها هنا مع خلفية مشابهة للصورة) -->
        <div style="display: flex; align-items: center; gap: 15px; background: #eef2f6; padding: 6px 15px; border-radius: 20px; border: 1px solid #cbd5e1;">
            
            <!-- التاريخ -->
            <div style="font-size: 0.8rem; font-weight: 800; color: #64748b; text-align: center;">
                <div id="c-hijri">00/00/0000</div>
                <div id="c-greg">00/00/0000</div>
            </div>
            
            <!-- خط فاصل صغير داخل الساعة -->
            <div style="width: 2px; height: 25px; background: #cbd5e1;"></div>
            
            <!-- الوقت -->
            <div style="font-weight: 900; color: var(--itqan-navy-bg); direction: ltr; font-family: monospace; font-size: 1.2rem; display: flex; align-items: center;">
                <span id="c-hours">00</span> : <span id="c-minutes">00</span> : <span id="c-seconds">00</span>
                <span id="c-ampm" style="font-size: 0.9rem; color: #D4AF37; margin-left: 8px; font-family: 'Segoe UI', Tahoma, sans-serif;">ص</span>
            </div>
        </div>

        <!-- خط فاصل بين الساعة والعنوان (كما في صورتك تماماً) -->
        <div style="width: 2px; height: 30px; background: #cbd5e1;"></div>

        <!-- العنوان -->
        <h3 style="color: var(--itqan-navy-bg); margin: 0; font-weight: 900;">لوحة التحكم</h3>
    </div>

</div>
