<div class="header-container">
    <!-- القسم الأيمن: الترحيب (الاسم يظهر هنا فقط لعدم التكرار) -->
    <div class="header-greeting">
        <div class="greeting-main">مرحباً بك، <span id="display-user-name">محمد الشمري</span> 👋</div>
        <div class="motivate-text" id="motivational-phrase">يوم مليء بالنجاح والإنجازات!</div>
    </div>

    <!-- القسم الأوسط: الساعة الرقمية -->
    <div id="clock-mount-point" class="header-clock-wrapper"></div>

    <!-- القسم الأيسر: الإشعارات والملف الشخصي -->
    <div class="header-actions">
        
        <!-- أيقونة الإشعارات (SVG) -->
        <button class="icon-btn notification-btn" title="تنبيهات النظام">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span class="badge">3</span>
        </button>

        <!-- القائمة المنسدلة للملف الشخصي -->
        <div class="user-profile-dropdown" id="profile-dropdown-container">
            <!-- الزر الدائري -->
            <div class="profile-trigger" id="profile-trigger-btn" title="الملف الشخصي">
                <div class="user-avatar" id="user-avatar-icon">م</div>
                <svg class="dropdown-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>

            <!-- القائمة المنسدلة -->
            <div class="dropdown-menu" id="user-dropdown-menu">
                
                <!-- الخاصية الجديدة: ترويسة مدة الجلسة -->
                <div class="dropdown-header-card">
                    <div class="card-role">مدير النظام</div>
                    <div class="session-timer">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        <span>مدة الجلسة: <strong id="session-time-counter">00:00:00</strong></span>
                    </div>
                </div>
                
                <div class="dropdown-divider"></div>
                
                <!-- خيارات القائمة بأيقونات SVG الإبداعية -->
                <button class="dropdown-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    تعديل البيانات
                </button>
                <button class="dropdown-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    بيانات التواصل
                </button>
                <button class="dropdown-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    تغيير كلمة المرور
                </button>
                
                <div class="dropdown-divider"></div>
                <button class="dropdown-item logout-item" onclick="window.location.href='login.html'">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    تسجيل الخروج
                </button>
            </div>
        </div>
    </div>
</div>
