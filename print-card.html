<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة بيانات العميل | Tera Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/customers-print.css">
    
    <style>
        /* تنسيقات سريعة لضمان المظهر الرسمي */
        body { font-family: 'Tajawal', sans-serif; background: #f5f5f5; padding: 20px; }
        
        .print-card { 
            background: #fff; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
        }

        .print-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #1e293b; 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
        }

        .brand-logo { font-size: 24px; color: #1e293b; }
        .brand-logo b { color: #3b82f6; }

        .data-row { margin-bottom: 15px; border-bottom: 1px dashed #eee; padding-bottom: 10px; display: flex; }
        .data-label { font-weight: bold; width: 150px; color: #475569; }
        
        .notes-area { 
            margin-top: 30px; 
            padding: 15px; 
            background: #f8fafc; 
            border-right: 4px solid #1e293b; 
            min-height: 100px;
        }

        .print-footer { 
            margin-top: 50px; 
            text-align: center; 
            font-size: 12px; 
            color: #94a3b8;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        /* تنسيقات عند الطباعة الفعلية */
        @media print {
            body { background: white; padding: 0; }
            .print-card { box-shadow: none; max-width: 100%; border: none; padding: 20px; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

    <div class="print-card">
        <div class="print-header">
            <div class="brand-logo">Tera<b>Gateway</b></div>
            <div style="text-align: left;">
                <h3 style="margin: 0;">بطاقة بيانات عميل</h3>
                <small id="p-date" style="color: #64748b;"></small>
            </div>
        </div>

        <div class="data-row">
            <span class="data-label"><i class="fas fa-user"></i> اسم العميل:</span> 
            <span id="p-name">جاري التحميل...</span>
        </div>

        <div class="data-row">
            <span class="data-label"><i class="fas fa-phone"></i> رقم الجوال:</span> 
            <span id="p-phone" dir="ltr"></span>
        </div>

        <div class="data-row">
            <span class="data-label"><i class="fas fa-envelope"></i> البريد الإلكتروني:</span> 
            <span id="p-email"></span>
        </div>

        <div class="data-row">
            <span class="data-label"><i class="fas fa-map-marker-alt"></i> العنوان الوطني:</span> 
            <span id="p-address"></span>
        </div>

        <div class="notes-area">
            <strong><i class="fas fa-edit"></i> ملاحظات فنية:</strong>
            <div id="p-notes" style="margin-top: 10px; line-height: 1.6;"></div>
        </div>

        <div class="print-footer">
            تم استخراج هذا المستند آلياً من منصة تيرا (Tera Gateway) - بتاريخ اليوم.
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px;" class="no-print">
        <button onclick="window.print()" style="padding: 10px 30px; cursor: pointer; background: #1e293b; color: white; border: none; border-radius: 5px;">
            <i class="fas fa-print"></i> طباعة الآن
        </button>
    </div>

    <script type="module">
        // تأكد من صحة المسار بناءً على هيكلة ملفاتك
        import { initPrint } from './js/modules/print-logic.js';
        
        // تنفيذ منطق الجلب والطباعة التلقائية
        document.addEventListener('DOMContentLoaded', initPrint);
    </script>
</body>
</html>
