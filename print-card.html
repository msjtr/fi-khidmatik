<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="stylesheet" href="css/customers-print.css">
</head>
<body>
    <div class="print-card">
        <div class="print-header">
            <h3>بطاقة بيانات عميل</h3>
            <div id="p-date"></div>
        </div>
        <div class="data-row"><span class="data-label">اسم العميل:</span> <span id="p-name"></span></div>
        <div class="data-row"><span class="data-label">رقم الجوال:</span> <span id="p-phone"></span></div>
        <div class="data-row"><span class="data-label">البريد الإلكتروني:</span> <span id="p-email"></span></div>
        <div class="data-row"><span class="data-label">العنوان الوطني:</span> <span id="p-address"></span></div>
        <div class="notes-area">
            <strong>ملاحظات:</strong>
            <div id="p-notes"></div>
        </div>
    </div>
    <script type="module">
        import { initPrint } from './js/customer-print-logic.js';
        initPrint();
    </script>
</body>
</html>
