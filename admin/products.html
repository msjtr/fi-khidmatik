<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المنتجات</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script type="module">
        import { getProducts, addProduct, updateProduct, deleteProduct, importProductsFromExcel } from '../js/admin.js';
        
        let products = [];

        async function loadProducts() {
            products = await getProducts();
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            if (!grid) return;
            
            if (products.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center p-8 text-gray-500">لا توجد منتجات. أضف منتجاً جديداً.</div>';
                return;
            }
            
            grid.innerHTML = products.map(p => `
                <div class="border rounded-lg p-4 shadow-sm hover:shadow-md transition">
                    <img src="${p.imageUrl || 'https://via.placeholder.com/150?text=No+Image'}" class="w-full h-40 object-cover rounded mb-3">
                    <h3 class="font-bold text-lg">${p.name}</h3>
                    <p class="text-blue-600 font-bold mt-1">${p.price} ريال</p>
                    <p class="text-gray-600 text-sm">الكمية: ${p.quantity || 0}</p>
                    <div class="flex justify-between mt-3 pt-2 border-t">
                        <button onclick="window.editProductItem('${p.id}')" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit ml-1"></i>تعديل</button>
                        <button onclick="window.deleteProductItem('${p.id}')" class="text-red-600 hover:text-red-800"><i class="fas fa-trash ml-1"></i>حذف</button>
                    </div>
                </div>
            `).join('');
        }

        window.showAddProduct = () => {
            const name = prompt('اسم المنتج:');
            if (!name) return;
            const price = parseFloat(prompt('السعر:'));
            if (isNaN(price)) return;
            const quantity = parseInt(prompt('الكمية:') || 0);
            const imageUrl = prompt('رابط الصورة (اختياري):');
            
            addProduct({ name, price, quantity, imageUrl: imageUrl || '' })
                .then(() => loadProducts())
                .catch(err => alert('خطأ: ' + err.message));
        };

        window.editProductItem = async (id) => {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            const name = prompt('الاسم الجديد:', product.name);
            if (!name) return;
            const price = parseFloat(prompt('السعر الجديد:', product.price));
            if (isNaN(price)) return;
            const quantity = parseInt(prompt('الكمية الجديدة:', product.quantity) || 0);
            const imageUrl = prompt('رابط الصورة الجديد:', product.imageUrl);
            
            await updateProduct(id, { name, price, quantity, imageUrl });
            loadProducts();
        };

        window.deleteProductItem = async (id) => {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                await deleteProduct(id);
                loadProducts();
            }
        };

        window.handleExcelUpload = (input) => {
            const file = input.files[0];
            if (file) {
                importProductsFromExcel(file, (result) => {
                    if (result.success) {
                        alert(`تم استيراد ${result.count} منتج بنجاح`);
                        loadProducts();
                    } else {
                        alert('فشل الاستيراد');
                    }
                });
            }
            input.value = '';
        };

        loadProducts();
        
        window.showAddProduct = showAddProduct;
        window.editProductItem = editProductItem;
        window.deleteProductItem = deleteProductItem;
        window.handleExcelUpload = handleExcelUpload;
    </script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
            <h2 class="text-2xl font-bold"><i class="fas fa-boxes ml-2"></i>المنتجات</h2>
            <div class="flex gap-2">
                <button onclick="showAddProduct()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
                    <i class="fas fa-plus ml-1"></i>إضافة يدوي
                </button>
                <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" style="display:none" onchange="handleExcelUpload(this)">
                <button onclick="document.getElementById('excelFile').click()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition">
                    <i class="fas fa-file-excel ml-1"></i>رفع Excel
                </button>
            </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="products-grid">
            <div class="col-span-full text-center p-8 text-gray-500">جاري التحميل...</div>
        </div>
    </div>
</body>
</html>
