<div style="padding: 25px;">
    <h2><i class="fas fa-sliders-h" style="color: #e67e22;"></i> إعدادات النظام</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 20px;">
        <div style="background: white; border-radius: 12px; padding: 20px;">
            <h3>الإعدادات العامة</h3>
            <form id="general-settings">
                <div style="margin-bottom: 10px;">
                    <label>اسم الشركة</label>
                    <input type="text" id="company-name" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label>نسبة الضريبة</label>
                    <input type="number" id="tax-rate" value="15" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <button type="submit" style="background: #e67e22; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer;">حفظ</button>
            </form>
        </div>
        <div style="background: white; border-radius: 12px; padding: 20px;">
            <h3>النسخ الاحتياطي</h3>
            <button id="export-data" style="background: #27ae60; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px;">
                تصدير البيانات
            </button>
            <button id="import-data" style="background: #3498db; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%;">
                استيراد البيانات
            </button>
        </div>
    </div>
</div>
