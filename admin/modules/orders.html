    // ========== دوال الفاتورة المتكاملة ==========
import { buildInvoiceHTML } from '../../js/print/template.js';
import { printInvoice } from '../../js/print/print.service.js';
import { generateImage } from '../../js/print/image.service.js';
import { generatePDF } from '../../js/print/pdf.service.js';


    
/* =========================
   🧠 إنشاء الفاتورة المؤقتة
========================= */
function createInvoiceElement(order) {

    const wrapper = document.createElement('div');

    const cartRows = order.items.map(item => `
    <tr>
        <td>${item.name || '-'}</td>
        <td>${item.barcode || '-'}</td>
        <td>-</td>
        <td>${item.quantity}</td>
        <td>${item.price}</td>
        <td>0</td>
        <td>${item.price * item.quantity}</td>
    </tr>
    `).join('');

    const subtotal = order.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const tax = subtotal * 0.15;
    const total = subtotal + tax;

    const totals = {
        subtotal: subtotal.toFixed(2) + ' ريال',
        discount: '0 ريال',
        tax: tax.toFixed(2) + ' ريال',
        total: total.toFixed(2) + ' ريال'
    };

    wrapper.innerHTML = buildInvoiceHTML(order, cartRows, totals);

    // 🔥 تحسين مخفي بدون مشاكل
    wrapper.style.position = 'fixed';
    wrapper.style.top = '-9999px';
    wrapper.style.left = '-9999px';

    document.body.appendChild(wrapper);

    return wrapper.firstElementChild;
}

/* =========================
   🧹 حذف الفاتورة
========================= */
function removeInvoiceElement(el) {
    if (el && el.parentElement) {
        el.parentElement.remove();
    }
}

/* =========================
   🖨️ طباعة
========================= */
window.printInvoiceHandler = async (orderId) => {

    const order = orders.find(o => o.id === orderId);

    if (!order || !order.items) {
        showToast('❌ بيانات الطلب غير مكتملة', 'error');
        return;
    }

    const el = createInvoiceElement(order);

    await new Promise(r => setTimeout(r, 200));

    await printInvoice(el);

    removeInvoiceElement(el);
};

/* =========================
   📄 PDF
========================= */
window.exportAsPDF = async (orderId) => {

    const order = orders.find(o => o.id === orderId);

    if (!order || !order.items) {
        showToast('❌ بيانات الطلب غير مكتملة', 'error');
        return;
    }

    const el = createInvoiceElement(order);

    await new Promise(r => setTimeout(r, 200));

    await generatePDF(el, order);

    removeInvoiceElement(el);
};

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.innerText = message;
    toast.className = type;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
}

function escapeHtml(text = '') {
    return text.replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;',
        '"': '&quot;', "'": '&#039;'
    }[m]));
}

function generateRandomCode() {
    return 'PRD-' + Math.random().toString(36).substr(2, 9).toUpperCase();
}



    
function formatDateInvoice(date) {
    if (!date) return '';
    return new Date(date).toLocaleDateString('ar-SA');
}

function formatTimeInvoice(time) {
    return time || '';
}

    // دوال التحكم (نفس الكود الأصلي)
    function generateOrderNumber() { 
        const d = new Date(); 
        return `${d.getFullYear().toString().slice(-2)}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}${Math.floor(Math.random()*1000).toString().padStart(4,'0')}`; 
    }
    
    function populateTimeOptions() { 
        for(let i=1;i<=12;i++) orderHourSelect.appendChild(new Option(i.toString().padStart(2,'0'), i)); 
        for(let i=0;i<=59;i++) orderMinuteSelect.appendChild(new Option(i.toString().padStart(2,'0'), i)); 
    }
    
    function setCurrentDate() { 
        orderDateInput.value = new Date().toISOString().split('T')[0]; 
    }
    
    function setCurrentTime() { 
        const n=new Date(); 
        let h=n.getHours(); 
        const m=n.getMinutes(); 
        const ap=h>=12?'PM':'AM'; 
        h=h%12||12; 
        orderHourSelect.value=h; 
        orderMinuteSelect.value=m.toString().padStart(2,'0'); 
        orderAmPmSelect.value=ap; 
    }
    
    function get24HourTime() { 
        let h=parseInt(orderHourSelect.value); 
        const m=orderMinuteSelect.value; 
        if(orderAmPmSelect.value==='PM' && h!==12) h+=12; 
        if(orderAmPmSelect.value==='AM' && h===12) h=0; 
        return `${h.toString().padStart(2,'0')}:${m}`; 
    }
    
    function calculateTotals() {
        let subtotal=0; 
        document.querySelectorAll('.product-row').forEach(r=>{ 
            const p=parseFloat(r.querySelector('.product-price')?.value)||0; 
            const q=parseInt(r.querySelector('.product-quantity')?.value)||0; 
            subtotal+=p*q; 
        });
        let d=parseFloat(discountValueInput.value)||0; 
        if(discountTypeSelect.value==='percent') d=(subtotal*d)/100;
        const ad=subtotal-d, tax=ad*0.15, total=ad+tax;
        subtotalDisplay.innerText=subtotal.toFixed(2)+' ريال'; 
        discountDisplay.innerText=d.toFixed(2)+' ريال'; 
        taxDisplay.innerText=tax.toFixed(2)+' ريال'; 
        totalDisplay.innerText=total.toFixed(2)+' ريال'; 
        taxAmountInput.value=tax.toFixed(2);
        return {subtotal,discount:d,tax,total};
    }
    
    function updateTotals() { calculateTotals(); }
    
    function addProductRow(pd=null) {
        const row=document.createElement('div'); row.className='product-row';
        row.innerHTML=`<div class="grid grid-cols-7 gap-2"><input type="text" class="product-name border rounded p-1 col-span-2" value="${escapeHtml(pd?.name||'')}" placeholder="اسم المنتج"><input type="text" class="product-barcode border rounded p-1 bg-gray-50" readonly value="${escapeHtml(pd?.barcode||'')}"><input type="number" class="product-price border rounded p-1" step="0.01" value="${pd?.price||0}"><input type="number" class="product-quantity border rounded p-1" value="${pd?.quantity||1}" min="1"><input type="text" class="product-image border rounded p-1" placeholder="رابط الصورة" value="${escapeHtml(pd?.image||'')}"><button type="button" class="remove-product-btn text-red-600"><i class="fas fa-trash"></i></button></div><div class="mt-1"><div class="product-desc-editor" style="height:80px;"></div><input type="hidden" class="product-desc-hidden" value="${escapeHtml(pd?.description||'')}"></div><input type="hidden" class="product-id" value="${pd?.productId||''}">`;
        productsContainer.appendChild(row);
        const editor=row.querySelector('.product-desc-editor'), hidden=row.querySelector('.product-desc-hidden');
        const quill=new Quill(editor,{theme:'snow',placeholder:'وصف...',modules:{toolbar:[['bold','italic','underline'],['link','image']]}});
        if(hidden.value) quill.root.innerHTML=hidden.value;
        quill.on('text-change',()=>{ hidden.value=quill.root.innerHTML; updateTotals(); });
        row.querySelector('.product-price').addEventListener('input',updateTotals);
        row.querySelector('.product-quantity').addEventListener('input',updateTotals);
        row.querySelector('.remove-product-btn').onclick=()=>{ row.remove(); updateTotals(); };
        updateTotals();
        return row;
    }
    
    function openInventoryModal() {
        inventoryModal.classList.remove('hidden'); inventoryModal.classList.add('flex');
        const search=inventorySearch.value.toLowerCase();
        const filtered=products.filter(p=>p.name?.toLowerCase().includes(search));
        inventoryList.innerHTML=filtered.map(p=>`<div class="p-2 border rounded cursor-pointer hover:bg-gray-50" onclick="window.selectFromInventory('${p.id}')"><div class="flex justify-between"><span>${escapeHtml(p.name)}</span><span>${p.price} ريال</span><span class="text-gray-400">مخزون:${p.stock}</span></div></div>`).join('');
    }
    
    window.selectFromInventory=(id)=>{ const p=products.find(p=>p.id===id); if(p){ addProductRow({name:p.name,price:p.price,barcode:p.code,image:p.image,description:p.description,productId:p.id}); inventoryModal.classList.add('hidden'); } };
    
    function openQuickProductModal(row){ currentProductRowTemp=row; quickProductForm.reset(); quickProductBarcode.value=''; imagePreviewQuick.classList.add('hidden'); quickProductModal.classList.remove('hidden'); quickProductModal.classList.add('flex'); if(!quillEditor) quillEditor=new Quill('#quickProductEditor',{theme:'snow',placeholder:'وصف...',modules:{toolbar:[['bold','italic','underline'],['link','image']]}}); quickProductImageUrl.oninput=()=>{ if(quickProductImageUrl.value){ previewQuickImg.src=quickProductImageUrl.value; imagePreviewQuick.classList.remove('hidden'); } }; quickProductImageFile.onchange=(e)=>{ const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=(ev)=>{ previewQuickImg.src=ev.target.result; imagePreviewQuick.classList.remove('hidden'); quickProductImageUrl.value=ev.target.result; }; r.readAsDataURL(f); } }; }
    
    function closeQuickProductModal(){ quickProductModal.classList.add('hidden'); quickProductModal.classList.remove('flex'); currentProductRowTemp=null; }
    
    async function saveQuickProduct(e){ e.preventDefault(); const name=quickProductName.value.trim(), price=parseFloat(quickProductPrice.value), cost=parseFloat(quickProductCost.value)||0, quantity=parseInt(quickProductQuantity.value), image=quickProductImageUrl.value.trim(), description=quillEditor?quillEditor.root.innerHTML:'', saveToInventory=saveToInventoryCheck.checked; if(!name||isNaN(price)||isNaN(quantity)||quantity<=0){ showToast('الاسم والسعر والكمية مطلوبة','error'); return; } if(price<cost){ showToast('سعر البيع أقل من التكلفة','error'); return; } const barcode=generateRandomCode(); let productId=null; if(saveToInventory){ try{ const np={name,price,cost,stock:0,image,description,code:barcode,createdAt:new Date().toISOString()}; const ref=await addProduct(np); productId=ref.id; await loadProductsList(); showToast('تم حفظ المنتج','success'); }catch(err){ showToast('خطأ في الحفظ','error'); return; } } if(currentProductRowTemp){ currentProductRowTemp.querySelector('.product-name').value=name; currentProductRowTemp.querySelector('.product-barcode').value=barcode; currentProductRowTemp.querySelector('.product-price').value=price; currentProductRowTemp.querySelector('.product-quantity').value=quantity; currentProductRowTemp.querySelector('.product-image').value=image; currentProductRowTemp.querySelector('.product-desc-hidden').value=description; const ed=currentProductRowTemp.querySelector('.product-desc-editor .ql-editor'); if(ed) ed.innerHTML=description; currentProductRowTemp.querySelector('.product-id').value=productId||''; updateTotals(); showToast('تم إضافة المنتج','success'); } closeQuickProductModal(); }
    
    function openQuickModal(){ quickModal.classList.remove('hidden'); quickModal.classList.add('flex'); quickForm.reset(); }
    function closeQuickModal(){ quickModal.classList.add('hidden'); quickModal.classList.remove('flex'); }
    
    async function saveQuickCustomer(e){ e.preventDefault(); const name=quickName.value.trim(), phone=quickPhone.value.trim(); if(!name||!phone){ showToast('الاسم والجوال مطلوبان','error'); return; } await addCustomer({name,phone,email:quickEmail.value,city:quickCity.value,street:quickStreet.value,additionalNo:quickAdditionalNo.value,poBox:quickPoBox.value,createdAt:new Date().toISOString()}); closeQuickModal(); await loadCustomersList(); customerSelect.value=customers[customers.length-1]?.id||''; showToast('تم إضافة العميل','success'); }
    
    function setPaymentMethod(method){
        selectedPaymentMethod=method; paymentMethodBtns.forEach(btn=>{ btn.classList.remove('bg-blue-600','text-white'); btn.classList.add('border-gray-300'); });
        const active=document.querySelector(`.payment-btn[data-payment="${method}"]`); if(active){ active.classList.add('bg-blue-600','text-white'); active.classList.remove('border-gray-300'); }
        if(method==='tamara'||method==='tabby'){ approvalMethodLabel.innerText=method==='tamara'?'تمارا':'تابي'; approvalCodeField.classList.remove('hidden'); otherPaymentField.classList.add('hidden'); }
        else if(method==='other'){ approvalCodeField.classList.add('hidden'); otherPaymentField.classList.remove('hidden'); }
        else{ approvalCodeField.classList.add('hidden'); otherPaymentField.classList.add('hidden'); }
    }
    
    function resetForm(){
        currentOrderId=null; productsContainer.innerHTML=''; addProductRow(); customerSelect.value=''; discountValueInput.value='0'; discountTypeSelect.value='fixed';
        orderNumberInput.value=generateOrderNumber(); setCurrentDate(); setCurrentTime(); orderStatusSelect.value='جديد';
        setPaymentMethod('mada'); approvalCodeInput.value=''; otherPaymentText.value=''; updateTotals();
        document.getElementById('modalTitle').innerText='إضافة طلب جديد';
    }
    
    function closeModal(){ orderModal.classList.add('hidden'); orderModal.classList.remove('flex'); resetForm(); }
    
    async function saveOrder(e){
        e.preventDefault(); const customerId=customerSelect.value; if(!customerId){ showToast('اختر عميل','error'); return; }
        const orderNumber=orderNumberInput.value.trim(); if(!orderNumber){ showToast('أدخل رقم الطلب','error'); return; }
        const orderDate=orderDateInput.value, orderTime=get24HourTime(), status=orderStatusSelect.value;
        let approvalCode=null, otherText=null;
        if(selectedPaymentMethod==='tamara'||selectedPaymentMethod==='tabby'){ approvalCode=approvalCodeInput.value.trim(); if(!approvalCode){ showToast(`أدخل رمز الموافقة لـ ${selectedPaymentMethod==='tamara'?'تمارا':'تابي'}`,'error'); return; } }
        if(selectedPaymentMethod==='other'){ otherText=otherPaymentText.value.trim(); if(!otherText){ showToast('أدخل طريقة الدفع','error'); return; } }
        const items=[]; const rows=document.querySelectorAll('.product-row');
        for(let r of rows){ const name=r.querySelector('.product-name').value.trim(); const price=parseFloat(r.querySelector('.product-price').value); const qty=parseInt(r.querySelector('.product-quantity').value); if(!name||isNaN(price)||isNaN(qty)||qty<=0){ showToast('جميع المنتجات يجب أن تحتوي على اسم وسعر وكمية','error'); return; } items.push({productId:r.querySelector('.product-id').value||null,name,price,quantity:qty,barcode:r.querySelector('.product-barcode').value,image:r.querySelector('.product-image').value,description:r.querySelector('.product-desc-hidden').value}); }
        if(items.length===0){ showToast('أضف منتجاً واحداً على الأقل','error'); return; }
        const {subtotal,discount,tax,total}=calculateTotals();
        const orderData={orderNumber:`KF-${orderNumber}`,orderDate,orderTime,customerId,status,paymentMethod:selectedPaymentMethod,paymentMethodName:selectedPaymentMethod==='other'?otherText:(selectedPaymentMethod==='tamara'?'تمارا':(selectedPaymentMethod==='tabby'?'تابي':(selectedPaymentMethod==='mada'?'مدى':(selectedPaymentMethod==='mastercard'?'ماستركارد':(selectedPaymentMethod==='visa'?'فيزا':'STCPay'))))),approvalCode,otherPaymentText:otherText,items,subtotal,discount:parseFloat(discountValueInput.value)||0,discountType:discountTypeSelect.value,tax,total,updatedAt:new Date().toISOString()};
        if(!currentOrderId) orderData.createdAt=new Date().toISOString();
        try{
            if(currentOrderId){ const old=orders.find(o=>o.id===currentOrderId); if(old?.items) for(let it of old.items) if(it.productId){ const p=products.find(pr=>pr.id===it.productId); if(p) await updateProductStock(it.productId,p.stock+it.quantity); } await updateOrder(currentOrderId,orderData); showToast('تم تعديل الطلب','success'); }
            else{ await addOrder(orderData); showToast('تم إضافة الطلب','success'); }
            for(let it of items) if(it.productId){ const p=products.find(pr=>pr.id===it.productId); if(p) await updateProductStock(it.productId,p.stock-it.quantity); }
            closeModal(); await loadData(); await renderOrders();
        }catch(err){ console.error(err); showToast('خطأ في الحفظ','error'); }
    }
    
    function openModalForEdit(orderId){
        const order=orders.find(o=>o.id===orderId); if(!order) return;
        currentOrderId=orderId; document.getElementById('modalTitle').innerText='تعديل الطلب';
        orderNumberInput.value=order.orderNumber.replace('KF-',''); orderDateInput.value=order.orderDate;
        if(order.orderTime){ let [h,m]=order.orderTime.split(':'); let ap=parseInt(h)>=12?'PM':'AM'; let h12=parseInt(h)%12||12; orderHourSelect.value=h12; orderMinuteSelect.value=m; orderAmPmSelect.value=ap; }
        orderStatusSelect.value=order.status; customerSelect.value=order.customerId;
        setPaymentMethod(order.paymentMethod);
        if(order.approvalCode) approvalCodeInput.value=order.approvalCode;
        if(order.otherPaymentText) otherPaymentText.value=order.otherPaymentText;
        discountValueInput.value=order.discount||0; discountTypeSelect.value=order.discountType||'fixed';
        productsContainer.innerHTML='';
        order.items.forEach(item=>addProductRow({name:item.name,price:item.price,quantity:item.quantity,barcode:item.barcode,image:item.image,description:item.description,productId:item.productId}));
        updateTotals(); orderModal.classList.remove('hidden'); orderModal.classList.add('flex');
    }
    
    window.editOrder=openModalForEdit;
    window.changeStatus=async(id,st)=>{ try{ await updateOrder(id,{status:st}); await renderOrders(); showToast(`تم تغيير الحالة إلى ${st}`,'success'); }catch(e){ showToast('خطأ','error'); } };
    window.deleteOrderHandler=async(id)=>{ if(!confirm('تأكيد الحذف؟')) return; try{ const ord=orders.find(o=>o.id===id); if(ord?.items) for(let it of ord.items) if(it.productId){ const p=products.find(pr=>pr.id===it.productId); if(p) await updateProductStock(it.productId,p.stock+it.quantity); } await deleteOrder(id); await renderOrders(); showToast('تم الحذف','success'); }catch(e){ showToast('خطأ','error'); } };
