<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>إدارة الطلبات</title>

<link rel="icon" href="data:,">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f3f4f6; font-family: system-ui }
.card { background:#fff; padding:15px; border-radius:12px; margin-bottom:10px }
.modal { display:none }
.modal.show { display:flex }
</style>
</head>

<body class="p-6">

<div class="flex justify-between mb-6">
<h1 class="text-2xl font-bold">إدارة الطلبات</h1>
<button id="newOrderBtn" class="bg-blue-600 text-white px-4 py-2 rounded">
+ طلب جديد
</button>
</div>

<div id="ordersContainer"></div>

<!-- ================= MODAL ================= -->
<div id="orderModal" class="modal fixed inset-0 bg-black/50 items-center justify-center">

<div class="bg-white p-6 rounded-xl w-full max-w-md">

<h2 class="font-bold mb-4">طلب</h2>

<input id="orderNumber" placeholder="رقم الطلب" class="border w-full p-2 mb-2">
<input id="orderTotal" type="number" placeholder="المبلغ" class="border w-full p-2 mb-2">

<select id="orderStatus" class="border w-full p-2 mb-3">
<option>جديد</option>
<option>تم التنفيذ</option>
</select>

<div class="flex justify-end gap-2">
<button id="cancelBtn">إلغاء</button>
<button id="saveBtn" class="bg-blue-600 text-white px-3 py-1 rounded">حفظ</button>
</div>

</div>
</div>

<script type="module">

// ================= Firebase =================
import {
    loadOrders,
    addOrder,
    updateOrder,
    deleteOrder
} from "../../js/firebase.js";

// ================= State =================
let orders = [];
let currentId = null;

// ================= INIT =================
async function init(){
    orders = await loadOrders();
    renderOrders();
}
init();

// ================= UI =================
const modal = document.getElementById('orderModal');

function openModal(){
    modal.classList.add('show');
}

function closeModal(){
    modal.classList.remove('show');
}

// ================= Buttons =================
document.getElementById('newOrderBtn').addEventListener('click', ()=>{
    currentId = null;
    document.getElementById('orderNumber').value = '';
    document.getElementById('orderTotal').value = '';
    openModal();
});

document.getElementById('cancelBtn').addEventListener('click', closeModal);

// ================= Save =================
document.getElementById('saveBtn').addEventListener('click', async ()=>{

    const data = {
        orderNumber: document.getElementById('orderNumber').value,
        total: parseFloat(document.getElementById('orderTotal').value || 0),
        status: document.getElementById('orderStatus').value,
        createdAt: new Date().toISOString()
    };

    if(currentId){
        await updateOrder(currentId, data);
    }else{
        await addOrder(data);
    }

    orders = await loadOrders();

    closeModal();
    renderOrders();
});

// ================= Render =================
function renderOrders(){

    const el = document.getElementById('ordersContainer');

    if(!orders.length){
        el.innerHTML = "لا يوجد طلبات";
        return;
    }

    el.innerHTML = orders.map(o=>`
        <div class="card">

            <div class="flex justify-between">
                <b>${o.orderNumber || '-'}</b>
                <span>${o.status || '-'}</span>
            </div>

            <div class="text-green-600">
                ${(o.total || 0).toFixed(2)} ريال
            </div>

            <div class="flex gap-2 mt-2">

                <button onclick="editOrder('${o.id}')">✏️</button>
                <button onclick="printOrder('${o.id}')">🖨</button>
                <button onclick="removeOrder('${o.id}')">🗑</button>

            </div>

        </div>
    `).join('');
}

// ================= Global Actions =================
window.editOrder = (id)=>{
    const o = orders.find(x=>x.id===id);
    currentId = id;

    document.getElementById('orderNumber').value = o.orderNumber;
    document.getElementById('orderTotal').value = o.total;
    document.getElementById('orderStatus').value = o.status;

    openModal();
};

window.removeOrder = async(id)=>{
    if(!confirm('حذف؟')) return;

    await deleteOrder(id);

    orders = orders.filter(o=>o.id!==id);
    renderOrders();
};

window.printOrder = (id)=>{
    window.open(`../../print.html?id=${id}&auto=print`);
};

</script>

</body>
</html>
