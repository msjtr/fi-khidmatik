<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .modal { transition: opacity 0.3s ease; }
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; top: 0; right: 0; width: 100%; }
            .no-print { display: none; }
        }
        .toolbar-btn {
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar-btn:hover { background: #e5e7eb; }
        .product-image-preview {
            max-width: 50px;
            max-height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }
        .item-row .product-image-thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-50 p-6">

<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">📦 إدارة الطلبات</h1>
        <button id="newOrderBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow">
            <i class="fas fa-plus ml-1"></i> إضافة طلب جديد
        </button>
    </div>

    <div id="ordersList" class="space-y-4">
        <div class="text-center text-gray-500 py-8">جاري التحميل...</div>
    </div>
</div>

<!-- مودال إضافة/تعديل الطلب -->
<div id="orderModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50 overflow-y-auto">
    <div class="bg-white rounded-lg shadow-xl max-w-5xl w-full max-h-[90vh] overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-xl font-bold">إضافة طلب جديد</h2>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <form id="orderForm">
                <!-- رقم الطلب والتاريخ والوقت -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">رقم الطلب</label>
                        <div class="flex gap-2 items-center">
                            <span class="bg-gray-100 px-3 py-2 rounded border text-gray-600">KF-</span>
                            <input type="text" id="orderNumber" class="flex-1 border rounded-lg px-3 py-2 font-mono" required>
                            <button type="button" id="generateOrderNumber" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded">توليد</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">التاريخ</label>
                        <input type="date" id="orderDate" required class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">الوقت</label>
                        <div class="flex gap-2">
                            <select id="orderHour" class="border rounded-lg px-3 py-2 w-24"></select>
                            <select id="orderMinute" class="border rounded-lg px-3 py-2 w-24"></select>
                            <select id="orderAmPm" class="border rounded-lg px-3 py-2 w-24">
                                <option value="AM">صباحاً (AM)</option>
                                <option value="PM">مساءً (PM)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- حالة الطلب -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">حالة الطلب</label>
                    <select id="orderStatus" class="w-full border rounded-lg px-3 py-2">
                        <option value="جديد">جديد</option>
                        <option value="تحت التنفيذ">تحت التنفيذ</option>
                        <option value="تم التنفيذ">تم التنفيذ</option>
                        <option value="تحت المراجعة">تحت المراجعة</option>
                        <option value="مسترجع">مسترجع</option>
                        <option value="ملغي">ملغي</option>
                    </select>
                </div>

                <!-- العميل -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">العميل</label>
                    <div class="flex gap-2">
                        <select id="customerSelect" required class="flex-1 border rounded-lg px-3 py-2">
                            <option value="">-- اختر عميلاً --</option>
                        </select>
                        <button type="button" id="quickAddCustomerBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg">
                            <i class="fas fa-user-plus"></i> عميل جديد
                        </button>
                    </div>
                </div>

                <!-- خيار الشحن -->
                <div class="mb-4">
                    <div class="flex items-center gap-2 mb-2">
                        <input type="checkbox" id="shippingRequired" class="w-5 h-5">
                        <label for="shippingRequired" class="text-sm font-medium text-gray-700">يتطلب شحن</label>
                    </div>
                    <div id="shippingAddressFields" class="hidden grid grid-cols-1 md:grid-cols-2 gap-3 p-3 bg-gray-50 rounded">
                        <div><label class="text-sm">المدينة</label><input type="text" id="shippingCity" class="w-full border rounded px-2 py-1"></div>
                        <div><label class="text-sm">الشارع</label><input type="text" id="shippingStreet" class="w-full border rounded px-2 py-1"></div>
                        <div><label class="text-sm">رقم إضافي</label><input type="text" id="shippingAdditionalNo" class="w-full border rounded px-2 py-1"></div>
                        <div><label class="text-sm">صندوق البريد</label><input type="text" id="shippingPoBox" class="w-full border rounded px-2 py-1"></div>
                    </div>
                    <div id="noShippingNote" class="hidden text-sm text-gray-500 mt-2">⚠️ هذا المنتج لا يطلب شحن (سيظهر في الفاتورة).</div>
                </div>

                <!-- طريقة الدفع -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">طريقة الدفع</label>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3">
                        <button type="button" data-payment="mada" class="payment-method-btn p-2 border rounded-lg text-center hover:bg-gray-50">💳 مدى</button>
                        <button type="button" data-payment="mastercard" class="payment-method-btn p-2 border rounded-lg text-center hover:bg-gray-50">💳 ماستركارد</button>
                        <button type="button" data-payment="visa" class="payment-method-btn p-2 border rounded-lg text-center hover:bg-gray-50">💳 فيزا</button>
                        <button type="button" data-payment="stcpay" class="payment-method-btn p-2 border rounded-lg text-center hover:bg-gray-50">📱 STCPay</button>
                        <button type="button" data-payment="tamara" class="payment-method-btn p-2 border rounded-lg text-center hover:bg-gray-50">🟣 تمارا</button>
                        <button type="button" data-payment="tabby" class="payment-method-btn p-2 border rounded-lg text-center hover:bg-gray-50">🟢 تابي</button>
                        <button type="button" data-payment="other" class="payment-method-btn p-2 border rounded-lg text-center hover:bg-gray-50">📝 أخرى</button>
                    </div>
                    <input type="hidden" id="paymentMethod" name="paymentMethod">
                    <div id="approvalCodeField" class="hidden mt-3">
                        <label class="block text-sm font-medium text-gray-700 mb-1">رمز الموافقة (لـ <span id="approvalMethodLabel">تمارا</span>)</label>
                        <input type="text" id="approvalCode" placeholder="أدخل رمز الموافقة" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div id="otherPaymentField" class="hidden mt-3">
                        <label class="block text-sm font-medium text-gray-700 mb-1">طريقة دفع أخرى</label>
                        <input type="text" id="otherPaymentText" class="w-full border rounded-lg px-3 py-2">
                    </div>
                </div>

                <!-- المنتجات (جدول قابل للتعديل) -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">المنتجات</label>
                    <div id="itemsContainer" class="space-y-3">
                        <!-- سيتم إضافة صفوف المنتجات ديناميكياً -->
                    </div>
                    <button type="button" id="addItemBtn" class="mt-2 bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm">
                        <i class="fas fa-plus"></i> إضافة منتج جديد
                    </button>
                </div>

                <!-- الخصم والضريبة -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">الخصم</label>
                        <div class="flex gap-2">
                            <input type="number" id="discountValue" class="w-32 border rounded-lg px-3 py-2" step="0.01" value="0">
                            <select id="discountType" class="border rounded-lg px-3 py-2">
                                <option value="fixed">قيمة ثابتة</option>
                                <option value="percent">نسبة مئوية (%)</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">الضريبة (15%)</label>
                        <input type="text" id="taxAmount" readonly class="w-full bg-gray-100 border rounded-lg px-3 py-2">
                    </div>
                </div>

                <!-- الإجماليات -->
                <div class="bg-gray-50 p-4 rounded-lg mb-4">
                    <div class="flex justify-between text-sm"><span>المجموع الفرعي:</span><span id="subtotalDisplay">0.00 ريال</span></div>
                    <div class="flex justify-between text-sm"><span>الخصم:</span><span id="discountDisplay">0.00 ريال</span></div>
                    <div class="flex justify-between text-sm"><span>الضريبة:</span><span id="taxDisplay">0.00 ريال</span></div>
                    <div class="flex justify-between font-bold text-lg mt-2"><span>الإجمالي النهائي:</span><span id="totalDisplay">0.00 ريال</span></div>
                </div>

                <div class="flex justify-end gap-2">
                    <button type="button" id="cancelOrderBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100">إلغاء</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">حفظ الطلب</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- مودال إضافة عميل سريع (نفس السابق مع حقول العنوان) -->
<div id="quickCustomerModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">إضافة عميل جديد</h2>
                <button id="closeQuickModalBtn" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <form id="quickCustomerForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="md:col-span-2"><label class="block text-sm font-medium">الاسم الكامل *</label><input type="text" id="quickName" required class="w-full border rounded-lg px-3 py-2"></div>
                    <div><label class="block text-sm font-medium">رقم الجوال *</label><input type="tel" id="quickPhone" required class="w-full border rounded-lg px-3 py-2"></div>
                    <div><label class="block text-sm font-medium">البريد الإلكتروني</label><input type="email" id="quickEmail" class="w-full border rounded-lg px-3 py-2"></div>
                    <div><label class="block text-sm font-medium">المدينة</label><input type="text" id="quickCity" class="w-full border rounded-lg px-3 py-2"></div>
                    <div><label class="block text-sm font-medium">الشارع</label><input type="text" id="quickStreet" class="w-full border rounded-lg px-3 py-2"></div>
                    <div><label class="block text-sm font-medium">رقم إضافي</label><input type="text" id="quickAdditionalNo" class="w-full border rounded-lg px-3 py-2"></div>
                    <div><label class="block text-sm font-medium">صندوق البريد</label><input type="text" id="quickPoBox" class="w-full border rounded-lg px-3 py-2"></div>
                </div>
                <div class="flex justify-end gap-2 mt-6">
                    <button type="button" id="cancelQuickBtn" class="px-4 py-2 border rounded-lg">إلغاء</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg">حفظ العميل</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- مودال إضافة منتج جديد (سريع) مع خيار حفظ في المخزون -->
<div id="quickProductModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-lg w-full">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">إضافة منتج جديد</h2>
                <button id="closeQuickProductModalBtn" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <form id="quickProductForm">
                <div class="mb-3"><label class="block text-sm font-medium">اسم المنتج *</label><input type="text" id="quickProductName" required class="w-full border rounded-lg px-3 py-2"></div>
                <div class="mb-3"><label class="block text-sm font-medium">السعر *</label><input type="number" id="quickProductPrice" required class="w-full border rounded-lg px-3 py-2" step="0.01"></div>
                <div class="mb-3"><label class="block text-sm font-medium">الكمية في الطلب *</label><input type="number" id="quickProductQuantity" required class="w-full border rounded-lg px-3 py-2" value="1" min="1"></div>
                <div class="mb-3"><label class="block text-sm font-medium">رابط الصورة (اختياري)</label><input type="url" id="quickProductImage" class="w-full border rounded-lg px-3 py-2"></div>
                <div class="mb-3"><label class="block text-sm font-medium">الوصف (اختياري)</label>
                    <div contenteditable="true" id="quickProductDesc" class="border rounded-lg p-2 min-h-[100px] bg-white" style="direction: rtl;"></div>
                    <input type="hidden" id="quickProductDescHidden">
                </div>
                <div class="mb-3 flex items-center gap-2">
                    <input type="checkbox" id="saveToInventory" checked>
                    <label class="text-sm text-gray-700">حفظ المنتج في المخزون (للاستخدام المستقبلي)</label>
                </div>
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" id="cancelQuickProductBtn" class="px-4 py-2 border rounded-lg">إلغاء</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg">إضافة للطلب</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="printArea" class="hidden print-area"></div>

<script type="module">
    import { 
        loadCustomers, addCustomer, loadProducts, addOrder, updateOrder, deleteOrder, 
        updateProductStock, getOrdersWithDetails, addProduct, updateProduct 
    } from '../../js/common.js';

    // ========== المتغيرات العامة ==========
    let customers = [];
    let products = [];
    let orders = [];
    let currentOrderId = null;
    let selectedPaymentMethod = '';

    // عناصر DOM
    const ordersListDiv = document.getElementById('ordersList');
    const orderModal = document.getElementById('orderModal');
    const modalTitle = document.getElementById('modalTitle');
    const orderForm = document.getElementById('orderForm');
    const customerSelect = document.getElementById('customerSelect');
    const itemsContainer = document.getElementById('itemsContainer');
    const discountValueInput = document.getElementById('discountValue');
    const discountTypeSelect = document.getElementById('discountType');
    const subtotalDisplay = document.getElementById('subtotalDisplay');
    const discountDisplay = document.getElementById('discountDisplay');
    const taxDisplay = document.getElementById('taxDisplay');
    const totalDisplay = document.getElementById('totalDisplay');
    const taxAmountInput = document.getElementById('taxAmount');
    const addItemBtn = document.getElementById('addItemBtn');
    const newOrderBtn = document.getElementById('newOrderBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const cancelOrderBtn = document.getElementById('cancelOrderBtn');
    
    const orderNumberInput = document.getElementById('orderNumber');
    const orderDateInput = document.getElementById('orderDate');
    const orderHourSelect = document.getElementById('orderHour');
    const orderMinuteSelect = document.getElementById('orderMinute');
    const orderAmPmSelect = document.getElementById('orderAmPm');
    const generateOrderNumberBtn = document.getElementById('generateOrderNumber');
    const orderStatusSelect = document.getElementById('orderStatus');
    const shippingRequiredCheck = document.getElementById('shippingRequired');
    const shippingAddressFields = document.getElementById('shippingAddressFields');
    const noShippingNote = document.getElementById('noShippingNote');
    const shippingCity = document.getElementById('shippingCity');
    const shippingStreet = document.getElementById('shippingStreet');
    const shippingAdditionalNo = document.getElementById('shippingAdditionalNo');
    const shippingPoBox = document.getElementById('shippingPoBox');

    const paymentMethodInput = document.getElementById('paymentMethod');
    const approvalCodeField = document.getElementById('approvalCodeField');
    const approvalCodeInput = document.getElementById('approvalCode');
    const approvalMethodLabel = document.getElementById('approvalMethodLabel');
    const otherPaymentField = document.getElementById('otherPaymentField');
    const otherPaymentText = document.getElementById('otherPaymentText');
    const paymentMethodBtns = document.querySelectorAll('.payment-method-btn');

    // عناصر مودال العميل السريع
    const quickModal = document.getElementById('quickCustomerModal');
    const quickForm = document.getElementById('quickCustomerForm');
    const quickName = document.getElementById('quickName');
    const quickPhone = document.getElementById('quickPhone');
    const quickEmail = document.getElementById('quickEmail');
    const quickCity = document.getElementById('quickCity');
    const quickStreet = document.getElementById('quickStreet');
    const quickAdditionalNo = document.getElementById('quickAdditionalNo');
    const quickPoBox = document.getElementById('quickPoBox');
    const closeQuickModalBtn = document.getElementById('closeQuickModalBtn');
    const cancelQuickBtn = document.getElementById('cancelQuickBtn');
    const quickAddCustomerBtn = document.getElementById('quickAddCustomerBtn');

    // عناصر مودال المنتج السريع
    const quickProductModal = document.getElementById('quickProductModal');
    const quickProductForm = document.getElementById('quickProductForm');
    const quickProductName = document.getElementById('quickProductName');
    const quickProductPrice = document.getElementById('quickProductPrice');
    const quickProductQuantity = document.getElementById('quickProductQuantity');
    const quickProductImage = document.getElementById('quickProductImage');
    const quickProductDesc = document.getElementById('quickProductDesc');
    const quickProductDescHidden = document.getElementById('quickProductDescHidden');
    const saveToInventoryCheck = document.getElementById('saveToInventory');
    const closeQuickProductModalBtn = document.getElementById('closeQuickProductModalBtn');
    const cancelQuickProductBtn = document.getElementById('cancelQuickProductBtn');

    let currentProductRow = null; // للربط عند إضافة منتج جديد

    // ========== دوال مساعدة ==========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    function generateRandomCode() {
        return 'PROD-' + Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    // توليد رقم طلب عشوائي (مثال: 2503291432)
    function generateOrderNumber() {
        const now = new Date();
        const year = now.getFullYear().toString().slice(-2);
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const day = now.getDate().toString().padStart(2, '0');
        const random = Math.floor(Math.random() * 1000).toString().padStart(4, '0');
        return `${year}${month}${day}${random}`;
    }

    function setCurrentDate() {
        const now = new Date();
        orderDateInput.value = now.toISOString().split('T')[0];
    }

    // دوال الوقت (12 ساعة)
    function populateTimeOptions() {
        for (let i = 1; i <= 12; i++) {
            orderHourSelect.appendChild(new Option(i.toString().padStart(2, '0'), i));
        }
        for (let i = 0; i <= 59; i++) {
            orderMinuteSelect.appendChild(new Option(i.toString().padStart(2, '0'), i));
        }
    }
    function setCurrentTime12Hour() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        orderHourSelect.value = hours;
        orderMinuteSelect.value = minutes.toString().padStart(2, '0');
        orderAmPmSelect.value = ampm;
    }
    function get24HourTime() {
        let hour = parseInt(orderHourSelect.value);
        const minute = orderMinuteSelect.value;
        const ampm = orderAmPmSelect.value;
        if (ampm === 'PM' && hour !== 12) hour += 12;
        if (ampm === 'AM' && hour === 12) hour = 0;
        return `${hour.toString().padStart(2, '0')}:${minute}`;
    }
    function formatTime12Hour(time24) {
        if (!time24) return '';
        let [hour, minute] = time24.split(':');
        let ampm = 'AM';
        let hour12 = parseInt(hour);
        if (hour12 >= 12) { ampm = 'PM'; if (hour12 > 12) hour12 -= 12; }
        if (hour12 === 0) hour12 = 12;
        return `${hour12.toString().padStart(2, '0')}:${minute} ${ampm === 'AM' ? 'ص' : 'م'}`;
    }

    // حساب الإجماليات
    function calculateTotals() {
        let subtotal = 0;
        const rows = document.querySelectorAll('.item-row');
        rows.forEach(row => {
            const price = parseFloat(row.querySelector('.item-price').value) || 0;
            const qty = parseFloat(row.querySelector('.item-quantity').value) || 0;
            subtotal += price * qty;
        });
        let discount = parseFloat(discountValueInput.value) || 0;
        if (discountTypeSelect.value === 'percent') discount = (subtotal * discount) / 100;
        const afterDiscount = subtotal - discount;
        const tax = afterDiscount * 0.15; // 15% ضريبة
        const total = afterDiscount + tax;

        subtotalDisplay.innerText = subtotal.toFixed(2) + ' ريال';
        discountDisplay.innerText = discount.toFixed(2) + ' ريال';
        taxDisplay.innerText = tax.toFixed(2) + ' ريال';
        totalDisplay.innerText = total.toFixed(2) + ' ريال';
        taxAmountInput.value = tax.toFixed(2);
        return { subtotal, discount, tax, total };
    }

    // تحديث الإجماليات عند تغيير أي حقل
    function updateTotals() {
        calculateTotals();
    }

    // ========== دوال إدارة المنتجات داخل الطلب ==========
    // إضافة صف منتج جديد (يمكن أن يكون من المخزون أو مخصص)
    function addProductRow(productData = null) {
        const row = document.createElement('div');
        row.className = 'item-row border rounded-lg p-3 bg-white shadow-sm mb-3';
        
        // نستخدم حقول قابلة للتعديل
        row.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div>
                    <label class="text-xs text-gray-500">اسم المنتج</label>
                    <input type="text" class="item-name w-full border rounded px-2 py-1" placeholder="اسم المنتج" value="${escapeHtml(productData?.name || '')}">
                </div>

    async function saveQuickProduct(event) {
        event.preventDefault();
        const name = quickProductName.value.trim();
        const price = parseFloat(quickProductPrice.value);
        const quantity = parseInt(quickProductQuantity.value);
        const image = quickProductImage.value.trim() || null;
        const description = quickProductDesc.innerHTML; // محتوى HTML
        const saveToInventory = saveToInventoryCheck.checked;

        if (!name || isNaN(price) || isNaN(quantity) || quantity <= 0) {
            alert('الاسم والسعر والكمية مطلوبة وبأرقام صحيحة');
            return;
        }

        let productId = null;
        if (saveToInventory) {
            // حفظ المنتج في مجموعة products
            const newProduct = {
                name,
                price,
                stock: 0, // المخزون الابتدائي صفر، لأنه سيتم استخدامه في الطلب
                image,
                description,
                code: generateRandomCode(),
                createdAt: new Date().toISOString()
            };
            try {
                const docRef = await addProduct(newProduct);
                productId = docRef.id;
                // تحديث قائمة المنتجات المحلية
                await loadProductsList(); // تحديث products
            } catch (err) {
                console.error(err);
                alert('حدث خطأ أثناء حفظ المنتج');
                return;
            }
        }

        // إضافة المنتج إلى الصف الحالي
        if (currentProductRow) {
            const row = currentProductRow;
            row.querySelector('.item-name').value = name;
            row.querySelector('.item-image').value = image || '';
            row.querySelector('.item-barcode').value = generateRandomCode(); // باركود جديد
            row.querySelector('.item-desc-editor').innerHTML = description;
            row.querySelector('.item-desc-hidden').value = description;
            row.querySelector('.item-quantity').value = quantity;
            row.querySelector('.item-price').value = price;
            row.querySelector('.item-product-id').value = productId || '';
            row.querySelector('.item-save-to-inventory').value = saveToInventory ? '1' : '0';
            updateTotals();
        }

        closeQuickProductModal();
    }

        quickProductModal.classList.add('hidden');
        quickProductModal.classList.remove('flex');
        currentProductRow = null;

            const approvalDisplay = order.approvalCode ? `<span class="text-xs text-gray-500">رمز: ${order.approvalCode}</span>` : '';
            const shippingInfo = order.shippingRequired ? 
                `<span class="text-xs">🚚 شحن إلى: ${order.shippingCity || ''} ${order.shippingStreet || ''}</span>` :
                `<span class="text-xs text-gray-500">🚫 لا يطلب شحن</span>`;

                <div class="flex justify-between items-start flex-wrap gap-2">

                        <p class="text-sm text-gray-600">📅 ${order.orderDate} | 🕐 ${formatTime12Hour(order.orderTime)}</p>
                        <p class="text-sm">العميل: ${escapeHtml(order.customer?.name || 'غير معروف')}</p>
                        <p class="text-sm">الحالة: <span class="status-badge px-2 py-1 rounded text-xs ${getStatusClass(order.status)}">${order.status}</span></p>
                        <p class="text-sm font-bold">الإجمالي: ${order.total} ريال</p>
                        <div class="flex gap-2 mt-1">
                            ${paymentDisplay}
                            ${approvalDisplay}
                        </div>
                        <div class="mt-1">${shippingInfo}</div>
                    </div>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="editOrder('${order.id}')" class="text-blue-600 hover:text-blue-800">✏️ تعديل</button>
                        <select onchange="changeStatus('${order.id}', this.value)" class="text-sm border rounded px-2 py-1">
                            <option value="جديد" ${order.status === 'جديد' ? 'selected' : ''}>جديد</option>
                            <option value="تحت التنفيذ" ${order.status === 'تحت التنفيذ' ? 'selected' : ''}>تحت التنفيذ</option>
                            <option value="تم التنفيذ" ${order.status === 'تم التنفيذ' ? 'selected' : ''}>تم التنفيذ</option>
                            <option value="تحت المراجعة" ${order.status === 'تحت المراجعة' ? 'selected' : ''}>تحت المراجعة</option>
                            <option value="مسترجع" ${order.status === 'مسترجع' ? 'selected' : ''}>مسترجع</option>
                            <option value="ملغي" ${order.status === 'ملغي' ? 'selected' : ''}>ملغي</option>
                        </select>
                        <button onclick="printInvoice('${order.id}')" class="text-green-600 hover:text-green-800">🖨️ طباعة</button>

    function getStatusClass(status) {
        const map = {
            'جديد': 'bg-blue-100 text-blue-800',
            'تحت التنفيذ': 'bg-yellow-100 text-yellow-800',
            'تم التنفيذ': 'bg-green-100 text-green-800',
            'تحت المراجعة': 'bg-purple-100 text-purple-800',
            'مسترجع': 'bg-orange-100 text-orange-800',
            'ملغي': 'bg-red-100 text-red-800'
        };
        return map[status] || 'bg-gray-100 text-gray-800';
    }

        currentOrderId = null;
        orderForm.reset();
        itemsContainer.innerHTML = '';
        // إضافة صف منتج فارغ واحد
        addProductRow();
        customerSelect.value = '';
        discountValueInput.value = '0';
        discountTypeSelect.value = 'fixed';
        orderNumberInput.value = generateOrderNumber();
        setCurrentDate();
        setCurrentTime12Hour();
        orderStatusSelect.value = 'جديد';
        shippingRequiredCheck.checked = false;
        shippingAddressFields.classList.add('hidden');
        noShippingNote.classList.add('hidden');

    function setPaymentMethod(method) {
        selectedPaymentMethod = method;
        paymentMethodInput.value = method;
        paymentMethodBtns.forEach(btn => {
            btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
            btn.classList.add('border-gray-300');
        });
        const activeBtn = document.querySelector(`.payment-method-btn[data-payment="${method}"]`);
        if (activeBtn) {
            activeBtn.classList.remove('border-gray-300');
            activeBtn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
        }
        if (method === 'tamara' || method === 'tabby') {
            approvalMethodLabel.innerText = method === 'tamara' ? 'تمارا' : 'تابي';
            approvalCodeField.classList.remove('hidden');
            otherPaymentField.classList.add('hidden');
        } else if (method === 'other') {
            approvalCodeField.classList.add('hidden');
            otherPaymentField.classList.remove('hidden');
        } else {
            approvalCodeField.classList.add('hidden');
            otherPaymentField.classList.add('hidden');
        }
    }

    async function saveOrder(event) {
        event.preventDefault();
        const customerId = customerSelect.value;
        if (!customerId) { alert('يرجى اختيار عميل'); return; }
        const orderNumber = orderNumberInput.value.trim();
        if (!orderNumber) { alert('يرجى إدخال رقم الطلب'); return; }
        const orderDate = orderDateInput.value;
        if (!orderDate) { alert('يرجى اختيار التاريخ'); return; }
        if (!orderHourSelect.value || !orderMinuteSelect.value) { alert('يرجى اختيار الوقت'); return; }
        const orderTime = get24HourTime();
        const status = orderStatusSelect.value;
        const shippingRequired = shippingRequiredCheck.checked;
        const shippingAddress = shippingRequired ? {
            city: shippingCity.value.trim(),
            street: shippingStreet.value.trim(),
            additionalNo: shippingAdditionalNo.value.trim(),
            poBox: shippingPoBox.value.trim()
        } : null;

        if (!selectedPaymentMethod) { alert('يرجى اختيار طريقة الدفع'); return; }
        let approvalCode = null;
        let otherPaymentTextValue = null;
        if (selectedPaymentMethod === 'tamara' || selectedPaymentMethod === 'tabby') {
            approvalCode = approvalCodeInput.value.trim();
            if (!approvalCode) { alert(`يرجى إدخال رمز الموافقة لطريقة الدفع ${selectedPaymentMethod === 'tamara' ? 'تمارا' : 'تابي'}`); return; }
        }
        if (selectedPaymentMethod === 'other') {
            otherPaymentTextValue = otherPaymentText.value.trim();
            if (!otherPaymentTextValue) { alert('يرجى إدخال طريقة الدفع'); return; }
        }

        // جمع المنتجات من الصفوف
        const items = [];
        const rows = document.querySelectorAll('.item-row');
        for (let row of rows) {
            const name = row.querySelector('.item-name').value.trim();
            const image = row.querySelector('.item-image').value.trim() || null;
            const barcode = row.querySelector('.item-barcode').value.trim();
            const description = row.querySelector('.item-desc-hidden').value;
            const quantity = parseInt(row.querySelector('.item-quantity').value);
            const price = parseFloat(row.querySelector('.item-price').value);
            const productId = row.querySelector('.item-product-id').value || null;
            const saveToInventory = row.querySelector('.item-save-to-inventory').value === '1';

            if (!name || isNaN(quantity) || isNaN(price) || quantity <= 0 || price < 0) {
                alert('جميع المنتجات يجب أن تحتوي على اسم، كمية وسعر صحيح');
                return;
            }
            items.push({
                productId,
                name,
                image,
                barcode: barcode || generateRandomCode(),
                description,
                quantity,
                price,
                saveToInventory
            });
        }
        if (items.length === 0) { alert('أضف منتجاً واحداً على الأقل'); return; }

        // التحقق من المخزون للمنتجات المحفوظة (ذات productId)
        for (let item of items) {
            if (item.productId) {
                const product = products.find(p => p.id === item.productId);
                if (product && product.stock < item.quantity) {
                    alert(`المنتج ${item.name} لديه مخزون ${product.stock} فقط`);
                    return;
                }
            }
        }

        const { subtotal, discount, tax, total } = calculateTotals();
        const discountType = discountTypeSelect.value;
        const discountValue = parseFloat(discountValueInput.value) || 0;

        const orderData = {
            orderNumber: `KF-${orderNumber}`,
            orderDate,
            orderTime,
            customerId,
            status,
            shippingRequired,
            shippingAddress,
            paymentMethod: selectedPaymentMethod,
            paymentMethodName: selectedPaymentMethod === 'other' ? otherPaymentTextValue : 
                (selectedPaymentMethod === 'tamara' ? 'تمارا' : (selectedPaymentMethod === 'tabby' ? 'تابي' : 
                (selectedPaymentMethod === 'mada' ? 'مدى' : (selectedPaymentMethod === 'mastercard' ? 'ماستركارد' : 
                (selectedPaymentMethod === 'visa' ? 'فيزا' : (selectedPaymentMethod === 'stcpay' ? 'STCPay' : '')))))),
            approvalCode,
            otherPaymentText: otherPaymentTextValue,
            items,
            subtotal,
            discount: discountValue,
            discountType,
            tax,
            total,
            updatedAt: new Date().toISOString()
        };
        if (!currentOrderId) orderData.createdAt = new Date().toISOString();

        try {
            if (currentOrderId) {
                // استرجاع المخزون القديم
                const oldOrder = orders.find(o => o.id === currentOrderId);
                if (oldOrder && oldOrder.items) {
                    for (let oldItem of oldOrder.items) {
                        if (oldItem.productId) {
                            const prod = products.find(p => p.id === oldItem.productId);
                            if (prod) await updateProductStock(oldItem.productId, prod.stock + oldItem.quantity);
                        }
                    }
                }
                await updateOrder(currentOrderId, orderData);
            } else {
                await addOrder(orderData);
            }
            // خصم المخزون الجديد
            for (let item of items) {
                if (item.productId) {
                    const prod = products.find(p => p.id === item.productId);
                    if (prod) await updateProductStock(item.productId, prod.stock - item.quantity);
                } else if (item.saveToInventory) {
                    // المنتج غير موجود في المخزون ولكن طلب حفظه: أضفه الآن
                    const newProduct = {
                        name: item.name,
                        price: item.price,
                        stock: 0,
                        image: item.image,
                        description: item.description,
                        code: item.barcode,
                        createdAt: new Date().toISOString()
                    };
                    const docRef = await addProduct(newProduct);
                    // تحديث productId للعنصر في قاعدة البيانات (للمراجعة)
                    await updateOrder(currentOrderId || (await addOrder(orderData)).id, { 
                        items: items.map(it => it === item ? { ...it, productId: docRef.id } : it) 
                    });
                }
            }
            alert(currentOrderId ? 'تم تعديل الطلب' : 'تم إضافة الطلب');
            closeModal();
            await loadData();
            await renderOrders();
        } catch (err) {
            console.error(err);
            alert('حدث خطأ أثناء حفظ الطلب');
        }
    }

    function openModalForEdit(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        currentOrderId = orderId;
        modalTitle.innerText = 'تعديل الطلب';

        orderNumberInput.value = order.orderNumber.replace('KF-', '');
        orderDateInput.value = order.orderDate;
        const { hour, minute, ampm } = convertTo12HourFormat(order.orderTime);
        orderHourSelect.value = hour;
        orderMinuteSelect.value = minute;
        orderAmPmSelect.value = ampm;
        orderStatusSelect.value = order.status;
        customerSelect.value = order.customerId;
        shippingRequiredCheck.checked = order.shippingRequired || false;
        if (order.shippingRequired && order.shippingAddress) {
            shippingAddressFields.classList.remove('hidden');
            noShippingNote.classList.add('hidden');
            shippingCity.value = order.shippingAddress.city || '';
            shippingStreet.value = order.shippingAddress.street || '';
            shippingAdditionalNo.value = order.shippingAddress.additionalNo || '';
            shippingPoBox.value = order.shippingAddress.poBox || '';
        } else {
            shippingAddressFields.classList.add('hidden');
            noShippingNote.classList.remove('hidden');
        }
        setPaymentMethod(order.paymentMethod);
        if (order.approvalCode) approvalCodeInput.value = order.approvalCode;
        if (order.otherPaymentText) otherPaymentText.value = order.otherPaymentText;

        discountValueInput.value = order.discount || 0;
        discountTypeSelect.value = order.discountType || 'fixed';

        itemsContainer.innerHTML = '';
        order.items.forEach(item => {
            addProductRow({
                name: item.productDetails?.name || item.name,
                image: item.productDetails?.image || item.image,
                barcode: item.productDetails?.code || item.barcode,
                description: item.productDetails?.description || item.description,
                quantity: item.quantity,
                price: item.price,
                productId: item.productId,
                saveToInventory: !!item.productId // إذا كان له productId فهو محفوظ
            });
        });
        if (order.items.length === 0) addProductRow();

        updateTotals();
        orderModal.classList.remove('hidden');
        orderModal.classList.add('flex');
    }

    function convertTo12HourFormat(time24) {
        if (!time24) return { hour: 12, minute: '00', ampm: 'AM' };
        let [hour, minute] = time24.split(':');
        let ampm = 'AM';
        let hour12 = parseInt(hour);
        if (hour12 >= 12) { ampm = 'PM'; if (hour12 > 12) hour12 -= 12; }
        if (hour12 === 0) hour12 = 12;
        return { hour: hour12, minute, ampm };
    }

        orderModal.classList.add('hidden');
        orderModal.classList.remove('flex');

            await updateOrder(orderId, { status: newStatus });
            await renderOrders();
        } catch (err) { console.error(err); alert('خطأ في تغيير الحالة'); }

    window.deleteOrderHandler = async (orderId) => {
        if (!confirm('هل أنت متأكد من حذف هذا الطلب؟')) return;
        try {
            const order = orders.find(o => o.id === orderId);
            if (order && order.items) {
                for (let item of order.items) {
                    if (item.productId) {
                        const prod = products.find(p => p.id === item.productId);
                        if (prod) await updateProductStock(item.productId, prod.stock + item.quantity);
                    }
                }
            }
            await deleteOrder(orderId);
            await renderOrders();
            alert('تم حذف الطلب');
        } catch (err) { console.error(err); alert('خطأ في الحذف'); }
    };

                <hr><table style="width:100%; border-collapse:collapse;"><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
                <tbody>${order.items.map(item => `<tr><td>${escapeHtml(item.productDetails?.name || item.name)}</td><td>${item.quantity}</td><td>${item.price}</td><td>${(item.quantity * item.price).toFixed(2)}</td></tr>`).join('')}</tbody></table>
                <hr><div><p>المجموع الفرعي: ${order.subtotal} ريال</p><p>الخصم: ${order.discount} ${order.discountType === 'percent' ? '%' : 'ريال'}</p><p>الضريبة: ${order.tax} ريال</p><p style="font-weight:bold;">الإجمالي: ${order.total} ريال</p></div>
                <hr><p style="text-align:center;">شكراً لتسوقكم معنا</p>
            </div>
        `;
        printArea.classList.remove('hidden');
        window.print();
        printArea.classList.add('hidden');
    };

    window.editOrder = (id) => openModalForEdit(id);

    // ========== دوال العميل السريع ==========
    function openQuickModal() {
        quickModal.classList.remove('hidden');
        quickModal.classList.add('flex');
        quickForm.reset();
    }
    function closeQuickModal() {
        quickModal.classList.add('hidden');
        quickModal.classList.remove('flex');
    }
    async function saveQuickCustomer(event) {
        event.preventDefault();
        const name = quickName.value.trim();
        const phone = quickPhone.value.trim();
        if (!name || !phone) { alert('الاسم ورقم الجوال مطلوبان'); return; }
        const newCustomer = {
            name, phone,
            email: quickEmail.value.trim(),
            city: quickCity.value.trim(),
            street: quickStreet.value.trim(),
            additionalNo: quickAdditionalNo.value.trim(),
            poBox: quickPoBox.value.trim(),
            createdAt: new Date().toISOString()
        };
        try {
            const docRef = await addCustomer(newCustomer);
            closeQuickModal();
            await loadCustomersList();
            customerSelect.value = docRef.id;
        } catch (err) { console.error(err); alert('حدث خطأ أثناء إضافة العميل'); }
    }

    // ========== ربط الأحداث ==========
    newOrderBtn.onclick = () => { resetForm(); orderModal.classList.remove('hidden'); orderModal.classList.add('flex'); };
    closeModalBtn.onclick = closeModal;
    cancelOrderBtn.onclick = closeModal;
    addItemBtn.onclick = () => addProductRow();
    discountValueInput.addEventListener('input', updateTotals);
    discountTypeSelect.addEventListener('change', updateTotals);
    generateOrderNumberBtn.onclick = () => { orderNumberInput.value = generateOrderNumber(); };
    shippingRequiredCheck.addEventListener('change', () => {
        if (shippingRequiredCheck.checked) {
            shippingAddressFields.classList.remove('hidden');
            noShippingNote.classList.add('hidden');
        } else {
            shippingAddressFields.classList.add('hidden');
            noShippingNote.classList.remove('hidden');
        }
    });
    quickAddCustomerBtn.onclick = openQuickModal;
    closeQuickModalBtn.onclick = closeQuickModal;
    cancelQuickBtn.onclick = closeQuickModal;
    quickForm.onsubmit = saveQuickCustomer;
    orderForm.onsubmit = saveOrder;

    // ربط أزرار طريقة الدفع
    paymentMethodBtns.forEach(btn => {
        btn.onclick = () => setPaymentMethod(btn.dataset.payment);
    });

    // مودال المنتج السريع
    closeQuickProductModalBtn.onclick = closeQuickProductModal;
    cancelQuickProductBtn.onclick = closeQuickProductModal;
    quickProductForm.onsubmit = saveQuickProduct;

    // إضافة زر "جديد" بجانب كل منتج (سنقوم بذلك داخل addProductRow)
    // سنضيف زراً في صف المنتج لفتح المودال
    // تعديل addProductRow لإضافة زر جديد
    const originalAddProductRow = addProductRow;
    window.addProductRow = function(productData = null) {
        const row = originalAddProductRow(productData);
        // إضافة زر "جديد" بجانب حذف
        const actionsDiv = row.querySelector('.flex.items-end');
        if (actionsDiv) {
            const newBtn = document.createElement('button');
            newBtn.type = 'button';
            newBtn.className = 'text-blue-600 hover:text-blue-800 text-sm mr-2';
            newBtn.innerHTML = '<i class="fas fa-plus-circle"></i> جديد';
            newBtn.onclick = () => openQuickProductModal(row);
            actionsDiv.appendChild(newBtn);
        }
        return row;
    };
    // استبدال الدالة الأصلية
    addProductRow = window.addProductRow;

    // تهيئة خيارات الوقت
    populateTimeOptions();

    // بدء التشغيل
    await loadData();
    await renderOrders();
</script>
</body>
</html>
