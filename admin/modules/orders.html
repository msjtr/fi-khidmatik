<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الطلبات المتكامل</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { transition: all 0.2s ease; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; display: inline-block; }
        .status-new { background: #dbeafe; color: #1e40af; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .shipping-fields { background: #f0fdf4; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #bbf7d0; }
        .pickup-fields { background: #fef3c7; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #fcd34d; }
        .form-section { background: #f9fafb; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #e5e7eb; }
        .form-section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #1f2937; border-right: 4px solid #3b82f6; padding-right: 12px; display: flex; align-items: center; gap: 8px; }
        .modal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 p-6">

<div id="toast" class="fixed bottom-5 left-5 hidden px-6 py-3 rounded-lg text-white z-[1000]"></div>

<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg text-white">
                <i class="fas fa-shopping-cart text-xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-gray-800">إدارة الطلبات</h1>
                <p class="text-gray-500 text-sm">لوحة التحكم والمبيعات</p>
            </div>
        </div>
        <button id="newOrderBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl shadow-md flex items-center gap-2">
            <i class="fas fa-plus-circle"></i> طلب جديد
        </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-5 mb-8 flex flex-wrap gap-4 items-end">
        <div class="flex-1 min-w-[200px]">
            <label class="text-xs text-gray-500 mb-1 block">حالة الطلب</label>
            <select id="filterStatus" class="w-full border rounded-lg px-3 py-2 text-sm bg-gray-50">
                <option value="">جميع الحالات</option>
                <option value="جديد">جديد</option>
                <option value="تم التنفيذ">تم التنفيذ</option>
            </select>
        </div>
        <div class="flex-1 min-w-[200px]">
            <label class="text-xs text-gray-500 mb-1 block">بحث عن عميل</label>
            <input type="text" id="filterCustomer" placeholder="اسم العميل أو رقم الطلب..." class="w-full border rounded-lg px-3 py-2 text-sm bg-gray-50">
        </div>
        <button id="applyFilters" class="bg-gray-800 text-white px-5 py-2 rounded-lg hover:bg-gray-900">فلترة</button>
    </div>

    <div id="ordersContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
</div>

<div id="orderModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50 overflow-y-auto">
    <div class="bg-white rounded-2xl shadow-2xl max-w-5xl w-full max-h-[90vh] overflow-y-auto">
        <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center z-10">
            <h2 class="text-2xl font-bold text-gray-800">إضافة طلب جديد</h2>
            <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600 text-3xl">&times;</button>
        </div>
        
        <form id="orderForm" class="p-6">
            <div class="form-section">
                <div class="form-section-title"><i class="fas fa-info-circle text-blue-600"></i><span>المعلومات الأساسية</span></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">رقم الطلب</label>
                        <input type="text" id="orderNumber" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="مثلاً: 1001">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">التاريخ</label>
                        <input type="date" id="orderDate" class="w-full border rounded-lg px-3 py-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">حالة الطلب</label>
                        <select id="orderStatus" class="w-full border rounded-lg px-3 py-2 text-sm">
                            <option value="جديد">جديد</option>
                            <option value="تم التنفيذ">تم التنفيذ</option>
                            <option value="ملغي">ملغي</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title"><i class="fas fa-user text-blue-600"></i><span>بيانات العميل</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">اسم العميل</label>
                        <input type="text" id="customerName" class="w-full border rounded-lg px-3 py-2 text-sm" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">رقم الجوال</label>
                        <input type="tel" id="customerPhone" class="w-full border rounded-lg px-3 py-2 text-sm" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title"><i class="fas fa-map-marker-alt text-blue-600"></i><span>بيانات العنوان والشحن</span></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                    <label class="border p-3 rounded-xl cursor-pointer flex items-center gap-2">
                        <input type="radio" name="shippingMethod" value="pickup" checked> استلام من المقر
                    </label>
                    <label class="border p-3 rounded-xl cursor-pointer flex items-center gap-2">
                        <input type="radio" name="shippingMethod" value="delivery"> شحن منزلي
                    </label>
                </div>

                <div id="deliveryFields" class="shipping-fields hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <input type="text" id="deliveryCity" class="border rounded-lg p-2 text-sm" placeholder="المدينة">
                        <input type="text" id="deliveryDistrict" class="border rounded-lg p-2 text-sm" placeholder="الحي">
                        <input type="text" id="deliveryStreet" class="border rounded-lg p-2 text-sm" placeholder="الشارع">
                        <input type="text" id="deliveryBuildingNo" class="border rounded-lg p-2 text-sm" placeholder="رقم المبنى">
                        <input type="text" id="deliveryAdditionalNo" class="border rounded-lg p-2 text-sm" placeholder="الرقم الإضافي">
                        <input type="text" id="deliveryPoBox" class="border rounded-lg p-2 text-sm" placeholder="الرمز البريدي / ص.ب">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title"><i class="fas fa-calculator text-blue-600"></i><span>المنتجات والمبالغ</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">طريقة الدفع</label>
                            <select id="paymentMethod" class="w-full border rounded-lg px-3 py-2 text-sm">
                                <option value="مدى">مدى</option>
                                <option value="تمارا">تمارا</option>
                                <option value="تابي">تابي</option>
                                <option value="تحويل بنكي">تحويل بنكي</option>
                            </select>
                        </div>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl space-y-2">
                        <div class="flex justify-between"><span>المجموع الفرعي:</span><input type="number" id="subtotal" class="w-24 text-left border rounded px-1" value="0"></div>
                        <div class="flex justify-between"><span>الضريبة (15%):</span><input type="number" id="taxAmount" class="w-24 text-left border rounded px-1" readonly value="0"></div>
                        <div class="flex justify-between font-bold text-lg border-t pt-2"><span>الإجمالي النهائي:</span><input type="number" id="total" class="w-24 text-left border rounded px-1" value="0"></div>
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 pt-6 border-t">
                <button type="button" id="cancelBtn" class="px-6 py-2 border rounded-xl hover:bg-gray-100">إغاء</button>
                <button type="submit" class="px-8 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-lg">حفظ الطلب</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    // --- منطق الواجهة البرمجي ---
    const newOrderBtn = document.getElementById('newOrderBtn');
    const orderModal = document.getElementById('orderModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const orderForm = document.getElementById('orderForm');
    const deliveryFields = document.getElementById('deliveryFields');
    const shippingRadios = document.getElementsByName('shippingMethod');

    // فتح وإغلاق المودال
    newOrderBtn.onclick = () => orderModal.classList.remove('hidden'), orderModal.classList.add('flex');
    closeModalBtn.onclick = () => orderModal.classList.add('hidden');

    // تبديل حقول الشحن
    shippingRadios.forEach(radio => {
        radio.onchange = (e) => {
            if (e.target.value === 'delivery') deliveryFields.classList.remove('hidden');
            else deliveryFields.classList.add('hidden');
        };
    });

    // حساب الضريبة تلقائياً عند تغيير المجموع الفرعي
    document.getElementById('subtotal').oninput = (e) => {
        const sub = parseFloat(e.target.value) || 0;
        const tax = sub * 0.15;
        const total = sub + tax;
        document.getElementById('taxAmount').value = tax.toFixed(2);
        document.getElementById('total').value = total.toFixed(2);
    };

    // معالجة الحفظ (مثال)
    orderForm.onsubmit = async (e) => {
        e.preventDefault();
        alert("تم تجهيز البيانات للحفظ ومطابقتها مع ملف الطباعة!");
        // هنا يتم استدعاء دالة Firebase الخاصة بك
        orderModal.classList.add('hidden');
    };
</script>

</body>
</html>
