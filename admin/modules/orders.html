<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>إدارة الطلبات</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.product-row{border:1px solid #ddd;padding:10px;margin-bottom:10px;border-radius:8px}
</style>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-5xl mx-auto">

<div class="flex justify-between mb-6">
<h1 class="text-2xl font-bold">إدارة الطلبات</h1>
<button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded">طلب جديد</button>
</div>

<div id="ordersContainer"></div>

</div>

<!-- مودال -->
<div id="modal" class="fixed inset-0 hidden bg-black bg-opacity-50 flex items-center justify-center">

<div class="bg-white p-6 rounded w-full max-w-3xl">

<h2 class="text-xl mb-4">طلب جديد</h2>

<form id="form">

<input id="orderNumber" placeholder="رقم الطلب" class="border p-2 w-full mb-2">
<input id="customerName" placeholder="اسم العميل" class="border p-2 w-full mb-2">

<div id="products"></div>

<button type="button" onclick="addProduct()" class="bg-gray-200 px-3 py-1 mb-3">+ منتج</button>

<div class="flex justify-end gap-2">
<button type="button" onclick="closeModal()" class="border px-3 py-1">إلغاء</button>
<button class="bg-blue-600 text-white px-3 py-1">حفظ</button>
</div>

</form>

</div>
</div>

<script type="module">

/* =============================
   استيراد Firebase
============================= */
import {
    loadOrders,
    addOrder,
    deleteOrder
} from './js/firebase.js';

/* =============================
   متغيرات
============================= */
let orders = [];

/* =============================
   إضافة منتج
============================= */
function addProduct(){
const row=document.createElement('div')
row.className='product-row'
row.innerHTML=`
<input placeholder="اسم المنتج" class="name border p-1 w-full mb-1">
<input type="number" placeholder="السعر" class="price border p-1 w-full mb-1">
<input type="number" placeholder="الكمية" class="qty border p-1 w-full">
`
document.getElementById('products').appendChild(row)
}

/* =============================
   فتح/إغلاق مودال
============================= */
window.openModal = () => {
document.getElementById('modal').classList.remove('hidden')
}

window.closeModal = () => {
document.getElementById('modal').classList.add('hidden')
}

/* =============================
   تحميل الطلبات من Firebase
============================= */
async function loadData(){
orders = await loadOrders();
render();
}

/* =============================
   حفظ الطلب
============================= */
document.getElementById('form').onsubmit = async function(e){
e.preventDefault();

const items=[];
document.querySelectorAll('.product-row').forEach(r=>{
items.push({
name:r.querySelector('.name').value,
price:parseFloat(r.querySelector('.price').value||0),
quantity:parseInt(r.querySelector('.qty').value||0)
});
});

let total=0;
items.forEach(i=> total += i.price*i.quantity);

/* حفظ في Firebase */
await addOrder({
orderNumber: document.getElementById('orderNumber').value,
customer: { name: document.getElementById('customerName').value },
items,
total,
createdAt: new Date().toISOString()
});

closeModal();
this.reset();
document.getElementById('products').innerHTML='';

await loadData();
}

/* =============================
   عرض الطلبات
============================= */
function render(){
const el=document.getElementById('ordersContainer');

if(!orders.length){
el.innerHTML='لا يوجد طلبات';
return;
}

el.innerHTML = orders.map(o=>`
<div class="bg-white p-4 mb-3 rounded shadow">
<h3 class="font-bold text-blue-600">${o.orderNumber}</h3>
<p>${o.customer?.name || ''}</p>
<p class="text-green-600">${o.total || 0} ريال</p>

<div class="flex gap-2 mt-2">
<button onclick="printOrder('${o.id}')" class="bg-blue-500 text-white px-2 py-1 rounded">🖨️ طباعة</button>
<button onclick="deleteOrderHandler('${o.id}')" class="bg-red-500 text-white px-2 py-1 rounded">حذف</button>
</div>
</div>
`).join('');
}

/* =============================
   حذف طلب
============================= */
window.deleteOrderHandler = async (id) => {
if(!confirm('تأكيد الحذف؟')) return;

await deleteOrder(id);
await loadData();
}

/* =============================
   الطباعة (مربوطة)
============================= */
window.printOrder = (id) => {
const order = orders.find(o=>o.id===id);
if(!order) return;

localStorage.setItem('print_order', JSON.stringify(order));
window.open('print.html','_blank');
}

/* =============================
   تشغيل الصفحة
============================= */
loadData();

</script>

</body>
</html>
