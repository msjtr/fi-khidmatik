<!DOCTYPE html>
<html dir="rtl">
<head>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { getSettings, setSettings } from '../../js/common.js';

async function init() {
    const data = await getSettings('invoiceInstructions') || {};

    document.body.innerHTML = `
    <div class="p-6">
        <textarea id="txt" class="w-full h-40">${data.text || ''}</textarea>
        <button onclick="save()">حفظ</button>
    </div>`;
}

window.save = async () => {
    const text = document.getElementById('txt').value;
    await setSettings('invoiceInstructions', { text });
    alert('تم');
};

init();
</script>
</head>
<body></body>
</html>
