<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تعليمات الفاتورة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module">
        import { getSettings, setSettings } from '../js/common.js';
        
        let quillEditor = null;

        async function init() {
            await loadInvoiceText();
        }

        async function loadInvoiceText() {
            const data = await getSettings('invoiceInstructions');
            const text = data?.text || 'شكراً لتسوقكم معنا. في حال وجود استفسار أو مشكلة، يرجى التواصل مع فريق الدعم. نتمنى لكم تجربة تسوق ممتعة.';
            const container = document.getElementById('invoice-container');
            if (!container) return;
            container.innerHTML = `
                <div class="bg-white rounded-2xl shadow p-6">
                    <h2 class="text-2xl font-bold mb-4"><i class="fas fa-file-invoice-dollar ml-2"></i>تعليمات الفاتورة</h2>
                    <p class="text-gray-600 mb-3 text-sm">هذا النص سيظهر في أسفل الفاتورة التي يراها العميل</p>
                    <div id="invoiceEditor" style="min-height:200px; margin-bottom:1rem;"></div>
                    <button onclick="window.saveInvoiceInstructions()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">
                        <i class="fas fa-save ml-1"></i>حفظ التعليمات
                    </button>
                </div>
            `;
            
            quillEditor = new Quill('#invoiceEditor', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'color': [] }, { 'background': [] }],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'align': [] }],
                        ['link', 'image', 'video'],
                        ['clean']
                    ]
                },
                placeholder: 'أدخل تعليمات الفاتورة...',
                direction: 'rtl'
            });
            quillEditor.root.innerHTML = text;
        }

        window.saveInvoiceInstructions = async () => {
            if (!quillEditor) return;
            const newText = quillEditor.root.innerHTML;
            await setSettings('invoiceInstructions', { text: newText });
            alert('تم حفظ تعليمات الفاتورة بنجاح');
        };

        init();
    </script>
    <style>
        body { background: #f1f5f9; font-family: 'Tahoma', system-ui; margin: 0; padding: 1rem; }
        .ql-editor { min-height: 150px; direction: rtl; text-align: right; }
    </style>
</head>
<body>
    <div id="invoice-container"></div>
</body>
</html>
