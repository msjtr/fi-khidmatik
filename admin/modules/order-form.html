<div style="padding: 25px;">
    <h2><i class="fas fa-file-invoice" style="color: #e67e22;"></i> نموذج الطلب</h2>
    <div style="background: white; border-radius: 12px; padding: 20px; margin-top: 20px;">
        <form id="quick-order-form">
            <div style="display: grid; gap: 15px;">
                <input type="text" placeholder="اسم العميل" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                <input type="tel" placeholder="رقم الجوال" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                <select style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    <option>اختر المنتج</option>
                </select>
                <button type="submit" style="background: #e67e22; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer;">إنشاء طلب</button>
            </div>
        </form>
    </div>
</div>
