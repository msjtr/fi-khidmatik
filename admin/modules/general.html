<!DOCTYPE html>
<html dir="rtl">
<head>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
import { getSettings, setSettings } from '../../js/common.js';

async function init() {
    const data = await getSettings('general') || {};

    document.body.innerHTML = `
    <div class="p-6">
        <input id="name" value="${data.siteName || ''}" placeholder="اسم الموقع">
        <button onclick="save()">حفظ</button>
    </div>`;
}

window.save = async () => {
    const siteName = document.getElementById('name').value;
    await setSettings('general', { siteName });
    alert('تم');
};

init();
</script>
</head>
<body></body>
</html>
