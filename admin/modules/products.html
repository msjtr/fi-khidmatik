<div class="module-container" style="font-family: 'Tajawal', sans-serif;" dir="rtl">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
        <h2 style="margin:0; color:#2c3e50;"><i class="fas fa-cubes" style="color:#e67e22; margin-left:10px;"></i> إدارة مستودع المنتجات</h2>
        <button id="new-product-btn" class="btn-primary" style="background:#e67e22; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">
            <i class="fas fa-plus"></i> إضافة منتج جديد
        </button>
    </div>

    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:15px; margin-bottom: 20px;">
        <input type="text" id="search-product" placeholder="بحث..." style="padding:10px; border:1px solid #ddd; border-radius:8px;">
        <select id="category-filter" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
            <option value="all">جميع التصنيفات</option>
            <option value="cards">بطاقات شحن</option>
            <option value="services">خدمات تقنية</option>
        </select>
    </div>

    <table style="width:100%; border-collapse:collapse; background:white; border-radius:15px; overflow:hidden;">
        <thead style="background:#fcfcfc;">
            <tr>
                <th style="padding:15px; border-bottom:1px solid #eee;">المنتج</th>
                <th style="padding:15px; border-bottom:1px solid #eee;">السعر</th>
                <th style="padding:15px; border-bottom:1px solid #eee;">المخزون</th>
                <th style="padding:15px; border-bottom:1px solid #eee;">الإجراءات</th>
            </tr>
        </thead>
        <tbody id="products-list-body">
            </tbody>
    </table>
</div>

<div id="product-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; width:90%; max-width:550px; padding:25px; border-radius:15px;">
        <h3 id="modal-title">إضافة منتج</h3>
        <form id="product-form"> <input type="hidden" id="p-id">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                <input type="text" id="p-name" placeholder="اسم المنتج" required style="padding:10px; border:1px solid #ddd; border-radius:8px;">
                <input type="text" id="p-code" placeholder="الكود SKU" required style="padding:10px; border:1px solid #ddd; border-radius:8px;">
                <input type="number" id="p-price" placeholder="السعر" required style="padding:10px; border:1px solid #ddd; border-radius:8px;">
                <input type="number" id="p-stock" placeholder="الكمية" required style="padding:10px; border:1px solid #ddd; border-radius:8px;">
                <select id="p-category" style="padding:10px; border:1px solid #ddd; border-radius:8px; grid-column: span 2;">
                    <option value="cards">بطاقات شحن</option>
                    <option value="services">خدمات تقنية</option>
                </select>
                <input type="text" id="p-image" placeholder="رابط الصورة" style="padding:10px; border:1px solid #ddd; border-radius:8px; grid-column: span 2;">
            </div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button type="submit" style="flex:2; background:#e67e22; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">حفظ</button>
                <button type="button" onclick="document.getElementById('product-modal').style.display='none'" style="flex:1; background:#eee; border:none; padding:12px; border-radius:8px;">إلغاء</button>
            </div>
        </form>
    </div>
</div>
