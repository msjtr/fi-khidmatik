<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المنتجات</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="p-6 bg-gray-100">

<div id="products"></div>

<script type="module">

import {
    loadProducts,
    addProduct,
    deleteProduct
} from '../../js/common.js';

let data = [];

async function init() {
    data = await loadProducts();
    render();
}

function render() {
    document.getElementById('products').innerHTML = `
    
    <div class="bg-white p-6 rounded-xl shadow">
    
        <div class="flex justify-between mb-4">
            <h2 class="text-xl font-bold">المنتجات</h2>
            <button onclick="add()" class="bg-blue-600 text-white px-4 py-2 rounded">
                إضافة
            </button>
        </div>

        ${data.length === 0 ? `
            <p class="text-center text-gray-500">لا يوجد منتجات</p>
        ` : `
        
        <div class="grid grid-cols-2 gap-4">
        
        ${data.map(p => `
        
        <div class="border p-4 rounded-lg bg-gray-50">
            
            <!-- ✅ مسار الصورة الصحيح -->
            <img 
                src="${p.imageUrl || '../../admin/images/default-product.png'}"
                class="w-full h-32 object-cover mb-2 rounded"
            >

            <h3 class="font-bold">${p.name || '-'}</h3>
            <p class="text-sm text-gray-600">${p.price || 0} ريال</p>

            <button onclick="del('${p.id}')" 
                class="mt-2 bg-red-600 text-white px-3 py-1 rounded">
                حذف
            </button>

        </div>
        
        `).join('')}
        
        </div>
        `}
    </div>
    `;
}

window.add = async () => {
    const name = prompt('اسم المنتج');
    if (!name) return;

    await addProduct({
        name,
        price: 0,
        imageUrl: ''
    });

    init();
};

window.del = async (id) => {
    if (!confirm('حذف المنتج؟')) return;
    await deleteProduct(id);
    init();
};

init();

</script>

</body>
</html>
