<div style="padding: 25px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2><i class="fas fa-box" style="color: #e67e22;"></i> إدارة المنتجات</h2>
        <button id="add-product-btn" style="background: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">
            <i class="fas fa-plus"></i> منتج جديد
        </button>
    </div>
    <div style="margin-bottom: 20px;">
        <input type="text" id="search-products" placeholder="بحث عن منتج..." style="width: 100%; max-width: 300px; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
    </div>
    <div id="products-grid-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
        <div style="grid-column: 1/-1; text-align: center; padding: 40px;">جاري التحميل...</div>
    </div>
</div>
