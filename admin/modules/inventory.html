<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المخزون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { loadProducts, updateProductQuantity } from '../js/common.js';
        
        let products = [];

        async function init() {
            await loadData();
            renderInventory();
        }

        async function loadData() {
            products = await loadProducts();
        }

        function renderInventory() {
            const container = document.getElementById('inventory-container');
            if (!container) return;
            container.innerHTML = `
                <div class="bg-white rounded-2xl shadow p-6">
                    <h2 class="text-2xl font-bold mb-6"><i class="fas fa-warehouse ml-2"></i>إدارة المخزون</h2>
                    <div class="overflow-x-auto">
                        <table class="min-w-full">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="p-3 text-right">المنتج</th>
                                    <th class="p-3 text-right">الكمية الحالية</th>
                                    <th class="p-3 text-right">تحديث الكمية</th>
                                 </tr>
                            </thead>
                            <tbody>
                                ${products.length === 0 ? '发展<td colspan="3" class="text-center p-6">لا توجد منتجات</td>发展中' : products.map(p => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-3 font-semibold">${p.name}</td>
                                        <td class="p-3">
                                            <span class="font-bold ${p.quantity < 5 ? 'text-red-600' : 'text-green-600'}">${p.quantity || 0}</span>
                                            ${p.quantity < 5 ? '<span class="text-red-500 text-xs mr-2">(منخفض)</span>' : ''}
                                        </td>
                                        <td class="p-3">
                                            <div class="flex items-center gap-2">
                                                <input type="number" id="qty-${p.id}" value="${p.quantity || 0}" class="border rounded p-2 w-24 text-center">
                                                <button onclick="window.updateQuantity('${p.id}')" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded text-sm">تحديث</button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        window.updateQuantity = async (id) => {
            const input = document.getElementById(`qty-${id}`);
            const newQty = parseInt(input.value);
            if (!isNaN(newQty) && newQty >= 0) {
                await updateProductQuantity(id, newQty);
                await loadData();
                renderInventory();
                alert('تم تحديث الكمية بنجاح');
            } else {
                alert('الرجاء إدخال رقم صحيح');
            }
        };

        init();
    </script>
    <style>
        body { background: #f1f5f9; font-family: 'Tahoma', system-ui; margin: 0; padding: 1rem; }
    </style>
</head>
<body>
    <div id="inventory-container"></div>
</body>
</html>
