<script type="module">
import { loadProducts, updateProductQuantity } from '../../js/common.js';

let products = [];

async function init() {
    products = await loadProducts();
    render();
}

function render() {
    const el = document.getElementById('inventory-container');

    el.innerHTML = `
        <table class="min-w-full">
            <thead>
                <tr>
                    <th>المنتج</th>
                    <th>الكمية</th>
                    <th>تعديل</th>
                </tr>
            </thead>
            <tbody>
                ${products.map(p => `
                    <tr>
                        <td>${p.name}</td>
                        <td>${p.quantity || 0}</td>
                        <td>
                            <input id="q-${p.id}" type="number" value="${p.quantity || 0}">
                            <button onclick="updateQty('${p.id}')">حفظ</button>
                        </td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

window.updateQty = async (id) => {
    const val = document.getElementById(`q-${id}`).value;
    await updateProductQuantity(id, parseInt(val));
    await init();
};

init();
</script>
