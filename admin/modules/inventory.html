<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المخزون - منصة في خدمتك</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .low-stock {
            background-color: #fef3c7;
            border-right: 4px solid #f59e0b;
        }
        .out-stock {
            background-color: #fee2e2;
            border-right: 4px solid #ef4444;
        }
        .product-image-preview {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
        }
        .modal { transition: opacity 0.3s ease; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast-error { background: #ef4444; }
        .toast-warning { background: #f59e0b; }
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-gray-50 p-6">

<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">📦 إدارة المخزون</h1>
            <p class="text-gray-500 text-sm">إدارة المنتجات والمخزون والصور</p>
        </div>
        <button id="addProductBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow transition">
            <i class="fas fa-plus ml-1"></i> إضافة منتج جديد
        </button>
    </div>

    <!-- إحصائيات المخزون -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-gray-500 text-sm"><i class="fas fa-boxes text-blue-500 ml-1"></i> إجمالي المنتجات</p>
            <p id="totalProducts" class="text-2xl font-bold text-gray-800">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-gray-500 text-sm"><i class="fas fa-image text-purple-500 ml-1"></i> منتجات بها صور</p>
            <p id="productsWithImages" class="text-2xl font-bold text-purple-600">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-gray-500 text-sm"><i class="fas fa-exclamation-triangle text-orange-500 ml-1"></i> منتجات منخفضة</p>
            <p id="lowStockCount" class="text-2xl font-bold text-orange-600">0</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-gray-500 text-sm"><i class="fas fa-times-circle text-red-500 ml-1"></i> منتجات نفدت</p>
            <p id="outStockCount" class="text-2xl font-bold text-red-600">0</p>
        </div>
    </div>

    <!-- قائمة المنتجات -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-100 border-b">
                    <tr class="text-right">
                        <th class="p-3">الصورة</th>
                        <th class="p-3">المنتج / الكود</th>
                        <th class="p-3">السعر</th>
                        <th class="p-3">الكمية</th>
                        <th class="p-3">الحالة</th>
                        <th class="p-3">الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr><td colspan="6" class="text-center p-8 text-gray-500"><div class="loading-spinner mx-auto"></div> جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- مودال إضافة/تعديل منتج -->
<div id="productModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50 overflow-y-auto">
    <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div class="sticky top-0 bg-white border-b p-4 flex justify-between items-center">
            <h2 id="modalTitle" class="text-xl font-bold">إضافة منتج جديد</h2>
            <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
        </div>
        <form id="productForm" class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">اسم المنتج *</label>
                    <input type="text" id="productName" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">كود المنتج</label>
                    <div class="flex gap-2">
                        <input type="text" id="productCode" class="flex-1 border rounded-lg px-3 py-2 bg-gray-50 font-mono text-sm" readonly>
                        <button type="button" id="generateCodeBtn" class="bg-gray-200 hover:bg-gray-300 px-3 rounded"><i class="fas fa-sync-alt"></i></button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">السعر *</label>
                    <input type="number" id="productPrice" required step="0.01" min="0" class="w-full border rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">الكمية *</label>
                    <input type="number" id="productStock" required min="0" class="w-full border rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">الحد الأدنى للتنبيه</label>
                    <input type="number" id="minStock" value="5" class="w-full border rounded-lg px-3 py-2">
                </div>
                
                <!-- الصورة الرئيسية -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">الصورة الرئيسية</label>
                    <div class="flex gap-2 flex-wrap">
                        <input type="url" id="productMainImage" placeholder="https://example.com/image.jpg" class="flex-1 border rounded-lg px-3 py-2">
                        <input type="file" id="productMainImageFile" accept="image/*" class="border rounded-lg px-3 py-2">
                    </div>
                    <div id="mainImagePreview" class="mt-2 hidden">
                        <img id="mainPreviewImg" class="product-image-preview">
                        <button type="button" id="removeMainImageBtn" class="text-red-500 text-sm mt-1">إزالة الصورة</button>
                    </div>
                </div>

                <!-- الوصف -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">الوصف</label>
                    <textarea id="productDescription" rows="3" class="w-full border rounded-lg px-3 py-2"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-6 pt-4 border-t">
                <button type="button" id="cancelModalBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100">إلغاء</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"><i class="fas fa-save ml-1"></i> حفظ المنتج</button>
            </div>
        </form>
    </div>
</div>

<!-- مودال حذف المنتج -->
<div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
        <div class="text-center">
            <i class="fas fa-exclamation-triangle text-red-500 text-5xl mb-4"></i>
            <h3 class="text-xl font-bold mb-2">تأكيد الحذف</h3>
            <p id="deleteMessage" class="text-gray-600 mb-6">هل أنت متأكد من حذف هذا المنتج؟</p>
            <div class="flex justify-center gap-3">
                <button id="cancelDeleteBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100">إلغاء</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">حذف</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="hidden fixed bottom-4 left-4 px-6 py-3 rounded-lg shadow-lg z-50"></div>

<script type="module">
    // ===================== استيراد Firebase =====================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
        getFirestore,
        collection,
        addDoc,
        doc,
        getDocs,
        updateDoc,
        deleteDoc,
        query,
        orderBy
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBWYW6Qqlhh904pBeuJ29wY7Cyjm2uklBA",
        authDomain: "msjt301-974bb.firebaseapp.com",
        projectId: "msjt301-974bb",
        storageBucket: "msjt301-974bb.firebasestorage.app",
        messagingSenderId: "186209858482",
        appId: "1:186209858482:web:186ca610780799ef562aab"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ===================== دوال Firebase =====================
    async function loadProducts() {
        try {
            const productsRef = collection(db, 'products');
            const q = query(productsRef, orderBy('createdAt', 'desc'));
            const querySnapshot = await getDocs(q);
            return querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } catch (error) {
            console.error('Error loading products:', error);
            return [];
        }
    }

    async function addProduct(data) {
        return await addDoc(collection(db, 'products'), data);
    }

    async function updateProduct(id, data) {
        return await updateDoc(doc(db, 'products', id), data);
    }

    async function deleteProduct(id) {
        return await deleteDoc(doc(db, 'products', id));
    }

    // ===================== المتغيرات العامة =====================
    let products = [];
    let currentEditId = null;
    let deleteId = null;
    let deleteName = '';

    // عناصر DOM
    const productsTableBody = document.getElementById('productsTableBody');
    const totalProductsSpan = document.getElementById('totalProducts');
    const productsWithImagesSpan = document.getElementById('productsWithImages');
    const lowStockCountSpan = document.getElementById('lowStockCount');
    const outStockCountSpan = document.getElementById('outStockCount');
    const toast = document.getElementById('toast');

    // ===================== دوال مساعدة =====================
    function showToast(message, type = 'success') {
        toast.textContent = message;
        toast.className = `fixed bottom-4 left-4 px-6 py-3 rounded-lg shadow-lg z-50`;
        if (type === 'error') {
            toast.style.backgroundColor = '#ef4444';
        } else if (type === 'warning') {
            toast.style.backgroundColor = '#f59e0b';
        } else {
            toast.style.backgroundColor = '#10b981';
        }
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function generateRandomCode() {
        return 'PROD-' + Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ===================== إدارة الصور =====================
    const productMainImage = document.getElementById('productMainImage');
    const productMainImageFile = document.getElementById('productMainImageFile');
    const mainImagePreview = document.getElementById('mainImagePreview');
    const mainPreviewImg = document.getElementById('mainPreviewImg');
    const removeMainImageBtn = document.getElementById('removeMainImageBtn');

    productMainImageFile.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                mainPreviewImg.src = ev.target.result;
                mainImagePreview.classList.remove('hidden');
                productMainImage.value = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    productMainImage.addEventListener('input', () => {
        if (productMainImage.value) {
            mainPreviewImg.src = productMainImage.value;
            mainImagePreview.classList.remove('hidden');
        } else {
            mainImagePreview.classList.add('hidden');
        }
    });

    if (removeMainImageBtn) {
        removeMainImageBtn.addEventListener('click', () => {
            productMainImage.value = '';
            productMainImageFile.value = '';
            mainImagePreview.classList.add('hidden');
        });
    }

    // ===================== إحصائيات المخزون =====================
    function updateStats() {
        totalProductsSpan.textContent = products.length;
        
        const productsWithImages = products.filter(p => p.mainImage && p.mainImage.trim() !== '').length;
        productsWithImagesSpan.textContent = productsWithImages;
        
        // المنتجات المنخفضة (أقل من الحد الأدنى وأكبر من 0)
        const lowStock = products.filter(p => {
            const stock = p.stock || 0;
            const minStock = p.minStock || 5;
            return stock > 0 && stock <= minStock;
        }).length;
        lowStockCountSpan.textContent = lowStock;
        
        // المنتجات التي نفدت (الكمية = 0)
        const outStock = products.filter(p => (p.stock || 0) === 0).length;
        outStockCountSpan.textContent = outStock;
    }

    // ===================== حالة المنتج =====================
    function getStockStatus(product) {
        const stock = product.stock || 0;
        const minStock = product.minStock || 5;
        if (stock === 0) {
            return '<span class="text-red-600 font-semibold"><i class="fas fa-times-circle ml-1"></i> نفد من المخزون</span>';
        } else if (stock <= minStock) {
            return '<span class="text-orange-600 font-semibold"><i class="fas fa-exclamation-triangle ml-1"></i> منخفض</span>';
        }
        return '<span class="text-green-600 font-semibold"><i class="fas fa-check-circle ml-1"></i> متوفر</span>';
    }

    function getRowClass(product) {
        const stock = product.stock || 0;
        const minStock = product.minStock || 5;
        if (stock === 0) return 'out-stock';
        if (stock <= minStock) return 'low-stock';
        return '';
    }

    // ===================== عرض المنتجات =====================
    function render() {
        if (products.length === 0) {
            productsTableBody.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-gray-500"><i class="fas fa-box-open text-4xl mb-2 block"></i>لا يوجد منتجات</td></tr>';
            return;
        }

        productsTableBody.innerHTML = products.map(p => {
            const stock = p.stock || 0;
            return `
            <tr class="border-b hover:bg-gray-50 transition ${getRowClass(p)}">
                <td class="p-3">
                    ${p.mainImage ? `<img src="${escapeHtml(p.mainImage)}" class="product-image-preview" onerror="this.style.display='none'">` : '<div class="w-12 h-12 bg-gray-100 rounded-lg flex items-center justify-center"><i class="fas fa-image text-gray-400 text-xl"></i></div>'}
                  </td>
                <td class="p-3">
                    <div class="font-semibold text-gray-800">${escapeHtml(p.name)}</div>
                    <div class="text-xs text-gray-500 font-mono">${escapeHtml(p.code || '—')}</div>
                    ${p.description ? `<div class="text-xs text-gray-400 mt-1">${escapeHtml(p.description.substring(0, 50))}${p.description && p.description.length > 50 ? '...' : ''}</div>` : ''}
                </td>
                <td class="p-3 font-bold text-blue-600">${p.price} <span class="text-xs">ر.س</span></td>
                <td class="p-3">
                    <div class="flex items-center gap-2">
                        <span class="font-semibold text-lg">${stock}</span>
                        <button onclick="window.quickUpdateStock('${p.id}', 'decrease')" class="bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200 transition" ${stock === 0 ? 'disabled' : ''}>
                            <i class="fas fa-minus"></i>
                        </button>
                        <button onclick="window.quickUpdateStock('${p.id}', 'increase')" class="bg-green-100 text-green-600 px-2 py-1 rounded hover:bg-green-200 transition">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </td>
                <td class="p-3">${getStockStatus(p)}</td>
                <td class="p-3 whitespace-nowrap">
                    <button onclick="window.editProduct('${p.id}')" class="text-blue-600 hover:text-blue-800 p-2 rounded-lg hover:bg-blue-50 transition" title="تعديل">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="window.deleteProductHandler('${p.id}', '${escapeHtml(p.name)}')" class="text-red-600 hover:text-red-800 p-2 rounded-lg hover:bg-red-50 transition" title="حذف">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                  </td>
            </tr>
        `}).join('');
    }

    // ===================== تحديث سريع للمخزون =====================
    window.quickUpdateStock = async (id, action) => {
        const product = products.find(p => p.id === id);
        if (!product) return;
        
        let newStock = product.stock || 0;
        if (action === 'increase') {
            newStock++;
        } else if (action === 'decrease') {
            if (newStock === 0) return;
            newStock--;
        } else {
            return;
        }
        
        try {
            await updateProduct(id, { 
                stock: newStock, 
                updatedAt: new Date().toISOString() 
            });
            await loadAndRender();
            showToast(`✅ تم تحديث الكمية إلى ${newStock}`);
        } catch (err) {
            console.error(err);
            showToast('❌ حدث خطأ في تحديث الكمية', 'error');
        }
    };

    // ===================== تحميل وعرض البيانات =====================
    async function loadAndRender() {
        try {
            products = await loadProducts();
            console.log('✅ تم تحميل المنتجات:', products.length);
            updateStats();
            render();
        } catch (err) {
            console.error('❌ خطأ في تحميل المنتجات:', err);
            productsTableBody.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-red-500">❌ حدث خطأ في تحميل المنتجات</td></tr>';
            showToast('حدث خطأ في تحميل المنتجات', 'error');
        }
    }

    // ===================== فتح وإغلاق المودال =====================
    function openModal(editId = null) {
        currentEditId = editId;
        const modal = document.getElementById('productModal');
        
        if (editId) {
            const product = products.find(p => p.id === editId);
            if (product) {
                document.getElementById('modalTitle').innerText = '✏️ تعديل المنتج';
                document.getElementById('productName').value = product.name || '';
                document.getElementById('productCode').value = product.code || generateRandomCode();
                document.getElementById('productPrice').value = product.price || '';
                document.getElementById('productStock').value = product.stock || 0;
                document.getElementById('minStock').value = product.minStock || 5;
                document.getElementById('productDescription').value = product.description || '';
                if (product.mainImage) {
                    productMainImage.value = product.mainImage;
                    mainPreviewImg.src = product.mainImage;
                    mainImagePreview.classList.remove('hidden');
                } else {
                    productMainImage.value = '';
                    mainImagePreview.classList.add('hidden');
                }
            }
        } else {
            document.getElementById('modalTitle').innerText = '➕ إضافة منتج جديد';
            document.getElementById('productForm').reset();
            document.getElementById('productCode').value = generateRandomCode();
            document.getElementById('minStock').value = 5;
            document.getElementById('productStock').value = 0;
            productMainImage.value = '';
            mainImagePreview.classList.add('hidden');
        }
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeModal() {
        const modal = document.getElementById('productModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        currentEditId = null;
    }

    // ===================== حفظ المنتج =====================
    async function saveProduct(event) {
        event.preventDefault();
        
        const name = document.getElementById('productName').value.trim();
        const price = parseFloat(document.getElementById('productPrice').value);
        const stock = parseInt(document.getElementById('productStock').value) || 0;
        const minStock = parseInt(document.getElementById('minStock').value) || 5;
        const description = document.getElementById('productDescription').value.trim();
        const mainImage = document.getElementById('productMainImage').value.trim();
        const code = document.getElementById('productCode').value.trim();
        
        if (!name) {
            showToast('❌ اسم المنتج مطلوب', 'error');
            return;
        }
        if (isNaN(price) || price < 0) {
            showToast('❌ السعر غير صحيح', 'error');
            return;
        }
        
        const data = {
            name,
            price,
            stock: stock,
            minStock: minStock,
            description: description || null,
            mainImage: mainImage || null,
            code: code || generateRandomCode(),
            updatedAt: new Date().toISOString()
        };
        
        try {
            if (currentEditId) {
                await updateProduct(currentEditId, data);
                showToast('✅ تم تعديل المنتج بنجاح');
            } else {
                data.createdAt = new Date().toISOString();
                await addProduct(data);
                showToast('✅ تم إضافة المنتج بنجاح');
            }
            closeModal();
            await loadAndRender();
        } catch (err) {
            console.error(err);
            showToast('❌ حدث خطأ أثناء حفظ المنتج', 'error');
        }
    }

    // ===================== حذف المنتج =====================
    window.deleteProductHandler = (id, name) => {
        deleteId = id;
        deleteName = name;
        document.getElementById('deleteMessage').innerHTML = `هل أنت متأكد من حذف المنتج <strong>"${escapeHtml(name)}"</strong>؟`;
        document.getElementById('deleteModal').classList.remove('hidden');
        document.getElementById('deleteModal').classList.add('flex');
    };

    async function confirmDelete() {
        if (!deleteId) return;
        try {
            await deleteProduct(deleteId);
            showToast(`✅ تم حذف المنتج "${deleteName}"`);
            await loadAndRender();
        } catch (err) {
            console.error(err);
            showToast('❌ حدث خطأ أثناء الحذف', 'error');
        } finally {
            closeDeleteModal();
        }
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.add('hidden');
        document.getElementById('deleteModal').classList.remove('flex');
        deleteId = null;
        deleteName = '';
    }

    window.editProduct = (id) => openModal(id);

    // ===================== ربط الأحداث =====================
    document.getElementById('addProductBtn').onclick = () => openModal();
    document.getElementById('closeModalBtn').onclick = closeModal;
    document.getElementById('cancelModalBtn').onclick = closeModal;
    document.getElementById('productForm').onsubmit = saveProduct;
    document.getElementById('generateCodeBtn').onclick = () => document.getElementById('productCode').value = generateRandomCode();
    
    document.getElementById('cancelDeleteBtn').onclick = closeDeleteModal;
    document.getElementById('confirmDeleteBtn').onclick = confirmDelete;
    
    // إغلاق المودال عند النقر خارج المحتوى
    document.getElementById('deleteModal').onclick = (e) => { 
        if (e.target === document.getElementById('deleteModal')) closeDeleteModal(); 
    };
    document.getElementById('productModal').onclick = (e) => { 
        if (e.target === document.getElementById('productModal')) closeModal(); 
    };

    // ===================== بدء التشغيل =====================
    console.log('🚀 بدء تشغيل صفحة المخزون...');
    await loadAndRender();
    console.log('✅ تم تهيئة صفحة المخزون بنجاح');
</script>
</body>
</html>
