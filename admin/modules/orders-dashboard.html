<section class="p-6 bg-gray-50 rounded-lg shadow-inner">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">نموذج الطلبات</h2>
        <button onclick="initNewOrder()" class="bg-blue-600 text-white px-6 py-2 rounded-lg shadow">إنشاء طلب جديد</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-blue-600 font-bold mb-4 border-b pb-2">بيانات العميل</h3>
                <select id="customerSelect" onchange="autoFillCustomer(this.value)" class="w-full mb-4 p-2 border rounded"></select>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="cName" placeholder="اسم العميل" class="p-2 border rounded">
                    <input type="tel" id="cPhone" placeholder="رقم الهاتف" class="p-2 border rounded">
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-blue-600 font-bold mb-4 border-b pb-2">وصف المنتج/الخدمة</h3>
                <div id="editor" style="height: 200px;"></div>
                <div class="mt-4 flex items-center gap-4">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" id="saveToStock"> إضافة للمخزون الدائم؟
                    </label>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-600">
            <h3 class="font-bold mb-4 text-center">ملخص الفاتورة</h3>
            <div class="space-y-3 text-sm">
                <div class="flex justify-between"><span>المجموع:</span><span id="subtotal">0.00</span></div>
                <div class="flex justify-between"><span>الخصم:</span><input type="number" class="w-20 border text-center" value="0" id="discountInput"></div>
                <div class="flex justify-between text-gray-500"><span>الضريبة (15%):</span><span id="tax">0.00</span></div>
                <hr>
                <div class="flex justify-between font-bold text-lg text-blue-700"><span>الإجمالي:</span><span id="total">0.00</span></div>
            </div>
            <button class="w-full mt-6 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition">حفظ الطلب وطباعة</button>
        </div>
    </div>
</section>
