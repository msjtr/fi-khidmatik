<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة العمليات - تيرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-right">

    <div class="max-w-7xl mx-auto space-y-8">
        <div class="bg-white rounded-3xl shadow-sm p-6 md:p-10 border border-slate-200">
            <h2 class="text-2xl font-black text-slate-800 mb-8 flex items-center gap-3">
                <span class="w-2 h-8 bg-blue-600 rounded-full"></span> إنشاء طلب جديد
            </h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="orderNo" readonly class="p-4 bg-slate-100 rounded-2xl font-mono font-bold text-blue-600">
                        <input type="date" id="orderDate" class="p-4 bg-slate-50 rounded-2xl outline-none">
                    </div>
                    <input id="cName" placeholder="اسم العميل" class="w-full p-4 border border-slate-100 rounded-2xl">
                    <div id="editor" class="h-40 bg-white rounded-2xl"></div>
                </div>
                <div class="bg-blue-600 text-white p-8 rounded-[2rem] flex flex-col justify-between">
                    <div class="space-y-4">
                        <label class="block text-sm opacity-80">المبلغ الإجمالي</label>
                        <input type="number" id="finalTotal" class="w-full p-4 bg-blue-500 rounded-xl text-2xl font-black outline-none border-none placeholder-blue-300" placeholder="0.00">
                    </div>
                    <button onclick="submitFullOrder()" class="mt-8 w-full bg-white text-blue-600 py-4 rounded-xl font-black hover:bg-slate-100 transition shadow-lg">حفظ الطلب</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm p-6 border border-slate-200">
            <h2 class="text-xl font-black mb-6 text-slate-700">سجل العمليات السابقة</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-right border-separate border-spacing-y-2">
                    <thead>
                        <tr class="text-slate-400 text-xs font-bold uppercase">
                            <th class="p-4">رقم الطلب</th>
                            <th class="p-4">العميل</th>
                            <th class="p-4">المنتجات</th>
                            <th class="p-4">التاريخ</th>
                            <th class="p-4">الإجمالي</th>
                            <th class="p-4">الحالة</th>
                            <th class="p-4"></th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module" src="../../js/orders-app.js"></script>
</body>
</html>
