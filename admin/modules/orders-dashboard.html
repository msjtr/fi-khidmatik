<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام تيرة المتكامل - الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/orders-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* أنيميشن الظهور التدريجي */
        .hidden-form { display: none; opacity: 0; transform: translateY(-20px); transition: all 0.4s ease; }
        .show-form { display: block; opacity: 1; transform: translateY(0); }
        .floating-add-btn {
            position: fixed; bottom: 30px; left: 30px;
            width: 70px; height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white; font-size: 24px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            cursor: pointer; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .floating-add-btn:hover { transform: scale(1.1) rotate(90deg); }
    </style>
</head>
<body class="bg-[#f8fafc] p-4 md:p-8 text-right font-sans">

    <div id="openFormBtn" class="floating-add-btn" onclick="toggleOrderForm()">
        <i class="fas fa-plus"></i>
    </div>

    <div class="max-w-7xl mx-auto space-y-8">
        
        <div id="orderFormContainer" class="hidden-form bg-white rounded-[2.5rem] shadow-xl p-8 md:p-12 border border-gray-100 mb-12">
            <div class="flex justify-between items-center mb-10">
                <div class="flex items-center gap-4">
                    <button onclick="toggleOrderForm()" class="text-slate-400 hover:text-red-500 transition text-2xl">
                        <i class="fas fa-times-circle"></i>
                    </button>
                    <h2 class="text-3xl font-black text-slate-800 border-r-8 border-blue-600 pr-4">إنشاء طلب جديد</h2>
                </div>
                <div class="flex gap-2">
                    <input id="orderNo" readonly class="bg-blue-50 p-4 rounded-2xl font-bold text-blue-700 w-48 text-center outline-none">
                    <input type="date" id="orderDate" class="bg-slate-50 p-4 rounded-2xl outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div class="lg:col-span-2 space-y-10">
                    <div class="space-y-6">
                        <div class="flex items-center justify-between">
                            <h3 class="font-bold text-lg text-slate-700">بيانات العميل</h3>
                            <label class="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-full"><input type="checkbox" id="newCustomerCheck"> حفظ كعميل جديد؟</label>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input id="cName" placeholder="اسم العميل الكامل" class="p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-100">
                            <input id="cPhone" placeholder="رقم الجوال" class="p-4 bg-slate-50 rounded-2xl outline-none">
                            <input id="cStreet" placeholder="الحي والشارع" class="p-4 bg-slate-50 rounded-2xl outline-none col-span-2">
                        </div>
                    </div>

                    <div class="space-y-6 bg-slate-50/50 p-8 rounded-[2rem]">
                        <div class="flex items-center justify-between">
                            <h3 class="font-bold text-lg text-slate-700">تفاصيل المنتج</h3>
                            <label class="text-xs bg-green-50 text-green-600 px-3 py-1 rounded-full"><input type="checkbox" id="newProductCheck"> إضافة للمخزون؟</label>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <input id="pName" placeholder="اسم المنتج" class="col-span-2 p-4 rounded-2xl outline-none">
                            <input id="pPrice" type="number" placeholder="سعر البيع" class="p-4 rounded-2xl outline-none">
                            <input id="pQty" type="number" value="1" class="p-4 rounded-2xl outline-none">
                        </div>
                        <div id="editor" class="bg-white rounded-xl overflow-hidden"></div>
                        <div id="currentCartItems" class="mt-4"></div> <button onclick="addToCart()" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-black text-lg hover:bg-slate-900 transition shadow-lg">
                            <i class="fas fa-cart-plus ml-2"></i> إضافة للقائمة
                        </button>
                    </div>
                </div>

                <div class="bg-blue-600 text-white p-10 rounded-[3rem] shadow-2xl flex flex-col justify-between">
                    <div class="space-y-6">
                        <h3 class="text-xl font-bold border-b border-blue-400 pb-4">ملخص الفاتورة</h3>
                        <div class="space-y-4">
                            <div class="flex justify-between opacity-80"><span>المجموع:</span><span id="subtotalLabel">0.00</span></div>
                            <div class="flex justify-between opacity-80"><span>الضريبة (15%):</span><span id="taxLabel">0.00</span></div>
                            <div class="flex justify-between text-3xl font-black pt-6 border-t border-blue-500"><span>الإجمالي:</span><span id="totalLabel">0.00</span></div>
                        </div>
                        <div class="pt-6">
                            <label class="text-xs block mb-2 opacity-70">طريقة الدفع</label>
                            <select id="payMethod" class="w-full p-4 bg-blue-700 rounded-2xl border-none font-bold outline-none cursor-pointer">
                                <option>تمارا</option><option>تابي</option><option>نقدي</option><option>ماستركارد</option>
                            </select>
                        </div>
                    </div>
                    <button id="mainSubmitBtn" onclick="submitOrder(event)" class="mt-10 w-full bg-white text-blue-600 py-6 rounded-3xl font-black text-2xl hover:scale-95 transition shadow-xl">
                        اعتماد وحفظ
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm p-8 border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-700 flex items-center gap-3">
                    <span class="w-2 h-8 bg-blue-600 rounded-full"></span> سجل العمليات السابقة
                </h2>
                <div class="relative">
                    <i class="fas fa-search absolute right-4 top-4 text-slate-400"></i>
                    <input type="text" placeholder="بحث برقم الطلب أو العميل..." class="pr-12 pl-4 py-3 bg-slate-50 rounded-xl outline-none focus:ring-2 ring-blue-100 text-sm w-64">
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-right border-separate border-spacing-y-2">
                    <thead>
                        <tr class="text-slate-400 text-xs font-bold uppercase">
                            <th class="p-4">رقم الطلب</th>
                            <th class="p-4">العميل</th>
                            <th class="p-4">التاريخ</th>
                            <th class="p-4">الإجمالي</th>
                            <th class="p-4 text-center">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function toggleOrderForm() {
            const container = document.getElementById('orderFormContainer');
            const floatingBtn = document.getElementById('openFormBtn');
            
            if (container.classList.contains('show-form')) {
                container.classList.remove('show-form');
                setTimeout(() => container.style.display = 'none', 400);
                floatingBtn.style.display = 'flex';
            } else {
                container.style.display = 'block';
                setTimeout(() => container.classList.add('show-form'), 10);
                floatingBtn.style.display = 'none';
                
                // إعادة توليد رقم الطلب عند فتح النموذج
                if (window.refreshOrderID) window.refreshOrderID(); 
            }
        }
    </script>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module" src="../../js/orders-app.js"></script>
</body>
</html>
