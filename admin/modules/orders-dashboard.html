<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات - منصة تيرا</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="/fi-khidmatik/css/orders-style.css">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div id="toast" class="fixed bottom-6 left-6 z-50 hidden shadow-2xl transition-all duration-300 transform rounded-xl px-6 py-3 text-white font-bold"></div>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-4 rounded-2xl shadow-blue-200 shadow-xl">
                    <i class="fas fa-file-invoice text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight">إدارة الطلبات</h1>
                    <p class="text-gray-500 font-medium">متابعة عمليات منصة تيرا</p>
                </div>
            </div>
            <button id="newOrderBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl shadow-lg transition-all flex items-center gap-2 transform hover:scale-105 active:scale-95">
                <i class="fas fa-plus-circle"></i> <span>إنشاء طلب جديد</span>
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm transition-hover hover:shadow-md">
                <p class="text-gray-400 text-sm mb-1 font-bold">إجمالي الطلبات</p>
                <h3 class="text-3xl font-black text-blue-600" id="todayOrdersCount">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm transition-hover hover:shadow-md">
                <p class="text-gray-400 text-sm mb-1 font-bold">بانتظار المراجعة</p>
                <h3 class="text-3xl font-black text-yellow-500" id="pendingOrdersCount">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm transition-hover hover:shadow-md">
                <p class="text-gray-400 text-sm mb-1 font-bold">المبيعات المكتملة</p>
                <h3 class="text-3xl font-black text-green-500" id="completedOrdersCount">0</h3>
            </div>
        </div>

        <div id="ordersContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full flex flex-col items-center justify-center py-20 opacity-50">
                <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-blue-600 mb-4"></div>
                <p class="font-bold text-gray-600">جاري الاتصال بقاعدة بيانات تيرا...</p>
            </div>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 p-4 backdrop-blur-md transition-opacity">
        <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col text-right transform transition-all">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-xl font-bold text-gray-800">تفاصيل الطلب الجديد</h2>
                <button id="closeModalBtn" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <form id="orderForm" class="space-y-6">
                    <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
                        <p class="text-blue-700 font-bold mb-4 flex items-center gap-2">
                            <i class="fas fa-user-circle"></i> بيانات العميل
                        </p>
                        <input type="text" id="custName" placeholder="اسم العميل الكامل" class="w-full p-4 rounded-xl border-none shadow-sm mb-4 focus:ring-2 focus:ring-blue-500 outline-none" required>
                        <input type="tel" id="custPhone" placeholder="رقم الجوال (05xxxxxxxx)" class="w-full p-4 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                    <div class="bg-gray-50 p-5 rounded-2xl border border-gray-200">
                        <p class="text-gray-700 font-bold mb-4 flex items-center gap-2">
                            <i class="fas fa-layer-group"></i> تفاصيل الباقة (سوا)
                        </p>
                        <select id="packageSelect" class="w-full p-4 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer" required>
                            <option value="">-- اختر قيمة الشحن --</option>
                            <option value="100">باقة 100 ريال</option>
                            <option value="200">باقة 200 ريال</option>
                            <option value="300">باقة 300 ريال</option>
                            <option value="500">باقة 500 ريال</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="p-6 border-t bg-gray-50 flex justify-end gap-4">
                <button id="cancelModalBtn" class="px-8 py-3 rounded-xl text-gray-600 font-bold hover:bg-gray-200 transition-all">إلغاء</button>
                <button type="submit" form="orderForm" class="px-12 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 shadow-lg transition-all">حفظ الطلب</button>
            </div>
        </div>
    </div>

    <script type="module" src="/fi-khidmatik/js/orders-app.js"></script>
</body>
</html>
