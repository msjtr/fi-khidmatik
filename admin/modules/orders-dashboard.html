<div style="padding: 25px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2><i class="fas fa-chart-line" style="color: #e67e22;"></i> لوحة الطلبات</h2>
        <button id="quick-create-order" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">
            <i class="fas fa-plus"></i> طلب جديد
        </button>
    </div>
    <div id="orders-stats-container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;">
        <div style="background: white; padding: 15px; border-radius: 12px; text-align: center;">
            <div id="total-orders">0</div>
            <div>إجمالي الطلبات</div>
        </div>
        <div style="background: white; padding: 15px; border-radius: 12px; text-align: center;">
            <div id="total-amount">0</div>
            <div>إجمالي المبيعات</div>
        </div>
        <div style="background: white; padding: 15px; border-radius: 12px; text-align: center;">
            <div id="pending-orders">0</div>
            <div>طلبات معلقة</div>
        </div>
    </div>
    <div id="orders-list-container" style="display: grid; gap: 15px;">
        <div style="text-align: center; padding: 40px; color: #95a5a6;">جاري تحميل الطلبات...</div>
    </div>
</div>
