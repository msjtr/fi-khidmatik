<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات - نظام متكامل</title>
    
    <link rel="stylesheet" href="../../css/orders-style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50 p-6 font-sans">

    <div id="toast"></div>

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">إدارة الطلبات</h1>
            <button id="newOrderBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl shadow-lg">إضافة طلب</button>
        </div>
        
        <div id="ordersContainer" class="orders-grid"></div>
    </div>

    <script type="module">
        import { loadOrders, db } from '../../js/orders-logic.js';

        async function init() {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '<div class="loading-spinner"></div>';
            
            try {
                const orders = await loadOrders();
                container.innerHTML = orders.length === 0 ? '<p>لا توجد طلبات حالياً</p>' : '';
                
                orders.forEach(order => {
                    const statusClass = order.status === 'جديد' ? 'status-new' : 'status-processing';
                    container.innerHTML += `
                        <div class="order-card p-5 border rounded-2xl bg-white shadow-sm">
                            <div class="flex justify-between mb-2">
                                <span class="font-bold">#${order.orderNumber || '000'}</span>
                                <span class="status-badge ${statusClass}">${order.status || 'معلق'}</span>
                            </div>
                            <p class="text-gray-600">${order.customerName || 'عميل مجهول'}</p>
                            <p class="text-blue-600 font-bold mt-2">${order.totalAmount || 0} ريال</p>
                        </div>`;
                });
            } catch (e) {
                container.innerHTML = '<p class="text-red-500">حدث خطأ في تحميل البيانات</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
