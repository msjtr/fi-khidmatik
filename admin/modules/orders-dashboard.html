<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات - نظام تيرا</title>
    
    <link rel="stylesheet" href="../../css/orders-style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
        }

        .order-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .order-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .status-executed { background-color: #d1fae5; color: #065f46; } /* تم التنفيذ */
        .status-pending { background-color: #fef3c7; color: #92400e; }  /* معلق/جديد */
        
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-black text-gray-900 border-r-4 border-blue-600 pr-4">لوحة التحكم بالطلبات</h1>
                <p class="text-gray-500 mt-1 pr-4">متابعة العملاء، المنتجات، وحالات الدفع</p>
            </div>
            <div class="flex gap-3">
                <button onclick="location.reload()" class="p-2 px-4 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 transition shadow-sm">
                    <i class="fas fa-sync-alt text-gray-600"></i>
                </button>
                <button id="newOrderBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl shadow-lg shadow-blue-200 transition-all font-bold">
                    إضافة طلب جديد
                </button>
            </div>
        </div>

        <div id="ordersContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script type="module">
        import { loadOrders } from '../../js/orders-logic.js';

        async function init() {
            const container = document.getElementById('ordersContainer');
            
            // إظهار هيكل التحميل (Skeleton Screen)
            container.innerHTML = Array(6).fill(0).map(() => `
                <div class="h-64 rounded-2xl loading-shimmer border border-gray-100"></div>
            `).join('');
            
            try {
                const orders = await loadOrders();
                
                if (!orders || orders.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-20 bg-white rounded-3xl border border-dashed border-gray-300">
                            <i class="fas fa-box-open text-5xl text-gray-200 mb-4"></i>
                            <p class="text-gray-400 text-lg font-medium">لا توجد طلبات مسجلة حالياً</p>
                        </div>`;
                    return;
                }

                container.innerHTML = ''; // مسح الهياكل الوهمية

                orders.forEach(order => {
                    const statusClass = order.status === 'تم التنفيذ' ? 'status-executed' : 'status-pending';
                    
                    // بناء قائمة المنتجات بأسماء وباركودات
                    const itemsHtml = (order.items || []).map(item => `
                        <div class="flex justify-between items-center text-xs border-b border-blue-50 py-2 last:border-0">
                            <div class="flex flex-col">
                                <span class="text-blue-900 font-bold">${item.name}</span>
                                <span class="text-[10px] text-gray-400 font-mono">${item.barcode || ''}</span>
                            </div>
                            <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-lg font-bold">x${item.quantity}</span>
                        </div>
                    `).join('');

                    container.innerHTML += `
                        <div class="order-card p-6 border border-gray-100 rounded-3xl bg-white shadow-sm relative overflow-hidden">
                            <div class="flex justify-between items-center mb-6">
                                <span class="text-[10px] font-mono text-gray-300 tracking-tighter">#${order.orderNumber}</span>
                                <span class="px-4 py-1.5 rounded-full text-xs font-bold ${statusClass}">
                                    ${order.status}
                                </span>
                            </div>

                            <div class="flex items-start gap-3 mb-6">
                                <div class="bg-blue-50 p-3 rounded-2xl text-blue-500">
                                    <i class="fas fa-user-tie text-xl"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-gray-900 leading-tight">${order.customerFullName}</h3>
                                    <p class="text-xs text-gray-500 mt-1">
                                        <i class="fas fa-phone-alt ml-1 scale-75"></i> ${order.customerPhone}
                                    </p>
                                    <p class="text-[10px] text-gray-400 mt-0.5">
                                        <i class="fas fa-map-marker-alt ml-1 scale-75"></i> ${order.customerAddress}
                                    </p>
                                </div>
                            </div>

                            <div class="bg-slate-50 p-4 rounded-2xl mb-6">
                                <p class="text-[9px] font-black text-slate-400 mb-3 uppercase tracking-widest">محتويات السلة</p>
                                <div class="space-y-1">
                                    ${itemsHtml}
                                </div>
                            </div>

                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-[10px] text-gray-400 mb-1">طريقة الدفع: <span class="text-gray-700 font-bold">${order.paymentMethodName}</span></p>
                                    <div class="flex items-baseline gap-1">
                                        <span class="text-2xl font-black text-blue-600">${order.total}</span>
                                        <span class="text-xs font-bold text-blue-400">ريال</span>
                                    </div>
                                </div>
                                <button onclick="console.log('${order.id}')" class="bg-gray-900 text-white p-3 rounded-xl hover:bg-blue-600 transition-colors shadow-lg shadow-gray-100">
                                    <i class="fas fa-chevron-left text-sm"></i>
                                </button>
                            </div>

                            ${order.approvalCode ? `
                            <div class="mt-4 pt-3 border-t border-gray-50 flex items-center justify-between">
                                <span class="text-[9px] text-gray-300 font-mono">ID: ${order.approvalCode.substring(0, 18)}...</span>
                                <i class="fas fa-shield-alt text-gray-200 text-xs"></i>
                            </div>` : ''}
                        </div>`;
                });

            } catch (error) {
                console.error("Critical Error:", error);
                container.innerHTML = `
                    <div class="col-span-full bg-red-50 text-red-600 p-6 rounded-2xl border border-red-100 text-center">
                        <i class="fas fa-exclamation-triangle text-2xl mb-2"></i>
                        <p class="font-bold">فشل الاتصال بقاعدة البيانات</p>
                        <p class="text-sm">تأكد من إعدادات Firebase في ملف firebase.js</p>
                    </div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
