<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء طلب جديد - تيرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto bg-white rounded-[2.5rem] shadow-2xl p-8 border border-gray-100">
    <div class="flex justify-between items-center mb-10 border-b pb-6">
        <div>
            <h1 class="text-3xl font-black text-blue-900">إنشاء طلب جديد</h1>
            <p class="text-slate-400">نظام إدارة فواتير تيرة المتكامل</p>
        </div>
        <div class="text-left">
            <div id="displayOrderID" class="text-xl font-bold text-blue-600">KF-2026-XXXX</div>
            <div id="displayDate" class="text-sm text-slate-400">14-04-2026</div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
        <div class="lg:col-span-2 space-y-8">
            
            <section class="bg-slate-50 p-6 rounded-3xl space-y-4">
                <h3 class="font-bold text-slate-700 flex items-center gap-2">
                    <i class="fas fa-user-circle text-blue-600"></i> بيانات العميل
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="cName" placeholder="الاسم الكامل" class="p-4 rounded-xl border-none outline-none focus:ring-2 ring-blue-100">
                    <input id="cPhone" placeholder="رقم الجوال" class="p-4 rounded-xl border-none outline-none">
                    <input id="cCity" placeholder="المدينة" class="p-4 rounded-xl border-none outline-none">
                    <input id="cStreet" placeholder="الشارع ورقم المبنى" class="p-4 rounded-xl border-none outline-none">
                </div>
            </section>

            <section class="bg-white border p-6 rounded-3xl space-y-4 shadow-sm">
                <h3 class="font-bold text-slate-700 flex items-center gap-2">
                    <i class="fas fa-box text-blue-600"></i> إضافة منتجات
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <input id="pName" placeholder="اسم المنتج" class="md:col-span-2 p-4 bg-slate-50 rounded-xl outline-none">
                    <input id="pPrice" type="number" placeholder="السعر" class="p-4 bg-slate-50 rounded-xl outline-none">
                    <button onclick="addItem()" class="bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition">إضافة</button>
                </div>
                <div id="cartItems" class="space-y-2 mt-4">
                    </div>
            </section>

            <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-50 p-6 rounded-3xl space-y-4">
                    <h3 class="font-bold text-slate-700">طريقة الدفع</h3>
                    <select id="payMethod" class="w-full p-4 rounded-xl outline-none bg-white">
                        <option value="tamara">تمارا</option>
                        <option value="tabby">تابي</option>
                        <option value="mada">مدى / فيزا</option>
                        <option value="cash">نقدي</option>
                    </select>
                </div>
                <div class="bg-slate-50 p-6 rounded-3xl space-y-4">
                    <h3 class="font-bold text-slate-700">طريقة الشحن</h3>
                    <select id="shipMethod" class="w-full p-4 rounded-xl outline-none bg-white">
                        <option value="pickup">استلام من المقر</option>
                        <option value="delivery">شحن للموقع</option>
                    </select>
                </div>
            </section>
        </div>

        <div class="bg-blue-900 text-white p-8 rounded-[3rem] shadow-xl h-fit sticky top-8">
            <h3 class="text-xl font-bold border-b border-blue-800 pb-4 mb-6">ملخص الحساب</h3>
            <div class="space-y-4">
                <div class="flex justify-between opacity-70"><span>المجموع الفرعي:</span><span id="resSubtotal">0.00</span></div>
                <div class="flex justify-between opacity-70"><span>الضريبة (15%):</span><span id="resTax">0.00</span></div>
                <div class="flex justify-between text-2xl font-black pt-6 border-t border-blue-800">
                    <span>الإجمالي:</span><span id="resTotal">0.00</span>
                </div>
            </div>
            <button onclick="handleSaveOrder()" class="w-full bg-white text-blue-900 py-6 rounded-3xl font-black text-xl mt-10 hover:scale-95 transition">
                اعتماد وحفظ الطلب
            </button>
        </div>
    </div>
</div>

<script type="module">
    import * as logic from '../js/order-logic.js';

    let cart = [];
    const orderID = logic.generateOrderID();
    
    document.getElementById('displayOrderID').innerText = orderID;
    document.getElementById('displayDate').innerText = new Date().toLocaleDateString('ar-SA');

    window.addItem = () => {
        const name = document.getElementById('pName').value;
        const price = parseFloat(document.getElementById('pPrice').value);
        if(!name || !price) return alert("أكمل بيانات المنتج");

        cart.push({ name, price, qty: 1 });
        renderCart();
        updateTotals();
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
    };

    function renderCart() {
        const container = document.getElementById('cartItems');
        container.innerHTML = cart.map((item, index) => `
            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl">
                <span class="font-bold text-slate-700">${item.name}</span>
                <div class="flex items-center gap-4">
                    <span class="text-blue-600 font-bold">${item.price} ر.س</span>
                    <button onclick="cart.splice(${index},1); renderCart(); updateTotals();" class="text-red-400"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }

    function updateTotals() {
        const results = logic.calculateFinalOrder(cart);
        document.getElementById('resSubtotal').innerText = results.subtotal;
        document.getElementById('resTax').innerText = results.tax;
        document.getElementById('resTotal').innerText = results.total;
    }

    window.handleSaveOrder = async () => {
        if(cart.length === 0) return alert("السلة فارغة");
        
        const orderData = {
            orderNumber: orderID,
            orderDate: new Date().toISOString().split('T')[0],
            customerSnapshot: {
                name: document.getElementById('cName').value,
                phone: document.getElementById('cPhone').value,
                address: {
                    city: document.getElementById('cCity').value,
                    street: document.getElementById('cStreet').value
                }
            },
            items: cart,
            totals: logic.calculateFinalOrder(cart),
            payment: { method: document.getElementById('payMethod').value },
            shipping: { method: document.getElementById('shipMethod').value }
        };

        const id = await logic.saveOrder(orderData);
        window.location.href = `../print.html?id=${id}`;
    };
</script>
</body>
</html>
