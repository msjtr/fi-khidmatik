<div class="module-container" style="font-family: 'Tajawal', sans-serif;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
        <h2 style="margin:0;"><i class="fas fa-truck" style="color:#3498db; margin-left:10px;"></i> لوحة الطلبات والفواتير</h2>
        
        <button id="btn-create-order" class="btn-primary" style="background:#27ae60; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">
            <i class="fas fa-plus-circle"></i> إنشاء طلب جديد
        </button>
    </div>

    <div class="filters" style="display:grid; grid-template-columns: 2fr 1fr auto; gap:10px; margin-bottom: 20px; background:#f8f9fa; padding:15px; border-radius:12px; border: 1px solid #eee;">
        <div style="position:relative;">
            <i class="fas fa-search" style="position:absolute; right:15px; top:12px; color:#bdc3c7;"></i>
            <input type="text" id="search-order" placeholder="بحث برقم الفاتورة، اسم العميل، أو الجوال..." style="width:100%; padding:10px 40px 10px 10px; border:1px solid #ddd; border-radius:8px;">
        </div>
        
        <select id="status-filter" style="padding:10px; border:1px solid #ddd; border-radius:8px; background:white; cursor:pointer;">
            <option value="all">جميع الحالات</option>
            <option value="pending">قيد الانتظار</option>
            <option value="processing">جاري التنفيذ</option>
            <option value="completed">مكتمل ✅</option>
            <option value="cancelled">ملغي ❌</option>
        </select>

        <button id="refresh-orders" class="btn-secondary" title="تحديث البيانات" style="padding:10px 15px; border-radius:8px; background:#34495e; color:white; border:none; cursor:pointer;">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>

    <div id="orders-list" class="orders-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap:20px;">
        <div style="grid-column: 1/-1; text-align:center; padding:40px;">
            <i class="fas fa-spinner fa-spin fa-2x" style="color:#3498db;"></i>
            <p style="margin-top:10px; color:#7f8c8d;">جاري مزامنة طلبات تيرا جيتواي...</p>
        </div>
    </div>
</div>

<style>
    .orders-grid {
        min-height: 200px;
    }
    .btn-primary:hover {
        background: #219150 !important;
        transform: translateY(-2px);
        transition: 0.2s;
    }
    #search-order:focus {
        border-color: #3498db !important;
        outline: none;
        box-shadow: 0 0 5px rgba(52,152,219,0.2);
    }
</style>
