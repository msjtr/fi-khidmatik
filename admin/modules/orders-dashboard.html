<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات - نظام متكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* نفس تنسيقاتك القديمة بالضبط */
        * { transition: all 0.2s ease; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; display: inline-block; }
        .status-new { background: linear-gradient(135deg, #dbeafe, #bfdbfe); color: #1e40af; }
        .status-completed { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #065f46; }
        .order-card { transition: all 0.3s ease; background: white; }
        .order-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .form-section { background: #f9fafb; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #e5e7eb; }
        .payment-btn.active { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 p-6 font-sans">

<div id="toast" class="fixed bottom-6 left-6 z-50 hidden px-6 py-3 rounded-xl text-white font-bold"></div>

<div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-br from-blue-600 to-blue-700 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fas fa-shopping-cart text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-gray-800">إدارة الطلبات</h1>
                <p class="text-gray-500 text-sm">نظام منصة تيرا المتكامل</p>
            </div>
        </div>
        <button id="newOrderBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-2">
            <i class="fas fa-plus-circle"></i> طلب جديد
        </button>
    </div>

    <div id="ordersContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
</div>

<div id="previewModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl max-w-2xl w-full p-6">
        <div id="printArea" class="bg-white">
            </div>
        <div class="flex justify-end gap-3 mt-6">
            <button id="closePreviewBtn" class="px-4 py-2 border rounded-lg">إغلاق</button>
            <button id="downloadPdfBtn" class="px-4 py-2 bg-purple-600 text-white rounded-lg">حفظ PDF</button>
            <button id="directPrintBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg">طباعة مباشرة</button>
        </div>
    </div>
</div>

<script type="module" src="../../js/orders-app.js"></script>
</body>
</html>
