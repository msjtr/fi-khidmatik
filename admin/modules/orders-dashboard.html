<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم تيرة | الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 p-6 font-sans text-right">

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-2 space-y-6">
                    <div class="flex gap-4">
                        <input id="orderNo" readonly class="flex-1 p-3 bg-blue-50 rounded-xl font-bold text-blue-700">
                        <input type="date" id="orderDate" class="p-3 bg-gray-50 rounded-xl">
                        <input type="time" id="orderTime" class="p-3 bg-gray-50 rounded-xl">
                    </div>

                    <div class="p-6 border rounded-2xl space-y-4">
                        <h3 class="font-bold text-gray-700 underline">بيانات العميل</h3>
                        <select id="customerSelect" onchange="fillCustomerData(this.value)" class="w-full p-3 bg-gray-50 rounded-xl border-none"></select>
                        <div class="grid grid-cols-2 gap-3">
                            <input id="cName" placeholder="اسم العميل" class="p-3 border rounded-xl">
                            <input id="cPhone" placeholder="رقم الهاتف" class="p-3 border rounded-xl">
                            <input id="cEmail" placeholder="البريد الإلكتروني" class="p-3 border rounded-xl">
                            <input id="cCity" placeholder="الحي / الشارع" class="p-3 border rounded-xl">
                        </div>
                    </div>

                    <div class="p-6 border rounded-2xl space-y-4 bg-green-50/30">
                        <h3 class="font-bold text-green-700">إضافة منتج / خدمة</h3>
                        <input id="pName" placeholder="اسم المنتج" class="w-full p-3 border rounded-xl">
                        <div class="grid grid-cols-2 gap-3">
                            <input id="pPrice" type="number" placeholder="سعر الوحدة" class="p-3 border rounded-xl">
                            <input id="pQty" type="number" placeholder="الكمية" class="p-3 border rounded-xl">
                        </div>
                        <div id="editor" class="h-32 bg-white"></div>
                        <button onclick="addItem()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">إضافة المنتج للقائمة +</button>
                    </div>
                </div>

                <div class="bg-[#1e293b] text-white p-8 rounded-[2.5rem] shadow-xl h-fit sticky top-6">
                    <h2 class="text-xl font-bold mb-6 border-b border-slate-700 pb-2">ملخص الحساب</h2>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between"><span>المجموع:</span><span id="subtotalLabel">0.00</span></div>
                        <div class="flex justify-between"><span>الضريبة:</span><span id="taxLabel">0.00</span></div>
                        <div class="flex justify-between text-2xl font-black text-blue-400 border-t pt-4"><span>الإجمالي:</span><span id="totalLabel">0.00</span></div>
                    </div>
                    
                    <div class="mt-8 space-y-4">
                        <select id="payMethod" class="w-full p-3 bg-slate-800 rounded-xl border-none">
                            <option>تمارا</option><option>تابي</option><option>نقدي</option>
                        </select>
                        <button onclick="saveOrder()" class="w-full bg-blue-600 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition">اعتماد وحفظ</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2rem] shadow-sm">
            <h3 class="font-bold text-lg mb-4">سجل العمليات السابقة</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-gray-50 text-xs text-gray-500 font-bold uppercase">
                        <tr><th class="p-4">رقم الطلب</th><th class="p-4">العميل</th><th class="p-4">المبلغ</th><th class="p-4">إجراءات</th></tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module" src="../../js/orders-app.js"></script>
</body>
</html>
