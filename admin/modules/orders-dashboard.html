<div class="module-container">
    <h2><i class="fas fa-truck"></i> لوحة الطلبات</h2>
    <div class="filters">
        <input type="text" id="search-order" placeholder="بحث برقم الطلب أو العميل...">
        <select id="status-filter">
            <option value="all">جميع الحالات</option>
            <option value="pending">قيد الانتظار</option>
            <option value="completed">مكتمل</option>
            <option value="cancelled">ملغي</option>
        </select>
        <button id="refresh-orders" class="btn-secondary"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div id="orders-list" class="orders-grid"></div>
</div>
