<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدفوعات - متجرك الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

<div class="max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">💰 إدارة المدفوعات</h1>

    <!-- إحصائيات -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-gray-500 text-sm">إجمالي المدفوعات</p>
            <p id="totalPayments" class="text-2xl font-bold text-gray-800">0 ر.س</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-gray-500 text-sm">المدفوعات المكتملة</p>
            <p id="completedPayments" class="text-2xl font-bold text-green-600">0 ر.س</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4">
            <p class="text-gray-500 text-sm">المدفوعات المعلقة</p>
            <p id="pendingPayments" class="text-2xl font-bold text-orange-600">0 ر.س</p>
        </div>
    </div>

    <!-- قائمة المدفوعات -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-100 border-b">
                <tr class="text-right">
                    <th class="p-3">رقم الطلب</th>
                    <th class="p-3">العميل</th>
                    <th class="p-3">المبلغ</th>
                    <th class="p-3">طريقة الدفع</th>
                    <th class="p-3">الحالة</th>
                    <th class="p-3">التاريخ</th>
                    <th class="p-3">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="paymentsTableBody">
                <tr><td colspan="7" class="text-center p-4 text-gray-500">جاري التحميل...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- مودال تحديث حالة الدفع -->
<div id="paymentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">تحديث حالة الدفع</h2>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <form id="paymentForm">
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">الحالة</label>
                    <select id="paymentStatus" class="w-full border rounded-lg px-3 py-2">
                        <option value="مكتمل">✅ مكتمل</option>
                        <option value="معلق">⏳ معلق</option>
                        <option value="ملغي">❌ ملغي</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">طريقة الدفع</label>
                    <select id="paymentMethod" class="w-full border rounded-lg px-3 py-2">
                        <option value="نقدي">💰 نقدي</option>
                        <option value="بطاقة ائتمان">💳 بطاقة ائتمان</option>
                        <option value="تحويل بنكي">🏦 تحويل بنكي</option>
                        <option value="مدى">💳 مدى</option>
                        <option value="أبل باي">📱 أبل باي</option>
                    </select>
                </div>
                <div class="flex justify-end gap-2 mt-4">
                    <button type="button" id="cancelModalBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100">إلغاء</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">حفظ</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { loadOrders, updateOrder, getOrdersWithCustomers } from '../../js/common.js';

    let orders = [];
    let currentPaymentId = null;

    const paymentsTableBody = document.getElementById('paymentsTableBody');
    const totalPaymentsSpan = document.getElementById('totalPayments');
    const completedPaymentsSpan = document.getElementById('completedPayments');
    const pendingPaymentsSpan = document.getElementById('pendingPayments');

    async function init() {
        const ordersWithCustomers = await getOrdersWithCustomers();
        orders = ordersWithCustomers.filter(o => o.paymentStatus !== undefined);
        if (orders.length === 0 && ordersWithCustomers.length > 0) {
            // تحويل الطلبات القديمة لتشمل معلومات الدفع
            for (const order of ordersWithCustomers) {
                if (!order.paymentStatus) {
                    await updateOrder(order.id, {
                        paymentStatus: 'معلق',
                        paymentMethod: 'غير محدد'
                    });
                }
            }
            orders = await getOrdersWithCustomers();
            orders = orders.filter(o => o.paymentStatus !== undefined);
        }
        updateStats();
        render();
    }

    function updateStats() {
        const total = orders.reduce((sum, o) => sum + (o.total || 0), 0);
        const completed = orders.filter(o => o.paymentStatus === 'مكتمل').reduce((sum, o) => sum + (o.total || 0), 0);
        const pending = orders.filter(o => o.paymentStatus === 'معلق').reduce((sum, o) => sum + (o.total || 0), 0);
        
        totalPaymentsSpan.textContent = total.toFixed(2) + ' ر.س';
        completedPaymentsSpan.textContent = completed.toFixed(2) + ' ر.س';
        pendingPaymentsSpan.textContent = pending.toFixed(2) + ' ر.س';
    }

    function getStatusBadge(status) {
        if (status === 'مكتمل') return '<span class="bg-green-100 text-green-800 px-2 py-1 rounded">✅ مكتمل</span>';
        if (status === 'معلق') return '<span class="bg-orange-100 text-orange-800 px-2 py-1 rounded">⏳ معلق</span>';
        return '<span class="bg-red-100 text-red-800 px-2 py-1 rounded">❌ ملغي</span>';
    }

    function render() {
        if (orders.length === 0) {
            paymentsTableBody.innerHTML = '<tr><td colspan="7" class="text-center p-4 text-gray-500">لا يوجد مدفوعات</td></tr>';
            return;
        }

        paymentsTableBody.innerHTML = orders.map(order => `
            <tr class="border-b hover:bg-gray-50">
                <td class="p-3">#${order.id.substring(0, 8)}</td>
                <td class="p-3">${escapeHtml(order.customer?.name || 'غير معروف')}</td>
                <td class="p-3 font-semibold">${order.total || 0} ر.س</td>
                <td class="p-3">${order.paymentMethod || 'غير محدد'}</td>
                <td class="p-3">${getStatusBadge(order.paymentStatus)}</td>
                <td class="p-3 text-sm">${order.date || order.createdAt?.split('T')[0] || '-'}</td>
                <td class="p-3">
                    <button onclick="updatePayment('${order.id}')" class="text-blue-600 hover:text-blue-800">تحديث</button>
                </td>
            </tr>
        `).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function openModal(orderId) {
        currentPaymentId = orderId;
        const order = orders.find(o => o.id === orderId);
        if (order) {
            document.getElementById('paymentStatus').value = order.paymentStatus || 'معلق';
            document.getElementById('paymentMethod').value = order.paymentMethod || 'نقدي';
        }
        document.getElementById('paymentModal').classList.remove('hidden');
        document.getElementById('paymentModal').classList.add('flex');
    }

    function closeModal() {
        document.getElementById('paymentModal').classList.add('hidden');
        document.getElementById('paymentModal').classList.remove('flex');
        currentPaymentId = null;
    }

    window.updatePayment = (id) => openModal(id);

    async function savePayment(event) {
        event.preventDefault();
        const status = document.getElementById('paymentStatus').value;
        const method = document.getElementById('paymentMethod').value;
        try {
            await updateOrder(currentPaymentId, {
                paymentStatus: status,
                paymentMethod: method,
                paymentUpdatedAt: new Date().toISOString()
            });
            closeModal();
            await init();
        } catch (err) {
            console.error(err);
            alert('حدث خطأ أثناء تحديث الدفع');
        }
    }

    document.getElementById('closeModalBtn').onclick = closeModal;
    document.getElementById('cancelModalBtn').onclick = closeModal;
    document.getElementById('paymentForm').onsubmit = savePayment;

    init();
</script>
</body>
</html>
