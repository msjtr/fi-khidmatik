<script type="module">
import { getSettings, setSettings } from '../../js/common.js';

let methods = [];

async function init() {
    const data = await getSettings('paymentMethods');
    methods = data?.methods || [];
    render();
}

function render() {
    document.getElementById('payment-methods-container').innerHTML = `
        <div>
            <button onclick="addMethod()">إضافة</button>
            <ul>
                ${methods.map((m, i) => `
                    <li>
                        ${m}
                        <button onclick="del(${i})">حذف</button>
                    </li>
                `).join('')}
            </ul>
        </div>
    `;
}

window.addMethod = async () => {
    const m = prompt('اسم الطريقة');
    if (!m) return;
    methods.push(m);
    await save();
};

window.del = async (i) => {
    methods.splice(i, 1);
    await save();
};

async function save() {
    await setSettings('paymentMethods', { methods });
    render();
}

init();
</script>
