
```html
<script type="module">
import { loadCustomers, addCustomer, updateCustomer, deleteCustomer } from '../../js/firebase.js';

let customers = [];
let deletedCustomers = [];
let currentCustomerId = null;
let searchTerm = '';
let currentFilters = { city: '', dateFrom: '', dateTo: '' };

// ✅ إصلاح importData
window.importData = [];

// ===================== تحميل العملاء =====================
async function loadCustomersWithFilters() {
    try {
        const allCustomers = await loadCustomers();
        const activeCustomers = allCustomers.filter(c => !deletedCustomers.some(dc => dc.id === c.id));
        
        let filtered = activeCustomers;

        // البحث
        if (searchTerm) {
            filtered = filtered.filter(c => 
                c.name?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                (c.phone || '').includes(searchTerm) ||
                c.email?.toLowerCase().includes(searchTerm.toLowerCase())
            );
        }

        // الفلترة بالمدينة
        if (currentFilters.city) {
            filtered = filtered.filter(c => c.city === currentFilters.city);
        }

        // ✅ إصلاح فلترة التاريخ
        if (currentFilters.dateFrom) {
            filtered = filtered.filter(c => 
                c.createdAt && new Date(c.createdAt) >= new Date(currentFilters.dateFrom)
            );
        }

        if (currentFilters.dateTo) {
            filtered = filtered.filter(c => 
                c.createdAt && new Date(c.createdAt) <= new Date(currentFilters.dateTo)
            );
        }

        customers = filtered;
        render(filtered);

    } catch (err) {
        console.error(err);
    }
}

// ===================== عرض العملاء =====================
function render(list) {
    const container = document.getElementById('customersList');

    if (!list.length) {
        container.innerHTML = `<div class="text-center text-gray-500 py-8">لا يوجد عملاء</div>`;
        return;
    }

    container.innerHTML = list.map(c => `
        <div class="customer-card bg-white rounded-lg shadow p-4">
            <h3 class="font-bold">${c.name || ''}</h3>
            <p>${c.phone || ''}</p>
            <p>${c.email || ''}</p>

            <p class="text-xs text-gray-400">
                ${c.createdAt ? new Date(c.createdAt).toLocaleDateString('ar-SA') : 'غير محدد'}
            </p>

            <div class="mt-3 flex gap-2">
                <button onclick="editCustomer('${c.id}')">تعديل</button>
                <button onclick="deleteCustomerHandler('${c.id}', '${c.name}')">حذف</button>
            </div>
        </div>
    `).join('');
}

// ===================== تشغيل الصفحة =====================

// ❌ كان await → تم إصلاحه
loadCustomersWithFilters();

</script>
