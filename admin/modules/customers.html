<!DOCTYPE html>
<html dir="rtl">
<head>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module">
import {loadCustomers,addCustomer,deleteCustomer} from '../../js/common.js';

let data=[];

async function init(){
data=await loadCustomers();
render();
}

function render(){
document.body.innerHTML=data.map(c=>`
<div>
${c.name}
<button onclick="del('${c.id}')">حذف</button>
</div>`).join('')+
`<button onclick="add()">إضافة</button>`;
}

window.add=async()=>{
const n=prompt('اسم');
if(!n)return;
await addCustomer({name:n});
init();
}

window.del=async(id)=>{
await deleteCustomer(id);
init();
}

init();
</script>
</head>
</html>
