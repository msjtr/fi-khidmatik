<div class="customers-module">
    <!-- الهيدر الخاص بالموديول -->
    <div class="module-header">
        <div class="header-title">
            <h2><i class="fas fa-users"></i> قاعدة العملاء</h2>
            <p>إدارة بيانات العملاء وحالات التقسيط</p>
        </div>
        <div class="header-actions">
            <button onclick="exportToExcel()" class="btn-secondary">
                <i class="fas fa-file-export"></i> تصدير Excel
            </button>
            <button onclick="openCustomerModal()" class="btn-primary">
                <i class="fas fa-user-plus"></i> إضافة عميل جديد
            </button>
        </div>
    </div>

    <!-- شريط البحث والفلاتر -->
    <div class="filter-bar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="customerSearch" placeholder="بحث باسم العميل، الجوال، أو الحي..." onkeyup="filterCustomers()">
        </div>
    </div>

    <!-- حاوية الجدول مع خاصية التمرير -->
    <div class="table-container shadow-sm">
        <table id="customersTable">
            <thead>
                <tr>
                    <th>العميل</th>
                    <th>الاتصال</th>
                    <th>العنوان الوطني (حائل)</th>
                    <th>تاريخ الإضافة</th>
                    <th>التصنيف</th>
                    <th>الحالة</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customersList">
                <!-- يتم التحميل بواسطة JavaScript -->
            </tbody>
        </table>
    </div>
</div>

<!-- النافذة المنبثقة (Modal) لإضافة/تعديل عميل -->
<div id="customerModal" class="tera-modal">
    <div class="modal-content animate-pop">
        <div class="modal-header">
            <h3><i class="fas fa-user-circle"></i> بيانات العميل</h3>
            <button class="close-btn" onclick="closeCustomerModal()">&times;</button>
        </div>
        <form id="customerForm" onsubmit="handleCustomerSubmit(event)">
            <div class="modal-body">
                <div class="avatar-upload">
                    <div class="avatar-preview">
                        <div id="imagePreview" style="background-image: url('images/default-avatar.png');"></div>
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="input-group">
                        <label>الاسم الثلاثي</label>
                        <input type="text" id="cust_name" name="name" required placeholder="محمد صالح الشمري">
                    </div>
                    <div class="input-group">
                        <label>رقم الجوال</label>
                        <input type="tel" id="cust_phone" name="phone" required placeholder="05xxxxxxxx">
                    </div>
                    <div class="input-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="cust_email" name="email" placeholder="example@mail.com">
                    </div>
                    <div class="input-group">
                        <label>التصنيف</label>
                        <select id="cust_type" name="type">
                            <option value="individual">فرد</option>
                            <option value="vip">عميل VIP</option>
                            <option value="corporate">مؤسسة</option>
                        </select>
                    </div>
                </div>

                <div class="address-section">
                    <h4><i class="fas fa-map-marker-alt"></i> العنوان الوطني</h4>
                    <div class="form-grid">
                        <input type="text" name="district" placeholder="الحي (مثال: النقرة)">
                        <input type="text" name="street" placeholder="الشارع">
                        <input type="text" name="building" placeholder="رقم المبنى">
                        <input type="text" name="zip" placeholder="الرمز البريدي">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeCustomerModal()">إلغاء</button>
                <button type="submit" class="btn-save">حفظ البيانات</button>
            </div>
        </form>
    </div>
</div>
