<div class="customers-module animate-fade-in">
    <!-- رأس الصفحة: العنوان وأدوات البحث والإضافة -->
    <div class="module-header">
        <div class="header-title">
            <h2><i class="fas fa-users-cog" style="color: var(--tera-orange);"></i> إدارة عملاء تيرا</h2>
            <p>لوحة التحكم المركزية | منطقة حائل والمناطق المسجلة</p>
        </div>
        
        <div class="header-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <!-- تم ربط البحث الفوري بدالة تصفية البيانات -->
                <input type="text" id="customerSearchInput" placeholder="ابحث عن اسم العميل أو الجوال..." oninput="handleCustomerSearch(this.value)">
            </div>
            <button class="btn-primary" onclick="window.openCustomerModal()">
                <i class="fas fa-user-plus"></i> إضافة عميل جديد
            </button>
        </div>
    </div>

    <!-- جدول عرض البيانات - التصميم النظيف (Glassmorphism) -->
    <div class="table-container shadow-neumorphic">
        <table>
            <thead>
                <tr>
                    <th>العميل</th>
                    <th>رقم الجوال</th>
                    <th>الموقع (المدينة/الحي)</th>
                    <th>تاريخ الإضافة</th>
                    <th>التصنيف</th>
                    <th>الحالة</th>
                    <th style="text-align: center;">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customersListContainer">
                <!-- يتم تعبئة البيانات ديناميكياً بواسطة js/modules/customers-ui.js -->
                <tr>
                    <td colspan="7" style="text-align:center; padding: 60px;">
                        <div class="tera-loader-inline">
                            <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--tera-orange);"></i>
                            <p style="margin-top: 15px; color: #64748b;">جاري مزامنة بيانات عملاء حائل من السحابة...</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- النافذة المنبثقة (Modal) لإضافة وتعديل العملاء -->
    <div id="customerModal" class="tera-modal">
        <div class="modal-content animate-slide-up">
            <div class="modal-header-flex">
                <h3><i class="fas fa-id-card"></i> ملف بيانات العميل الجديد</h3>
                <button onclick="window.closeCustomerModal()" class="close-x">&times;</button>
            </div>

            <form id="customerForm" onsubmit="window.handleCustomerSubmit(event)">
                <!-- قسم المعاينة الذكية -->
                <div class="avatar-upload-section">
                    <div id="imagePreview" class="image-preview shadow-inner">
                        <i class="fas fa-user-tie fa-3x" style="color: #cbd5e1;"></i>
                    </div>
                    <small>نظام تيرا يقوم بإنشاء ملف تعريفي تلقائي</small>
                </div>

                <div class="form-grid">
                    <!-- المعلومات الأساسية -->
                    <div class="form-group">
                        <label>اسم العميل الكامل</label>
                        <input type="text" name="name" id="cust_name" placeholder="الاسم الرباعي الرسمي" required>
                    </div>

                    <div class="form-group">
                        <label>رقم الجوال</label>
                        <div class="phone-input-wrapper" style="display: flex; gap: 5px; direction: ltr;">
                            <input type="tel" name="phone" id="cust_phone" placeholder="5xxxxxxxx" required style="flex: 1;">
                            <span style="background: #f1f5f9; padding: 10px; border-radius: 8px; font-weight: bold; color: #475569;">+966</span>
                        </div>
                    </div>

                    <!-- تفاصيل العنوان الوطني -->
                    <div class="form-group">
                        <label>المدينة</label>
                        <input type="text" name="city" id="cust_city" value="حائل" required>
                    </div>

                    <div class="form-group">
                        <label>الحي / العنوان</label>
                        <input type="text" name="district" id="cust_district" placeholder="اسم الحي">
                    </div>

                    <div class="form-group">
                        <label>رقم المبنى (العنوان الوطني)</label>
                        <input type="text" name="buildingNum" id="cust_building" placeholder="4 أرقام">
                    </div>

                    <div class="form-group">
                        <label>تصنيف العميل</label>
                        <select name="category" id="cust_category">
                            <option value="عادي">عادي</option>
                            <option value="vip">عميل VIP 💎</option>
                            <option value="تاجر">تاجر / جملة</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>ملاحظات إضافية</label>
                        <textarea name="notes" id="cust_notes" rows="2" placeholder="أية تفاصيل خاصة بحساب العميل..."></textarea>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-close" onclick="window.closeCustomerModal()">إلغاء</button>
                    <button type="submit" id="saveBtn" class="btn-primary">
                        <i class="fas fa-save"></i> حفظ في قاعدة البيانات
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    /**
     * ربط الأحداث محلياً لضمان سرعة الاستجابة
     * ملاحظة: يتم تعريف الدوال فعلياً في js/modules/customers-ui.js
     */
    function handleCustomerSearch(val) {
        if (typeof window.filterCustomers === 'function') {
            window.filterCustomers(val);
        }
    }
</script>
