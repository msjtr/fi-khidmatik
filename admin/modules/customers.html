<!-- 
    Tera Gateway - Customer Management Modal
    Version: 12.12.8
    Target: admin/modules/customers.html
-->

<div id="customerModal" class="tera-modal">
    <div class="modal-content">
        <div class="modal-header-flex">
            <h3><i class="fas fa-user-plus"></i> إدارة بيانات عميل تيرا</h3>
            <button onclick="closeCustomerModal()" class="close-x">&times;</button>
        </div>

        <form id="customerForm" onsubmit="handleCustomerSubmit(e)">
            <!-- قسم الصورة والمعلومات الأساسية -->
            <div class="avatar-upload-section">
                <div id="imagePreview" class="image-preview"></div>
                <small>صورة العميل (اختياري)</small>
            </div>

            <div class="form-grid">
                <!-- 1. اسم العميل -->
                <div class="form-group">
                    <label>اسم العميل الكامل</label>
                    <input type="text" name="name" placeholder="أدخل اسم العميل" required>
                </div>

                <!-- 2 + 3. مفتاح الدولة ورقم الجوال -->
                <div class="form-group">
                    <label>رقم الجوال</label>
                    <div class="country-input-group">
                        <div class="dial-select-box" onclick="toggleCountryDropdown()">
                            <span id="dialCodeDisplay">+966</span>
                            <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-right: 5px;"></i>
                        </div>
                        <input type="tel" name="phone" placeholder="5xxxxxxxx" required style="flex: 1;">
                        
                        <!-- قائمة الدول المنسدلة -->
                        <div id="countryDropdown" class="country-dropdown">
                            <input type="text" class="search-country" placeholder="ابحث عن دولة..." onkeyup="searchCountryList(this.value)">
                            <div id="countryOptions" class="country-options-list">
                                <!-- تظهر الخيارات هنا عبر JS -->
                            </div>
                        </div>
                    </div>
                    <!-- حقول مخفية للمفاتيح -->
                    <input type="hidden" name="countryDial" id="countryDialInput" value="+966">
                    <input type="hidden" name="countryName" id="countryNameInput" value="المملكة العربية السعودية">
                </div>

                <!-- 4. البريد الإلكتروني -->
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" name="email" placeholder="example@mail.com">
                </div>

                <!-- 5. اسم الدولة (يتم تحديثه تلقائياً أو يدوياً) -->
                <div class="form-group">
                    <label>الدولة</label>
                    <input type="text" name="countryNameDisplay" id="countryNameDisplay" value="المملكة العربية السعودية" readonly>
                </div>

                <!-- 6. المدينة -->
                <div class="form-group">
                    <label>المدينة</label>
                    <input type="text" name="city" placeholder="مثلاً: حائل" required>
                </div>

                <!-- 7. الحي -->
                <div class="form-group">
                    <label>الحي</label>
                    <input type="text" name="district" placeholder="اسم الحي">
                </div>

                <!-- 8. الشارع -->
                <div class="form-group">
                    <label>الشارع</label>
                    <input type="text" name="street" placeholder="اسم الشارع الرئيسي">
                </div>

                <!-- 9. رقم المبنى -->
                <div class="form-group">
                    <label>رقم المبنى</label>
                    <input type="text" name="buildingNum" placeholder="الرقم المكون من 4 أرقام">
                </div>

                <!-- 10. الرقم الإضافي -->
                <div class="form-group">
                    <label>الرقم الإضافي</label>
                    <input type="text" name="extraNum" placeholder="الرقم الإضافي للعنوان الوطني">
                </div>

                <!-- 11. الرمز البريدي -->
                <div class="form-group">
                    <label>الرمز البريدي</label>
                    <input type="text" name="zipCode" placeholder="5 أرقام">
                </div>

                <!-- 12. صندوق البريد -->
                <div class="form-group">
                    <label>صندوق البريد</label>
                    <input type="text" name="poBox" placeholder="إن وجد">
                </div>

                <!-- 13. حالة العميل -->
                <div class="form-group">
                    <label>حالة العميل</label>
                    <select name="status">
                        <option value="نشط">نشط</option>
                        <option value="محظور">محظور</option>
                        <option value="موقوف مؤقتاً">موقوف مؤقتاً</option>
                    </select>
                </div>

                <!-- 14. تصنيف العميل -->
                <div class="form-group">
                    <label>تصنيف العميل</label>
                    <select name="category">
                        <option value="عادي">عادي</option>
                        <option value="vip">عميل VIP 💎</option>
                        <option value="تاجر">تاجر / جملة</option>
                    </select>
                </div>

                <!-- 15. الملاحظات (عرض كامل) -->
                <div class="form-group full-width">
                    <label>ملاحظات إضافية</label>
                    <textarea name="notes" rows="3" placeholder="أي معلومات إضافية عن العميل..."></textarea>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-close" onclick="closeCustomerModal()">إلغاء</button>
                <button type="submit" class="btn-primary btn-save">حفظ بيانات العميل</button>
            </div>
        </form>
    </div>
</div>
