<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العملاء | تيرا جيت واي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; }
        
        /* تأكد من ظهور المودال بشكل صحيح فوق المحتوى */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.5); 
            justify-content: center; 
            align-items: center; 
        }
        .modal-content { 
            background: #fff; 
            padding: 20px; 
            border-radius: 12px; 
            width: 90%; 
            max-width: 800px; 
            max-height: 90vh; 
            overflow-y: auto; 
        }
    </style>
</head>
<body>

    <div id="customers-module-container"></div>

    <div id="customer-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:10px;">
                <h2 id="modal-title" style="margin:0; font-size:1.2rem; color:var(--primary);">بيانات العميل</h2>
                <button onclick="closeCustomerModal()" class="close-modal-btn" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            
            <div class="modal-body" style="padding-top:20px;">
                <form id="customer-form">
                    <div class="form-grid">
                        <h4 style="border-right: 4px solid var(--primary); padding-right:10px; margin-bottom:15px;">المعلومات الشخصية والاتصال</h4>
                        
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                            <div class="form-group">
                                <label>الاسم الكامل</label>
                                <input type="text" id="cust-name" class="tera-input" style="width:100%;" required>
                            </div>
                            <div class="form-group">
                                <label>رقم الجوال</label>
                                <input type="text" id="cust-phone" class="tera-input" style="width:100%;" placeholder="5xxxxxxxx" required>
                            </div>
                        </div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; margin-top:15px;">
                            <div class="form-group">
                                <label>مفتاح الدولة</label>
                                <input type="text" id="cust-key" class="tera-input" style="width:100%;" value="+966">
                            </div>
                            <div class="form-group">
                                <label>الدولة</label>
                                <select id="cust-country" class="select2-search" style="width:100%;">
                                    <option value="السعودية" selected>السعودية</option>
                                    <option value="الإمارات">الإمارات</option>
                                    <option value="الكويت">الكويت</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>البريد الإلكتروني</label>
                                <input type="email" id="cust-email" class="tera-input" style="width:100%;">
                            </div>
                        </div>

                        <h4 style="border-right: 4px solid var(--success); padding-right:10px; margin-top:25px; margin-bottom:15px;">العنوان الوطني</h4>
                        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                            <div class="form-group"><label>المدينة</label><input type="text" id="cust-city" class="tera-input" style="width:100%;"></div>
                            <div class="form-group"><label>الحي</label><input type="text" id="cust-district" class="tera-input" style="width:100%;"></div>
                            <div class="form-group"><label>الشارع</label><input type="text" id="cust-street" class="tera-input" style="width:100%;"></div>
                        </div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:10px; margin-top:10px;">
                            <div class="form-group"><label>المبنى</label><input type="text" id="cust-building" class="tera-input" style="width:100%;"></div>
                            <div class="form-group"><label>الإضافي</label><input type="text" id="cust-additional" class="tera-input" style="width:100%;"></div>
                            <div class="form-group"><label>الرمز</label><input type="text" id="cust-zip" class="tera-input" style="width:100%;"></div>
                            <div class="form-group"><label>ص.ب</label><input type="text" id="cust-pobox" class="tera-input" style="width:100%;"></div>
                        </div>

                        <h4 style="border-right: 4px solid var(--warning); padding-right:10px; margin-top:25px; margin-bottom:15px;">الحالة والتصنيف</h4>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                            <div class="form-group">
                                <label>الحالة</label>
                                <select id="cust-status" class="tera-input" style="width:100%;">
                                    <option value="نشط">نشط</option>
                                    <option value="معلق">معلق</option>
                                    <option value="موقوف">موقوف</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>التصنيف</label>
                                <select id="cust-type" class="tera-input" style="width:100%;">
                                    <option value="فرد">فرد</option>
                                    <option value="شركة">شركة</option>
                                    <option value="VIP">VIP</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group full" style="margin-top:20px;">
                            <label>ملاحظات إضافية</label>
                            <div id="notes-editor" style="height:120px; background:#fff;"></div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer" style="margin-top:30px; padding-top:15px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:10px;">
                <button type="button" class="btn btn-secondary" onclick="closeCustomerModal()">إلغاء</button>
                <button type="button" class="btn btn-primary" onclick="triggerSave()">
                    <i class="fas fa-save"></i> حفظ البيانات
                </button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script type="module">
        // تم تعديل المسار ليكون نسبياً صحيحاً لمجلد js من داخل admin/modules
        import { initCustomersUI } from '../../js/modules/customers-ui.js';

        document.addEventListener('DOMContentLoaded', () => {
            // تهيئة واجهة العملاء
            initCustomersUI(document.getElementById('customers-module-container'));

            // تهيئة محرر النصوص
            window.quill = new Quill('#notes-editor', {
                theme: 'snow',
                placeholder: 'اكتب ملاحظاتك هنا...'
            });

            // تهيئة Select2
            $('.select2-search').select2({
                dir: "rtl",
                dropdownParent: $('#customer-modal')
            });
        });

        // وظائف التحكم في النافذة عالمياً
        window.open
