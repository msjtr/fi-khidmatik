<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العملاء - تيرا جيت واي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f4f7fe;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-main);
        }

        /* تنسيق النافذة المنبثقة (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(5px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            width: 90%;
            max-width: 800px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #64748b;
        }

        .form-group input, .form-group select {
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .full-width { grid-column: span 2; }

        .modal-footer {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-save {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="customers-module-container"></div>

    <div id="customer-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0; color:var(--primary-color);">إضافة عميل جديد</h2>
            
            <form id="customer-form">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>اسم العميل بالكامل</label>
                        <input type="text" id="cust-name" placeholder="أدخل اسم العميل..." required>
                    </div>

                    <div class="form-group">
                        <label>رقم الجوال</label>
                        <input type="text" id="cust-phone" placeholder="05xxxxxxxx" required>
                    </div>

                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="cust-email" placeholder="example@mail.com">
                    </div>

                    <div class="form-group">
                        <label>المدينة</label>
                        <input type="text" id="cust-city" placeholder="مثال: حائل">
                    </div>

                    <div class="form-group">
                        <label>الحي</label>
                        <input type="text" id="cust-district">
                    </div>

                    <div class="form-group">
                        <label>الشارع</label>
                        <input type="text" id="cust-street">
                    </div>

                    <div class="form-group">
                        <label>رقم المبنى</label>
                        <input type="text" id="cust-building">
                    </div>

                    <div class="form-group">
                        <label>الرقم الإضافي</label>
                        <input type="text" id="cust-additional">
                    </div>

                    <div class="form-group">
                        <label>الرمز البريدي</label>
                        <input type="text" id="cust-postal">
                    </div>

                    <div class="form-group">
                        <label>صندوق البريد (P.O Box)</label>
                        <input type="text" id="cust-pobox">
                    </div>

                    <div class="form-group">
                        <label>تصنيف العميل</label>
                        <select id="cust-category">
                            <option value="عادي">عميل عادي</option>
                            <option value="vip">عميل تميز (VIP)</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeCustomerModal()">إلغاء</button>
                    <button type="button" class="btn-save" onclick="saveCustomerData()">حفظ البيانات</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initCustomersUI } from './js/modules/customers-ui.js';
        
        // تشغيل الواجهة فور تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('customers-module-container');
            initCustomersUI(container);
        });
    </script>

</body>
</html>
