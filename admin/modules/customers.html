<!-- Tera Gateway - Customers Management Module v12.12.6 -->
<div class="customers-module animated fadeIn">
    
    <!-- قسم الإحصائيات الذكية -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon" style="background: #eff6ff; color: #2563eb;"><i class="fas fa-users"></i></div>
            <div class="stat-info">
                <span class="stat-label">إجمالي العملاء</span>
                <h3 id="total-customers">0</h3>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #f0fdf4; color: #16a34a;"><i class="fas fa-user-check"></i></div>
            <div class="stat-info">
                <span class="stat-label">عملاء نشطين</span>
                <h3 id="active-customers">0</h3>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #fffbeb; color: #d97706;"><i class="fas fa-crown"></i></div>
            <div class="stat-info">
                <span class="stat-label">عملاء VIP</span>
                <h3 id="vip-customers">0</h3>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #fef2f2; color: #dc2626;"><i class="fas fa-user-slash"></i></div>
            <div class="stat-info">
                <span class="stat-label">موقوفين</span>
                <h3 id="suspended-customers">0</h3>
            </div>
        </div>
    </div>

    <!-- شريط الأدوات (Actions Bar) -->
    <div class="module-actions-bar">
        <div class="right-tools">
            <button class="btn-tera" onclick="openCustomerModal('add')">
                <i class="fas fa-plus-circle"></i> إضافة عميل جديد
            </button>
            <button class="btn-secondary-outline" onclick="exportToExcel()">
                <i class="fas fa-file-excel"></i> تصدير Excel
            </button>
        </div>
        <div class="left-tools">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="customerSearch" placeholder="بحث باسم العميل، الجوال، أو الحي..." onkeyup="filterCustomersTable()">
            </div>
        </div>
    </div>

    <!-- جدول البيانات الرئيسي -->
    <div class="tera-table-container card-style">
        <table class="tera-table" id="customersTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>العميل</th>
                    <th>الاتصال</th>
                    <th>العنوان الوطني (حائل)</th>
                    <th>تاريخ الإضافة</th>
                    <th>التصنيف</th>
                    <th>الحالة</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="customersList">
                <tr><td colspan="8" class="text-center p-5"><div class="spinner-tera"></div> جاري جلب سجلات العملاء...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- الموديل (Modal) المحسن -->
<div id="customerModal" class="tera-modal">
    <div class="modal-content glassmorphism">
        <div class="modal-header">
            <h2 id="modalTitle"><i class="fas fa-user-plus"></i> إضافة عميل</h2>
            <button class="close-modal-btn" onclick="closeCustomerModal()">&times;</button>
        </div>
        <form id="customerForm">
            <input type="hidden" id="customerId">
            
            <div class="form-layout">
                <!-- الجانب الأيمن: الصورة والبيانات الأساسية -->
                <div class="form-main">
                    <div class="avatar-upload">
                        <div class="avatar-preview">
                            <img id="customerImagePreview" src="https://ui-avatars.com/api/?name=جديد&background=f97316&color=fff">
                        </div>
                        <label for="imgUpload" class="upload-badge"><i class="fas fa-camera"></i></label>
                        <input type="file" id="imgUpload" hidden accept="image/*" onchange="previewImage(event)">
                    </div>

                    <div class="form-grid">
                        <div class="input-group">
                            <label>الاسم الثلاثي</label>
                            <input type="text" id="name" required placeholder="محمد صالح الشمري">
                        </div>
                        <div class="input-group">
                            <label>رقم الجوال</label>
                            <div class="phone-input">
                                <input type="text" id="phone" required placeholder="59xxxxxxx">
                                <span class="prefix">+966</span>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="email" placeholder="example@mail.com">
                        </div>
                        <div class="input-group">
                            <label>التصنيف</label>
                            <select id="tag">
                                <option value="individual">فرد</option>
                                <option value="company">شركة / مؤسسة</option>
                                <option value="vip">عميل VIP</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- الجانب الأيسر: العنوان الوطني -->
                <div class="form-address-section">
                    <h4><i class="fas fa-map-marked-alt"></i> العنوان الوطني</h4>
                    <div class="address-grid">
                        <div class="input-group"><label>الحي</label><input type="text" id="district" placeholder="مثال: النقرة"></div>
                        <div class="input-group"><label>الشارع</label><input type="text" id="street" placeholder="اسم الشارع"></div>
                        <div class="input-group"><label>رقم المبنى</label><input type="text" id="buildingNo"></div>
                        <div class="input-group"><label>الرمز البريدي</label><input type="text" id="postalCode"></div>
                    </div>
                    <div class="input-group" style="margin-top: 15px;">
                        <label>ملاحظات إضافية</label>
                        <textarea id="notes" rows="2" placeholder="أية تفاصيل إضافية عن الموقع أو العميل..."></textarea>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeCustomerModal()">إلغاء</button>
                <button type="submit" class="btn-save" id="btnSubmitForm">حفظ بيانات العميل</button>
            </div>
        </form>
    </div>
</div>

<style>
    /* تحسينات التصميم Neumorphism & Glassmorphism */
    .glassmorphism { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
    .card-style { background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 10px; }
    
    .avatar-upload { position: relative; width: 100px; margin: 0 auto 25px; }
    .avatar-preview { width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 4px solid #fff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    .upload-badge { position: absolute; bottom: 0; right: 0; background: #2563eb; color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; }

    .phone-input { position: relative; display: flex; align-items: center; }
    .phone-input input { padding-left: 50px !important; text-align: left; direction: ltr; }
    .phone-input .prefix { position: absolute; left: 10px; color: #94a3b8; font-size: 0.8rem; font-weight: bold; border-right: 1px solid #e2e8f0; padding-right: 8px; }

    .badge-vip { background: #fff7ed; color: #c2410c; border: 1px solid #ffedd5; }
    .status-active { color: #16a34a; background: #f0fdf4; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
    
    .btn-icon { cursor: pointer; border: none; padding: 8px 12px; border-radius: 8px; transition: all 0.2s; }
    .btn-icon.edit { color: #2563eb; background: #eff6ff; }
    .btn-icon.delete { color: #dc2626; background: #fef2f2; }
    .btn-icon:hover { opacity: 0.8; transform: scale(1.05); }
</style>

<script type="module">
    import { db } from './js/core/config.js';
    import { collection, addDoc, getDocs, updateDoc, getDoc, doc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const customerCollection = collection(db, "customers");

    // فتح الموديل وتجهيزه
    window.openCustomerModal = async (mode, id = null) => {
        const modal = document.getElementById('customerModal');
        const form = document.getElementById('customerForm');
        form.reset();
        document.getElementById('customerId').value = id || '';
        
        // الصورة الافتراضية الذكية عند الفتح
        document.getElementById('customerImagePreview').src = 'https://ui-avatars.com/api/?name=جديد&background=f97316&color=fff';
        
        if (mode === 'edit' && id) {
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit"></i> تعديل بيانات العميل';
            const docRef = doc(db, "customers", id);
            const snap = await getDoc(docRef);
            if(snap.exists()) {
                const data = snap.data();
                document.getElementById('name').value = data.name || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('email').value = data.email || '';
                document.getElementById('district').value = data.district || '';
                document.getElementById('street').value = data.street || '';
                document.getElementById('buildingNo').value = data.buildingNo || '';
                document.getElementById('postalCode').value = data.postalCode || '';
                document.getElementById('tag').value = data.tag || 'individual';
                
                if(data.photoURL) {
                    document.getElementById('customerImagePreview').src = data.photoURL;
                } else if(data.name) {
                     document.getElementById('customerImagePreview').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=f97316&color=fff`;
                }
            }
        } else {
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> إضافة عميل جديد';
        }
        modal.style.display = 'flex';
    };

    window.closeCustomerModal = () => {
        document.getElementById('customerModal').style.display = 'none';
    };

    // تحميل السجلات وتحديث الإحصائيات بأمان
    async function loadCustomers() {
        const list = document.getElementById('customersList');
        const q = query(customerCollection, orderBy("updatedAt", "desc"));
        
        try {
            const snapshot = await getDocs(q);
            list.innerHTML = '';
            let stats = { total: 0, active: 0, vip: 0, suspended: 0 };

            snapshot.forEach((docSnap) => {
                const c = docSnap.data();
                if (!c) return; // حماية ضد السجلات الفارغة تماماً
                
                const id = docSnap.id;
                stats.total++;
                if(c.status === 'active') stats.active++;
                if(c.tag === 'vip') stats.vip++;
                if(c.status === 'suspended') stats.suspended++;

                // حماية المتغيرات وتجهيزها
                const safeName = c.name || 'بدون اسم';
                const safeTag = (c.tag || 'individual').toLowerCase();
                const displayTag = safeTag.toUpperCase();
                const safeStatus = c.status || 'active';
                const displayStatus = safeStatus === 'active' ? 'نشط' : 'موقوف';
                
                // الصورة الاحتياطية (تتلافى خطأ 404)
                const fallbackImg = `https://ui-avatars.com/api/?name=${encodeURIComponent(safeName)}&background=f97316&color=fff`;
                const photoURL = c.photoURL || fallbackImg;
                
                // معالجة التاريخ بأمان
                let displayDate = '-';
                if(c.createdAt) {
                    try {
                        displayDate = new Date(c.createdAt).toLocaleDateString('ar-SA');
                    } catch(e) { displayDate = '-'; }
                }

                const row = `
                    <tr>
                        <td>${stats.total}</td>
                        <td>
                            <div class="user-cell">
                                <img src="${photoURL}" class="table-img-circle" onerror="this.src='${fallbackImg}'">
                                <div class="user-info">
                                    <strong>${safeName}</strong>
                                    <span>${c.email || 'بدون بريد'}</span>
                                </div>
                            </div>
                        </td>
                        <td dir="ltr">+966 ${c.phone || '-'}</td>
                        <td>${c.district || 'حائل'} - ${c.street || ''}</td>
                        <td>${displayDate}</td>
                        <td><span class="badge badge-${safeTag}">${displayTag}</span></td>
                        <td><span class="status-${safeStatus}">${displayStatus}</span></td>
                        <td>
                            <div class="actions">
                                <button onclick="openCustomerModal('edit', '${id}')" class="btn-icon edit" title="تعديل"><i class="fas fa-pen"></i></button>
                                <button onclick="confirmDelete('${id}')" class="btn-icon delete" title="حذف"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
                list.insertAdjacentHTML('beforeend', row);
            });

            if(stats.total === 0) {
                list.innerHTML = '<tr><td colspan="8" class="text-center p-5">لا توجد بيانات حالياً</td></tr>';
            }

            // تحديث أرقام الإحصائيات في الواجهة
            document.getElementById('total-customers').innerText = stats.total;
            document.getElementById('active-customers').innerText = stats.active;
            document.getElementById('vip-customers').innerText = stats.vip;
            document.getElementById('suspended-customers').innerText = stats.suspended;
            
        } catch (error) {
            console.error("خطأ أثناء جلب العملاء:", error);
            list.innerHTML = '<tr><td colspan="8" class="text-center text-danger">حدث خطأ في تحميل البيانات</td></tr>';
        }
    }

    // الحفظ والتحديث
    document.getElementById('customerForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('customerId').value;
        const btn = document.getElementById('btnSubmitForm');
        btn.disabled = true;
        btn.innerText = 'جاري المعالجة...';

        const data = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            district: document.getElementById('district').value,
            street: document.getElementById('street').value,
            buildingNo: document.getElementById('buildingNo').value,
            postalCode: document.getElementById('postalCode').value,
            tag: document.getElementById('tag').value,
            status: 'active',
            updatedAt: serverTimestamp()
        };

        try {
            if (id) {
                await updateDoc(doc(db, "customers", id), data);
            } else {
                data.createdAt = new Date().toISOString();
                await addDoc(customerCollection, data);
            }
            closeCustomerModal();
            loadCustomers();
        } catch (err) {
            console.error(err);
            alert("خطأ في حفظ البيانات");
        } finally {
            btn.disabled = false;
            btn.innerText = 'حفظ بيانات العميل';
        }
    };

    window.confirmDelete = async (id) => {
        if(confirm("هل أنت متأكد من حذف هذا العميل نهائياً؟")) {
            try {
                await deleteDoc(doc(db, "customers", id));
                loadCustomers();
            } catch(e) {
                alert("تعذر حذف العميل");
            }
        }
    };

    // التشغيل الأولي
    loadCustomers();
</script>
