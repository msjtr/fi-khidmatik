<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>العملاء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { loadCustomers, addCustomer, updateCustomer, deleteCustomer } from '../js/common.js';
        
        let customers = [];

        async function init() {
            await loadData();
            renderCustomers();
        }

        async function loadData() {
            customers = await loadCustomers();
        }

        function renderCustomers() {
            const container = document.getElementById('customers-container');
            if (!container) return;
            container.innerHTML = `
                <div class="bg-white rounded-2xl shadow p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold"><i class="fas fa-users ml-2"></i>العملاء</h2>
                        <button onclick="window.showAddCustomerModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg"><i class="fas fa-plus ml-1"></i>عميل جديد</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="p-3 text-right">الاسم</th>
                                    <th class="p-3 text-right">الهاتف</th>
                                    <th class="p-3 text-right">البريد الإلكتروني</th>
                                    <th class="p-3 text-right">العنوان</th>
                                    <th class="p-3 text-right">الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${customers.length === 0 ? '<tr><td colspan="5" class="text-center p-6">لا يوجد عملاء</td></tr>' : customers.map(c => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-3 font-semibold">${c.name}</td>
                                        <td class="p-3">${c.phone || '-'}</td>
                                        <td class="p-3">${c.email || '-'}</td>
                                        <td class="p-3">${c.address || '-'}</td>
                                        <td class="p-3">
                                            <button onclick="window.editCustomer('${c.id}')" class="text-blue-600 hover:text-blue-800 ml-2" title="تعديل"><i class="fas fa-edit"></i></button>
                                            <button onclick="window.deleteCustomerItem('${c.id}')" class="text-red-600 hover:text-red-800" title="حذف"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        window.showAddCustomerModal = async () => {
            const name = prompt('الاسم:');
            if (!name) return;
            const phone = prompt('رقم الهاتف:');
            const email = prompt('البريد الإلكتروني:');
            const address = prompt('العنوان:');
            await addCustomer({ name, phone, email, address });
            await loadData();
            renderCustomers();
        };

        window.editCustomer = async (id) => {
            const customer = customers.find(c => c.id === id);
            if (!customer) return;
            const name = prompt('الاسم الجديد:', customer.name);
            if (!name) return;
            const phone = prompt('رقم الهاتف الجديد:', customer.phone);
            const email = prompt('البريد الإلكتروني الجديد:', customer.email);
            const address = prompt('العنوان الجديد:', customer.address);
            await updateCustomer(id, { name, phone, email, address });
            await loadData();
            renderCustomers();
        };

        window.deleteCustomerItem = async (id) => {
            if (confirm('هل أنت متأكد من حذف هذا العميل؟')) {
                await deleteCustomer(id);
                await loadData();
                renderCustomers();
            }
        };

        init();
    </script>
    <style>
        body { background: #f1f5f9; font-family: 'Tahoma', system-ui; margin: 0; padding: 1rem; }
    </style>
</head>
<body>
    <div id="customers-container"></div>
</body>
</html>
