<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تعليمات الفاتورة</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { db, doc, getDoc, setDoc } from '../js/firebase.js';
        
        async function loadInvoiceText() {
            const docRef = doc(db, 'settings', 'invoiceInstructions');
            const docSnap = await getDoc(docRef);
            const textarea = document.getElementById('invoiceText');
            if (docSnap.exists()) {
                textarea.value = docSnap.data().text || '';
            } else {
                textarea.value = 'شكراً لتسوقكم معنا. في حال وجود استفسار أو مشكلة، يرجى التواصل مع فريق الدعم عبر البريد الإلكتروني أو الهاتف. نتمنى لكم تجربة تسوق ممتعة.';
            }
        }
        
        window.saveInvoiceText = async () => {
            const text = document.getElementById('invoiceText').value;
            const docRef = doc(db, 'settings', 'invoiceInstructions');
            await setDoc(docRef, { text, updatedAt: new Date().toISOString() });
            alert('تم حفظ تعليمات الفاتورة بنجاح');
        };
        
        loadInvoiceText();
        window.saveInvoiceText = saveInvoiceText;
    </script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-4"><i class="fas fa-file-invoice-dollar ml-2"></i>تعليمات الفاتورة</h2>
        <p class="text-gray-600 mb-3 text-sm">هذا النص سيظهر في أسفل الفاتورة التي يراها العميل</p>
        <textarea id="invoiceText" rows="6" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
        <button onclick="saveInvoiceText()" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">
            <i class="fas fa-save ml-1"></i>حفظ التعليمات
        </button>
    </div>
</body>
</html>
