<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>العملاء</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="../js/firebase.js"></script>
    <script src="../js/admin.js"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between mb-4">
            <h2 class="text-2xl font-bold">إدارة العملاء</h2>
            <button onclick="showAddCustomerModal()" class="bg-blue-600 text-white px-4 py-2 rounded">+ عميل جديد</button>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full bg-white">
                <thead class="bg-gray-100">
                    <tr><th>الاسم</th><th>الهاتف</th><th>البريد</th><th>العنوان</th><th>الإجراءات</th></tr>
                </thead>
                <tbody id="customers-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        let customers = [];
        async function loadCustomers() {
            customers = await getCollection('customers');
            renderCustomers();
        }
        function renderCustomers() {
            document.getElementById('customers-list').innerHTML = customers.map(c => `
                <tr>
                    <td>${c.name}</td><td>${c.phone}</td><td>${c.email}</td><td>${c.address}</td>
                    <td>
                        <button onclick="editCustomer('${c.id}')" class="text-blue-600"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteCustomer('${c.id}')" class="text-red-600 mx-2"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        window.showAddCustomerModal = () => {
            const name = prompt('الاسم:');
            const phone = prompt('الهاتف:');
            const email = prompt('البريد:');
            const address = prompt('العنوان:');
            if (name && phone) {
                addDocument('customers', { name, phone, email, address });
                loadCustomers();
            }
        };
        window.editCustomer = async (id) => {
            const c = customers.find(c => c.id === id);
            const name = prompt('الاسم الجديد:', c.name);
            const phone = prompt('الهاتف الجديد:', c.phone);
            if (name && phone) {
                await updateDocument('customers', id, { name, phone });
                loadCustomers();
            }
        };
        window.deleteCustomer = async (id) => {
            if (confirm('حذف العميل؟')) {
                await deleteDocument('customers', id);
                loadCustomers();
            }
        };
        loadCustomers();
    </script>
</body>
</html>
