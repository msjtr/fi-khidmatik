<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المخزون</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { getProducts, updateProductQuantity } from '../js/admin.js';
        
        let products = [];

        async function loadInventory() {
            products = await getProducts();
            renderInventory();
        }

        function renderInventory() {
            const tbody = document.getElementById('inventory-list');
            if (!tbody) return;
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center p-6 text-gray-500">لا توجد منتجات</td></tr>';
                return;
            }
            
            tbody.innerHTML = products.map(p => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3 font-semibold">${p.name}</td>
                    <td class="p-3">
                        <span class="font-bold ${p.quantity < 5 ? 'text-red-600' : 'text-green-600'}">${p.quantity || 0}</span>
                        ${p.quantity < 5 ? '<span class="text-xs text-red-500 mr-2">(منخفض)</span>' : ''}
                    </td>
                    <td class="p-3">
                        <div class="flex items-center gap-2">
                            <input type="number" id="qty-${p.id}" value="${p.quantity || 0}" class="border rounded p-2 w-24 text-center">
                            <button onclick="window.updateQuantity('${p.id}')" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded transition">
                                <i class="fas fa-save"></i> تحديث
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.updateQuantity = async (id) => {
            const input = document.getElementById(`qty-${id}`);
            const newQty = parseInt(input.value);
            if (!isNaN(newQty)) {
                await updateProductQuantity(id, newQty);
                loadInventory();
                alert('تم تحديث الكمية بنجاح');
            } else {
                alert('الرجاء إدخال رقم صحيح');
            }
        };

        loadInventory();
        window.updateQuantity = updateQuantity;
    </script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-4"><i class="fas fa-warehouse ml-2"></i>إدارة المخزون</h2>
        <div class="overflow-x-auto">
            <table class="min-w-full">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-3 text-right">المنتج</th>
                        <th class="p-3 text-right">الكمية الحالية</th>
                        <th class="p-3 text-right">تحديث الكمية</th>
                    </tr>
                </thead>
                <tbody id="inventory-list">
                    <tr><td colspan="3" class="text-center p-6 text-gray-500">جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
