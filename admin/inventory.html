<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المخزون</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="../js/firebase.js"></script>
    <script src="../js/admin.js"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-4">إدارة المخزون</h2>
        <div class="overflow-x-auto">
            <table class="min-w-full bg-white">
                <thead class="bg-gray-100"><tr><th>المنتج</th><th>الكمية الحالية</th><th>تحديث الكمية</th></tr></thead>
                <tbody id="inventory-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        let products = [];
        async function loadInventory() {
            products = await getCollection('products');
            renderInventory();
        }
        function renderInventory() {
            const tbody = document.getElementById('inventory-list');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.quantity}</td>
                    <td><input type="number" id="qty-${p.id}" value="${p.quantity}" class="border rounded p-1 w-24"><button onclick="updateQty('${p.id}')" class="bg-blue-600 text-white px-2 py-1 rounded ml-2">تحديث</button></td>
                </tr>
            `).join('');
        }
        window.updateQty = async (id) => {
            const newQty = parseInt(document.getElementById(`qty-${id}`).value);
            if (!isNaN(newQty)) {
                await updateDocument('products', id, { quantity: newQty });
                loadInventory();
            }
        };
        loadInventory();
    </script>
</body>
</html>
