<div class="tera-form-container">
    <form id="customer-form">
        <div class="form-section-title">المعلومات الشخصية</div>
        <div class="row g-3">
            <div class="col-md-6">
                <label>الاسم الكامل</label>
                <input type="text" id="cust-name" class="form-control tera-field" required>
            </div>
            <div class="col-md-6">
                <label>رقم الجوال</label>
                <input type="tel" id="cust-phone" class="form-control tera-field" placeholder="5xxxxxxxx" required>
            </div>
        </div>

        <div class="form-section-title mt-4">تفاصيل العنوان (حائل)</div>
        <div class="row g-3">
            <div class="col-md-4">
                <label>الحي</label>
                <input type="text" id="cust-district" class="form-control tera-field">
            </div>
            <div class="col-md-4">
                <label>رقم المبنى</label>
                <input type="text" id="cust-buildingNo" class="form-control tera-field text-center">
            </div>
            <div class="col-md-4">
                <label>الرمز البريدي</label>
                <input type="text" id="cust-postalCode" class="form-control tera-field text-center">
            </div>
        </div>
    </form>
</div>
