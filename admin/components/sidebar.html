        <a href="javascript:void(0)" class="nav-item" onclick="handleNavClick(this, 'orders')">

        </div>
    </div>
</div>

<script>
    /**
     * معالج النقر المطور لنظام SPA
     */
    function handleNavClick(element, moduleName) {
        // 1. تحديث الحالة البصرية
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');

        // 2. استدعاء المحرك الرئيسي (الموجود في index.html)
        if (typeof window.loadModule === 'function') {
            window.loadModule(moduleName);
        } else {
            console.warn("محرك التحميل loadModule غير متاح في الصفحة الرئيسية.");
        }
    }
</script>
