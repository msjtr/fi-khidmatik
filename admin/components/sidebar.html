    <div class="sidebar-footer">

        </div>
    </div>
</div>

<script>
    /**
     * وظيفة التعامل مع النقر على الروابط وتغيير الموديول
     */
    function handleNavClick(element, moduleName) {
        // 1. إزالة حالة النشاط من جميع الروابط
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });

        // 2. إضافة حالة النشاط للرابط الحالي
        element.classList.add('active');

        // 3. استدعاء وظيفة تحميل الموديول الموجودة في index.html
        if (typeof window.loadModule === 'function') {
            window.loadModule(moduleName);
        }
        
        // 4. منع السلوك الافتراضي للرابط
        return false;
    }
</script>
