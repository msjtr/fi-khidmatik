<aside id="main-sidebar" class="app-sidebar">
    <div class="sidebar-header">
        <span class="menu-label">القائمة الرئيسية</span>
    </div>
    
    <nav class="side-nav">
        <ul id="admin-menu">
            <li class="nav-item active" data-module="dashboard">
                <div class="nav-icon">
                    <i class="fas fa-th-large"></i>
                </div>
                <span>الرئيسية</span>
                <div class="active-pill"></div>
            </li>
            
            <li class="nav-item" data-module="products">
                <div class="nav-icon">
                    <i class="fas fa-boxes-stacked"></i>
                </div>
                <span>المنتجات</span>
                <div class="active-pill"></div>
            </li>
            
            <li class="nav-item" data-module="orders">
                <div class="nav-icon">
                    <i class="fas fa-hand-holding-dollar"></i>
                </div>
                <span>طلبات التقسيط</span>
                <div class="active-pill"></div>
            </li>
            
            <li class="nav-item" data-module="customers">
                <div class="nav-icon">
                    <i class="fas fa-users-gear"></i>
                </div>
                <span>قاعدة العملاء</span>
                <div class="active-pill"></div>
            </li>
            
            <div class="nav-divider"></div>
            
            <li class="nav-item" data-module="settings">
                <div class="nav-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <span>إعدادات النظام</span>
                <div class="active-pill"></div>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <div class="system-status">
            <span class="status-dot"></span>
            <small>تيرا جيت واي: متصل</small>
        </div>
    </div>
</aside>

<style>
    /* القائمة الجانبية المطورة لتيرا */
    .app-sidebar {
        display: flex;
        flex-direction: column;
        background: #ffffff;
        height: 100%;
        width: 280px;
        border-left: 1px solid var(--border-color, #e2e8f0);
        overflow: hidden;
        transition: width 0.3s ease;
    }

    .sidebar-header {
        padding: 25px 25px 15px;
    }

    .menu-label {
        font-size: 0.75rem;
        font-weight: 800;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .side-nav {
        flex: 1;
        padding: 10px 0;
    }

    #admin-menu {
        list-style: none;
        padding: 0 15px;
    }

    .nav-item {
        position: relative;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 18px;
        margin-bottom: 8px;
        border-radius: 14px;
        color: var(--text-muted, #64748b);
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-icon {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        background: #f8fafc;
        transition: all 0.3s ease;
        font-size: 1.1rem;
    }

    /* حالة التحويم (Hover) */
    .nav-item:hover {
        background: var(--primary-light, #fff7ed);
        color: var(--primary, #f97316);
        transform: translateX(-5px); /* حركة خفيفة لليمين في العربي */
    }

    .nav-item:hover .nav-icon {
        background: white;
        color: var(--primary, #f97316);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    /* الحالة النشطة (Active) */
    .nav-item.active {
        background: var(--primary-light, #fff7ed);
        color: var(--primary, #f97316);
    }

    .nav-item.active .nav-icon {
        background: var(--primary, #f97316);
        color: #ffffff;
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
    }

    .active-pill {
        position: absolute;
        right: -15px;
        width: 5px;
        height: 24px;
        background: var(--primary, #f97316);
        border-radius: 5px 0 0 5px;
        opacity: 0;
        transition: 0.3s;
    }

    .nav-item.active .active-pill {
        opacity: 1;
    }

    .nav-divider {
        height: 1px;
        background: #f1f5f9;
        margin: 20px 15px;
    }

    .sidebar-footer {
        padding: 20px 25px;
        background: #fafafa;
        border-top: 1px solid #f1f5f9;
    }

    .system-status {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #64748b;
        font-weight: 700;
        font-size: 0.85rem;
    }

    .status-dot {
        width: 10px;
        height: 10px;
        background: #10b981;
        border-radius: 50%;
        position: relative;
    }

    /* تأثير النبض للنقطة الخضراء */
    .status-dot::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background: #10b981;
        border-radius: 50%;
        animation: pulse 2s infinite;
        opacity: 0.5;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.5; }
        100% { transform: scale(2.5); opacity: 0; }
    }

    /* استجابة التصغير المحسنّة */
    .app-sidebar.collapsed { width: 85px; }
    .app-sidebar.collapsed .menu-label,
    .app-sidebar.collapsed span,
    .app-sidebar.collapsed .system-status small {
        display: none;
    }
</style>

<script>
    /**
     * منطق التبديل بين الموديولات
     */
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            // إزالة الحالة النشطة من الجميع
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            // إضافة الحالة النشطة للعنصر الحالي
            this.classList.add('active');
            
            const moduleName = this.getAttribute('data-module');
            console.log(`🔄 جاري الانتقال إلى موديول: ${moduleName}`);
            
            // هنا يتم استدعاء دالة التحميل الخاصة بكل موديول
            if (window.loadModule) window.loadModule(moduleName);
        });
    });
</script>
