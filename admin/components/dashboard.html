<div class="dashboard-content animate-fade-in" style="padding: 15px;">
    
    <!-- الهيدر العلوي الذكي -->
    <div class="dashboard-header-wrapped">
        <div class="welcome-text">
            <h2 class="main-title">نظرة عامة على النظام</h2>
            <p class="sub-title">مرحباً بك يا أبا صالح. إليك حالة محرك تيرا والعمليات الحالية.</p>
        </div>
        <div class="live-status-container">
            <div class="status-pulse">
                <span class="pulse-dot"></span>
                <span class="status-text">مزامنة سحابية نشطة</span>
            </div>
        </div>
    </div>
    
    <!-- كروت الإحصائيات مع تأثيرات النيومورفيزم -->
    <div class="stats-grid">
        
        <!-- كرت العملاء -->
        <div class="stat-card orange-theme">
            <div class="stat-inner">
                <div class="stat-icon bg-orange-soft">
                    <i class="fas fa-users-viewfinder"></i>
                </div>
                <div class="stat-details">
                    <span class="label">إجمالي العملاء</span>
                    <h3 class="value" id="dash-total-customers">...</h3>
                </div>
            </div>
            <div class="stat-progress"><div class="bar" style="width: 100%"></div></div>
        </div>

        <!-- كرت الأقساط - محرك حساب تلقائي -->
        <div class="stat-card purple-theme">
            <div class="stat-inner">
                <div class="stat-icon bg-purple-soft">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div class="stat-details">
                    <span class="label">أقساط مستحقة (اليوم)</span>
                    <h3 class="value" id="dash-due-installments">0</h3>
                </div>
            </div>
            <div class="stat-progress"><div class="bar" style="width: 45%"></div></div>
        </div>

        <!-- كرت رصيد المحفظة/السلسلة -->
        <div class="stat-card green-theme">
            <div class="stat-inner">
                <div class="stat-icon bg-green-soft">
                    <i class="fas fa-wallet"></i>
                </div>
                <div class="stat-details">
                    <span class="label">السيولة المتاحة</span>
                    <h3 class="value" id="dash-liquidity">...</h3>
                </div>
            </div>
            <div class="stat-progress"><div class="bar" style="width: 75%"></div></div>
        </div>

    </div>

    <!-- قسم الإجراءات السريعة - تصميم بطاقة ترحيبية -->
    <div class="welcome-action-card">
        <div class="action-content">
            <div class="action-icon-main">
                <div class="rocket-wrap"><i class="fas fa-rocket"></i></div>
            </div>
            <div class="action-text">
                <h3>لوحة التحكم السريعة</h3>
                <p>قم بإدارة عقود التقسيط وإصدار الفواتير فورياً لعملاء منطقة حائل.</p>
            </div>
            <div class="action-buttons">
                <button onclick="window.handleSidebarClick(null, 'customers')" class="tera-btn btn-primary">
                    <i class="fas fa-plus-circle"></i> إضافة عقد جديد
                </button>
                <button onclick="window.handleSidebarClick(null, 'reports')" class="tera-btn btn-glass">
                    <i class="fas fa-chart-pie"></i> التقارير المالية
                </button>
            </div>
        </div>
    </div>

    <!-- المحرك البرمجي لجلب البيانات الحية -->
    <script type="module">
        import { db } from '../js/core/config.js';
        import { collection, getCountFromServer, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function initDashboard() {
            try {
                // 1. جلب عدد العملاء
                const customerColl = collection(db, "customers");
                const customerCount = await getCountFromServer(customerColl);
                document.getElementById('dash-total-customers').innerText = customerCount.data().count.toLocaleString('ar-SA');

                // 2. حساب الأقساط المستحقة لليوم (مثال للمنطق البرمجي)
                const today = new Date().toISOString().split('T')[0];
                const dueQuery = query(collection(db, "installments"), where("dueDate", "==", today), where("status", "==", "pending"));
                const dueCount = await getCountFromServer(dueQuery);
                document.getElementById('dash-due-installments').innerText = dueCount.data().count.toLocaleString('ar-SA');

                // 3. جلب السيولة (قيمة ثابتة أو من حقل إعدادات)
                document.getElementById('dash-liquidity').innerText = "متوفر";

            } catch (error) {
                console.error("Tera Dashboard Error:", error);
            }
        }

        initDashboard();
    </script>
</div>
