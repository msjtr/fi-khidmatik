<!-- مكون الجداول الاحترافي - Tera Gateway -->
<div class="tera-table-container">
    <div class="table-header-actions">
        <div class="search-box-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="table-search" placeholder="بحث سريع في السجلات...">
        </div>
        <div class="table-filters">
            <button class="filter-btn active">الكل</button>
            <button class="filter-btn">نشط</button>
            <button class="filter-btn">متوقف</button>
        </div>
    </div>

    <div class="responsive-table-wrapper">
        <table class="tera-main-table">
            <thead>
                <tr>
                    <th class="text-right">العميل / الطلب</th>
                    <th>التصنيف</th>
                    <th>التاريخ</th>
                    <th>الحالة</th>
                    <th>الإجمالي</th>
                    <th class="text-center">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- مثال لصف بيانات -->
                <tr>
                    <td>
                        <div class="user-info-cell">
                            <img src="https://ui-avatars.com/api/?name=محمد+علي&background=random" alt="User">
                            <div class="info-text">
                                <span class="primary-text">محمد علي الشمري</span>
                                <span class="secondary-text">050XXXXXXX</span>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge-tera gold">VIP</span></td>
                    <td>2026-04-29</td>
                    <td><span class="status-dot online">نشط الآن</span></td>
                    <td class="price-cell">5,400 ر.س</td>
                    <td class="text-center">
                        <div class="actions-group">
                            <button class="action-icon edit" title="تعديل"><i class="fas fa-pen-to-square"></i></button>
                            <button class="action-icon view" title="عرض"><i class="fas fa-eye"></i></button>
                            <button class="action-icon delete" title="حذف"><i class="fas fa-trash-can"></i></button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- الترقيم (Pagination) -->
    <div class="table-footer-pagination">
        <span class="results-count">عرض 1 إلى 10 من أصل 150 سجل</span>
        <div class="pagination-controls">
            <button class="page-nav"><i class="fas fa-chevron-right"></i></button>
            <button class="page-num active">1</button>
            <button class="page-num">2</button>
            <button class="page-num">3</button>
            <button class="page-nav"><i class="fas fa-chevron-left"></i></button>
        </div>
    </div>
</div>
