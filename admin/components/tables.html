<aside id="main-sidebar" class="app-sidebar">
    <div class="sidebar-header">
        <div class="brand-minimal">
            <div class="logo-dot"></div>
            <span class="menu-label">لوحة التحكم</span>
        </div>
    </div>
    
    <nav class="side-nav">
        <ul id="admin-menu">
            <li class="nav-item active" data-module="dashboard">
                <div class="nav-icon">
                    <i class="fas fa-chart-pie"></i>
                </div>
                <span class="nav-text">الرئيسية</span>
                <div class="active-indicator"></div>
            </li>
            
            <li class="nav-item" data-module="products">
                <div class="nav-icon">
                    <i class="fas fa-tags"></i>
                </div>
                <span class="nav-text">المنتجات</span>
                <div class="active-indicator"></div>
            </li>
            
            <li class="nav-item" data-module="orders">
                <div class="nav-icon">
                    <i class="fas fa-file-invoice-dollar"></i>
                </div>
                <span class="nav-text">طلبات التقسيط</span>
                <div class="active-indicator"></div>
            </li>
            
            <li class="nav-item" data-module="customers">
                <div class="nav-icon">
                    <i class="fas fa-users-gear"></i>
                </div>
                <span class="nav-text">قاعدة العملاء</span>
                <div class="active-indicator"></div>
            </li>
            
            <div class="nav-divider"><span>الإدارة</span></div>
            
            <li class="nav-item" data-module="settings">
                <div class="nav-icon">
                    <i class="fas fa-sliders-h"></i>
                </div>
                <span class="nav-text">إعدادات النظام</span>
                <div class="active-indicator"></div>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <div class="status-badge">
            <div class="pulse-wrapper">
                <div class="status-dot"></div>
                <div class="status-pulse"></div>
            </div>
            <span class="status-text">خادم الرياض: متصل</span>
        </div>
    </div>
</aside>

<style>
    /* Tera Sidebar - Premium Dark/Light UI */
    :root {
        --sidebar-bg: #ffffff;
        --sidebar-accent: #f97316; /* البرتقالي الرسمي لتيرا */
        --sidebar-accent-hover: #ea580c;
        --sidebar-text: #64748b;
        --sidebar-hover-bg: #f8fafc;
        --sidebar-active-bg: #fff7ed;
        --sidebar-border: #f1f5f9;
    }

    .app-sidebar {
        display: flex;
        flex-direction: column;
        background: var(--sidebar-bg);
        height: 100vh;
        width: 280px;
        border-left: 1px solid var(--sidebar-border);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: sticky;
        top: 0;
    }

    .sidebar-header {
        padding: 30px 25px 20px;
    }

    .brand-minimal {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .logo-dot {
        width: 10px;
        height: 10px;
        background: var(--sidebar-accent);
        border-radius: 3px;
        box-shadow: 0 0 10px rgba(249, 115, 22, 0.4);
    }

    .menu-label {
        font-size: 0.75rem;
        font-weight: 900;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }

    .side-nav {
        flex: 1;
        padding: 10px 15px;
        overflow-y: auto;
    }

    #admin-menu {
        list-style: none;
        padding: 0;
    }

    .nav-item {
        position: relative;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        margin-bottom: 8px;
        border-radius: 14px;
        color: var(--sidebar-text);
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .nav-icon {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        background: #f1f5f9;
        font-size: 1.1rem;
        transition: 0.3s;
    }

    /* تفاعلات التحويم */
    .nav-item:hover {
        background: var(--sidebar-hover-bg);
        color: var(--sidebar-accent);
        transform: translateX(-5px);
    }

    /* الحالة النشطة */
    .nav-item.active {
        background: var(--sidebar-active-bg);
        color: var(--sidebar-accent);
    }

    .nav-item.active .nav-icon {
        background: var(--sidebar-accent);
        color: #ffffff;
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
    }

    /* مؤشر النشاط الجانبي */
    .active-indicator {
        position: absolute;
        right: -15px;
        width: 4px;
        height: 24px;
        background: var(--sidebar-accent);
        border-radius: 4px 0 0 4px;
        opacity: 0;
        transition: 0.3s;
    }

    .nav-item.active .active-indicator {
        opacity: 1;
    }

    /* الفواصل المسمّاة */
    .nav-divider {
        margin: 30px 10px 20px;
        height: 1px;
        background: var(--sidebar-border);
        position: relative;
    }

    .nav-divider span {
        position: absolute;
        top: -10px;
        right: 15px;
        background: var(--sidebar-bg);
        padding: 0 10px;
        font-size: 0.65rem;
        color: #cbd5e1;
        font-weight: 800;
        text-transform: uppercase;
    }

    /* الفوتر وحالة النظام */
    .sidebar-footer {
        padding: 20px 15px;
        border-top: 1px solid var(--sidebar-border);
    }

    .status-badge {
        background: #f0fdf4;
        padding: 12px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid #dcfce7;
    }

    .status-text {
        font-size: 0.8rem;
        color: #166534;
        font-weight: 800;
    }

    /* نبض الاتصال الأخضر */
    .pulse-wrapper {
        position: relative;
        width: 10px;
        height: 10px;
    }

    .status-dot {
        width: 10px;
        height: 10px;
        background: #10b981;
        border-radius: 50%;
        z-index: 2;
        position: relative;
    }

    .status-pulse {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #10b981;
        border-radius: 50%;
        z-index: 1;
        animation: tera-pulse 2s infinite ease-in-out;
    }

    @keyframes tera-pulse {
        0% { transform: scale(0.9); opacity: 0.8; }
        100% { transform: scale(2.8); opacity: 0; }
    }

    /* تصغير القائمة (Responsive/Collapsed) */
    .app-sidebar.collapsed {
        width: 85px;
    }
    
    .app-sidebar.collapsed .nav-text, 
    .app-sidebar.collapsed .menu-label, 
    .app-sidebar.collapsed .nav-divider span,
    .app-sidebar.collapsed .status-text {
        display: none;
    }
</style>

<script>
    /**
     * التحكم في تنقل القائمة
     */
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            // إزالة النشاط من الجميع
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            // تفعيل العنصر المختار
            this.classList.add('active');
            
            const module = this.getAttribute('data-module');
            // استدعاء دالة تغيير المحتوى إذا كانت موجودة
            if (typeof window.loadModule === 'function') {
                window.loadModule(module);
            }
        });
    });
</script>
