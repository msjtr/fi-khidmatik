<!-- مكون الجداول الاحترافي - Tera Gateway v12.12.6 -->
<div class="tera-table-container animate-fade-in">
    
    <!-- أدوات التحكم العلوية -->
    <div class="table-header-actions">
        <div class="search-box-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="table-search" placeholder="بحث باسم العميل، رقم الهاتف، أو رقم الطلب..." onkeyup="teraTableSearch()">
        </div>
        
        <div class="table-filters-group">
            <div class="filter-label"><i class="fas fa-filter"></i> تصفية:</div>
            <div class="table-filters">
                <button class="filter-btn active" onclick="filterTable('all')">الكل</button>
                <button class="filter-btn" onclick="filterTable('active')">نشط</button>
                <button class="filter-btn" onclick="filterTable('pending')">معلق</button>
                <button class="filter-btn" onclick="filterTable('late')">متأخر</button>
            </div>
        </div>
        
        <button class="btn-add-new" onclick="openAddOrderModal()">
            <i class="fas fa-plus"></i> إضافة طلب جديد
        </button>
    </div>

    <!-- حاوية الجدول المستجيبة -->
    <div class="responsive-table-wrapper">
        <table class="tera-main-table" id="ordersTable">
            <thead>
                <tr>
                    <th class="text-right">العميل والمعلومات</th>
                    <th>التصنيف</th>
                    <th>تاريخ العقد</th>
                    <th>حالة الدفع</th>
                    <th>المبلغ المتبقي</th>
                    <th class="text-center">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- يتم حقن البيانات هنا برمجياً من Firestore -->
                <tr class="table-row-item" data-status="active">
                    <td>
                        <div class="user-info-cell">
                            <div class="avatar-wrapper">
                                <img src="https://ui-avatars.com/api/?name=محمد+الشمري&background=f97316&color=fff&bold=true" alt="User">
                            </div>
                            <div class="info-text">
                                <span class="primary-text">محمد بن صالح الشمري</span>
                                <span class="secondary-text"><i class="fas fa-phone fa-xs"></i> 050XXXXXXX</span>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge-tera gold-gradient">VIP</span></td>
                    <td><span class="date-text">2026-04-29</span></td>
                    <td>
                        <div class="status-indicator">
                            <span class="status-dot online"></span>
                            <span class="status-label">منتظم</span>
                        </div>
                    </td>
                    <td class="price-cell">
                        <span class="currency">ر.س</span>
                        <span class="amount">5,400</span>
                    </td>
                    <td class="text-center">
                        <div class="actions-group">
                            <button class="action-icon edit" onclick="editOrder('ID_123')" title="تعديل"><i class="fas fa-edit"></i></button>
                            <button class="action-icon view" onclick="viewOrder('ID_123')" title="عرض التفاصيل"><i class="fas fa-file-invoice"></i></button>
                            <button class="action-icon whatsapp" onclick="contactWhatsApp('050XXX')" title="واتساب"><i class="fab fa-whatsapp"></i></button>
                            <button class="action-icon delete" onclick="confirmDelete('ID_123')" title="حذف"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- التذييل ونظام الترقيم -->
    <div class="table-footer-pagination">
        <div class="footer-info">
            <span class="results-count">عرض <b>10</b> سجلات من إجمالي <b>152</b> سجل</span>
        </div>
        
        <div class="pagination-controls">
            <button class="page-nav disabled" title="السابق"><i class="fas fa-chevron-right"></i></button>
            <div class="page-numbers">
                <button class="page-num active">1</button>
                <button class="page-num">2</button>
                <button class="page-num">3</button>
                <span class="page-dots">...</span>
                <button class="page-num">15</button>
            </div>
            <button class="page-nav" title="التالي"><i class="fas fa-chevron-left"></i></button>
        </div>
    </div>
</div>

<script>
    // دالة البحث السريع (Client-side) لسرعة الأداء
    function teraTableSearch() {
        const input = document.getElementById("table-search");
        const filter = input.value.toLowerCase();
        const rows = document.getElementById("table-body").getElementsByTagName("tr");

        for (let i = 0; i < rows.length; i++) {
            const text = rows[i].textContent.toLowerCase();
            rows[i].style.display = text.includes(filter) ? "" : "none";
        }
    }

    // دالة التبديل بين الفلاتر
    function filterTable(status) {
        // تحديث شكل الأزرار
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        // هنا يتم استدعاء بيانات Firebase بناءً على الحالة
        console.log(`جاري تصفية السجلات بناءً على: ${status}`);
    }
</script>
