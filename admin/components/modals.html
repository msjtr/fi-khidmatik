<div id="customer-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card shadow-lg">
        <div class="modal-header">
            <h3 id="modal-title"><i class="fas fa-user-plus"></i> إضافة عميل جديد</h3>
            <button class="close-btn" onclick="closeCustomerModal()">&times;</button>
        </div>

        <div class="modal-body">
            <form id="customer-form">
                <div class="form-section-header">البيانات الأساسية والهوية</div>
                <div class="row-flex">
                    <div class="photo-upload-zone">
                        <div id="photo-preview" class="avatar-box">
                            <i class="fas fa-user-tie fa-3x"></i>
                        </div>
                        <label class="upload-label">
                            <i class="fas fa-camera"></i> رفع صورة
                            <input type="file" id="cust-photo" hidden accept="image/*" onchange="previewCustomerPhoto(this)">
                        </label>
                    </div>
                    
                    <div class="grid-3-cols" style="flex-grow: 1;">
                        <div class="input-group">
                            <label>اسم العميل الكامل</label>
                            <input type="text" id="cust-name" placeholder="أدخل الاسم الثلاثي" required>
                        </div>
                        <div class="input-group">
                            <label>رقم الجوال</label>
                            <input type="tel" id="cust-phone" dir="ltr" placeholder="5xxxxxxxx" required>
                        </div>
                        <div class="input-group">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="cust-email" placeholder="example@mail.com">
                        </div>
                    </div>
                </div>

                <div class="grid-4-cols">
                    <div class="input-group">
                        <label>مفتاح الدولة</label>
                        <select id="cust-countryCode">
                            <option value="+966" selected>السعودية +966</option>
                            <option value="+971">الإمارات +971</option>
                            <option value="+965">الكويت +965</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>حالة العميل</label>
                        <select id="cust-status">
                            <option value="نشط">نشط</option>
                            <option value="معلق">معلق</option>
                            <option value="موقوف">موقوف</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>تصنيف العميل</label>
                        <select id="cust-category">
                            <option value="فرد">فرد</option>
                            <option value="شركة">شركة</option>
                            <option value="VIP">عميل VIP</option>
                        </select>
                    </div>
                </div>

                <div class="form-section-header">تفاصيل العنوان الوطني</div>
                <div class="grid-4-cols">
                    <div class="input-group"><label>المدينة</label><input type="text" id="cust-city"></div>
                    <div class="input-group"><label>الحي</label><input type="text" id="cust-district"></div>
                    <div class="input-group"><label>الشارع</label><input type="text" id="cust-street"></div>
                    <div class="input-group"><label>رقم المبنى</label><input type="text" id="cust-buildingNo"></div>
                    <div class="input-group"><label>الرقم الإضافي</label><input type="text" id="cust-additionalNo"></div>
                    <div class="input-group"><label>الرمز البريدي</label><input type="text" id="cust-postalCode"></div>
                    <div class="input-group"><label>صندوق البريد</label><input type="text" id="cust-poBox"></div>
                    <div class="input-group"><label>تاريخ الإضافة</label><input type="text" id="cust-createdAt" readonly class="readonly-input"></div>
                </div>

                <div class="form-section-header">الملاحظات والطلبات</div>
                <div class="rich-text-wrapper">
                    <div id="cust-notes-editor" style="height: 120px; background: white; border-radius: 8px;"></div>
                </div>
            </form>
        </div>

        <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="closeCustomerModal()">إلغاء</button>
            <button type="button" class="btn-save" onclick="saveCustomerData()">
                <i class="fas fa-check"></i> حفظ البيانات
            </button>
        </div>
    </div>
</div>

<hr style="display:none">

<div id="confirm-modal" class="tera-modal-overlay" style="display: none;">
    <div class="tera-confirm-content">
        <div class="confirm-icon-circle">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <h3 id="confirm-title">تأكيد الإجراء</h3>
        <p id="confirm-message">هل أنت متأكد من تنفيذ هذه العملية؟</p>
        <div class="confirm-actions">
            <button id="confirm-yes" class="btn-confirm-yes">تأكيد</button>
            <button id="confirm-no" class="btn-confirm-no">تراجع</button>
        </div>
    </div>
</div>

<style>
    /* التنسيقات الأساسية لنوافذ العميل */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .modal-card { background: #fff; width: 90%; max-width: 900px; border-radius: 20px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; animation: slideIn 0.3s ease-out; }
    .modal-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { color: var(--primary); margin: 0; }
    .modal-body { padding: 25px; overflow-y: auto; flex: 1; }
    .form-section-header { background: var(--primary-light); padding: 8px 15px; border-radius: 8px; margin: 20px 0 15px; font-weight: 800; color: var(--primary); border-right: 4px solid var(--primary); }
    .grid-4-cols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .grid-3-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .row-flex { display: flex; gap: 20px; align-items: center; }
    .modal-footer { padding: 15px 25px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px; }
    .btn-save { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; }

    /* تنسيقات نافذة التأكيد */
    .tera-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 10000; display: none; align-items: center; justify-content: center; }
    .tera-confirm-content { background: white; padding: 40px 30px; border-radius: 24px; text-align: center; max-width: 400px; width: 95%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    .confirm-icon-circle { width: 70px; height: 70px; background: #fff7ed; color: #f97316; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2rem; }
    .confirm-actions { display: flex; gap: 12px; margin-top: 25px; }
    .confirm-actions button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
    .btn-confirm-yes { background: #f97316; color: white; }
    .btn-confirm-no { background: #f1f5f9; color: #64748b; }

    @keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>

<script>
    /**
     * دالة عرض نافذة التأكيد
     */
    window.showConfirm = (title, message, onConfirm) => {
        const modal = document.getElementById('confirm-modal');
        document.getElementById('confirm-title').innerText = title;
        document.getElementById('confirm-message').innerHTML = message;
        modal.style.display = 'flex';

        document.getElementById('confirm-yes').onclick = () => {
            onConfirm();
            modal.style.display = 'none';
        };
        document.getElementById('confirm-no').onclick = () => modal.style.display = 'none';
    };

    /**
     * إغلاق نافذة العميل
     */
    window.closeCustomerModal = () => {
        document.getElementById('customer-modal').style.display = 'none';
        document.getElementById('customer-form').reset();
    };
</script>
