<div id="customer-modal" class="modal-overlay" style="display: none; animation: fadeIn 0.3s ease;">
    <div class="modal-card tera-premium-shadow">
        <!-- الهيدر -->
        <div class="modal-header-tera">
            <div class="header-title-wrap">
                <div class="icon-circle">
                    <i class="fas fa-user-plus"></i>
                </div>
                <div>
                    <h3 id="modal-title">إضافة عميل جديد</h3>
                    <p class="subtitle">نظام إدارة سجلات تيرا جيت واي</p>
                </div>
            </div>
            <button class="close-btn-tera" onclick="window.closeCustomerModal()">&times;</button>
        </div>

        <!-- البودي -->
        <div class="modal-body-tera">
            <form id="customer-form">
                <!-- رفع الصورة -->
                <div class="image-profile-upload-tera">
                    <div class="profile-preview-wrapper">
                        <img id="cust-img-preview" src="admin/images/default-avatar.png" alt="صورة العميل" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                        <label for="cust-image-file" class="upload-badge">
                            <i class="fas fa-camera"></i>
                            <input type="file" id="cust-image-file" accept="image/*" style="display: none;" onchange="previewCustomerImage(event)">
                        </label>
                    </div>
                    <div class="upload-info">
                        <span class="main-label">صورة الهوية أو العميل</span>
                        <span class="sub-label">يفضل أن تكون بصيغة PNG أو JPG</span>
                    </div>
                </div>

                <div class="form-section-tera">
                    <div class="section-title"><i class="fas fa-id-card"></i> البيانات الشخصية والاتصال</div>
                    <div class="grid-3-cols">
                        <div class="input-group-tera">
                            <label>اسم العميل الكامل</label>
                            <input type="text" id="cust-name" name="name" placeholder="محمد صالح الشمري" required>
                        </div>
                        <div class="input-group-tera">
                            <label>رقم الجوال</label>
                            <div class="phone-input-wrap">
                                <input type="tel" id="cust-phone" name="phone" dir="ltr" placeholder="5XXXXXXXX" required>
                                <span class="country-tag">966+</span>
                            </div>
                        </div>
                        <div class="input-group-tera">
                            <label>تصنيف العميل</label>
                            <select id="cust-tag" name="tag">
                                <option value="regular">عميل عادي (Regular)</option>
                                <option value="vip">عميل مميز (VIP)</option>
                                <option value="blacklisted">قائمة سوداء</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section-tera bg-light">
                    <div class="section-title"><i class="fas fa-map-marked-alt"></i> العنوان الوطني (SPL)</div>
                    <div class="grid-4-cols">
                        <div class="input-group-tera">
                            <label>المدينة</label>
                            <input type="text" id="cust-city" name="city" value="حائل">
                        </div>
                        <div class="input-group-tera">
                            <label>الحي</label>
                            <input type="text" id="cust-district" name="district">
                        </div>
                        <div class="input-group-tera">
                            <label>الشارع</label>
                            <input type="text" id="cust-street" name="street">
                        </div>
                        <div class="input-group-tera">
                            <label>رقم المبنى</label>
                            <input type="text" id="cust-buildingNo" name="buildingNo">
                        </div>
                    </div>
                </div>

                <div class="input-group-tera full-width" style="margin-top: 15px;">
                    <label>ملاحظات إضافية</label>
                    <textarea id="cust-notes" name="notes" rows="2" placeholder="اكتب أي تفاصيل أخرى هنا..."></textarea>
                </div>
            </form>
        </div>

        <!-- الفوتر -->
        <div class="modal-footer-tera">
            <button type="button" class="btn-tera secondary" onclick="window.closeCustomerModal()">إلغاء</button>
            <button type="button" class="btn-tera primary" id="btn-save-customer">
                <i class="fas fa-save"></i> حفظ العميل
            </button>
        </div>
    </div>
</div>

<style>
    /* التكملة والإصلاحات للـ CSS */
    .grid-3-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .grid-4-cols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .full-width { width: 100%; }
    .mt-15 { margin-top: 15px; }

    .modal-footer-tera {
        padding: 20px 30px;
        background: #f8fafc;
        border-top: 1px solid #f1f5f9;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
    }

    .btn-tera {
        padding: 12px 25px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        font-family: 'Cairo', sans-serif;
        transition: 0.3s;
    }

    .btn-tera.primary { background: #f97316; color: white; }
    .btn-tera.secondary { background: #e2e8f0; color: #475569; }
    .btn-tera:hover { transform: translateY(-2px); opacity: 0.9; }

    @media (max-width: 768px) {
        .grid-3-cols, .grid-4-cols { grid-template-columns: 1fr; }
        .modal-card { max-height: 95vh; border-radius: 0; }
    }
</style>
