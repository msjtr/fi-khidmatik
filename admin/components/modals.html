<div id="customer-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card shadow-lg">
        <div class="modal-header">
            <h3 id="modal-title"><i class="fas fa-user-plus"></i> إضافة عميل جديد</h3>
            <button class="close-btn" onclick="window.closeCustomerModal()">&times;</button>
        </div>

        <div class="modal-body">
            <form id="customer-form">
                <div class="form-section-header">البيانات الشخصية والاتصال</div>
                <div class="grid-3-cols">
                    <div class="input-group">
                        <label>الاسم الكامل (1)</label>
                        <input type="text" id="cust-name" placeholder="الاسم الثلاثي" required>
                    </div>
                    <div class="input-group">
                        <label>رقم الجوال (2)</label>
                        <input type="tel" id="cust-phone" dir="ltr" placeholder="05xxxxxxxx" required>
                    </div>
                    <div class="input-group">
                        <label>رقم الهوية / الإقامة (3)</label>
                        <input type="text" id="cust-national-id" placeholder="10xxxxxxxx">
                    </div>
                    <div class="input-group">
                        <label>البريد الإلكتروني (4)</label>
                        <input type="email" id="cust-email" placeholder="mail@example.com">
                    </div>
                    <div class="input-group">
                        <label>تاريخ الميلاد (5)</label>
                        <input type="date" id="cust-dob">
                    </div>
                    <div class="input-group">
                        <label>الجنس (6)</label>
                        <select id="cust-gender">
                            <option value="ذكر">ذكر</option>
                            <option value="أنثى">أنثى</option>
                        </select>
                    </div>
                </div>

                <div class="form-section-header">بيانات العنوان الوطني (العنوان المسجل)</div>
                <div class="grid-4-cols">
                    <div class="input-group">
                        <label>المدينة (7)</label>
                        <input type="text" id="cust-city" placeholder="مثال: حائل">
                    </div>
                    <div class="input-group">
                        <label>الحي (8)</label>
                        <input type="text" id="cust-district">
                    </div>
                    <div class="input-group">
                        <label>اسم الشارع (9)</label>
                        <input type="text" id="cust-street">
                    </div>
                    <div class="input-group">
                        <label>رقم المبنى (10)</label>
                        <input type="text" id="cust-building-no" placeholder="4 أرقام">
                    </div>
                    <div class="input-group">
                        <label>الرمز البريدي (11)</label>
                        <input type="text" id="cust-zip-code" placeholder="5 أرقام">
                    </div>
                    <div class="input-group">
                        <label>الرقم الإضافي (12)</label>
                        <input type="text" id="cust-additional-no" placeholder="4 أرقام">
                    </div>
                    <div class="input-group">
                        <label>رقم الوحدة (13)</label>
                        <input type="text" id="cust-unit-no">
                    </div>
                </div>

                <div class="form-section-header">بيانات العمل والحالة المالية</div>
                <div class="grid-3-cols">
                    <div class="input-group">
                        <label>جهة العمل (14)</label>
                        <input type="text" id="cust-employer" placeholder="اسم الشركة أو الوزارة">
                    </div>
                    <div class="input-group">
                        <label>الراتب الشهري (15)</label>
                        <input type="number" id="cust-salary" placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label>حالة الالتزام (16)</label>
                        <select id="cust-commitment">
                            <option value="ملتزم">ملتزم</option>
                            <option value="متعثر">متعثر</option>
                            <option value="قائمة سوداء">قائمة سوداء</option>
                        </select>
                    </div>
                </div>

                <div class="form-section-header">إضافات</div>
                <div class="input-group full-width">
                    <label>ملاحظات إضافية (17)</label>
                    <textarea id="cust-notes" rows="3" placeholder="أي معلومات أخرى تخص العميل..."></textarea>
                </div>
            </form>
        </div>

        <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="window.closeCustomerModal()">إلغاء</button>
            <button type="button" class="btn-save" id="btn-save-customer">
                <i class="fas fa-save"></i> حفظ في قاعدة البيانات
            </button>
        </div>
    </div>
</div>

<div id="confirm-modal" class="tera-modal-overlay" style="display: none;">
    <div class="tera-confirm-content">
        <div class="confirm-icon-circle"><i class="fas fa-exclamation-triangle"></i></div>
        <h3 id="confirm-title">تأكيد الإجراء</h3>
        <p id="confirm-message">هل أنت متأكد؟</p>
        <div class="confirm-actions">
            <button id="confirm-yes" class="btn-confirm-yes">نعم، متأكد</button>
            <button id="confirm-no" class="btn-confirm-no" onclick="window.closeConfirmModal()">تراجع</button>
        </div>
    </div>
</div>
