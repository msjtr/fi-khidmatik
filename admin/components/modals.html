<!-- 
    Tera Gateway v12.12.12 | Customer Management Modal
    مزامنة حقول مجموعة Customers - منطقة حائل
-->

<div id="customer-modal" class="tera-modal-overlay">
    <div class="tera-modal-card tera-premium-shadow animate-pop-in" style="max-width: 950px;">
        
        <!-- الهيدر الاحترافي -->
        <div class="tera-modal-header">
            <div class="tera-modal-title-wrap">
                <div class="tera-modal-icon">
                    <i class="fas fa-id-card-clip"></i>
                </div>
                <div>
                    <h3 id="modal-title" style="margin:0; font-weight:800; color:var(--tera-dark);">إدارة الملف الشخصي الكامل</h3>
                    <p class="mb-0 text-muted" style="font-size: 0.75rem;">
                        <i class="fas fa-database text-success me-1"></i> مزامنة Firestore | فرع حائل
                    </p>
                </div>
            </div>
            <button class="tera-modal-close" onclick="window.closeCustomerModal()" title="إغلاق">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="tera-modal-body" style="background: #ffffff;">
            <form id="customer-form" autocomplete="off">
                <input type="hidden" id="cust-id-hidden">
                
                <!-- القسم العلوي: الصورة والبيانات الأساسية -->
                <div class="row g-4 mb-4 border-bottom pb-4">
                    <div class="col-md-3 text-center border-start">
                        <div class="profile-upload-container position-relative d-inline-block">
                            <div class="profile-preview-wrapper glass-effect shadow-sm mb-2" 
                                 style="width: 140px; height: 140px; border-radius: 24px; overflow: hidden; border: 3px solid #fff;">
                                <img id="cust-img-preview" src="images/default-avatar.png" 
                                     style="width: 100%; height: 100%; object-fit: cover;"
                                     onerror="this.src='https://ui-avatars.com/api/?background=f8fafc&color=cbd5e1'">
                            </div>
                            <label for="cust-image-file" class="upload-badge shadow-lg" 
                                   style="position: absolute; bottom: 10px; left: -5px; background: var(--tera-orange); color: white; width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                                <i class="fas fa-camera"></i>
                                <input type="file" id="cust-image-file" name="profileImage" accept="image/*" style="display: none;" onchange="window.previewCustomerImage(event)">
                            </label>
                        </div>
                        <p class="text-muted mt-2" style="font-size: 0.7rem;">صورة العميل الشخصية</p>
                    </div>

                    <div class="col-md-9">
                        <div class="section-badge mb-3">
                            <span class="badge bg-soft-orange text-orange px-3 py-2 rounded-pill">1. المعلومات الأساسية</span>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-5">
                                <div class="tera-input-group">
                                    <label class="form-label fw-bold">الاسم الرباعي الكامل</label>
                                    <input type="text" id="cust-name" name="name" class="form-control tera-field" placeholder="محمد صالح الشمري..." required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="tera-input-group">
                                    <label class="form-label fw-bold">رقم الجوال</label>
                                    <div class="input-group dir-ltr">
                                        <span class="input-group-text bg-light">+966</span>
                                        <input type="tel" id="cust-phone" name="phone" class="form-control tera-field" placeholder="59XXXXXXX" maxlength="9" required>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="tera-input-group">
                                    <label class="form-label fw-bold">التصنيف</label>
                                    <select id="cust-tag" name="tag" class="form-select tera-field">
                                        <option value="أفراد">أفراد</option>
                                        <option value="vip">عميل VIP 💎</option>
                                        <option value="شركات">شركات / جملة</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="tera-input-group">
                                    <label class="form-label fw-bold">البريد الإلكتروني</label>
                                    <input type="email" id="cust-email" name="email" class="form-control tera-field" placeholder="name@domain.com">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="tera-input-group">
                                    <label class="form-label fw-bold">رقم الهوية / السجل</label>
                                    <input type="text" id="cust-national-id" class="form-control tera-field" placeholder="10XXXXXXXX">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- القسم الثاني: العنوان الوطني (تصميم شبكي) -->
                <div class="address-section p-4 rounded-4" style="background: #f8fafc; border: 1px dashed #cbd5e1;">
                    <div class="section-badge mb-3">
                        <span class="badge bg-soft-blue text-blue px-3 py-2 rounded-pill">2. بيانات العنوان الوطني</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="fs-xs fw-bold mb-1">المدينة</label>
                            <input type="text" id="cust-city" name="city" class="form-control tera-field-sm" value="حائل">
                        </div>
                        <div class="col-md-3">
                            <label class="fs-xs fw-bold mb-1">الحي</label>
                            <input type="text" id="cust-district" name="district" class="form-control tera-field-sm" placeholder="مثلاً: النقرة">
                        </div>
                        <div class="col-md-6">
                            <label class="fs-xs fw-bold mb-1">اسم الشارع</label>
                            <input type="text" id="cust-street" name="street" class="form-control tera-field-sm" placeholder="شارع الملك فهد">
                        </div>
                        <div class="col-md-3">
                            <label class="fs-xs fw-bold mb-1">رقم المبنى</label>
                            <input type="text" id="cust-buildingNo" maxlength="5" class="form-control tera-field-sm text-center font-monospace" placeholder="0000">
                        </div>
                        <div class="col-md-3">
                            <label class="fs-xs fw-bold mb-1">الرمز البريدي</label>
                            <input type="text" id="cust-postalCode" maxlength="5" class="form-control tera-field-sm text-center font-monospace" placeholder="00000">
                        </div>
                        <div class="col-md-3">
                            <label class="fs-xs fw-bold mb-1">الرقم الإضافي</label>
                            <input type="text" id="cust-additionalNo" maxlength="4" class="form-control tera-field-sm text-center font-monospace" placeholder="0000">
                        </div>
                        <div class="col-md-3">
                            <label class="fs-xs fw-bold mb-1">وحدة / شقة</label>
                            <input type="text" id="cust-unitNo" class="form-control tera-field-sm text-center" placeholder="--">
                        </div>
                    </div>
                </div>

                <!-- القسم الثالث: ملاحظات النظام -->
                <div class="mt-4">
                    <label class="form-label fw-bold"><i class="fas fa-pen-nib me-1"></i> ملاحظات إضافية</label>
                    <textarea id="cust-notes" name="notes" class="form-control tera-field" rows="3" placeholder="أدخل أية تفاصيل ائتمانية أو ملاحظات حول العميل..."></textarea>
                </div>
            </form>
        </div>

        <!-- الفوتر -->
        <div class="tera-modal-footer">
            <div class="security-info">
                <span class="text-muted fs-xs"><i class="fas fa-shield-halved text-primary me-1"></i> تشفير بيانات العميل نشط</span>
            </div>
            <div class="action-buttons d-flex gap-2">
                <button type="button" class="btn btn-light px-4 rounded-pill fw-bold" onclick="window.closeCustomerModal()">إلغاء</button>
                <button type="button" class="btn btn-primary-gradient px-4 rounded-pill fw-bold shadow-sm" id="btn-save-customer" onclick="window.handleCustomerSubmit(event)">
                    <span>حفظ البيانات</span>
                    <i class="fas fa-check-circle ms-2"></i>
                </button>
            </div>
        </div>
    </div>
</div>
