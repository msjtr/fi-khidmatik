<!-- شريط الرأس -->
<header class="app-header">
    <div class="header-right">
        <button id="sidebar-toggle" class="sidebar-trigger">
            <i class="fas fa-bars"></i>
        </button>
        <div class="app-brand">
            <img src="/fi-khidmatik/images/logo.svg" alt="Tera Gateway" style="width: 40px; height: 40px;">
            <span>Tera Gateway</span>
        </div>
    </div>
    <div id="header-datetime" class="header-clock"></div>
</header>

<script>
    function updateHeaderTime() {
        const el = document.getElementById('header-datetime');
        if (el) {
            el.innerText = new Date().toLocaleDateString('en-GB', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit', hour12: true
            });
        }
    }
    updateHeaderTime();
    setInterval(updateHeaderTime, 1000);
</script>
