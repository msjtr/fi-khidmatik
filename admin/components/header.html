<header class="app-header">
    <div class="header-right">
        <button id="sidebar-toggle" class="sidebar-trigger" aria-label="Toggle Sidebar">
            <i class="fas fa-bars-staggered"></i>
        </button>
        
        <div class="app-brand">
            <img src="images/logo.svg" 
                 alt="Tera Gateway" 
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968322.png'"
                 class="header-logo">
            <span class="brand-text">Tera <b class="highlight">Gateway</b></span>
        </div>
    </div>

    <div id="header-datetime" class="header-clock">
        <i class="fas fa-calendar-day" style="margin-left: 8px; opacity: 0.7;"></i>
        <span id="time-display">جاري التحميل...</span>
    </div>
</header>

<style>
    :root {
        --primary-tera: #2563eb;
        --primary-soft: rgba(37, 99, 235, 0.1);
        --header-bg: rgba(255, 255, 255, 0.85);
        --border-color: #e2e8f0;
    }

    .app-header {
        background: var(--header-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
        height: 70px;
        width: 100%;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .sidebar-trigger {
        background: var(--primary-soft);
        border: none;
        width: 42px;
        height: 42px;
        border-radius: 12px;
        color: var(--primary-tera);
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-trigger:hover {
        background: var(--primary-tera);
        color: white;
        transform: scale(1.05);
    }

    .app-brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .header-logo {
        width: 35px;
        height: 35px;
        object-fit: contain;
    }

    .brand-text {
        font-weight: 800;
        font-size: 1.2rem;
        color: #1e293b;
        letter-spacing: -0.5px;
    }

    .brand-text .highlight {
        color: var(--primary-tera);
    }

    .header-clock {
        font-family: 'Tajawal', sans-serif;
        font-size: 0.85rem;
        color: #64748b;
        font-weight: 700;
        background: #f8fafc;
        padding: 8px 18px;
        border-radius: 50px;
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        min-width: 220px;
        justify-content: center;
    }

    @media (max-width: 768px) {
        .brand-text { display: none; }
        .header-clock { min-width: auto; padding: 6px 12px; font-size: 0.75rem; }
    }
</style>

<script>
    /**
     * تحديث الساعة والتاريخ بأرقام إنجليزية وتنسيق عربي
     */
    function updateHeaderTime() {
        const timeEl = document.getElementById('time-display');
        if (timeEl) {
            const now = new Date();
            const options = {
                weekday: 'short',
                day: 'numeric',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            };
            // استخدم 'en-GB' لضمان بقاء الأرقام إنجليزية (123) كما تفضل في المراسلات
            const formatted = now.toLocaleDateString('en-GB', options);
            timeEl.innerText = formatted.replace(',', ' |');
        }
    }

    // تشغيل فوري للساعة
    updateHeaderTime();
    
    // منع تكرار الـ Interval
    if (window.headerClockInterval) clearInterval(window.headerClockInterval);
    window.headerClockInterval = setInterval(updateHeaderTime, 1000);

    // تفعيل السايدبار
    const toggleBtn = document.getElementById('sidebar-toggle');
    if (toggleBtn) {
        toggleBtn.onclick = function() {
            const sidebar = document.getElementById('sidebar-placeholder');
            if (sidebar) {
                sidebar.classList.toggle('collapsed');
                localStorage.setItem('sidebar-state', sidebar.classList.contains('collapsed') ? 'collapsed' : 'expanded');
            }
        };
    }
</script>
