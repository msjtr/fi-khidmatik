<header class="app-header">
    <div class="header-right">
        <button id="sidebar-toggle" class="sidebar-trigger" aria-label="Toggle Sidebar">
            <i class="fas fa-bars-staggered"></i>
        </button>
        
        <div class="app-brand">
            <img src="images/logo.svg" 
                 alt="Tera Gateway" 
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968322.png'"
                 class="header-logo">
            <span class="brand-text">Tera <b class="highlight">Gateway</b></span>
        </div>
    </div>

    <div id="header-datetime" class="header-clock">
        <i class="far fa-clock" style="margin-left: 10px; color: var(--primary-tera);"></i>
        <span id="time-display">00:00:00</span>
    </div>
</header>

<style>
    :root {
        --primary-tera: #f97316;
        --primary-soft: rgba(249, 115, 22, 0.08);
        --header-bg: rgba(255, 255, 255, 0.9);
        --border-color: #f1f5f9;
        --tera-dark: #1e293b;
    }

    .app-header {
        background: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 25px;
        height: 70px;
        width: 100%;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .sidebar-trigger {
        background: var(--primary-soft);
        border: 1px solid rgba(249, 115, 22, 0.1);
        width: 40px;
        height: 40px;
        border-radius: 10px;
        color: var(--primary-tera);
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
    }

    .sidebar-trigger:hover {
        background: var(--primary-tera);
        color: white;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
    }

    .app-brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .header-logo {
        width: 32px;
        height: 32px;
        object-fit: contain;
    }

    .brand-text {
        font-weight: 800;
        font-size: 1.15rem;
        color: var(--tera-dark);
        letter-spacing: -0.2px;
    }

    .brand-text .highlight {
        color: var(--primary-tera);
        font-weight: 900;
    }

    .header-clock {
        font-family: 'Cairo', sans-serif; /* تغيير للخط المعتمد في المشروع */
        font-size: 0.9rem;
        color: #475569;
        font-weight: 700;
        background: #f8fafc;
        padding: 8px 20px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        min-width: 250px;
        justify-content: center;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    @media (max-width: 768px) {
        .brand-text { display: none; }
        .header-clock { min-width: auto; padding: 6px 12px; font-size: 0.8rem; }
    }
</style>

<script>
    (function() {
        /**
         * تحديث الساعة والتاريخ
         */
        function updateHeaderTime() {
            const timeEl = document.getElementById('time-display');
            if (timeEl) {
                const now = new Date();
                
                const timeOptions = {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                };
                
                const dateOptions = {
                    day: 'numeric',
                    month: 'short',
                    year: 'numeric'
                };

                const timeStr = now.toLocaleTimeString('en-US', timeOptions);
                const dateStr = now.toLocaleDateString('en-GB', dateOptions);
                
                timeEl.innerText = `${dateStr} | ${timeStr.toUpperCase()}`;
            }
        }

        // تنظيف أي إنترفال قديم وتفعيل الجديد
        if (window.headerClockInterval) clearInterval(window.headerClockInterval);
        updateHeaderTime();
        window.headerClockInterval = setInterval(updateHeaderTime, 1000);

        // تفعيل إخفاء القائمة الجانبية (Sidebar Toggle)
        const toggleBtn = document.getElementById('sidebar-toggle');
        if (toggleBtn) {
            toggleBtn.onclick = function() {
                // ملاحظة: الروتر يضع السايدبار داخل #sidebar-container
                const sidebar = document.getElementById('sidebar-container');
                if (sidebar) {
                    sidebar.classList.toggle('collapsed');
                    const isCollapsed = sidebar.classList.contains('collapsed');
                    localStorage.setItem('sidebar-state', isCollapsed ? 'collapsed' : 'expanded');
                }
            };
        }
    })();
</script>
