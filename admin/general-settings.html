<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإعدادات العامة</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { db, doc, getDoc, setDoc } from '../js/firebase.js';
        
        async function loadGeneralSettings() {
            const docRef = doc(db, 'settings', 'general');
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('siteName').value = data.siteName || '';
                document.getElementById('currency').value = data.currency || '';
                document.getElementById('platformStamp').value = data.platformStamp || '';
                document.getElementById('contactEmail').value = data.contactEmail || '';
                document.getElementById('whatsapp').value = data.whatsapp || '';
            }
        }
        
        window.saveGeneralSettings = async () => {
            const settings = {
                siteName: document.getElementById('siteName').value,
                currency: document.getElementById('currency').value,
                platformStamp: document.getElementById('platformStamp').value,
                contactEmail: document.getElementById('contactEmail').value,
                whatsapp: document.getElementById('whatsapp').value,
                updatedAt: new Date().toISOString()
            };
            const docRef = doc(db, 'settings', 'general');
            await setDoc(docRef, settings);
            alert('تم حفظ الإعدادات العامة بنجاح');
        };
        
        loadGeneralSettings();
        window.saveGeneralSettings = saveGeneralSettings;
    </script>
</head>
<body class="bg-gray-50 p-6">
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-2xl font-bold mb-4"><i class="fas fa-sliders-h ml-2"></i>الإعدادات العامة</h2>
        <div class="space-y-4">
            <div>
                <label class="block font-semibold mb-1">اسم الموقع:</label>
                <input id="siteName" type="text" class="border rounded-lg w-full p-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block font-semibold mb-1">رمز العملة:</label>
                <input id="currency" type="text" class="border rounded-lg w-full p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="مثال: ريال، USD، SAR">
            </div>
            <div>
                <label class="block font-semibold mb-1">ختم المنصة (تذييل):</label>
                <textarea id="platformStamp" rows="2" class="border rounded-lg w-full p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="يظهر في أسفل الصفحات والفاتورة"></textarea>
            </div>
            <div>
                <label class="block font-semibold mb-1">بريد الدعم:</label>
                <input id="contactEmail" type="email" class="border rounded-lg w-full p-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block font-semibold mb-1">رقم واتساب الدعم:</label>
                <input id="whatsapp" type="text" class="border rounded-lg w-full p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="مثال: 9665xxxxxxxx">
            </div>
            <button onclick="saveGeneralSettings()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">
                <i class="fas fa-save ml-1"></i>حفظ الإعدادات
            </button>
        </div>
    </div>
</body>
</html>
